<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Library — Wade Classical</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; min-height:100vh; overflow-x:hidden; }

body {
  background: #0a0704;
  font-family: 'Cormorant Garamond', serif;
  color: #e8d8b8;
}

/* ── SCENE ── */
#scene {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
}

/* ── BACKGROUND: Stone Hall ── */
.hall-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  /* Deep warm stone gradient */
  background:
    radial-gradient(ellipse at 50% 0%, #3a1f08 0%, transparent 55%),
    radial-gradient(ellipse at 20% 50%, #1a0e04 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, #1a0e04 0%, transparent 50%),
    linear-gradient(180deg, #0f0804 0%, #160d06 30%, #1a0f07 60%, #0d0804 100%);
}

/* Stone floor perspective */
.hall-floor {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 35vh;
  z-index: 1;
  background:
    linear-gradient(180deg, transparent 0%, rgba(30,18,8,0.7) 40%, #0d0804 100%);
  /* Stone tile pattern */
  background-image:
    linear-gradient(180deg, transparent 0%, rgba(30,18,8,0.8) 50%, #0a0603 100%),
    repeating-linear-gradient(90deg, transparent 0px, transparent 119px, rgba(40,24,10,0.5) 119px, rgba(40,24,10,0.5) 120px),
    repeating-linear-gradient(0deg, transparent 0px, transparent 59px, rgba(40,24,10,0.4) 59px, rgba(40,24,10,0.4) 60px);
}

/* Towering bookshelves on sides */
.bookshelf {
  position: fixed;
  top: 0; bottom: 0;
  width: 220px;
  z-index: 2;
  pointer-events: none;
}
.bookshelf-left  { left: 0; }
.bookshelf-right { right: 0; transform: scaleX(-1); }

/* Ceiling vaults */
.ceiling-vault {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 200px;
  z-index: 2;
  pointer-events: none;
  background: linear-gradient(180deg, #0a0603 0%, transparent 100%);
}

/* Candle sconces */
.sconce {
  position: fixed;
  z-index: 4;
  display: flex;
  flex-direction: column;
  align-items: center;
  pointer-events: none;
}
.sconce-flame-wrap { position: relative; margin-bottom: -3px; }
.sconce-flame {
  width: 10px; height: 20px;
  background: radial-gradient(ellipse at 50% 85%, #fff8c0 0%, #f5c842 35%, #e87020 65%, transparent 100%);
  border-radius: 50% 50% 30% 30%;
  animation: sFlicker var(--fs, 2.2s) ease-in-out infinite;
  filter: blur(0.5px);
  box-shadow: 0 0 8px 4px rgba(245,200,60,0.65), 0 0 20px 8px rgba(245,150,20,0.25);
}
@keyframes sFlicker {
  0%   { opacity:1;    transform:scaleY(1)    scaleX(1)    rotate(0deg);  }
  8%   { opacity:.85;  transform:scaleY(.88)  scaleX(1.06) rotate(-2deg); }
  15%  { opacity:.95;  transform:scaleY(1.1)  scaleX(.94)  rotate(1.5deg);}
  22%  { opacity:.78;  transform:scaleY(.92)  scaleX(1.05) rotate(-1deg); }
  30%  { opacity:1;    transform:scaleY(1.06) scaleX(.97)  rotate(.5deg); }
  38%  { opacity:.88;  transform:scaleY(.95)  scaleX(1.03) rotate(-1.5deg);}
  46%  { opacity:.96;  transform:scaleY(1.08) scaleX(.96)  rotate(2deg);  }
  55%  { opacity:.82;  transform:scaleY(.9)   scaleX(1.07) rotate(-2deg); }
  63%  { opacity:.97;  transform:scaleY(1.05) scaleX(.98)  rotate(1deg);  }
  72%  { opacity:.86;  transform:scaleY(.93)  scaleX(1.04) rotate(-1deg); }
  80%  { opacity:1;    transform:scaleY(1.07) scaleX(.96)  rotate(1.5deg);}
  90%  { opacity:.9;   transform:scaleY(.97)  scaleX(1.02) rotate(-1deg); }
  100% { opacity:1;    transform:scaleY(1)    scaleX(1)    rotate(0deg);  }
}
.sconce-body {
  width: 18px; height: 40px;
  background: linear-gradient(90deg, #2a1a08, #4a2e10, #2a1a08);
  border-radius: 3px 3px 0 0;
  box-shadow: inset 0 0 6px rgba(245,200,60,0.2);
}
.sconce-arm {
  width: 50px; height: 8px;
  background: linear-gradient(180deg, #3a2010, #2a1808);
  border-radius: 0 4px 4px 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.6);
}
.sconce-glow {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  animation: sGlow var(--fs, 2.2s) ease-in-out infinite;
}
@keyframes sGlow { 0%,100%{opacity:.6} 50%{opacity:.9} }

/* Floating candles */
.float-candle {
  position: fixed;
  z-index: 50;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: cFloat var(--cf, 8s) var(--cd, 0s) ease-in-out infinite alternate;
}
@keyframes cFloat { 0%{transform:translateY(0) rotate(var(--cr,0deg))} 100%{transform:translateY(-18px) rotate(calc(var(--cr,0deg) + 2deg))} }
.float-candle-flame {
  width: 7px; height: 14px;
  background: radial-gradient(ellipse at 50% 85%, #fff8c0 0%, #f5c842 40%, #e87020 70%, transparent 100%);
  border-radius: 50% 50% 30% 30%;
  animation: sFlicker var(--ff, 1.8s) ease-in-out infinite;
  box-shadow: 0 0 5px 2px rgba(245,200,60,0.5);
}
.float-candle-body {
  width: 8px; height: 32px;
  background: linear-gradient(90deg, #e8dcc8, #fff5e8, #e0d0b8);
  border-radius: 2px;
}
.float-candle-drip {
  position: absolute;
  top: 12px; right: 0px;
  width: 3px; height: 8px;
  background: linear-gradient(180deg, #f5ead8, #e0d0b8);
  border-radius: 0 0 3px 3px;
  opacity: 0.7;
}

/* Floating candle glow on floor */
.float-candle-glow {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  animation: sGlow 3s ease-in-out infinite;
}

/* ── MAIN CONTENT ── */
.content {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 1100px;
  margin: 0 auto;
  padding: 60px 40px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── HEADER ── */
.hall-header {
  text-align: center;
  margin-bottom: 64px;
}
.hall-eyebrow {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: #8a7040;
  margin-bottom: 14px;
}
.hall-title {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: clamp(36px, 6vw, 64px);
  color: #f0e0b0;
  font-weight: 400;
  letter-spacing: 2px;
  text-shadow: 0 0 60px rgba(245,200,80,0.3), 0 2px 20px rgba(0,0,0,0.8);
  margin-bottom: 16px;
  line-height: 1.1;
}
.hall-subtitle {
  font-style: italic;
  font-size: 17px;
  color: #8a7858;
  letter-spacing: 0.5px;
}
.hall-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 20px;
  justify-content: center;
}
.hall-divider-line {
  width: 80px; height: 1px;
  background: linear-gradient(90deg, transparent, #6a5030);
}
.hall-divider-gem { color: #8a7040; font-size: 14px; }

/* ── DOORS GRID ── */
.doors-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 32px;
  width: 100%;
  max-width: 900px;
}

/* ── INDIVIDUAL DOOR ── */
.door-wrap {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-decoration: none;
  cursor: pointer;
}
.door-wrap.coming-soon { cursor: default; }

/* Stone arch frame */
.door-arch {
  position: relative;
  width: 100%;
  aspect-ratio: 10 / 13;
  border-radius: 50% 50% 0 0 / 25% 25% 0 0;
  overflow: hidden;
  transition: transform 0.35s cubic-bezier(.2,.8,.3,1);
  box-shadow:
    0 0 0 3px #2a1a08,
    0 0 0 6px #1a1008,
    0 0 30px rgba(0,0,0,0.8),
    inset 0 0 30px rgba(0,0,0,0.5);
}
.door-wrap:not(.coming-soon):hover .door-arch {
  transform: scale(1.02) translateY(-4px);
}
.door-wrap:not(.coming-soon):hover .door-light {
  opacity: 1;
}

/* Door face */
.door-face {
  position: absolute;
  inset: 0;
  overflow: hidden;
}

/* Door wood panels */
.door-wood {
  position: absolute;
  inset: 0;
  border-radius: inherit;
}
.door-panel {
  position: absolute;
  border-radius: 3px;
  box-shadow: inset 0 2px 4px rgba(255,255,255,0.05), inset 0 -2px 4px rgba(0,0,0,0.3);
}

/* Light leaking under door */
.door-light {
  position: absolute;
  bottom: 0; left: 10%; right: 10%;
  height: 4px;
  border-radius: 50%;
  opacity: 0.5;
  transition: opacity 0.35s;
  filter: blur(4px);
}

/* Door keyhole */
.door-keyhole {
  position: absolute;
  bottom: 22%;
  left: 50%;
  transform: translateX(-50%);
  width: 14px;
  height: 22px;
  z-index: 3;
}
.keyhole-circle {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: rgba(0,0,0,0.8);
  border: 1px solid rgba(200,160,80,0.3);
  margin: 0 auto;
}
.keyhole-slot {
  width: 5px; height: 12px;
  background: rgba(0,0,0,0.8);
  border: 1px solid rgba(200,160,80,0.2);
  border-top: none;
  margin: 0 auto;
  border-radius: 0 0 3px 3px;
}

/* Door handle */
.door-handle {
  position: absolute;
  width: 8px; height: 24px;
  border-radius: 4px;
  bottom: 30%;
  right: 22%;
  z-index: 3;
  background: linear-gradient(90deg, #c8a840, #f0d060, #a88030);
  box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

/* Door nameplate */
.door-nameplate {
  position: absolute;
  bottom: 14%;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #3a2808, #5a3e18, #3a2808);
  border: 1px solid rgba(200,160,60,0.3);
  border-radius: 3px;
  padding: 5px 14px;
  white-space: nowrap;
  z-index: 3;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,220,100,0.1);
}
.door-nameplate-text {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 2px;
  color: #d4a840;
  text-transform: uppercase;
}

/* Door icon */
.door-icon {
  position: absolute;
  top: 18%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 28px;
  z-index: 3;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
}

/* Door arch stone surround */
.door-surround {
  position: absolute;
  inset: 0;
  border-radius: 50% 50% 0 0 / 25% 25% 0 0;
  box-shadow: inset 0 0 0 8px #1e1408, inset 0 0 0 10px #2a1e10;
  pointer-events: none;
  z-index: 4;
}

/* Coming soon overlay */
.coming-soon-overlay {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
}
.coming-soon-badge {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #8a7040;
  border: 1px solid #4a3818;
  padding: 6px 16px;
  border-radius: 2px;
  background: rgba(10,7,3,0.8);
}

/* Door label below */
.door-label {
  margin-top: 16px;
  text-align: center;
}
.door-label-name {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  letter-spacing: 2px;
  color: #c8a848;
  margin-bottom: 4px;
}
.door-label-desc {
  font-style: italic;
  font-size: 13px;
  color: #6a5838;
}

/* Hover glow effect */
.door-wrap:not(.coming-soon) .door-arch::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: rgba(245,200,80,0);
  transition: background 0.35s;
  pointer-events: none;
  z-index: 2;
}
.door-wrap:not(.coming-soon):hover .door-arch::after {
  background: rgba(245,200,80,0.04);
}

/* Back link */
.back-link {
  position: fixed;
  top: 20px; left: 24px;
  z-index: 20;
  color: #6a5030;
  text-decoration: none;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: color 0.2s;
}
.back-link:hover { color: #c8a848; }

/* Footer */
.hall-footer {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 40px 0 30px;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #3a2810;
}

/* Smoke/mist at floor level */
.floor-mist {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 120px;
  z-index: 3;
  background: linear-gradient(0deg, rgba(20,12,5,0.4) 0%, transparent 100%);
  pointer-events: none;
  animation: mistDrift 12s ease-in-out infinite alternate;
}
@keyframes mistDrift { 0%{opacity:.6;transform:scaleX(1)} 100%{opacity:.9;transform:scaleX(1.02)} }

@media (max-width: 700px) {
  .doors-grid { grid-template-columns: 1fr; gap: 24px; }
  .content { padding: 40px 20px 60px; }
  .bookshelf { width: 80px; }
  .hall-title { font-size: 36px; }
}
</style>
</head>
