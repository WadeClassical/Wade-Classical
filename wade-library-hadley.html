<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hadley's Library</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --pink:      #f4a7c3;
  --pink2:     #e8809e;
  --pink3:     #fce4ee;
  --lavender:  #c9a8e0;
  --lav2:      #b08fcf;
  --lav3:      #efe0f8;
  --mint:      #7ec8a0;
  --mint2:     #5aad80;
  --mint3:     #d4f0e2;
  --blue:      #90cce8;
  --blue2:     #6ab4d8;
  --blue3:     #ddf0fa;
  --cream:     #fdf6ee;
  --warm:      #f8efe0;
  --bark:      #8b5e3c;
  --bark2:     #6b4428;
  --moss:      #4a7c50;
  --moss2:     #3a6040;
  --text:      #4a3828;
  --subtext:   #7a6858;
  --white:     #ffffff;
  --gold:      #f0c040;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--warm); color:var(--text); font-family:'Nunito',sans-serif; font-size:15px; min-height:100vh; overflow-x:hidden; }

/* ── WOODLAND BACKGROUND ── */
#woodland-bg {
  position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
  background: linear-gradient(180deg,
    #e8d4f0 0%,
    #f0dce8 15%,
    #f8ede0 35%,
    #eef8ec 60%,
    #d8eed8 80%,
    #c8e4c0 100%);
}

/* Sky glow */
.sky-glow {
  position: absolute; top: -20%; left: 50%; transform: translateX(-50%);
  width: 120%; height: 60%;
  background: radial-gradient(ellipse at 50% 0%,
    rgba(255,220,200,0.5) 0%,
    rgba(240,190,220,0.3) 30%,
    transparent 70%);
}

/* Trees */
.tree { position: absolute; bottom: 0; pointer-events: none; }

/* Ground -->*/
.ground {
  position: absolute; bottom: 0; left: 0; right: 0; height: 180px;
  background: linear-gradient(180deg, transparent 0%, #c8e8b8 30%, #a8d098 60%, #88b878 100%);
}
.ground-detail {
  position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
  background: linear-gradient(180deg, transparent 0%, #90c880 50%, #78b068 100%);
}

/* Flowers scattered -->*/
.flower { position: absolute; pointer-events: none; }

/* Fireflies */
.firefly {
  position: absolute; width: 4px; height: 4px; border-radius: 50%;
  background: #ffffa0; pointer-events: none;
  box-shadow: 0 0 6px 3px rgba(255,255,160,0.8);
  animation: ffFloat var(--fd,8s) var(--fdelay,0s) ease-in-out infinite,
             ffGlow  var(--fg,2.5s) var(--fdelay,0s) ease-in-out infinite;
}
@keyframes ffFloat {
  0%   { transform: translate(0,0); }
  25%  { transform: translate(var(--fx1,20px), var(--fy1,-30px)); }
  50%  { transform: translate(var(--fx2,-15px), var(--fy2,-50px)); }
  75%  { transform: translate(var(--fx3,10px), var(--fy3,-30px)); }
  100% { transform: translate(0,0); }
}
@keyframes ffGlow {
  0%,100% { opacity: 0.1; box-shadow: 0 0 4px 2px rgba(255,255,160,0.3); }
  50% { opacity: 1; box-shadow: 0 0 10px 5px rgba(255,255,160,0.9); }
}

/* Butterflies */
.butterfly { position: absolute; pointer-events: none; animation: bfFloat var(--bd,12s) var(--bdelay,0s) ease-in-out infinite; }
@keyframes bfFloat {
  0%   { transform: translate(0,0) rotate(0deg); }
  20%  { transform: translate(var(--bx1,40px), var(--by1,-20px)) rotate(5deg); }
  40%  { transform: translate(var(--bx2,80px), var(--by2,-40px)) rotate(-3deg); }
  60%  { transform: translate(var(--bx3,60px), var(--by3,-20px)) rotate(4deg); }
  80%  { transform: translate(var(--bx4,20px), var(--by4,10px)) rotate(-2deg); }
  100% { transform: translate(0,0) rotate(0deg); }
}
.bf-wing {
  display: inline-block;
  animation: bfWing var(--bw,0.4s) ease-in-out infinite alternate;
  transform-origin: center;
}
@keyframes bfWing { 0%{transform:scaleX(1)} 100%{transform:scaleX(0.3)} }

/* Cherry blossoms falling */
.blossom {
  position: absolute; pointer-events: none; opacity: 0; z-index: 1;
  animation: blossomFall var(--bd,14s) var(--bdelay,0s) linear infinite;
}
@keyframes blossomFall {
  0%   { opacity:0; transform: translateX(0) translateY(-30px) rotate(0deg) scale(1); }
  8%   { opacity: 0.9; }
  85%  { opacity: 0.7; }
  100% { opacity:0; transform: translateX(var(--bsx,40px)) translateY(105vh) rotate(var(--bsr,540deg)) scale(.7); }
}

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(253,246,238,0.88); backdrop-filter: blur(10px);
  border-bottom: 2px solid rgba(200,160,180,0.3);
  padding: 0 28px; height: 58px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.back-btn {
  color: var(--subtext); text-decoration: none; font-size: 13px;
  font-weight: 700; transition: color .15s; font-family: 'Nunito', sans-serif;
}
.back-btn:hover { color: var(--pink2); }
.header-title {
  font-family: 'Fredoka One', cursive;
  font-size: 22px; color: var(--pink2);
  letter-spacing: 0.5px;
  text-shadow: 0 2px 8px rgba(240,120,160,0.2);
}
.header-tag {
  font-size: 11px; font-weight: 800; color: var(--mint2);
  background: var(--mint3); padding: 3px 10px; border-radius: 20px;
  border: 1.5px solid rgba(90,173,128,0.3);
}

/* ── MAIN ── */
.main { position: relative; z-index: 10; max-width: 960px; margin: 0 auto; padding: 32px 24px 100px; }

/* ── TABS ── */
.tabs {
  display: flex; gap: 6px; margin-bottom: 28px;
  background: rgba(255,255,255,0.6); border-radius: 20px;
  padding: 6px; border: 1.5px solid rgba(200,160,180,0.25);
  backdrop-filter: blur(8px); flex-wrap: wrap;
}
.tab {
  padding: 8px 18px; background: none; border: none; border-radius: 14px;
  color: var(--subtext); font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s;
}
.tab:hover { background: rgba(244,167,195,0.2); color: var(--pink2); }
.tab.active { background: var(--pink); color: white; box-shadow: 0 3px 10px rgba(244,167,195,0.4); }

/* ── SHELF HEADER ── */
.shelf-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.shelf-title {
  font-family: 'Fredoka One', cursive; font-size: 18px; color: var(--moss);
  display: flex; align-items: center; gap: 8px;
}
.add-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 16px; background: var(--pink); color: white;
  border: none; border-radius: 20px; font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 700; cursor: pointer;
  transition: all .2s; box-shadow: 0 3px 10px rgba(244,167,195,0.35);
}
.add-btn:hover { background: var(--pink2); transform: translateY(-1px); box-shadow: 0 5px 14px rgba(244,167,195,0.45); }

/* ── CURRENTLY READING ── */
.cr-section { margin-bottom: 40px; }
.cr-books-row { display: flex; gap: 28px; flex-wrap: wrap; }
.cr-book-card {
  display: flex; gap: 20px; align-items: flex-start; flex: 1; min-width: 240px; max-width: 420px;
  background: rgba(255,255,255,0.75); border-radius: 20px; padding: 18px;
  border: 2px solid rgba(200,160,180,0.25); box-shadow: 0 4px 20px rgba(200,160,180,0.15);
  backdrop-filter: blur(8px);
}
.cr-cover-wrap { flex-shrink: 0; }
.cr-cover-img {
  width: 90px; height: 126px; object-fit: cover; border-radius: 10px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15); display: block;
}
.cr-cover-no-img {
  width: 90px; height: 126px; border-radius: 10px;
  background: linear-gradient(135deg, var(--pink3), var(--lav3));
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 6px; font-size: 12px; color: var(--subtext);
  text-align: center; padding: 8px;
}
.cr-info { flex: 1; }
.cr-eyebrow { font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--pink2); margin-bottom: 6px; }
.cr-title { font-family: 'Fredoka One', cursive; font-size: 17px; color: var(--text); line-height: 1.2; margin-bottom: 3px; }
.cr-author { font-size: 12px; color: var(--subtext); margin-bottom: 10px; }
.cr-progress-track { height: 8px; background: var(--pink3); border-radius: 10px; overflow: hidden; margin-bottom: 5px; }
.cr-progress-fill { height: 100%; background: linear-gradient(90deg, var(--pink), var(--lavender)); border-radius: 10px; transition: width .6s; }
.cr-progress-text { font-size: 11px; font-weight: 700; color: var(--subtext); margin-bottom: 10px; }
.cr-empty {
  display: none; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.6); border-radius: 20px; padding: 24px 20px;
  border: 2px dashed rgba(200,160,180,0.35); color: var(--subtext);
  font-size: 14px; font-weight: 600; margin-bottom: 40px;
}

/* ── COVERFLOW ── */
.cf-section { margin-bottom: 44px; }
.cf-stage {
  position: relative; height: 240px; display: flex; align-items: center;
  justify-content: center; perspective: 900px; overflow: visible; margin-bottom: 0;
}
.cf-track {
  position: relative; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  transform-style: preserve-3d;
}
.cf-book {
  position: absolute; width: 140px; height: 196px; cursor: pointer;
  transition: all .4s cubic-bezier(.25,.8,.25,1); transform-style: preserve-3d;
}
.cf-book-inner {
  width: 100%; height: 100%; border-radius: 6px 12px 12px 6px; overflow: hidden;
  box-shadow: 0 16px 40px rgba(0,0,0,.2), 0 0 0 1px rgba(255,255,255,.3);
}
.cf-book-cover { width: 100%; height: 100%; object-fit: cover; display: block; }
.cf-book-no-cover {
  width: 100%; height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 14px; text-align: center;
}
.cf-book-no-cover-title { font-family:'Nunito',sans-serif; font-size:12px; color:rgba(255,255,255,.9); line-height:1.4; margin-top:6px; font-weight:700; }
.cf-book-reflection { position:absolute; bottom:-60px; left:0; right:0; height:60px; overflow:hidden; opacity:.2; transform:scaleY(-1); filter:blur(1px); pointer-events:none; }
.cf-book-reflection img { width:100%; height:100%; object-fit:cover; object-position:top; }
.cf-book[data-pos="0"]  { transform:translateX(0) translateZ(0) rotateY(0deg) scale(1); z-index:10; filter:brightness(1); }
.cf-book[data-pos="1"]  { transform:translateX(165px) translateZ(-100px) rotateY(-36deg) scale(.88); z-index:8; filter:brightness(.65); }
.cf-book[data-pos="2"]  { transform:translateX(288px) translateZ(-185px) rotateY(-40deg) scale(.75); z-index:6; filter:brightness(.45); }
.cf-book[data-pos="3"]  { transform:translateX(375px) translateZ(-260px) rotateY(-43deg) scale(.65); z-index:4; filter:brightness(.3); }
.cf-book[data-pos="-1"] { transform:translateX(-165px) translateZ(-100px) rotateY(36deg) scale(.88); z-index:8; filter:brightness(.65); }
.cf-book[data-pos="-2"] { transform:translateX(-288px) translateZ(-185px) rotateY(40deg) scale(.75); z-index:6; filter:brightness(.45); }
.cf-book[data-pos="-3"] { transform:translateX(-375px) translateZ(-260px) rotateY(43deg) scale(.65); z-index:4; filter:brightness(.3); }
.cf-book[data-pos="hidden-right"] { transform:translateX(520px) translateZ(-350px) rotateY(-45deg) scale(.5); z-index:1; opacity:0; pointer-events:none; }
.cf-book[data-pos="hidden-left"]  { transform:translateX(-520px) translateZ(-350px) rotateY(45deg) scale(.5); z-index:1; opacity:0; pointer-events:none; }
.cf-book[data-pos="0"]:hover { transform:translateX(0) translateZ(18px) scale(1.03); }

.cf-arrow {
  position:absolute; top:50%; transform:translateY(-50%);
  background:rgba(255,255,255,0.75); border:2px solid rgba(200,160,180,0.3);
  border-radius:50%; width:40px; height:40px; display:flex; align-items:center;
  justify-content:center; color:var(--pink2); font-size:22px; cursor:pointer;
  transition:all .15s; z-index:20; padding-bottom:2px;
  box-shadow: 0 4px 12px rgba(200,160,180,0.25);
}
.cf-arrow:hover { background:var(--pink); color:white; border-color:var(--pink); }
.cf-arrow:disabled { opacity:.25; cursor:default; }
.cf-arrow-left { left:0; }
.cf-arrow-right { right:0; }

.cf-info { text-align:center; padding:12px 0 0; min-height:50px; }
.cf-info-title { font-family:'Fredoka One',cursive; font-size:16px; color:var(--text); margin-bottom:2px; }
.cf-info-author { font-size:12px; color:var(--subtext); font-weight:600; }
.cf-dots { display:flex; justify-content:center; gap:6px; margin-top:8px; }
.cf-dot { width:7px; height:7px; border-radius:50%; background:rgba(200,160,180,0.3); cursor:pointer; transition:all .3s; border:none; }
.cf-dot.active { background:var(--pink); transform:scale(1.3); }
.cf-empty { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100px; gap:8px; color:var(--subtext); font-size:14px; font-weight:600; }

/* Finished count */
.finished-count {
  text-align:center; padding:22px 0 16px;
  border-bottom:2px dashed rgba(200,160,180,0.3); margin-bottom:20px;
}
.finished-number {
  font-family:'Fredoka One',cursive; font-size:52px; color:var(--pink2);
  line-height:1; display:block;
  text-shadow:0 3px 12px rgba(240,120,160,0.25);
}
.finished-label { font-size:12px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:var(--subtext); margin-top:4px; display:block; }

/* No cover colors */
.bc-pink     { background:linear-gradient(135deg,#f4a7c3,#e8809e); }
.bc-lavender { background:linear-gradient(135deg,#c9a8e0,#b08fcf); }
.bc-mint     { background:linear-gradient(135deg,#7ec8a0,#5aad80); }
.bc-blue     { background:linear-gradient(135deg,#90cce8,#6ab4d8); }
.bc-peach    { background:linear-gradient(135deg,#f8c8a0,#e8a870); }
.bc-rose     { background:linear-gradient(135deg,#f0a0b8,#d87090); }
.bc-sage     { background:linear-gradient(135deg,#a0c898,#78b078); }
.bc-lilac    { background:linear-gradient(135deg,#d4b0e8,#b890d0); }
.bc-sky      { background:linear-gradient(135deg,#a8d8f0,#80c0e0); }
.bc-butter   { background:linear-gradient(135deg,#f8e090,#e8c860); }

/* ── MODAL ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(80,50,30,0.4); backdrop-filter:blur(6px);
  z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--cream); border:2px solid rgba(200,160,180,0.3);
  border-radius:24px; padding:28px; max-width:480px; width:100%;
  max-height:90vh; overflow-y:auto; position:relative;
  transform:translateY(12px) scale(.98); transition:transform .2s;
  scrollbar-width:thin; scrollbar-color:var(--pink3) transparent;
  box-shadow:0 20px 60px rgba(100,60,80,0.2);
}
.modal-overlay.open .modal { transform:translateY(0) scale(1); }
.modal-title { font-family:'Fredoka One',cursive; font-size:20px; color:var(--text); margin-bottom:20px; }
.modal-close {
  position:absolute; top:16px; right:16px; background:var(--pink3); border:none;
  color:var(--pink2); font-size:16px; cursor:pointer; transition:all .15s;
  width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center;
}
.modal-close:hover { background:var(--pink); color:white; }

/* FORMS */
.form-group { margin-bottom:14px; }
.form-label { display:block; font-size:11px; font-weight:800; letter-spacing:.8px; text-transform:uppercase; color:var(--subtext); margin-bottom:6px; }
.form-input,.form-select,.form-textarea {
  width:100%; background:white; border:2px solid rgba(200,160,180,0.3);
  border-radius:12px; padding:9px 14px; color:var(--text);
  font-family:'Nunito',sans-serif; font-size:14px; font-weight:600; outline:none; transition:border-color .15s;
}
.form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--pink); }
.form-select option { background:white; }
.form-textarea { resize:vertical; min-height:72px; }
.two-col { display:flex; gap:10px; }
.two-col>div { flex:1; }

/* BUTTONS */
.btn { padding:10px 20px; border:none; border-radius:14px; font-family:'Nunito',sans-serif; font-size:13px; font-weight:800; cursor:pointer; transition:all .15s; }
.btn-primary { background:var(--pink); color:white; box-shadow:0 3px 10px rgba(244,167,195,0.35); }
.btn-primary:hover { background:var(--pink2); transform:translateY(-1px); }
.btn-secondary { background:var(--mint3); color:var(--mint2); border:2px solid rgba(90,173,128,0.25); }
.btn-secondary:hover { background:var(--mint); color:white; }
.btn-lavender { background:var(--lav3); color:var(--lav2); border:2px solid rgba(176,143,207,0.25); }
.btn-lavender:hover { background:var(--lavender); color:white; }
.btn-danger { background:rgba(239,68,68,.08); color:#e05555; border:2px solid rgba(239,68,68,.2); }
.btn-danger:hover { background:rgba(239,68,68,.15); }
.btn-sm { padding:6px 14px; font-size:12px; border-radius:10px; }
.btn-row { display:flex; gap:8px; justify-content:flex-end; margin-top:18px; flex-wrap:wrap; }

/* SEARCH */
.search-results { display:flex; flex-direction:column; gap:8px; max-height:260px; overflow-y:auto; margin-top:10px; scrollbar-width:thin; scrollbar-color:var(--pink3) transparent; }
.result-item { display:flex; gap:12px; padding:10px; align-items:flex-start; background:white; border:2px solid rgba(200,160,180,0.2); border-radius:14px; cursor:pointer; transition:border-color .15s; }
.result-item:hover { border-color:var(--pink); }
.result-cover { width:38px; height:52px; object-fit:cover; border-radius:8px; flex-shrink:0; background:var(--pink3); }
.result-cover-ph { width:38px; height:52px; background:var(--pink3); border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; }
.result-info { flex:1; min-width:0; }
.result-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:2px; }
.result-author { font-size:12px; color:var(--subtext); }
.result-year { font-size:11px; color:var(--subtext); font-weight:600; margin-top:2px; }

.confirm-area { background:white; border:2px solid rgba(200,160,180,0.25); border-radius:14px; padding:14px; margin-top:12px; display:none; }
.confirm-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:2px; }
.confirm-author { font-size:12px; color:var(--subtext); margin-bottom:12px; }

.mode-toggle { display:flex; margin-bottom:16px; background:var(--pink3); border-radius:14px; padding:4px; gap:4px; }
.mode-btn { flex:1; padding:8px; background:none; border:none; color:var(--subtext); font-family:'Nunito',sans-serif; font-size:12px; font-weight:700; cursor:pointer; border-radius:10px; transition:all .15s; }
.mode-btn.active { background:white; color:var(--pink2); box-shadow:0 2px 8px rgba(200,160,180,0.2); }

/* REPORT */
.report-section { margin-top:18px; padding-top:16px; border-top:2px dashed rgba(200,160,180,0.3); }
.report-title { font-family:'Fredoka One',cursive; font-size:15px; color:var(--moss); margin-bottom:14px; }

/* STARS */
.star-row { display:flex; gap:5px; margin:6px 0; }
.star { font-size:24px; cursor:pointer; color:var(--pink3); transition:all .15s; }
.star.active { color:var(--gold); text-shadow:0 2px 6px rgba(240,192,64,0.4); }
.star:hover { transform:scale(1.2); }

/* DETAIL */
.detail-header { display:flex; gap:16px; margin-bottom:20px; }
.detail-cover { width:76px; height:108px; object-fit:cover; border-radius:12px; flex-shrink:0; box-shadow:0 6px 20px rgba(0,0,0,.15); }
.detail-cover-ph { width:76px; height:108px; background:var(--pink3); border-radius:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:28px; }
.detail-title { font-family:'Fredoka One',cursive; font-size:20px; color:var(--text); margin-bottom:3px; }
.detail-author { font-size:13px; color:var(--subtext); font-weight:600; margin-bottom:5px; }
.detail-meta { font-size:11px; color:var(--subtext); font-weight:700; }

.progress-wrap { margin:14px 0; }
.progress-row { display:flex; justify-content:space-between; margin-bottom:6px; }
.progress-lbl { font-size:11px; font-weight:800; letter-spacing:.8px; text-transform:uppercase; color:var(--subtext); }
.progress-pct { font-size:11px; font-weight:800; color:var(--pink2); }
.progress-track { height:10px; background:var(--pink3); border-radius:10px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--pink),var(--lavender)); border-radius:10px; transition:width .5s; }
.page-row { display:flex; gap:8px; align-items:center; margin-top:10px; }

/* TOAST */
.toast {
  position:fixed; bottom:24px; right:24px; background:white;
  border:2px solid var(--pink3); border-radius:20px; padding:12px 20px;
  color:var(--text); font-size:13px; font-weight:700; z-index:2000;
  opacity:0; transform:translateY(8px) scale(.95); transition:all .25s;
  pointer-events:none; box-shadow:0 8px 30px rgba(200,160,180,0.3);
}
.toast.show { opacity:1; transform:translateY(0) scale(1); }

.spinner { display:inline-block; width:16px; height:16px; border:2.5px solid var(--pink3); border-top-color:var(--pink); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Assigned badge */
.assigned-badge { font-size:11px; font-weight:800; background:var(--lav3); color:var(--lav2); padding:3px 10px; border-radius:10px; flex-shrink:0; border:1.5px solid rgba(176,143,207,0.3); }

@media(max-width:600px) { .main{padding:20px 16px 60px} .modal{padding:20px 16px; border-radius:18px} .header{padding:0 16px} }
</style>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <a href="wade-library.html" class="back-btn">← Library</a>
    <span class="header-title">🌷 Hadley's Library</span>
  </div>
  <span class="header-tag">🦔 hadley</span>
</header>

<div class="main">
  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('shelves')">📚 Shelves</button>
    <button class="tab" onclick="switchTab('browse')">🔍 Browse</button>
    <button class="tab" onclick="switchTab('assigned')">⭐ Assigned</button>
    <button class="tab" onclick="switchTab('reports')">🌸 Reports</button>
  </div>

  <!-- SHELVES TAB -->
  <div id="tab-shelves">
    <div class="cr-section">
      <div class="shelf-header">
        <span class="shelf-title">🌿 Now Reading</span>
        <button class="add-btn" onclick="openAddModal('reading')">+ Add Book</button>
      </div>
      <div class="cr-empty" id="empty-reading">
        <span>No books here yet — add one! 🌸</span>
        <button class="add-btn" onclick="openAddModal('reading')">+ Add Book</button>
      </div>
      <div class="cr-books-row" id="cr-books-row" style="display:none"></div>
    </div>

    <div class="cf-section">
      <div class="shelf-header">
        <span class="shelf-title">🦋 Have Read</span>
        <button class="add-btn" onclick="openAddModal('read')">+ Add</button>
      </div>
      <div id="finished-wrap" style="display:none">
        <div class="finished-count">
          <span class="finished-number" id="finished-num">0</span>
          <span class="finished-label">books finished 🌟</span>
        </div>
      </div>
      <div class="cf-stage">
        <div class="cf-empty" id="empty-read"><span>No finished books yet 🌷</span></div>
        <button class="cf-arrow cf-arrow-left" id="arr-left-read" onclick="cfShift('read',-1)">&#8249;</button>
        <div class="cf-track" id="track-read"></div>
        <button class="cf-arrow cf-arrow-right" id="arr-right-read" onclick="cfShift('read',1)">&#8250;</button>
      </div>
      <div class="cf-info" id="info-read">
        <div class="cf-info-title" id="info-title-read"></div>
        <div class="cf-info-author" id="info-author-read"></div>
        <div class="cf-dots" id="dots-read"></div>
      </div>
    </div>

    <div class="cf-section">
      <div class="shelf-header">
        <span class="shelf-title">🌙 Want to Read</span>
        <button class="add-btn" onclick="openAddModal('want')">+ Add</button>
      </div>
      <div class="cf-stage">
        <div class="cf-empty" id="empty-want"><span>Nothing here yet 🍄</span></div>
        <button class="cf-arrow cf-arrow-left" id="arr-left-want" onclick="cfShift('want',-1)">&#8249;</button>
        <div class="cf-track" id="track-want"></div>
        <button class="cf-arrow cf-arrow-right" id="arr-right-want" onclick="cfShift('want',1)">&#8250;</button>
      </div>
      <div class="cf-info" id="info-want">
        <div class="cf-info-title" id="info-title-want"></div>
        <div class="cf-info-author" id="info-author-want"></div>
        <div class="cf-dots" id="dots-want"></div>
      </div>
    </div>
  </div>

  <!-- BROWSE TAB -->
  <div id="tab-browse" style="display:none">
    <div style="display:flex;gap:10px;margin-bottom:20px">
      <input type="text" class="form-input" id="browse-q" placeholder="🔍 Search for a book..." style="flex:1">
      <button class="btn btn-primary" onclick="doBrowse()">Search</button>
    </div>
    <div id="browse-results"></div>
  </div>

  <!-- ASSIGNED TAB -->
  <div id="tab-assigned" style="display:none">
    <p style="color:var(--subtext);font-size:14px;font-weight:600;margin-bottom:20px">⭐ Books from Mom appear here!</p>
    <div class="cf-stage">
      <div class="cf-empty" id="empty-assigned"><span>No assigned books yet 🌸</span></div>
      <button class="cf-arrow cf-arrow-left" id="arr-left-assigned" onclick="cfShift('assigned',-1)">&#8249;</button>
      <div class="cf-track" id="track-assigned"></div>
      <button class="cf-arrow cf-arrow-right" id="arr-right-assigned" onclick="cfShift('assigned',1)">&#8250;</button>
    </div>
    <div class="cf-info" id="info-assigned">
      <div class="cf-info-title" id="info-title-assigned"></div>
      <div class="cf-info-author" id="info-author-assigned"></div>
      <div class="cf-dots" id="dots-assigned"></div>
    </div>
  </div>

  <!-- REPORTS TAB -->
  <div id="tab-reports" style="display:none">
    <div id="reports-list">
      <p style="color:var(--subtext);font-size:14px;font-weight:600">No reports yet 🌸 Open a book and fill in your report!</p>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-add')">✕</button>
    <div class="modal-title">🌸 Add a Book</div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-search" onclick="setAddMode('search')">Search</button>
      <button class="mode-btn" id="mode-manual" onclick="setAddMode('manual')">Type it in</button>
    </div>
    <div id="add-search-mode">
      <div style="display:flex;gap:8px">
        <input type="text" class="form-input" id="add-q" placeholder="Book title or author..." style="flex:1">

<script>

function uid(){ return Date.now()+'-'+Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function randColor(s){ var h=0; for(var i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))%COLORS.length; return COLORS[h]; }

function loadBooks(){
  db.ref('library/'+PERSON).on('value',function(snap){
    var d=snap.val()||{};
    books.reading  = d.reading  ? Object.values(d.reading)  : [];
    books.read     = d.read     ? Object.values(d.read)     : [];
    books.want     = d.want     ? Object.values(d.want)     : [];
    books.assigned = d.assigned ? Object.values(d.assigned) : [];

}
function saveBook(shelf,book){ db.ref('library/'+PERSON+'/'+shelf+'/'+book.id).set(book); }
function deleteBook(shelf,id){ db.ref('library/'+PERSON+'/'+shelf+'/'+id).remove(); }

function renderAll(){
  renderSpotlight();

  renderShelf('want');
  renderShelf('assigned');

function renderSpotlight(){
  var arr=books.reading||[];
  var empty=document.getElementById('empty-reading');
  var row=document.getElementById('cr-books-row');
  if(!arr.length){ if(empty)empty.style.display='flex'; if(row)row.style.display='none'; return; }
  if(empty)empty.style.display='none'; if(row)row.style.display='flex';
  row.innerHTML='';
  var showCount=Math.min(arr.length,2);
  for(var i=0;i<showCount;i++){
    var book=arr[i];
    var pct=(book.pages&&book.currentPage)?Math.round(book.currentPage/book.pages*100):0;
    var pageText=book.currentPage?'Page '+book.currentPage+' of '+(book.pages||'?'):'Not started yet';

    var card=document.createElement('div'); card.className='cr-book-card';
    var cw=document.createElement('div'); cw.className='cr-cover-wrap';
    if(book.cover){
      var ci=document.createElement('img'); ci.className='cr-cover-img'; ci.src=book.cover; ci.alt=book.title;
      var fb=document.createElement('div'); fb.className='cr-cover-no-img'; fb.innerHTML='<span>📖</span><span>'+esc(book.title)+'</span>'; fb.style.display='none';
      ci.addEventListener('error',(function(f){return function(){this.style.display='none';f.style.display='flex';};})(fb));
      cw.appendChild(ci); cw.appendChild(fb);
    } else {
      var nc=document.createElement('div'); nc.className='cr-cover-no-img'; nc.innerHTML='<span style="font-size:28px">📖</span><span>'+esc(book.title)+'</span>'; cw.appendChild(nc);
    }
    var info=document.createElement('div'); info.className='cr-info';
    info.innerHTML='<div class="cr-eyebrow">'+(i===0?'Now Reading 🌿':'Also Reading 🌷')+'</div>'+
      '<div class="cr-title">'+esc(book.title)+'</div>'+
      '<div class="cr-author">'+esc(book.author||'')+'</div>'+
      '<div class="cr-progress-track"><div class="cr-progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="cr-progress-text">'+esc(pageText)+' · '+pct+'%</div>';
    var ob=document.createElement('button'); ob.className='btn btn-primary btn-sm'; ob.textContent='Open 🌸';
    ob.addEventListener('click',(function(b){return function(){openDetailModal(b,'reading');};})(book));
    info.appendChild(ob);
    card.appendChild(cw); card.appendChild(info); row.appendChild(card);
  }
}

function renderShelf(shelf){
  var arr=books[shelf]||[];
  var track=document.getElementById('track-'+shelf);
  var emp=document.getElementById('empty-'+shelf);
  var info=document.getElementById('info-'+shelf);
  var arrL=document.getElementById('arr-left-'+shelf);
  var arrR=document.getElementById('arr-right-'+shelf);
  if(!track) return;
  track.innerHTML='';
  if(!arr.length){
    if(emp)emp.style.display='flex'; if(info)info.style.visibility='hidden';
    if(arrL)arrL.style.display='none'; if(arrR)arrR.style.display='none'; return;
  }
  if(emp)emp.style.display='none'; if(info)info.style.visibility='visible';
  if(arrL)arrL.style.display='flex'; if(arrR)arrR.style.display='flex';
  if(cfIndex[shelf]>=arr.length) cfIndex[shelf]=arr.length-1;
  if(cfIndex[shelf]<0) cfIndex[shelf]=0;
  for(var i=0;i<arr.length;i++){
    var book=arr[i];
    var card=document.createElement('div'); card.className='cf-book';
    var pos=i-cfIndex[shelf];
    if(pos>3) pos='hidden-right'; else if(pos<-3) pos='hidden-left';
    card.dataset.pos=pos;
    var inner=document.createElement('div'); inner.className='cf-book-inner';
    if(book.cover){
      var img=document.createElement('img'); img.className='cf-book-cover'; img.src=book.cover; img.alt=book.title; inner.appendChild(img);
      var ref=document.createElement('div'); ref.className='cf-book-reflection';
      var ri=document.createElement('img'); ri.src=book.cover; ref.appendChild(ri); card.appendChild(ref);
    } else {
      inner.style.background=COLOR_MAP[randColor(book.id||book.title||'x')];
      var nc=document.createElement('div'); nc.className='cf-book-no-cover';
      nc.innerHTML='<div style="font-size:28px">📖</div><div class="cf-book-no-cover-title">'+esc(book.title)+'</div>';
      inner.appendChild(nc);
    }
    card.appendChild(inner);
    card.addEventListener('click',(function(b,s,di){return function(){if(cfIndex[s]===di){openDetailModal(b,s);}else{cfIndex[s]=di;renderShelf(s);}};})(book,shelf,i));
    track.appendChild(card);
  }
  var active=arr[cfIndex[shelf]];
  var te=document.getElementById('info-title-'+shelf); var ae=document.getElementById('info-author-'+shelf);
  if(te)te.textContent=active.title; if(ae)ae.textContent=active.author||'';
  var de=document.getElementById('dots-'+shelf);
  if(de){ de.innerHTML=''; var md=Math.min(arr.length,12); for(var d=0;d<md;d++){ var dot=document.createElement('div'); dot.className='cf-dot'+(d===cfIndex[shelf]?' active':''); dot.addEventListener('click',(function(s,di){return function(){cfIndex[s]=di;renderShelf(s);};})(shelf,d)); de.appendChild(dot); } }
  if(arrL)arrL.disabled=cfIndex[shelf]===0;
  if(arrR)arrR.disabled=cfIndex[shelf]===arr.length-1;
}

function cfShift(shelf,dir){ var arr=books[shelf]||[]; var ni=cfIndex[shelf]+dir; if(ni<0||ni>=arr.length)return; cfIndex[shelf]=ni; renderShelf(shelf); }

async function gbSearch(q){
  var url='https://www.googleapis.com/books/v1/volumes?q='+encodeURIComponent(q)+'&maxResults=10&printType=books&key=AIzaSyBsjx3JKjCQOMuus07MSoj3o-Vu9eRW6zc';
  var res=await fetch(url); if(!res.ok) throw new Error();
  var data=await res.json();
  return (data.items||[]).map(function(item){
    var v=item.volumeInfo||{}; var cover='';
    if(v.imageLinks) cover=(v.imageLinks.thumbnail||v.imageLinks.smallThumbnail||'').replace('http://','https://');
    return {title:v.title||'Unknown',author:(v.authors||[]).join(', '),year:v.publishedDate?v.publishedDate.slice(0,4):'',pages:v.pageCount||'',cover:cover};
  });
}

function renderResults(results,container,clickFn){
  container.innerHTML='';
  if(!results.length){container.innerHTML='<div style="color:var(--subtext);font-size:13px;font-weight:600;padding:10px">No results found 🌸</div>';return;}
  results.forEach(function(bk){
    var item=document.createElement('div'); item.className='result-item';
    if(bk.cover){var img=document.createElement('img');img.className='result-cover';img.src=bk.cover;img.addEventListener('error',function(){this.style.display='none';});item.appendChild(img);}
    else{var ph=document.createElement('div');ph.className='result-cover-ph';ph.textContent='📖';item.appendChild(ph);}
    var info=document.createElement('div'); info.className='result-info';
    info.innerHTML='<div class="result-title">'+esc(bk.title)+'</div><div class="result-author">'+esc(bk.author)+'</div><div class="result-year">'+esc(bk.year)+(bk.pages?' · '+bk.pages+' pages':'')+'</div>';
    item.appendChild(info);
    item.addEventListener('click',(function(b){return function(){clickFn(b);};})(bk));
    container.appendChild(item);
  });
}

async function doAddSearch(){
  var q=document.getElementById('add-q').value.trim(); var el=document.getElementById('add-results');
  if(!q) return;
  el.innerHTML='<div style="padding:16px;text-align:center"><span class="spinner"></span></div>';
  try{ var r=await gbSearch(q); renderResults(r,el,selectBook); }
  catch(e){ el.innerHTML='<div style="color:var(--subtext);font-size:13px;font-weight:600;padding:10px">Search failed. Try typing it in!</div>'; }
}

function selectBook(bk){
  selectedBook={id:uid(),title:bk.title,author:bk.author,year:bk.year,pages:bk.pages,cover:bk.cover,addedAt:Date.now(),currentPage:0,notes:'',rating:0,report:null};
  document.getElementById('add-results').innerHTML='';

  document.getElementById('confirm-author').textContent=bk.author;
  document.getElementById('s-pages').value=bk.pages||'';

}
function clearSel(){ selectedBook=null; document.getElementById('add-confirm').style.display='none'; document.getElementById('add-results').innerHTML=''; document.getElementById('add-q').value=''; }
function confirmAdd(){
  if(!selectedBook) return;
  selectedBook.currentPage=parseInt(document.getElementById('s-page').value)||0;
  selectedBook.pages=parseInt(document.getElementById('s-pages').value)||selectedBook.pages||'';
  saveBook(currentShelf,selectedBook); closeModal('modal-add'); showToast('"'+selectedBook.title+'" added! 🌸');

function confirmManual(){
  var title=document.getElementById('m-title').value.trim();
  if(!title){showToast('What\'s the book called? 🌷');return;}
  var book={id:uid(),title:title,author:document.getElementById('m-author').value.trim(),year:'',pages:parseInt(document.getElementById('m-pages').value)||'',cover:document.getElementById('m-cover').value.trim(),addedAt:Date.now(),currentPage:parseInt(document.getElementById('m-page').value)||0,notes:'',rating:0,report:null};

async function doBrowse(){
  var q=document.getElementById('browse-q').value.trim(); var el=document.getElementById('browse-results');
  if(!q) return;
  el.innerHTML='<div style="padding:20px;text-align:center"><span class="spinner"></span></div>';
  try{
    var results=await gbSearch(q);
    if(!results.length){el.innerHTML='<div style="color:var(--subtext);font-size:13px;font-weight:600">No results 🌸</div>';return;}
    el.innerHTML='';
    results.forEach(function(bk){
      var item=document.createElement('div'); item.className='result-item'; item.style.cursor='default';
      if(bk.cover){var img=document.createElement('img');img.className='result-cover';img.src=bk.cover;img.addEventListener('error',function(){this.style.display='none';});item.appendChild(img);}
      else{var ph=document.createElement('div');ph.className='result-cover-ph';ph.textContent='📖';item.appendChild(ph);}
      var info=document.createElement('div'); info.className='result-info';
      info.innerHTML='<div class="result-title">'+esc(bk.title)+'</div><div class="result-author">'+esc(bk.author)+'</div><div class="result-year">'+esc(bk.year)+'</div>';
      var btn=document.createElement('button'); btn.className='btn btn-lavender btn-sm'; btn.style.marginTop='6px'; btn.textContent='+ Want to Read 🌷';
      btn.addEventListener('click',(function(b,bt){return function(){
        var nb={id:uid(),title:b.title,author:b.author,year:b.year,pages:b.pages,cover:b.cover,addedAt:Date.now(),currentPage:0,notes:'',rating:0,report:null};
        saveBook('want',nb); bt.textContent='Added! 🌸'; bt.disabled=true; showToast('"'+b.title+'" added!');
      };})(bk,btn));
      info.appendChild(btn); item.appendChild(info); el.appendChild(item);
    });
  }catch(e){el.innerHTML='<div style="color:var(--subtext);font-size:13px;font-weight:600">Search failed 🌸</div>';}
}

function openDetailModal(book,shelf){
  var rep=book.report||{};
  var pct=(book.pages&&book.currentPage)?Math.round(book.currentPage/book.pages*100):0;

  var hdr=document.createElement('div'); hdr.className='detail-header';
  if(book.cover){var ci=document.createElement('img');ci.className='detail-cover';ci.src=book.cover;hdr.appendChild(ci);}
  else{var cp=document.createElement('div');cp.className='detail-cover-ph';cp.textContent='📖';hdr.appendChild(cp);}
  var hi=document.createElement('div');
  hi.innerHTML='<div class="detail-title">'+esc(book.title)+'</div><div class="detail-author">'+esc(book.author||'')+'</div><div class="detail-meta">'+esc((book.year?book.year+' · ':'')+(book.pages?book.pages+' pages':''))+'</div>';
  hdr.appendChild(hi); container.appendChild(hdr);

  if(shelf==='reading'){
    var pw=document.createElement('div'); pw.className='progress-wrap';
    pw.innerHTML='<div class="progress-row"><span class="progress-lbl">My Progress</span><span class="progress-pct">'+pct+'% 🌸</span></div><div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
    var pr=document.createElement('div'); pr.className='page-row';
    var pi=document.createElement('input'); pi.type='number'; pi.id='detail-page'; pi.value=book.currentPage||0; pi.min='0'; pi.className='form-input'; pi.style.width='90px';

    pr.appendChild(pi); pr.appendChild(po); pr.appendChild(ps); pw.appendChild(pr); container.appendChild(pw);
  }

  var rw=document.createElement('div'); rw.style.marginBottom='14px';
  var rl=document.createElement('div'); rl.style.cssText='font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--subtext);margin-bottom:6px'; rl.textContent='My Rating';
  var sr=document.createElement('div'); sr.className='star-row'; sr.id='stars-'+book.id;
  for(var n=1;n<=5;n++){var st=document.createElement('span');st.className='star'+((book.rating||0)>=n?' active':'');st.dataset.n=n;st.innerHTML='&#9733;';st.addEventListener('click',(function(nn){return function(){setRating(nn,book.id,shelf);};})(n));sr.appendChild(st);}
  rw.appendChild(rl); rw.appendChild(sr); container.appendChild(rw);

  if(shelf==='reading'||shelf==='read'){
    var rs=document.createElement('div'); rs.className='report-section';
    var rt=document.createElement('div'); rt.className='report-title'; rt.textContent='🌸 My Book Report'; rs.appendChild(rt);
    var so='<option value="">⭐ How many stars?</option>';
    for(var si=1;si<=5;si++) so+='<option value="'+si+'"'+(rep.stars==si?' selected':'')+'>'+'⭐'.repeat(si)+'</option>';
    rs.innerHTML+='<div class="form-group"><label class="form-label">Star Rating</label><select class="form-select" id="report-stars">'+so+'</select></div>'+
      '<div class="form-group"><label class="form-label">Characters — Who is in the story?</label><input type="text" class="form-input" id="report-chars" placeholder="The main characters are..." value="'+esc(rep.characters||'')+'"></div>'+
      '<div class="form-group"><label class="form-label">Setting — Where does it happen?</label><input type="text" class="form-input" id="report-setting" placeholder="The story takes place in..." value="'+esc(rep.setting||'')+'"></div>'+
      '<div class="form-group"><label class="form-label">1. What was this book about?</label><textarea class="form-textarea" id="report-about" placeholder="This book is about...">'+esc(rep.about||'')+'</textarea></div>'+
      '<div class="form-group"><label class="form-label">2. What was your favorite part?</label><textarea class="form-textarea" id="report-fav" placeholder="My favorite part was...">'+esc(rep.favorite||'')+'</textarea></div>'+
      '<div class="form-group"><label class="form-label">3. What did you learn from this book?</label><textarea class="form-textarea" id="report-learned" placeholder="I learned that...">'+esc(rep.learned||'')+'</textarea></div>';
    var sv=document.createElement('button'); sv.className='btn btn-primary btn-sm'; sv.textContent='Save My Report! 🌷';
    sv.addEventListener('click',function(){saveReport(book.id,shelf);}); rs.appendChild(sv); container.appendChild(rs);
  }

  var br=document.createElement('div'); br.className='btn-row'; br.style.cssText='margin-top:16px;padding-top:14px;border-top:2px dashed rgba(200,160,180,0.3)';

}

function updateProgress(id,shelf){
  var page=parseInt(document.getElementById('detail-page').value)||0;
  (books[shelf]||[]).forEach(function(b){if(b.id===id){b.currentPage=page;saveBook(shelf,b);}});
  showToast('Progress saved! 🌸'); closeModal('modal-detail');
}
function setRating(n,id,shelf){
  (books[shelf]||[]).forEach(function(b){if(b.id===id){b.rating=n;saveBook(shelf,b);}});
  var c=document.getElementById('stars-'+id);
  if(c)c.querySelectorAll('.star').forEach(function(s){s.classList.toggle('active',parseInt(s.dataset.n)<=n);});
  showToast('Rating saved! ⭐');
}
function saveReport(id,shelf){
  (books[shelf]||[]).forEach(function(b){
    if(b.id===id){
      b.report={stars:document.getElementById('report-stars').value,characters:document.getElementById('report-chars').value,setting:document.getElementById('report-setting').value,about:document.getElementById('report-about').value,favorite:document.getElementById('report-fav').value,learned:document.getElementById('report-learned').value,savedAt:Date.now()};
      saveBook(shelf,b);
    }
  });
  showToast('Report saved! 🌷');
}
function moveBook(id,from,to){
  (books[from]||[]).forEach(function(b){if(b.id===id){var nb=Object.assign({},b,{movedAt:Date.now()});deleteBook(from,id);saveBook(to,nb);}});
  closeModal('modal-detail'); showToast('Moved! 🌸');
}

function renderReportsList(){
  var el=document.getElementById('reports-list'); if(!el) return;
  var all=(books.read||[]).concat(books.reading||[]);
  var wr=all.filter(function(b){return b.report&&(b.report.about||b.report.favorite||b.report.learned);});
  if(!wr.length){el.innerHTML='<p style="color:var(--subtext);font-size:14px;font-weight:600">No reports yet 🌸 Open a book and fill in your report!</p>';return;}
  var html='';
  wr.forEach(function(b){
    var rep=b.report;
    var stars=''; if(rep.stars){for(var i=0;i<parseInt(rep.stars);i++)stars+='⭐';}
    html+='<div style="padding:18px;margin-bottom:14px;background:rgba(255,255,255,0.8);border:2px solid rgba(200,160,180,0.25);border-radius:20px;box-shadow:0 4px 16px rgba(200,160,180,0.12)">';
    html+='<div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:14px">';
    if(b.cover)html+='<img src="'+esc(b.cover)+'" style="width:50px;height:70px;object-fit:cover;border-radius:10px;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.15)">';
    html+='<div><div style="font-family:Fredoka One,cursive;font-size:16px;color:var(--text);margin-bottom:2px">'+esc(b.title)+'</div>';
    html+='<div style="font-size:12px;font-weight:700;color:var(--subtext);margin-bottom:5px">'+esc(b.author||'')+'</div>';
    if(stars)html+='<div style="font-size:14px">'+stars+'</div>';
    html+='</div></div>';
    if(rep.characters)html+='<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--pink2);margin-bottom:2px">Characters</div><div style="font-size:13px;font-weight:600;color:var(--text)">'+esc(rep.characters)+'</div></div>';
    if(rep.setting)html+='<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--mint2);margin-bottom:2px">Setting</div><div style="font-size:13px;font-weight:600;color:var(--text)">'+esc(rep.setting)+'</div></div>';
    if(rep.about)html+='<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--lav2);margin-bottom:2px">What was it about?</div><div style="font-size:13px;color:var(--text);line-height:1.5;font-weight:600">'+esc(rep.about)+'</div></div>';
    if(rep.favorite)html+='<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--pink2);margin-bottom:2px">Favorite part</div><div style="font-size:13px;color:var(--text);line-height:1.5;font-weight:600">'+esc(rep.favorite)+'</div></div>';
    if(rep.learned)html+='<div><div style="font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--mint2);margin-bottom:2px">Something I learned</div><div style="font-size:13px;color:var(--text);line-height:1.5;font-weight:600">'+esc(rep.learned)+'</div></div>';
    html+='</div>';
  });
  el.innerHTML=html;
}

function openModal(id){var ov=document.getElementById(id);ov.classList.add('open');ov.addEventListener('click',function h(e){if(e.target===ov){closeModal(id);ov.removeEventListener('click',h);}});}
function closeModal(id){document.getElementById(id).classList.remove('open');}

document.getElementById('add-q').addEventListener('keydown',function(e){if(e.key==='Enter')doAddSearch();});
document.getElementById('browse-q').addEventListener('keydown',function(e){if(e.key==='Enter')doBrowse();});

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2400);}
