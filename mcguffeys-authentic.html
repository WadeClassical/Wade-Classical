                { level:"intermediate", title:"The Quarrel", text:"One day John and Henry were playing in the woods. Under a tall tree they saw a fine, large nut, and both ran to get it.\nHenry got to it first and picked it up. But John cried out, Give me that nut! It is mine, for I was the first to see it.\nNo, it is not yours, said Henry; it is mine, for I picked it up.\nThen they began to quarrel about the nut. Each wanted it, and each tried to show that he had the best right to it.\nJust then they saw Frank going by, and they asked him to stop a minute.\nShall I tell you whose it is? asked Frank.\nYes, yes, said both the little boys.\nWell, then, said Frank, who saw it first?\nI did, said John.\nWho picked it up?\nI did, said Henry.\nVery well, said Frank. I will now put an end to your little quarrel.\nHe took the nut from Henry's hand and broke the shell. When he had done this he took out the kernel.\nHere, John, he said, you shall have this half of the shell; for you were the first who saw the nut. And Henry, this other half is yours; for you picked the nut up.\nBut I shall keep the kernel as my pay for settling your quarrel.\nThe little boys did not like this very well. But Frank said: It is a good lesson for you. Most quarrels end just this way.", words:["quarrel","nut","kernel","shell","settling","lesson","picked","woods"], illustration:"🌰" },
                { level:"intermediate", title:"The Sail", text:"One summer morning Robert and his little sister Rose were playing in the white sand by the shore of the lake.\nTheir father's boat, with the sail half set, was lying not far away. It was pulling at the rope with which it was fastened, and looking as if it wanted to get away.\nRose, how would you like to take a sail in father's new boat? asked Robert.\nOh, I should like it very much, said Rose.\nWell, then, come and get in, said Robert, and we will go out a little way. Father will not care.\nBut you are too little to sail the boat, Robert. You can not make it go to the right place.\nToo little! said the brave boy. Why, I will soon be six, and I know all about the boat.\nWell, then, said Rose, let us take just a little sail on the lake. But we must be back before dinner.\nSoon Robert had untied the boat, and it began to move out from the shore.\nBut soon a big wave broke over the side of the boat, and Robert began to feel afraid. There was water all about their feet now, and Rose began to cry.\nNever mind, Rose, said her brave little brother. I will dip it all out with father's dipper.\nBut just as he was beginning to dip, a still bigger wave came. Then he looked up and saw another boat near them. Yes, it was coming right to them! Their father was in it, and he had come after them. How glad the children were to be taken safe home!", words:["sail","shore","lake","rope","wave","afraid","brave","dinner"], illustration:"⛵🌊" },
                { level:"intermediate", title:"The Swing", text:"How do you like to go up in a swing,\nUp in the air so blue?\nOh, I do think it the pleasantest thing\nEver a child can do!\nUp in the air and over the wall,\nTill I can see so wide,\nRivers and trees and cattle, and all\nOver the country's side —\nTill I look down on the garden green\nDown on the roof so brown —\nUp in the air I go flying again,\nUp in the air, and down!", words:["swing","air","wall","rivers","cattle","garden","roof","flying"], illustration:"🪀" },
                { level:"intermediate", title:"The Fireside", text:"One night in winter two little girls with their mother were sitting by a bright fire in their pleasant home. All were busy. The girls were sewing, and their mother was knitting.\nAt last Lucy finished her work. As she was putting it away she said, Mother, I think the fire is very bright this evening.\nAnd I was about to say, cried Mary, that this light is better than we had last night.\nMy dear girls, said the mother, it must be that you feel happier than usual to-night. Is that why you think the fire better and the light brighter?\nBut, mother, said Mary, I do not see why we are happier now than we were then; for last night our cousins were here, and we played till every one was tired.\nI know! I know why! cried Lucy. We are happy to-night because we have been busy. We are happy because we have been doing something useful.\nYou are right, said their mother; and I am glad you have both learned that it is sometimes better and pleasanter to work than to play. You could never be happy if you had no useful work to do.", words:["fireside","sewing","knitting","bright","useful","happy","cousins","winter"], illustration:"🔥" },
                { level:"intermediate", title:"The Cat and the Fox", text:"One day a cat met a fox in the woods.\nWhat a fine-looking fellow he is, said Pussy. Is there any wonder that people are always talking about him? I think I will speak to him.\nSo she went up to him and said, in her very kind way, Good morning, Mr. Fox! How are you?\nThe fox was a proud fellow, and thought himself very much above any cat. He looked at Puss from head to foot and did not speak for a long time. Then he said, Oh, you poor little mouse hunter, how many tricks do you know?\nI know only one trick, said the cat.\nAnd what trick is that? he asked.\nWell, she said, when the dogs run after me, I can jump up into a tree and save myself.\nIs that all? cried the fox. Why, I am master of a hundred tricks, every one of them better than that. I pity you, poor Puss.\nJust then a hunter with four dogs was seen coming through the woods. The cat climbed quickly up the tree and hid herself among the green leaves. Now show us some of your tricks, Mr. Fox! she said.\nBut before he could save himself by running the dogs were upon him. They caught him and held him fast.\nAh, Mr. Fox, said she, your hundred tricks are not of much use to you. If you had had only one trick like mine, you might have been well and happy even now.", words:["fox","cat","tricks","hunter","dogs","proud","tree","caught"], illustration:"🦊🐱" },
                { level:"intermediate", title:"The Squirrel to the Little Boy", text:"Yes, little boy, I am up here — out of your reach, I am glad to say. Would you like to catch me, and keep me in a cage? Well, you will not catch me to-day. I will keep out of your way.\nHow glad I am that you have not brought a gun with you. Oh, I know why you did not bring it. You are so little that your father will not let you have a gun.\nDon't you wish you could climb a tree as quickly as I can? See me run out on this branch. You can't do that.\nDon't hold up your hands; I am not going to fall. I laugh at little boys who think I shall fall when I run out to the end of a branch.\nWhat have you come here for? You have come here for nuts. Wait a minute, and I will drop one into your basket.\nThere now, thank me. You may have all the nuts you can find among the dry leaves on the ground. There are enough nuts in these woods for boys and squirrels too.\nMy home is not in this tree. It is in that big tree on the other side of the brook. What a pleasant home it is, too! It is in a hollow branch, and I go into it through a hole just large enough for a door.\nThere are ever so many nuts under the leaves by that big tree — enough to last me all the winter, I think.\nI must not stay here any longer. I see a man coming this way. He has a gun, and will shoot me if he can.\nCome again, some time, and I will tell you a funny story about some of the other little people that live in the woods. Good morning!", words:["squirrel","cage","branch","nuts","hollow","woods","winter","basket"], illustration:"🐿️" },
                { level:"intermediate", title:"In a Minute!", text:"Frank Brown had one great fault. Often when he was asked to do something he would say, In a minute, and then would not think about it again for a long time.\nHe always wanted to go with his mother when she went to town or to see his uncles and aunts; but he was never ready to start at the right time.\nHis mother often talked to him about this; but he would soon forget what she said, and be as careless as ever. At last she said, The next time you are not ready to go with me I will leave you at home.\nIt was Thanksgiving Day. Frank was to go with his father and mother to take dinner with his grandmother, who lived on a farm in the country.\nFrank had great fun playing about in the snow. When his mother called, he had just begun to make a snow house. He said, In a minute, mother, and went on with his play.\nAt last he left off his play, and ran into the house. No one was there but Mary. His father and mother and little sisters had gone and left him. Poor Frank!\nAll at once he heard some one call him from the road. He looked out and saw that it was John, the man who worked for his grandmother.\nCome, Frank, said John, your grandmother has sent me with the horse and sleigh to take you over. Come quickly, and we shall be there in time for dinner.\nIt did not take Frank long to get ready, and he was soon sitting with John in his grandmother's sleigh. They were just in time for dinner.\nAll the people were glad to see Frank. He had learned a good lesson, and was cured of his fault. When he was told to do a thing he never again said, In a minute!", words:["fault","careless","Thanksgiving","grandmother","sleigh","snow","lesson","ready"], illustration:"❄️🛷" },
                { level:"advanced", title:"The Cross Boy", text:"John Lane was a cross boy. He would strike and hurt those with whom he was at play, if they did not do all that he wished, or all that he told them to do.\nHe did not do this when he was with big boys, for he was afraid to make them angry; but to all the little boys he was very cross.\nOne day at school he was playing with a boy whose name was Henry Ball. Henry was a little boy, and not very strong.\nThey were flying a kite, and Henry could not run as fast as John wished; so John struck him in the face.\nThis made Henry cry; and Frank Day, who was a little larger than John, heard him.\nWhy are you crying, Henry? he asked.\nJohn Lane hurt me, said Henry. He struck me because I could not run as fast as he told me to.\nThen Frank called to John, and said: It would be serving you right if I should strike you in the same way; and you know I am strong enough to hurt you if I were to try. But I shall not do it.\nHe who strikes little boys is a coward. He is only brave when he knows that no one can strike him back. Think about what I have said.", words:["cross","strike","kite","angry","coward","brave","fault","hurt"], illustration:"🪁" },
                { level:"advanced", title:"The Crow and the Robin", text:"One warm summer day a crow was sitting in a tree, very well pleased with himself. He had found a fine piece of cheese, and was going to eat it when a robin came and sat near him.\nHow beautiful you are! said the robin. How bright and black your feathers are! And what a fine voice you must have!\nThe crow was very glad to hear this. He opened his mouth to sing.\nOf course, when he opened his mouth the cheese fell out, and the robin flew down and picked it up.\nThat was very foolish of you, said the robin. When any one tells you that you are beautiful, and asks you to sing, you may be sure that he wants something. I wanted the cheese, and I got it. Good morning.\nThe crow felt very much ashamed. He had been foolish, and had lost his dinner.\nWhen people praise you to get something from you, you are silly if you believe them.", words:["crow","robin","cheese","feathers","voice","foolish","praise","ashamed"], illustration:"🐦🧀" },
                { level:"advanced", title:"Tom and the Eagle", text:"One day Tom found a young eagle that had fallen from its nest. He took it home and put it in a cage. He fed it and took good care of it.\nBut the eagle did not like the cage. It beat its great wings against the bars. It wanted to fly far away over the hills and into the blue sky.\nTom was a kind boy. He saw that the eagle was not happy.\nIf I were an eagle, he said, I would not like to be shut up in a cage. I will let it go.\nSo he took the eagle out of the cage, and set it on the top of a high rock. The eagle spread its great wings, and flew round and round, going higher and higher, until Tom could hardly see it.\nThen it flew away over the hills and was gone.\nTom was glad that he had let the eagle go free. He thought it was better for the eagle to fly in the free air than to sit in a cage all its life.", words:["eagle","cage","wings","hills","spread","higher","free","happy"], illustration:"🦅" },
                { level:"advanced", title:"A Mouse at School", text:"One day a little mouse came into the schoolroom. How it came in, no one knew. It had, perhaps, lived under the floor for a long time without being seen.\nAll at once a little girl cried out, Oh! there is a mouse!\nAll the children looked. They saw a little brown mouse running along by the wall. Some of the children were afraid. Some of the little girls jumped up on their seats.\nBut the teacher said, Do not be afraid. It is only a little mouse, and it is much more afraid of you than you are of it.\nThe mouse ran this way and that way, and could not find the hole through which it had come in.\nAt last the teacher opened the door, and the little mouse ran out.\nDo you think the mouse came to school to learn to read? said the teacher. No, said the children, laughing. It came to look for something to eat, and it was frightened because it could not find its way out.\nA mouse cannot learn to read; but little boys and girls can. How glad you should be that you can go to school and learn!", words:["mouse","schoolroom","afraid","frightened","seats","teacher","door","running"], illustration:"🐭🏫" },
                { level:"advanced", title:"God is Great and Good", text:"Come, let us go into the fields, said the mother. I will show you some of God's work.\nSo the mother and her little girl went out into the bright sunshine.\nIn the fields the grass was green and fresh. There were many pretty flowers in it.\nDo you see how beautiful everything is? said the mother.\nYes, said the little girl. Who made the grass so green? Who made the flowers so pretty?\nGod made them, said the mother. He made the earth and all that is in it.\nWho made the sun so bright and warm? asked the little girl.\nGod made the sun, too, said the mother. He made everything that you can see.\nIs not God very great? said the little girl.\nYes, He is very great, said the mother. And He is very good, too. He made all these things for us. Let us thank Him for His goodness.", words:["fields","flowers","sunshine","grass","beautiful","God","great","good"], illustration:"🌸☀️" },
                { level:"advanced", title:"The Clouds", text:"One pleasant afternoon a father took his children out for a walk. The clouds were very beautiful that day, and the children began to ask their father about them.\nFather, said John, why do we have clouds? What are they made of?\nClouds are made of water, said his father. The sun draws the water up from the sea, and rivers and pools, and it floats in the air as tiny drops. These drops make the clouds.\nSometimes the clouds are spread out like curtains to shield the ground from the heat.\nIt soon began to rain; they went into a farmhouse for shelter. The children stood at the window to look at the rain.\nThat rain, said their father, comes from the clouds. How useful clouds are! They are great watering pots.\nWhy do you call them watering pots, father? asked Mary.\nI saw you taking a watering pot into the garden this morning. What did you do with it?\nI watered the ground about my flowers, said Mary; for when the ground becomes very dry, the plants cannot grow.\nJust so; and when all the land becomes very dry the grass, and the wheat, and the corn cannot grow. Then the clouds water it.\nThe rain was soon over, and the children went out again with their father. How pleasant it is, said they, as they breathed the cool, fresh air.\nThe children looked up and began to clap their hands. Oh, how beautiful! they cried. The great clouds were moving toward the east. The sun was shining upon them, giving them all shades of beautiful colors.", words:["clouds","water","shelter","curtains","watering","beautiful","rainbow","rain"], illustration:"☁️🌈" },
                { level:"advanced", title:"My Doll", text:"I once had a sweet little doll, —\nThe prettiest doll in the world;\nHer cheeks were so red and so white,\nAnd her hair was so prettily curled!\nBut I lost my poor little doll,\nAs I played in the fields one day;\nAnd I cried for her more than a week,\nBut I never could find where she lay.\nI found my poor little doll,\nAs I played in the fields one day.\nThey say she is very much changed,\nFor her paint is all washed away,\nAnd her arm trodden off by the cows,\nAnd her hair not the least bit curled;\nYet for old time's sake she is still\nThe prettiest doll in the world.", words:["doll","prettiest","cheeks","curled","lost","fields","changed","washed"], illustration:"🪆" },
                { level:"advanced", title:"The Fox and the Ducks", text:"One day in summer a man was sitting on the bank of a river and looking at some ducks that were swimming in the water.\nSoon he saw a branch with green leaves floating down the stream. As it floated near to the ducks they seemed to be frightened and flew away to another part of the river.\nIn a little while, however, they came back one by one, and began to swim in the water as before.\nSoon another branch came floating down among them, and again they took flight; but when they saw that the branch had gone by, they came back as before.\nAfter four or five branches had come down in this way, the ducks seemed but little afraid of them.\nThe man, who had been watching all this, now began to wonder who had set these branches floating down the stream. He looked around, and after a while saw a fox slyly watching the ducks.\nWhen the fox saw that the ducks were no longer afraid of the branches, he took a much larger branch than any he had yet used. He threw it into the river and then followed it, hiding himself behind it. Then he floated with it down the stream.\nRight among the ducks floated the green branch and the sly fox. The fox snapped quickly to the right and left. He seized two fine young ducks, and swam off with them.\nThe fox must have had a fine dinner to pay him for his cunning work.", words:["ducks","fox","branch","floating","cunning","frightened","seized","stream"], illustration:"🦊🦆" },
                { level:"advanced", title:"Work and Play", text:"Charles White was not an idle boy, but he did not like to work long at any one time or at any one thing.\nOne day his father said, Charles, would you like to earn some money by pulling up the weeds and grass in the garden?\nYes, father, said Charles, I should like it quite well. How much will you pay?\nThat is not business-like, said Mr. White. Give me your price by the hour, by the day, or by the job; then I will tell you what I am willing to pay.\nI think I would like to work by the hour, said Charles. Will you pay me ten cents for every hour I work?\nYes; if you will work an hour every morning, and stick to your work till all the weeds are pulled up, I will pay you ten cents for each hour's work.\nCharles began the next morning. After working about ten minutes, he ran into the house to see what time it was. His cousin John was in the garden when he came out, and he talked with him a while.\nAfter John left him, Charles worked very hard for five minutes, and then ran into the house again to look at the clock.\nAt last it was just one hour since he had first gone into the garden. Charles thought this was working, and was surprised when his father told him that he would not pay him for an hour's work.\nWhen you have worked one whole hour you shall have ten cents. I did not agree to pay you for playing, talking, or looking at flowers. I was to pay you for pulling up weeds.\nCharles learned from this that when he agreed to work a certain time at a certain price, the way to do was to work the full time.", words:["weeds","garden","earn","money","hour","pay","idle","lesson"], illustration:"🌱" },
                { level:"advanced", title:"The Crow and the Pitcher", text:"One hot day in summer a wise old crow felt very thirsty, but could find no water to drink. Not a drop was to be seen anywhere.\nAt last he flew down in a garden, and there he saw a pitcher among some stones. He was very much pleased, for he hoped to find some water in the pitcher.\nHe went to it and saw that indeed there was water in it, but it was so far down he could not reach it. He could not even wet the tip of his bill.\nHe then tried to turn the pitcher over, but it was far too heavy for him to move. For a minute he stood as if thinking what he should do.\nThen he took up a small stone and let it fall into the water. Again and again he did the same thing, dropping in stone after stone, till at last the water rose so high that he could reach it. Then he took a good drink and flew away.", words:["crow","pitcher","thirsty","stones","bill","reach","rose","clever"], illustration:"🐦🏺" },
                { level:"advanced", title:"The Squirrels", text:"Little Nora lives in a log house close by the green woods. She has no sisters, and her brothers are at work on the farm all day long.\nThere is no other house near, and it is not often that Nora sees any other girls. Yet she is not lonely; for she has many little friends that live in the woods.\nHow did Nora teach the squirrel to be so tame? Nora came to the woods often, and was always so quiet and gentle that the squirrels soon found they need not be afraid of her.\nShe brought her bread and milk to eat under the trees, and was sure to leave crumbs for the squirrels.\nWhen they came near, she sat very still and watched them. So, little by little, she made them her friends, till, at last, they would sit on her shoulder and eat from her hand.\nSquirrels build for themselves summer houses. These are made of leaves, and sticks, and moss. They are pleasant and cool for summer, but would never do for the winter cold and snow.\nSo these wise little people find a hollow in an old tree. They line it with soft moss and leaves and make it very cozy and warm; and there they live all winter.", words:["squirrels","Nora","gentle","tame","crumbs","shoulder","hollow","winter"], illustration:"🐿️" },
                { level:"advanced", title:"The Robin's Story", text:"I built me a nest\nIn the old oak tree —\nAs pretty a nest\nAs ever could be.\nI wove it with threads\nTo the oak tree bough;\nAnd three little birdies\nAre sleeping there now.\nOne day as I sang\nTo my birdies three,\nA spry little squirrel\nSprang up in the tree.\nI thought he was coming\nRight up to the bough, —\nIt makes my heart tremble\nTo think of it now.\nI flew like an eagle\nRight down through the air;\nAnd soon he was running,\nI cannot tell where.\nI pecked him and pecked him,\nAnd flew in his track;\nHe will not be in haste,\nI think, to come back.", words:["nest","oak","bough","squirrel","tremble","eagle","pecked","track"], illustration:"🐦🌳" },
                { level:"advanced", title:"George Washington", text:"When George Washington was quite a little boy, his father gave him a hatchet. It was bright and new, and George took great delight in going about and chopping things with it.\nHe ran into the garden, and there he saw a tree which seemed to say to him, Come and cut me down!\nSo he set to work with his little hatchet, and, as the tree was a very small one, it did not take long to lay it low.\nSoon after that, his father came home.\nWho has been cutting my fine young cherry tree? he cried. It was the only tree of its kind in this country and it cost me a great deal of money.\nFather! cried little George, I will tell you the truth about it. I chopped the tree down with my new hatchet.\nHis father forgot his anger.\nGeorge, he said, and he took the little fellow in his arms. George, I am glad that you told me about it. I would rather lose all my cherry trees than that you should tell one falsehood.\nWhen George Washington became a man he did many brave things to make our country free. The people loved him, and they still love his name. He was our first president.", words:["Washington","hatchet","cherry","truth","falsehood","president","brave","country"], illustration:"🪓🌳" },
                { level:"advanced", title:"The Kind-Hearted Boy", text:"One fine summer afternoon, Henry was walking home from school. He went along slowly, reading a book.\nHe had spent all his money for the book, but he was a happy boy.\nAfter a while he came into the highroad, where there was a gate. A blind man stood, holding it open.\nThe poor man said, Please give me a few cents to buy some bread! But Henry gave him nothing. What! did Henry give the poor blind man nothing? Yes; for, as I told you, he had spent all his money.\nSo Henry walked on, very sad. Soon after, a fine carriage came up, and in it were Robert and his mother.\nThe blind man stood, and held out his hat. Let us give the poor man something, said Robert to his mother. His mother gave him some cents. Robert took them, but did not put them into the man's hat.\nHe threw them among the grass and weeds at the side of the road. The poor man could not find them, for, as you know, he was blind.\nHenry had turned back to look at the fine carriage. When he saw Robert throw the cents upon the ground, he came back at once, and looked for the money until he found it all for the blind man. This took so long a time, that he almost lost his supper.\nWhich of the boys do you think was truly kind to the poor man?", words:["blind","money","carriage","bread","kind","truly","gate","cents"], illustration:"👦💰" },
                { level:"advanced", title:"A Good Old Man", text:"There once lived an old man in a cozy little cottage. It had two rooms and only two windows. A small garden lay just behind it.\nOld as the poor man was, he used to work in the fields. Often he would come home very tired and weak, with his hoe or spade on his shoulder.\nAnd who do you think met him at the door? Mary and Jane, his two little grandchildren.\nThey were too young to do very much work. But little Jane could bring water from the spring, and Mary could help keep the house for their grandfather.\nThey were too poor to buy much wood or coal in winter; but they sat close together around their little fire, and were very happy. Mary would sit on one of the good man's knees, and Jane on the other.\nSometimes their grandfather would tell them a funny story. Sometimes he would teach them a little song.\nOne cold, stormy night, they heard a knock at the door. The little girls ran and opened it. Oh, how glad they were! There stood their father.\nHe had been at sea a long time. He had saved some money, and had now come home to stay.\nAfter this the old man did not work any. His son worked for him, and his grandchildren took care of him. Many happy days they lived together.", words:["cottage","grandfather","grandchildren","spade","spring","stormy","saved","together"], illustration:"👴🏠" },
                { level:"advanced", title:"The Little Dairy Maid", text:"My name is Kate. I live on a farm. I am my mother's little dairymaid.\nI help take care of the milk, I churn the butter, and I keep everything in the dairy house clean and sweet.\nHow many cows have you on the farm, Kate?\nWe have ten cows. So you must know that we have as much milk as we can take care of.\nThe children drink some of it. Nothing is better for little boys and girls than plenty of good sweet milk.\nThe friendly cow, all red and white,\nI love with all my heart;\nShe gives me cream with all her might,\nTo eat with apple tart.\nShe wanders lowing here and there,\nAnd yet she cannot stray,\nAll in the pleasant open air,\nThe pleasant light of day.", words:["dairy","butter","cream","cows","milk","farm","churn","sweet"], illustration:"🐄🧈" },
                { level:"advanced", title:"Little Davy", text:"It was play time at the little red schoolhouse on the hill, and the children had run out into the bright sunshine, wild with laughter and fun.\nAll but little Davy. He came out last and very slowly, and he did not laugh. He was in trouble, and he did not see the bright golden sunlight and the pretty flowers that were doing their best to make him glad.\nHe walked across the yard, and sat down on a stone where none of the children could see him.\nDavy did not hear the bird. Some of the children would not play with him because his clothes were so poor. Some had even laughed at him. The tears came into his eyes, and then ran down his cheeks.\nPoor Davy had no father, and his mother had to work hard to keep him at school.\nThat evening when school was out, he started home alone by the path that led through the woods.\nJust then his teacher came along. She saw who it was, and said very kindly, What is the matter, Davy?\nThen he told her how the children had laughed at him because of his poor clothes. The teacher listened. When he had ended, she said: The children did very wrong to laugh at you, Davy, and I am sure they did not think. But I have a plan that I think will help you.\nOh, what is it? he said, while his face became bright with joy.\nWell, how would you like to be a little flower merchant?\nOn his way to and from school, the little boy hunted in the woods and fields for mosses and pretty wild flowers. His teacher helped him put them together, and then he took them to town and sold them.\nHe soon had money enough to help his mother buy many little things that were needed for her home; and the children never thought of laughing at his poor clothes again.", words:["Davy","tears","flowers","merchant","mosses","teacher","kindly","money"], illustration:"🌸👦" },
                { level:"advanced", title:"Mungo", text:"Once there was a miller who had a large black dog called Mungo.\nMungo was very kind to children. When the baby pulled his hair with both her hands, he would stand still and look pleased.\nAt night he stayed in the mill. When the miller came in the morning, he always found Mungo keeping watch just inside of the door.\nWhen at last the mill was started to running, and everything was in order, the miller would come upstairs and nod to Mungo. Then the dog would start to the house to get the miller's breakfast. He would make two trips. The first time he would bring a small pail of milk; then he would go back and get a dish of oatmeal tied up in a napkin.\nOne morning a little dog that lived near by was trying to cross the river by walking on a log which was sometimes used as a foot bridge. When the little dog was about half way over the foot bridge he fell into the rushing water.\nHe tried his best to swim to the shore, but the stream was too strong for him.\nJust at this time Mungo was going down to the mill with his master's dish of oatmeal. He saw the little dog fall into the water and heard him cry for help.\nMungo did not stop a minute to think. He set the dish on the ground by the side of the road, and then ran down the river bank as fast as he could.\nHe seized the poor fellow by the neck in such a way as to keep his head above water. Then he swam with him to the shore, and drew him high and dry out of the water.\nHaving done this, he went back, picked up his dish of oatmeal, and carried it to his master as if nothing had happened.", words:["Mungo","miller","mill","oatmeal","napkin","rescued","stream","faithful"], illustration:"🐕🏭" },
                { level:"advanced", title:"Bad Apples", text:"One day Robert's father saw him playing with some very rough boys. He had thought for some time that his son was learning bad habits, and now he knew the cause.\nIn the evening he brought to the house six beautiful apples. He gave them to Robert, telling him to lay them away for a few days until they should become mellow. Robert thanked his father, and laid them upon a dish in his mother's pantry.\nJust as he was putting them away, his father laid on the dish a seventh apple, which was quite rotten, and asked Robert to let it stay there.\nFather, said Robert, the rotten apple will spoil all the others.\nDo you think so? Why should not the six good apples rather make the bad one good? asked his father.\nA week after this he asked his son to open the door of the pantry and take out the apples. The six apples were all rotten.\nMy boy, said his father, I have often told you not to play with rude boys; for, just as the rotten apple has spoiled all the good ones, so the company of such boys will make you bad.\nRobert never forgot the lesson which his father had thus taught him. When any of the bad boys asked him to go with them or play with them, he thought of the rotten apples and turned away from them.", words:["apples","rotten","spoil","habits","company","lesson","pantry","mellow"], illustration:"🍎" },
                { level:"advanced", title:"Bruin", text:"I am going to tell about something that once happened in a little country town on the other side of the sea.\nDown in the kitchen of the inn sat a man who was going about the country with a pet bear. He was eating his supper.\nBruin, poor fellow, who never did any harm, had been left in the barnyard. He was tied to a post behind a pile of wood. He was very hungry, and yet his master had not given him a mouthful to eat.\nUp in the garret of the inn, three little children were playing. The eldest might be six years old, the youngest not more than two. They were very happy, and they often looked up at the moon and laughed.\nStump! stump! it was some one coming upstairs. The door flew open; it was Bruin — great, black, hungry Bruin! He had got tired of standing in the barnyard. He had untied himself, and had now found his way upstairs.\nThe children were much frightened when they saw the big bear. Each ran into a corner to hide; but Bruin found them all, and touched each one with his big cold nose, and did not try to harm them in any way.\nThis is nothing but a big dog, said the children. See how gentle and kind he is. Then, one by one, they came out of their dark corners and began to stroke the rough old bear.", words:["Bruin","bear","barnyard","garret","frightened","gentle","stroke","hungry"], illustration:"🐻" },
                { level:"advanced", title:"Bruin and the Children", text:"Bruin laid himself down on the floor; and the youngest boy lay down by him and hid his head with its golden curls in the bear's long black fur. Good doggie, said the little fellow, come and play hide and seek with me.\nThen the eldest boy took his drum and beat upon it till the room was full of the noise. The bear rose up on his hind legs and began to dance. All the children were delighted, and the youngest shouted with joy.\nNext, each boy took his toy gun, and Bruin, not to be outdone, seized the broomstick. What a fine soldier he is, and how well he holds his gun! shouted the second boy.\nThen they marched — left, left, left, right, left — up and down the long room. It was fine fun, and shaggy old Bruin enjoyed it as much as any of the children.\nIn a little while some one came up the stairs and opened the door. It was the mother of the three boys.\nBut the youngest boy laughed in great delight and shook his golden curls. Then he shouted, Oh, mother, we are playing soldiers with the big doggie!\nAnd just then the master of the bear came in and led him away.", words:["drum","dance","soldier","broomstick","marched","shaggy","golden","curls"], illustration:"🐻🥁" },
                { level:"advanced", title:"The Kind Old Oak", text:"It was almost time for winter to come. The little birds had all gone far away, for they were afraid of the cold. There was no green grass in the fields, and there were no pretty flowers in the gardens.\nMany of the trees had dropped all their leaves. Cold winter with its snow and ice was coming.\nAt the foot of an old oak tree some sweet little violets were still in blossom. Dear old oak, said they, winter is coming; we are afraid that we shall die of cold.\nDo not be afraid, little flowers, said the oak. Close your yellow eyes in sleep, and trust to me. You have made me glad many a time with your sweetness. Now I will take care that the winter shall do you no harm.\nSo the violets closed their pretty eyes and went to sleep; they knew they could trust the kind old oak. And the great tree softly dropped red leaf after red leaf upon them, until they were all covered over.\nCold winter came with its snow and ice, but it could not harm the little violets. Safe under the friendly leaves of the old oak they slept and dreamed happy dreams until the warm rains of spring came and waked them again.", words:["oak","violets","blossom","winter","trust","leaves","covered","spring"], illustration:"🌸🌳" },
                { level:"advanced", title:"Columbus", text:"This beautiful country in which we live was once an unknown land. There were no busy towns in it, no pleasant farms, no roads, no schoolhouses.\nWild animals lived in the woods, and red Indians hunted and fished and roamed about from place to place. There was not a white man in all the land.\nThe white people who lived in Europe did not know that there was any such country in the world. No one had ever crossed the great ocean; no one knew what was on this side of it.\nAt last a brave man whose name was Columbus said: I will cross the wide ocean; I will find out what lies on the other side.\nSo, with three small ships and a hundred men, he set sail. There were no swift steamships then, and his little vessels sailed very slowly. It took them two months to cross the sea.\nHow glad Columbus and his men were to see the land! Everything was very strange to them: the people, the animals, the trees, were not like those they had known in Europe. The country seemed a fairyland.\nWhen Columbus went back to Europe he told all about the strange new land he had found. Everybody was delighted, and a great many people wanted to come here to live.\nYear after year, men from Europe came over in ships. They built houses. They cleared the ground and made farms.\nAnd now in the country that was once so wild, there are hundreds and hundreds of happy homes.", words:["Columbus","ocean","ships","Europe","unknown","brave","fairyland","farms"], illustration:"⛵🌍" },
                { level:"advanced", title:"The Peaches", text:"One day a man who had been to market brought home five peaches. His four sons met him at the door, and he said, Here, boys, I have brought a peach for each of you, and one for your mother.\nIn the evening the father said: Well, boys, what did you do with those peaches?\nThe eldest said, I ate mine, and found it very sweet and juicy. I have put the stone away, and in the spring I will plant it. If it grows, I will have a peach tree of my own.\nYou have done right, said his father. It is a good thing to think of having something for yourself to-morrow or next year, and one should take care never to be wasteful.\nThe youngest boy then said: I ate my peach and threw away the stone, and mother gave me half of hers.\nThe next boy said: I picked up the stone which he threw away; I broke it open and ate the kernel. Then I sold my peach for enough to buy three peaches the next time I go down the street.\nThe father was not so well pleased with this answer. It is right to think of having something for yourself, but you have acted in a way that I am afraid will make you selfish and greedy.\nThe other boy then said: I did not eat my peach. I gave it to the little sick boy who lives across the street. The doctor said that ripe fruit would do him good, but his mother is too poor to buy any for him.\nThe other three brothers felt that this boy had made the best use of his peach; and the tears of joy in his mother's eyes were better to him than a basket full of fruit.", words:["peaches","stone","kernel","wasteful","selfish","generous","sick","tears"], illustration:"🍑" },
                { level:"advanced", title:"The Two Goats", text:"On a wild mountain, two goats met on a narrow ledge near the top of a high cliff.\nThe ledge was so narrow that there was no room for them to pass each other. It was so narrow that neither of them could turn round and go back.\nA steep rock rose high above them on one side. On the other side was a deep, dark chasm at the bottom of which flowed a swift river.\nOne of them with great care laid himself down on the narrow ledge, and pressed himself as close to the rock as he could. Then the other goat gently and with great care stepped over his friend, and when he was safely past him he ran swiftly away.\nThe goat that had lain down then got from the ground and went on his way, free to spring again from rock to rock and feed on the sweet grass on the hills.\nNot long after this, two other goats met in the same place. They looked at each other and both became angry. Then each said to the other, Get out of my road and let me pass!\nThen they stamped their feet and shook their heads, but neither would give way to the other. At last they began to strike and fight with their horns; then their feet slipped, and both fell down into the swift stream, and were lost in the waters.\nBoth might still have been alive and happy if one had been willing at the right time to give up to the other.", words:["goats","ledge","cliff","chasm","willing","quarrel","horns","stream"], illustration:"🐐⛰️" },
                { level:"advanced", title:"Oliver Goldsmith", text:"There was once a kind man whose name was Oliver Goldsmith. He wrote many good books, some of which you may read when you are older.\nHe had a gentle heart. He was always ready to help others and give them a part of anything he had. He gave so much to the poor that he was always poor himself.\nOne day a poor woman asked Doctor Goldsmith to go and see her husband; for she said he was sick and could not eat.\nGoldsmith did so. He found that the family was in great need. The man had not had work for a long time. He was not sick, but only in trouble; and as for eating, there was not a bit of food in the house.\nCall at my room this evening, said Doctor Goldsmith to the woman. I will then give you some medicine for your husband.\nIn the evening the woman called. The doctor gave her a little paper box that was very heavy.\nHere is the medicine, he said. Use it with care, and I think it will do your husband a great deal of good. But don't open the box until you reach home.\nWhen the woman reached her home she sat down by her husband, and they opened the box. It was full of pieces of money. And on the top were the directions: To be taken as often as necessity requires.\nDoctor Goldsmith had given them all the ready money that he had.", words:["Goldsmith","physician","medicine","money","poor","gentle","generous","directions"], illustration:"📚💰" },
                { level:"advanced", title:"Alice's Supper", text:"Far down in the valley the wheat grows deep,\nAnd the reapers are making the cradles sweep;\nAnd this is the song that I hear them sing,\nWhile cheery and loud their voices ring:\nTis the finest wheat that ever did grow!\nAnd it is for Alice's supper — ho! ho!\nFar down by the river the old mill stands,\nAnd the miller is rubbing his dusty hands;\nAnd these are the words of the miller's lay,\nAs he watches the millstones grinding away:\nTis the finest flour that money can buy,\nAnd it is for Alice's supper — hi! hi!\nDownstairs in the kitchen the fire doth glow,\nAnd cook is kneading the soft, white dough;\nAnd this is the song she is singing to-day,\nAs merry and busy she's working away:\nTis the finest dough, whether near or afar,\nAnd it is for Alice's supper — ha! ha!\nTo the nursery now comes mother, at last,\nAnd what in her hand is she bringing so fast?\nTis a plateful of something, all yellow and white,\nAnd she sings as she comes, with her smile so bright:\nTis the best bread and butter I ever did see,\nAnd it is for Alice's supper — he! he!", words:["wheat","flour","mill","dough","bread","butter","supper","nursery"], illustration:"🍞" }
            ]

        };


                // Active lesson set (changes when reader is switched)
        let currentReaderNum = 1;
        let lessons = READERS[1];

        let userData   = { first: { completed: [], currentLesson: 0 }, second: { completed: [], currentLesson: 0 } };
        let currentReader = null;
        let currentLesson = null;
        let currentLessonIndex = 0;
        let currentFilter = 'all';

        // ── READER SELECT ──────────────────────────────────────────────────────
        function selectReader(id) {
            currentReader = id;
            document.body.className = 'mode-page';
            document.getElementById('menuScreen').style.display = 'block';
            const icons = { hadley:'🌷', audrey:'🐱', guest:'👤' };
            const names = { hadley:'Hadley', audrey:'Audrey', guest:'Guest' };
            document.getElementById('readerLabel').textContent = (icons[id]||'') + ' ' + (names[id]||id);
            if (id === 'guest') {
                userData = { first: { completed: [], currentLesson: 0 }, second: { completed: [], currentLesson: 0 } };
                switchReader(1);
                init();
            } else {
                db.ref('mcguffey/' + id).once('value', function(snap) {
                    var saved = snap.val();
                    if (!saved) {
                        userData = { first: { completed: [], currentLesson: 0 }, second: { completed: [], currentLesson: 0 } };
                    } else if (saved.first) {
                        // New format
                        userData = saved;
                        if (!Array.isArray(userData.first.completed))  userData.first.completed  = [];
                        if (!Array.isArray(userData.second.completed)) userData.second.completed = [];
                    } else {
                        // Migrate old flat format (completed array at root)
                        var oldCompleted = Array.isArray(saved.completed) ? saved.completed : [];
                        userData = {
                            first:  { completed: oldCompleted, currentLesson: saved.currentLesson || 0 },
                            second: { completed: [], currentLesson: 0 }
                        };
                    }
                    // Auto-open Second Reader if First is complete
                    var firstDone = userData.first.completed.length >= READERS[1].length;
                    switchReader(firstDone ? 2 : 1);
                    init();
                });
            }
        }

        function changeReader() {
            currentReader = null;
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('lessonScreen').classList.add('hidden');
            document.body.className = 'mode-cover';
        }

        function saveProgress() {
            if (!currentReader || currentReader === 'guest') return;
            db.ref('mcguffey/' + currentReader).set(userData);
        }

        function switchReader(num) {
            currentReaderNum = num;
            lessons = READERS[num];
            currentFilter = 'all';
            // Update tab styles
            var r1 = document.getElementById('tab-reader-1');
            var r2 = document.getElementById('tab-reader-2');
            if (r1 && r2) {
                r1.style.background  = '#c8e0f8';
                r1.style.borderColor = num === 1 ? '#6aa0d0' : '#a8c8e8';
                r1.style.color       = '#1a3a5a';
                r1.style.boxShadow   = num === 1 ? '0 4px 0 #4a80b0' : '0 4px 0 #a0c0d8';
                r1.style.opacity     = num === 1 ? '1' : '0.6';
                r2.style.background  = '#e8d8f8';
                r2.style.borderColor = num === 2 ? '#9870c8' : '#c8b0e8';
                r2.style.color       = '#3a1a5a';
                r2.style.boxShadow   = num === 2 ? '0 4px 0 #7850a8' : '0 4px 0 #b8a0d8';
                r2.style.opacity     = num === 2 ? '1' : '0.6';
            }
            var sub = document.getElementById('readerSubtitle');
            if (sub) sub.textContent = (num === 1 ? 'First' : 'Second') + ' Reader · Revised Edition';
            var tease = document.getElementById('readerTease');
            if (tease) tease.style.display = (num === 1 && userData.first.completed.length < READERS[1].length) ? 'block' : 'none';
            // Reset level filter tabs
            document.querySelectorAll('.level-tab').forEach(t => t.classList.remove('active'));
            var allTab = document.querySelector('.level-tab');
            if (allTab) allTab.classList.add('active');
            if (currentReader) renderLessonMenu();
            updateOverallProgress();
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); };
        }

        function init() {
            renderLessonMenu();
            updateOverallProgress();
        }

        function filterByLevel(level) {
            currentFilter = level;
            document.querySelectorAll('.level-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            renderLessonMenu();
        }

        function renderLessonMenu() {
            const menu = document.getElementById('lessonMenu');
            menu.innerHTML = '';
            const filteredLessons = currentFilter === 'all'
                ? lessons
                : lessons.filter(l => l.level === currentFilter);
            filteredLessons.forEach((lesson) => {
                const index = lessons.indexOf(lesson);
                const btn = document.createElement('button');
                btn.className = 'btn lesson-btn';
                const levelBadge = `<span class="level-badge level-${lesson.level}">${lesson.level[0].toUpperCase()}</span>`;
                btn.innerHTML = `${index + 1}${levelBadge}`;
                if ((getCurrentData().completed||[]).includes(index)) {
                    btn.classList.add('completed');
                    btn.innerHTML += ' ✓';
                }
                btn.onclick = () => startLesson(index);
                menu.appendChild(btn);
            });
        }

        function getCurrentData() {
            return currentReaderNum === 1 ? userData.first : userData.second;
        }

        function updateOverallProgress() {
            var cd = getCurrentData();
            const percent = Math.round(((cd.completed||[]).length / lessons.length) * 100);
            const bar = document.getElementById('overallProgress');
            bar.style.width = percent + '%';
            bar.textContent = percent + '% Complete (' + (currentReaderNum === 1 ? 'First' : 'Second') + ' Reader)';
        }

        function startLesson(index) {
            currentLesson = lessons[index];
            currentLessonIndex = index;
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('lessonScreen').classList.remove('hidden');
            document.getElementById('lessonTitle').textContent = currentLesson.title;
            document.getElementById('illustration').textContent = currentLesson.illustration;
            document.getElementById('illustrationCaption').textContent = currentLesson.title;
            const textDiv = document.getElementById('lessonText');
            const words = currentLesson.text.split(' ');
            textDiv.innerHTML = words.map(word => `<span class="word">${word}</span>`).join(' ');
            document.getElementById('wordPractice').classList.add('hidden');
        }

        function readAloud() {
            const text = currentLesson.text;
            const words = document.querySelectorAll('.word');
            words.forEach(w => w.classList.remove('highlight'));
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.7;
            utterance.pitch = 1.2;
            const voices = speechSynthesis.getVoices();
            const femaleVoice = voices.find(voice =>
                voice.name.toLowerCase().includes('female') ||
                voice.name.toLowerCase().includes('samantha') ||
                voice.name.toLowerCase().includes('zira') ||
                voice.name.toLowerCase().includes('susan')
            );
            if (femaleVoice) utterance.voice = femaleVoice;
            let currentWordIndex = 0;
            if (words[0]) words[0].classList.add('highlight');
            utterance.onboundary = (event) => {
                if (event.name === 'word') {
                    words.forEach(w => w.classList.remove('highlight'));
                    if (currentWordIndex < words.length) {
                        words[currentWordIndex].classList.add('highlight');
                        currentWordIndex++;
                    }
                }
            };
            utterance.onend = () => { words.forEach(w => w.classList.remove('highlight')); };
            speechSynthesis.speak(utterance);
        }

        function showWordPractice() {
            document.getElementById('wordPractice').classList.remove('hidden');
            const wordList = document.getElementById('wordList');
            wordList.innerHTML = '';
            currentLesson.words.forEach(word => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.textContent = word;
                card.onclick = () => {
                    const utterance = new SpeechSynthesisUtterance(word);
                    utterance.pitch = 1.2;
                    speechSynthesis.speak(utterance);
                };
                wordList.appendChild(card);
            });
        }

        function hideWordPractice() {
            document.getElementById('wordPractice').classList.add('hidden');
        }

        function completeLesson() {
            var cd = getCurrentData();
            if (!(cd.completed||[]).includes(currentLessonIndex)) {
                cd.completed = cd.completed || [];
                cd.completed.push(currentLessonIndex);
                cd.currentLesson = Math.max(cd.currentLesson || 0, currentLessonIndex + 1);
                saveProgress();
            }
            if (cd.completed.length === lessons.length) {
                if (currentReaderNum === 1) {
                    alert('🎉 Congratulations! You completed McGuffey\'s First Reader!\n\nYou are now ready for the Second Reader! Click the 📗 Second Reader tab to begin.');
                    switchReader(2);
                } else {
                    alert('🏆 Amazing! You have completed McGuffey\'s Second Reader!\n\nWell done!');
                }
            }
            backToMenu();
        }

        function backToMenu() {
            document.getElementById('menuScreen').style.display = 'block';
            document.getElementById('lessonScreen').classList.add('hidden');
            renderLessonMenu();
            updateOverallProgress();
        }
    </script>
</body>
</html>
