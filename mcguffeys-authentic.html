<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McGuffey's Readers - Authentic Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=IM+Fell+English:ital@0;1&family=Fredoka+One&display=swap');

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Lora', Georgia, serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 24px 16px 48px;
            overflow-x: hidden;
            transition: background 0.6s ease;
        }

        /* ── COVER MODE body ── */
        body.mode-cover {
            background: radial-gradient(ellipse at 40% 30%, #b8e0a0 0%, #7ab860 40%, #4a8a30 100%);
        }

        /* ── PAGE MODE body ── */
        body.mode-page {
            background: radial-gradient(ellipse at 50% 80%, #c8d8b0 0%, #8aaa60 50%, #4a7030 100%);
        }

        /* ── FLOATING NATURE ICONS ── */
        .book-sparkles {
            width: 100%;
            max-width: 700px;
            height: 68px;
            position: relative;
            pointer-events: none;
            margin-bottom: -6px;
        }
        .sparkle {
            position: absolute;
            animation: floatLeaf 3.5s ease-in-out infinite;
        }
        .sparkle:nth-child(1) { left:3%;  top:8px;  font-size:1.7em; animation-delay:0s; }
        .sparkle:nth-child(2) { left:16%; top:34px; font-size:1.1em; animation-delay:0.6s; }
        .sparkle:nth-child(3) { left:29%; top:6px;  font-size:1em;   animation-delay:1.1s; }
        .sparkle:nth-child(4) { left:50%; top:16px; font-size:2em;   animation-delay:0.3s; }
        .sparkle:nth-child(5) { left:66%; top:5px;  font-size:1.2em; animation-delay:0.9s; }
        .sparkle:nth-child(6) { left:80%; top:32px; font-size:1em;   animation-delay:0.4s; }
        .sparkle:nth-child(7) { left:93%; top:10px; font-size:1.6em; animation-delay:1.4s; }
        @keyframes floatLeaf {
            0%,100% { transform: translateY(0) rotate(0deg)    scale(1);    opacity:.85; }
            50%      { transform: translateY(-10px) rotate(10deg) scale(1.1); opacity:1; }
        }

        /* ══════════════════════════════════════
           BOOK OUTER SHELL — shared wrapper
        ══════════════════════════════════════ */
        .book-outer {
            max-width: 680px;
            width: 100%;
            position: relative;
            transition: all 0.4s ease;
        }

        /* fanned pages peeking behind — only visible in page mode */
        .book-outer::before,
        .book-outer::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 4px 12px 12px 4px;
            opacity: 0;
            transition: opacity 0.4s;
        }
        body.mode-page .book-outer::before {
            background: linear-gradient(180deg, #fdf8ee 0%, #e8dfc0 100%);
            transform: rotate(-2deg);
            transform-origin: bottom left;
            opacity: 1;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        body.mode-page .book-outer::after {
            background: linear-gradient(180deg, #fdf8ee 0%, #e8dfc0 100%);
            transform: rotate(2deg);
            transform-origin: bottom right;
            opacity: 1;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        /* ══════════════════════════════════════
           BOOK COVER  (user select screen)
        ══════════════════════════════════════ */
        .book-cover {
            position: relative;
            z-index: 2;
            border-radius: 6px 14px 14px 6px;
            overflow: hidden;
            min-height: 520px;
            display: flex;
            flex-direction: column;
            transition: all 0.4s ease;

            /* Illustrated cover: rich teal/forest with texture */
            background:
                radial-gradient(ellipse at 70% 20%, rgba(255,255,255,0.08) 0%, transparent 60%),
                linear-gradient(160deg, #2d6e3e 0%, #1e5230 40%, #163d24 100%);

            /* hard cover border */
            border: 3px solid #0f2d18;
            box-shadow:
                -8px 0 0 #0f2d18,
                0 10px 0 #163d24,
                0 18px 40px rgba(10,40,15,0.5),
                inset 0 0 60px rgba(0,0,0,0.15);
        }

        /* Spine on left edge of cover */
        .book-cover::before {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 36px;
            background: linear-gradient(90deg,
                #0a1e10 0%, #163d24 35%, #1e5230 55%, #163d24 75%, #0a1e10 100%);
            border-right: 1px solid rgba(255,255,255,0.06);
        }

        /* Gold decorative border inset on cover */
        .book-cover::after {
            content: '';
            position: absolute;
            top: 14px; left: 50px; right: 14px; bottom: 14px;
            border: 2px solid rgba(212,180,80,0.35);
            border-radius: 4px;
            pointer-events: none;
        }

        .cover-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 40px 36px 60px;
            position: relative;
            z-index: 1;
        }

        /* Big woodland illustration at top of cover */
        .cover-art {
            font-size: 5.5em;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
            animation: coverFloat 4s ease-in-out infinite;
        }
        @keyframes coverFloat {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }

        /* Cover title */
        .cover-title {
            font-family: 'Fredoka One', cursive;
            font-size: 2.4em;
            color: #f0e080;
            text-align: center;
            line-height: 1.15;
            text-shadow:
                0 2px 0 rgba(0,0,0,0.4),
                0 4px 16px rgba(0,0,0,0.3);
            margin-bottom: 4px;
            letter-spacing: 0.01em;
        }

        .cover-subtitle {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 0.95em;
            color: rgba(220,240,180,0.8);
            margin-bottom: 28px;
            text-align: center;
        }

        /* Decorative divider */
        .cover-divider {
            width: 180px;
            text-align: center;
            color: rgba(212,180,80,0.6);
            font-size: 0.9em;
            letter-spacing: 0.15em;
            margin-bottom: 28px;
        }

        /* Reader select prompt */
        .cover-prompt {
            font-family: 'Fredoka One', cursive;
            font-size: 1.15em;
            color: rgba(220,240,180,0.9);
            margin-bottom: 20px;
            text-align: center;
        }

        /* Reader buttons on cover */
        .cover-readers {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .reader-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 16px 22px;
            border-radius: 16px;
            border: 3px solid rgba(255,255,255,0.2);
            cursor: pointer;
            font-family: 'Fredoka One', cursive;
            font-size: 1em;
            transition: all 0.2s;
            min-width: 110px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.25), 0 8px 20px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        .reader-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.08);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .reader-btn:hover { transform: translateY(-4px); box-shadow: 0 8px 0 rgba(0,0,0,0.2), 0 12px 24px rgba(0,0,0,0.25); }
        .reader-btn:hover::before { opacity: 1; }
        .reader-btn:active { transform: translateY(0); box-shadow: 0 2px 0 rgba(0,0,0,0.25); }

        .reader-btn.hadley { background: linear-gradient(145deg, #b8d8f0, #88b8e0); color: #1a3a5a; border-color: rgba(100,160,220,0.5); }
        .reader-btn.audrey { background: linear-gradient(145deg, #f8c8dc, #f090b8); color: #5a1a38; border-color: rgba(220,100,160,0.5); }
        .reader-btn.guest  { background: linear-gradient(145deg, #d8c8f0, #b090d8); color: #3a1a5a; border-color: rgba(160,100,220,0.5); }

        .reader-btn .btn-icon  { font-size: 2em; line-height: 1; }
        .reader-btn .btn-name  { font-size: 1.1em; font-weight: bold; }
        .reader-btn .btn-grade { font-size: 0.7em; opacity: 0.75; font-family: 'Lora', serif; font-style: italic; }

        /* Cover bottom binding strip */
        .cover-binding {
            height: 14px;
            background: linear-gradient(180deg, #0f2d18 0%, #081808 100%);
            border-radius: 0 0 10px 0;
            position: relative;
            z-index: 2;
        }

        /* ══════════════════════════════════════
           BOOK PAGE  (menu + lesson screens)
        ══════════════════════════════════════ */
        .book-page {
            display: none;
            position: relative;
            z-index: 2;
            min-height: 580px;

            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 31px,
                    rgba(80,110,40,0.055) 31px,
                    rgba(80,110,40,0.055) 32px
                ),
                linear-gradient(170deg, #fefcf5 0%, #faf4e0 50%, #f4ebcc 100%);

            border-radius: 4px 12px 0 0;

            /* Spine on left */
            border-left: 40px solid #2d5a20;

            box-shadow:
                inset 10px 0 20px rgba(45,90,32,0.12),
                inset -2px 0 8px rgba(0,0,0,0.04),
                0 6px 0 #234818,
                0 12px 40px rgba(20,50,10,0.35);

            padding: 40px 48px 36px 44px;
        }

        body.mode-page .book-page { display: block; }
        body.mode-cover .book-page { display: none; }
        body.mode-cover .book-cover { display: flex; }
        body.mode-page  .book-cover { display: none; }

        /* Spine label */
        .book-page::before {
            content: 'McGUFFEY';
            position: absolute;
            top: 50%;
            left: -32px;
            transform: translateY(-50%) rotate(-90deg);
            font-family: 'Lora', serif;
            font-size: 0.52em;
            font-weight: bold;
            color: rgba(212,180,80,0.7);
            letter-spacing: 0.3em;
            white-space: nowrap;
        }

        /* Inner margin rule */
        .book-page::after {
            content: '';
            position: absolute;
            inset: 16px 16px 16px 56px;
            border: 1px solid rgba(80,110,40,0.12);
            pointer-events: none;
            border-radius: 2px;
        }

        /* Bottom binding */
        .book-bottom {
            max-width: 680px;
            width: 100%;
            height: 13px;
            position: relative;
            z-index: 2;
            border-radius: 0 0 8px 8px;
            background: linear-gradient(180deg, #2d5a20 0%, #1e3e14 60%, #142a0c 100%);
            box-shadow: 0 6px 20px rgba(15,40,10,0.4);
        }

        /* ── PAGE TYPOGRAPHY ── */
        .header {
            text-align: center;
            margin-bottom: 22px;
            padding-bottom: 14px;
            border-bottom: 1.5px solid rgba(60,100,40,0.2);
        }
        h1 {
            font-family: 'IM Fell English', serif;
            color: #2a4a1a;
            font-size: 1.9em;
            margin-bottom: 5px;
        }
        .subtitle { font-size: 0.9em; color: #4a7030; font-style: italic; }

        .lesson-title {
            font-family: 'IM Fell English', serif;
            font-size: 1.45em;
            color: #2a4a1a;
            text-align: center;
            margin-bottom: 18px;
            border-bottom: 1.5px solid rgba(60,100,40,0.2);
            padding-bottom: 12px;
        }
        .lesson-content {
            font-size: 1.18em;
            line-height: 2.05;
            color: #1a2e0c;
            margin: 18px 0;
            text-align: justify;
        }
        .word { display:inline; cursor:pointer; padding:1px 3px; border-radius:3px; transition:background .2s; }
        .word:hover    { background: #d4edaa; }
        .word.highlight { background: #a8d860; font-weight:bold; }

        /* ── CONTROLS ── */
        .controls { display:flex; justify-content:center; gap:12px; margin:20px 0; flex-wrap:wrap; }
        .btn {
            background: linear-gradient(135deg, #c8e8a0 0%, #a0c870 100%);
            color: #2a4a1a; border: 2px solid #4a7a30;
            padding: 10px 22px; font-size: 0.95em;
            border-radius: 8px; cursor: pointer;
            font-weight: bold; font-family: 'Lora', serif;
            box-shadow: 0 4px 0 #3a6020; transition: all 0.1s;
        }
        .btn:hover  { transform:translateY(-2px); box-shadow:0 6px 0 #3a6020; }
        .btn:active { transform:translateY(2px);  box-shadow:0 2px 0 #3a6020; }
        .btn-primary { background:linear-gradient(135deg,#a8d8ea,#78b8cc); border-color:#4a8aaa; box-shadow:0 4px 0 #3a7a9a; }
        .btn-primary:hover { box-shadow:0 6px 0 #3a7a9a; }
        .btn-success { background:linear-gradient(135deg,#b8e6a0,#80c860); border-color:#4a8a30; box-shadow:0 4px 0 #3a7020; }
        .btn-success:hover { box-shadow:0 6px 0 #3a7020; }

        /* ── WORD PRACTICE ── */
        .word-practice {
            margin:18px 0; padding:18px;
            background:rgba(200,230,160,0.22);
            border-radius:8px; border:1.5px solid #7aaa50;
        }
        .word-practice h3 { color:#2a4a1a; margin-bottom:10px; text-align:center; font-family:'IM Fell English',serif; }
        .word-list { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin:12px 0; }
        .word-card {
            background:white; padding:10px 18px;
            border-radius:8px; border:2px solid #7aaa50;
            font-size:1.1em; color:#2a4a1a;
            cursor:pointer; transition:all .2s;
        }
        .word-card:hover { background:#c8e890; transform:scale(1.05); }

        /* ── PROGRESS ── */
        .progress-bar { background:#c8e8a0; height:20px; border-radius:10px; overflow:hidden; margin:12px 0; border:2px solid #4a7a30; }
        .progress-fill {
            background:linear-gradient(135deg,#6ab840,#4a9020);
            height:100%; transition:width .5s;
            display:flex; align-items:center; padding-left:10px;
            color:white; font-weight:bold; font-size:0.82em; white-space:nowrap;
        }

        /* ── LESSON MENU ── */
        .level-tabs { display:flex; justify-content:center; gap:8px; margin:12px 0; flex-wrap:wrap; }
        .level-tab {
            padding:7px 15px; background:#c8e8a0; border:2px solid #4a7a30;
            border-radius:8px; cursor:pointer; font-weight:bold; color:#2a4a1a;
            font-family:'Lora',serif; transition:all .2s;
        }
        .level-tab:hover, .level-tab.active { background:#a0c870; box-shadow:0 3px 0 #3a6020; }
        .lesson-menu {
            display:grid; grid-template-columns:repeat(auto-fill,minmax(86px,1fr));
            gap:7px; margin:12px 0; max-height:340px; overflow-y:auto;
            padding:10px; background:rgba(200,230,160,0.18);
            border-radius:8px; border:1.5px solid #7aaa50;
        }
        .lesson-btn { padding:10px 6px; font-size:0.86em; text-align:center; }
        .lesson-btn.completed { background:linear-gradient(135deg,#b8e6a0,#80c860); }
        .hidden { display:none; }

        /* ── ILLUSTRATION ── */
        .illustration {
            text-align:center; margin:18px auto; max-width:240px;
            background:linear-gradient(160deg,#fefcf4,#f0e8d0);
            border:2px solid #7aaa50;
            outline:1px solid #7aaa50; outline-offset:3px;
            padding:16px 14px 12px;
            box-shadow:0 4px 12px rgba(60,100,40,0.14);
        }
        .illus-emoji { font-size:4.2em; display:block; margin-bottom:5px; line-height:1.1; }
        .illus-caption {
            font-family:'IM Fell English',serif;
            font-size:0.7em; font-style:italic; color:#3a5a20;
            border-top:1px solid #7aaa50; margin-top:7px; padding-top:5px;
        }

        /* ── BADGES ── */
        .level-badge { display:inline-block; padding:3px 10px; border-radius:10px; font-size:0.72em; font-weight:bold; margin-left:6px; }
        .level-beginner     { background:#c8e0f8; color:#1a3a5a; }
        .level-intermediate { background:#fbd8e8; color:#5a1a38; }
        .level-advanced     { background:#e8d8f8; color:#3a1a5a; }

        /* ── READER SWITCHER TABS ── */
        #tab-reader-1, #tab-reader-2 { font-family:'Lora',serif; }

        @media (max-width:600px) {
            .book-page { border-left-width:22px; padding:24px 18px 24px 20px; }
            .book-page::before { left:-18px; font-size:0.42em; }
            .cover-title { font-size:1.8em; }
            .cover-content { padding:30px 24px 28px 42px; }
            h1 { font-size:1.5em; }
        }
    </style>
</head>
<body class="mode-cover">

    <div class="book-sparkles">
        <span class="sparkle">🍃</span>
        <span class="sparkle">🌿</span>
        <span class="sparkle">🍀</span>
        <span class="sparkle">🌸</span>
        <span class="sparkle">🍃</span>
        <span class="sparkle">✨</span>
        <span class="sparkle">🌿</span>
    </div>

    <div class="book-outer">

      <!-- ══ BOOK COVER (user select screen) ══ -->
      <div class="book-cover">
        <div class="cover-content">

          <div class="cover-art">🌿📖🌿</div>

          <div class="cover-title">McGuffey's<br>Readers</div>
          <div class="cover-subtitle">Revised Edition · 1879</div>

          <div class="cover-divider">✦ ───────── ✦</div>

          <div class="cover-prompt">Who is reading today?</div>

          <div class="cover-readers">
            <button class="reader-btn hadley" onclick="selectReader('hadley')">
              <span class="btn-icon">🌷</span>
              <span class="btn-name">Hadley</span>
              <span class="btn-grade">Grade 1–2</span>
            </button>
            <button class="reader-btn audrey" onclick="selectReader('audrey')">
              <span class="btn-icon">🐱</span>
              <span class="btn-name">Audrey</span>
              <span class="btn-grade">Grade K–1</span>
            </button>
            <button class="reader-btn guest" onclick="selectReader('guest')">
              <span class="btn-icon">👤</span>
              <span class="btn-name">Guest</span>
              <span class="btn-grade">No Save</span>
            </button>
          </div>

        </div>
        <div class="cover-binding"></div>
      </div>

      <!-- ══ BOOK PAGE (menu + lesson screens) ══ -->
      <div class="book-page">
        <div class="header">
            <h1>📖 McGuffey's Readers</h1>
            <p class="subtitle" id="readerSubtitle">First Reader · Revised Edition</p>
        </div>

        <!-- Reader switcher tabs -->
        <div style="display:flex; justify-content:center; gap:10px; margin:12px 0 4px;">
            <button id="tab-reader-1" class="btn" onclick="switchReader(1)" style="padding:7px 18px; font-size:0.82em; background:#c8e0f8; border:2px solid #6aa0d0; color:#1a3a5a; box-shadow:0 4px 0 #4a80b0;">📖 First Reader</button>
            <button id="tab-reader-2" class="btn" onclick="switchReader(2)" style="padding:7px 18px; font-size:0.82em; background:#e8d8f8; border:2px solid #9870c8; color:#3a1a5a; box-shadow:0 4px 0 #7850a8;">📗 Second Reader</button>
        </div>

        <!-- MENU SCREEN -->
        <div id="menuScreen" style="display:none">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <span id="readerLabel" style="color:#3a5a20; font-style:italic; font-size:0.9em;"></span>
                <button class="btn" onclick="changeReader()" style="font-size:0.75em; padding:6px 14px;">↩ Change Reader</button>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="overallProgress" style="width:0%">0% Complete</div>
            </div>
            <h2 style="text-align:center; color:#2a4a1a; font-family:'IM Fell English',serif; margin:20px 0 8px;">Choose a Lesson:</h2>
            <div class="lesson-menu" id="lessonMenu"></div>
            <div style="text-align:center; margin-top:20px;">
                <p id="readerTease" style="color:#4a7030; font-style:italic; font-size:0.9em;">Complete all lessons to unlock McGuffey's Second Reader!</p>
            </div>
        </div>

        <!-- LESSON SCREEN -->
        <div id="lessonScreen" class="hidden">
            <div class="lesson-title" id="lessonTitle">Lesson I</div>
            <div class="illustration" id="illustrationDiv">
                <span class="illus-emoji" id="illustration">🐱</span>
                <div class="illus-caption" id="illustrationCaption"></div>
            </div>
            <div class="lesson-content" id="lessonText"></div>
            <div class="controls">
                <button class="btn btn-primary" onclick="readAloud()">🔊 Read Aloud</button>
                <button class="btn" onclick="showWordPractice()">📝 Practice Words</button>
                <button class="btn btn-success" onclick="completeLesson()">✓ Complete Lesson</button>
            </div>
            <div id="wordPractice" class="hidden">
                <div class="word-practice">
                    <h3>Practice New Words:</h3>
                    <div class="word-list" id="wordList"></div>
                    <div style="text-align:center; margin-top:16px;">
                        <button class="btn" onclick="hideWordPractice()">Back to Lesson</button>
                    </div>
                </div>
            </div>
            <div class="controls" style="margin-top:20px;">
                <button class="btn" onclick="backToMenu()">📚 Back to Menu</button>
            </div>
        </div>

      </div><!-- end book-page -->
      <div class="book-bottom"></div>
    </div><!-- end book-outer -->

        const READERS = {
            1: [
                { level:"beginner", title:"Lesson I", text:"The mat.\nThe cat.\nThe cat is on the mat.\nIs the cat on the mat?", words:["mat","cat","is","on","the"], illustration:"🐱" },
                { level:"beginner", title:"Lesson II", text:"The man. A pen.\nThe man has a pen.\nIs the pen in his hand?\nIt is in his hand.", words:["man","pen","has","in","his","hand","it"], illustration:"✏️" },
                { level:"beginner", title:"Lesson III", text:"A fat hen is on the box.\nA big rat ran from the box.\nCan the hen run?", words:["fat","hen","big","rat","ran","from","can","run"], illustration:"🐔" },
                { level:"beginner", title:"Lesson IV", text:"See Rab! See Ann!\nSee! Rab has the hat.\nCan Ann catch Rab?", words:["see","Rab","Ann","hat","catch"], illustration:"👧" },
                { level:"beginner", title:"Lesson V", text:"Ann can catch Rab.\nSee! She has the hat.\nNow Ann can pat Rab.\nLet me pat Rab, too.", words:["she","pat","too","now","let","me"], illustration:"👧🐕" },
                { level:"beginner", title:"Lesson VI", text:"Ned has fed the hen.\nShe is a black hen.\nShe has left the nest.\nSee the eggs in the nest!\nWill the hen let Ned get the eggs?", words:["Ned","fed","black","left","nest","eggs","will","get"], illustration:"🐔🥚" },
                { level:"beginner", title:"Lesson VII", text:"Let me get the black hat.\nNow Ned has it on his head, and he is a big man.\nCome, Nat, see the big man with his black hat.", words:["head","he","Nat","come","with","and"], illustration:"🎩" },
                { level:"beginner", title:"Lesson VIII: Review", text:"Ned is on the box. He has a pen in his hand. A big rat ran from the box. Can the dog catch the rat?\nCome with me, Ann, and see the man with a black hat on his head.\nThe fat hen has left the nest. Run, Nat, and get the eggs.", words:["dog"], illustration:"📝" },
                { level:"beginner", title:"Lesson IX", text:"Do you see Nell?\nYes; she has a pan with some eggs in it.\nLet me have the pan and the eggs, will you, Nell?\nHas the black hen left the nest?\nI will now run to catch Rab.\nWill you run, too?", words:["Nell","you","do","yes","some","pan","I","now"], illustration:"👧" },
                { level:"beginner", title:"Lesson X", text:"O Ben! let me get in, will you?\nYes, if you will sit still.\nStand still, Jip, and let Ann get in.\nNow, Ben, hand me the whip.\nGet up, Jip!", words:["Ben","Jip","if","sit","still","stand","up","whip"], illustration:"🐕" },
                { level:"beginner", title:"Lesson XI", text:"Kitty has a nice pet. It can sing a sweet song.\nShe has just fed it.\nShe will now put it in the cage, and hang the cage up.\nThen the cat can not catch it.", words:["Kitty","nice","pet","sing","sweet","song","just","put","cage","hang","then","not"], illustration:"🐦" },
                { level:"beginner", title:"Lesson XII", text:"Look at Tom and his dog.\nThe dog has a black spot on his back. Do you think he is a good dog?\nTom has a big top, too. It is on the box with Kitty's doll.", words:["Tom","look","spot","back","think","good","top","doll"], illustration:"🐕" },
                { level:"beginner", title:"Lesson XIII", text:"The sun is up. The man has fed the black hen and the fat duck.\nNow the duck will swim in the pond. The hen has run to her nest.\nLet us not stop at the pond now, for it is hot.\nSee how still it is! We will go to see Tom and his top.", words:["sun","duck","swim","pond","her","us","stop","for","hot","how","we","go"], illustration:"🦆☀️" },
                { level:"beginner", title:"Lesson XIV", text:"O John! the sun has just set. It is not hot, now.\nLet us run and jump. I think it is fun to run, and skip, and jump.\nSee the duck on the pond! Her nest is up on the bank, under the rock.\nWe must not touch the nest, but we may look at it.", words:["John","set","jump","fun","skip","bank","rock","must","touch","but","may"], illustration:"🦆" },
                { level:"beginner", title:"Lesson XV: Review", text:"The sun has set, and the pond is still.\nJohn, Ned, Ben, Tom, and Nell stand on the bank, and look at the duck.\nThe dog with a black spot on his back is with Tom. See! Tom has his hat in his hand. He has left his big top on the box.\nKitty's doll is on the rock.\nNell has put her pet in the cage. It will sing a sweet song. The duck has her nest under the rock.\nIt is not hot now. Let us run, and skip, and jump on the bank. Do you not think it is fun?", words:["stand"], illustration:"🌅" },
                { level:"beginner", title:"Lesson XVI", text:"O Kate! the old cow is in the pond; see her drink! Will she not come out to get some grass?\nNo, John, she likes to be in the pond. See how still she stands!\nThe dear old cow gives us sweet milk to drink.", words:["Kate","old","cow","grass","no","likes","be","dear","gives","milk","drink"], illustration:"🐄" },
                { level:"beginner", title:"Lesson XVII", text:"Papa, will you let me ride with you on Prince? I will sit still in your arms.\nSee, mamma! We are both on Prince. How large he is!\nGet up, Prince! You are not too fat to trot as far as the barn.", words:["papa","mamma","arms","ride","far","barn","both","Prince","trot","your","large"], illustration:"🐎" },
                { level:"beginner", title:"Lesson XVIII", text:"O Fanny, what a pretty ball!\nYes; can you catch it, Ann?\nToss it to me, and see. I will not let it fall.\nThat was well done.\nNow, Fanny, toss it to the top of the wall, if you can.", words:["Fanny","what","pretty","ball","toss","fall","well","done","wall"], illustration:"⚽" },
                { level:"beginner", title:"Lesson XIX", text:"Did you call us, mamma?\nI went with Tom to the pond. I had my doll, and Tom had his flag.\nThe fat duck swam to the bank, and we fed her. Did you think we might fall into the pond?\nWe did not go too near, did we, Tom?", words:["call","went","had","my","flag","swam","might","near","did"], illustration:"🦆" },
                { level:"beginner", title:"Lesson XX", text:"Here comes the band!\nLet us stand still, and hear the men play as they pass.\nI hope they will stop here and play for us.\nSee the large man in front of the band, with his big hat. What has he in his hand? How fine he looks!\nLook, too, at the man on that fine horse.\nIf the men do not stop, let us go with them and see where they go.", words:["here","comes","band","hear","play","they","pass","hope","front","fine","where","horse"], illustration:"🎺" },
                { level:"intermediate", title:"Lesson XXI", text:"Bess and Robert are very happy; papa and mamma have gone to the woods with them.\nRobert has a big tent and a flag, and Bess has a little bed for her doll.\nJip is with them. Robert will make him draw Bess and her doll in the cart.", words:["Robert","Bess","very","happy","gone","woods","tent","little","draw","cart"], illustration:"⛺" },
                { level:"intermediate", title:"Lesson XXII", text:"Kate, will you play with me? That will be fine sport.\nNot now, James, said Kate; for I must make my doll's bed. Get Mary to play with you.\nJames went to get Mary to play with him. Then Kate made the doll's bed.\nShe sang a song to her doll, and the doll lay very still in her lap.\nDid the doll hear Kate sing?", words:["James","Mary","sport","must","make","sang","lay","lap"], illustration:"🪆" },
                { level:"intermediate", title:"Lesson XXIII", text:"Kate has left her doll in its little bed, and has gone to play with Mary and James. They are all in the shade, now, by the brook.\nJames digs in the soft sand with his spade, and Mary picks up little stones and puts them in her lap.\nJames and Mary are glad to see Kate. She will help them pick up stones and dig, by the little brook.", words:["shade","brook","digs","soft","sand","spade","picks","stones","puts","glad","help"], illustration:"🌊" },
                { level:"intermediate", title:"Lesson XXIV: Review", text:"What shall we do? said Fanny to John. I do not like to sit still. Shall we hunt for eggs in the barn?\nNo, said John; I like to play on the grass. Will not papa let us catch Prince, and go to the big woods? We can put the tent in the cart, and go to some nice spot where the grass is soft and sweet.\nThat will be fine, said Fanny. I will get my doll, and give her a ride with us.\nYes, said John, and we will get mamma to go, too. She will hang up a swing for us in the shade.", words:["shall","hunt","grass","spot","swing"], illustration:"🌳" },
                { level:"intermediate", title:"Lesson XXV", text:"Peep, peep! Where have you been, little chick? Are you lost? Can you not get back to the hen?\nOh, here you are! I will take you back. Here, hen, take this little chick under your wing.\nNow, chick, tuck your little wet feet under you, and go to sleep for a while.\nPeep, peep! How safe the little chick feels now!", words:["peep","been","lost","wing","tuck","wet","feet","sleep","while","safe","feels"], illustration:"🐥" },
                { level:"intermediate", title:"Lesson XXVI", text:"This is a fine day. The sun shines bright. There is a good wind, and my kite flies high. I can just see it.\nThe sun shines in my eyes; I will stand in the shade of this high fence.\nWhy, here comes my dog! He was under the cart. Did you see him there?\nWhat a good time we have had! Are you not glad that we did not go to the woods?", words:["fine","day","shines","bright","wind","kite","flies","high","eyes","fence","why","time"], illustration:"🪁" },
                { level:"intermediate", title:"Lesson XXVII: Review", text:"Kate, I wish we had a boat to put the dolls in. Don't you?\nI know what we can do. We can get the little tub, and tie a rope to it, and drag it to the pond. This will float, and we can get a pole to push it from the shore.\nWhat a funny boat, Kate! A tub for a boat, and a pole for an oar! Won't it upset?\nWe can try it, Nell, and see.\nWell, you get the tub, and I will get a pole and a rope. We will put both dolls in the tub, and give them a ride.", words:["wish","boat","know","tub","tie","rope","drag","float","pole","push","shore","funny","oar","upset","try"], illustration:"⛵" },
                { level:"intermediate", title:"Lesson XXVIII", text:"Here, Ponto! Here, Ponto! Kate called to her dog. Come, and get the dolls out of the pond.\nRose went under, but she did not drown. Bess was still on the top of the water.\nPonto came with a bound, and jumped into the pond. He swam around, and got Bess in his mouth, and brought her to shore.\nPonto then found Rose, and brought her out, too.\nKate said, Good, old Ponto! Brave, old dog!\nWhat do you think of Ponto?", words:["Ponto","called","drown","bound","jumped","swam","around","mouth","brought","brave"], illustration:"🐕" },
                { level:"intermediate", title:"Lesson XXIX", text:"What a bright June day! The air is pure. The sky is as blue as it can be.\nLucy and her mamma are in the woods. They have found a nice spot, where there is some grass.\nThey sit in the shade of the trees, and Lucy is singing.\nThe trees are not large, but they make a good shade.\nLucy's kind mamma says that they will have a picnic when papa can get a tent.", words:["Lucy","June","air","pure","sky","blue","singing","says","picnic"], illustration:"🌳☀️" },
                { level:"intermediate", title:"Lesson XXX: Review", text:"James and Robert have gone into the shade of a high wall to play ball.\nKate and Lucy have come from the pond near by, with the old Ponto, to see them play.\nWhen they toss the ball up in the air, and try to catch it, Ponto runs to get it in his mouth.\nNow the ball is lost. They look for it under the trees and in the grass; but they can not see it. Where can it be?\nSee! Ponto has found it. Here he comes with it. He will lay it at little Lucy's feet, or put it in her hand.", words:["toss","air","mouth","found","feet"], illustration:"⚽🐕" },
                { level:"intermediate", title:"Lesson XXXI", text:"Papa, may we have the big flag? said James.\nWhat can my little boy do with such a big flag?\nHoist it on our tent, papa. We are playing Fourth of July.\nIs that what all this noise is about? Why not hoist your own flags?\nOh! they are too little.\nYou might spoil my flag.\nThen we will all join to pay for it. But we will not spoil it, papa.\nTake it, then, and take the coil of rope with it.\nOh! thank you. Hurrah for the flag, boys!", words:["flag","hoist","tent","noise","Fourth","July","spoil","coil","hurrah"], illustration:"🇺🇸" },
                { level:"intermediate", title:"Lesson XXXII", text:"Frank has a pretty boat. It is white, with a black line near the water.\nHe keeps it in the pond, near his home. He always takes good care of it.\nFrank has been at work in the yard. He has worked hard.", words:["Frank","boat","white","line","keeps","home","always","care","worked","hard"], illustration:"⛵" },
                { level:"intermediate", title:"Lesson XXXIII", text:"What is that? said Lucy, as she came out on the steps. Oh, it is a little boat! What a pretty one it is!\nI will give it to you when it is finished, said John, kindly. Would you like to have it?\nYes, very much, thank you, John. Has grandma seen it?\nNot yet; we will take it to her by and by. What have you in your pan, Lucy?\nSome corn for my hens, John; they must be very hungry by this time.", words:["Lucy","steps","finished","kindly","grandma","corn","hungry"], illustration:"🚣" },
                { level:"intermediate", title:"Lesson XXXIV", text:"James has been to market with his mamma.\nShe has bought some bread, some meat, and some tea, which are in the basket on her arm.\nJames is trying to tell his mamma what he has seen in the market.", words:["market","bread","basket","bought","meat","tea","trying","tell"], illustration:"🧺" },
                { level:"intermediate", title:"Lesson XXXV", text:"See my dear, old grandma in her easy-chair! How gray her hair is! She wears glasses when she reads.\nShe is always kind, and takes such good care of me that I like to do what she tells me.\nWhen she says, Robert, will you get me a drink? I run as fast as I can to get one for her. Then she says, Thank you, my boy.\nWould you not love a good grandma, who is so kind? And would you not do all you could to please her?", words:["grandma","easy-chair","gray","hair","glasses","reads","please","Robert"], illustration:"👵" },
                { level:"intermediate", title:"Lesson XXXVI", text:"Come here, Lucy, and listen! What is in this flower?\nO mother! it is a bee. I wonder how it came to be shut up in the flower!\nIt went into the flower for some honey, and it may be it went to sleep. Then the flower shut it in.\nThe bee likes honey as well as we do, but it does not like to be shut up in the flower.\nShall we let it out, Lucy?\nYes; then it can go to other flowers, and get honey.", words:["listen","flower","bee","wonder","honey","sleep","shut","mother","other"], illustration:"🐝🌸" },
                { level:"intermediate", title:"Lesson XXXVII", text:"Here come Frank and James White. Do you know where they live?\nFrank is riding a horse, and James is driving one hitched to a cart. They are out very early in the day. How happy they are!\nSee how well Frank rides, and how tight James holds the lines!\nThe boys should be kind to their horses. It is not best to whip them.\nWhen they have done riding, they will give the horses some hay or corn.", words:["riding","driving","hitched","early","tight","lines","should","hay"], illustration:"🐎" },
                { level:"intermediate", title:"Lesson XXXVIII", text:"A little girl went in search of flowers for her mother. It was early in the day, and the grass was wet. Sweet little birds were singing all around her.\nAnd what do you think she found besides flowers? A nest with young birds in it.\nWhile she was looking at them, she heard the mother-bird chirp, as if she said, Do not touch my children, little girl, for I love them dearly.\nThe little girl now thought how dearly her own mother loved her.\nSo she left the birds. Then, picking some flowers, she went home, and told her mother what she had seen and heard.", words:["search","besides","young","heard","chirp","children","dearly","thought","picking","told"], illustration:"🐦🌸" },
                { level:"intermediate", title:"Lesson XXXIX", text:"Mamma, will you go to town?\nWhat do you ask for a ticket on your train?\nOh! we will give you a ticket, mamma.\nAbout what time will you get back?\nAt half past eight.\nAh! that is after bed-time. Is this the fast train?\nYes, this is the lightning train.\nOh! that is too fast for me.\nWhat shall we get for you in town, mamma?\nA big basket, with two good little children in it.\nAll right! Time is up! Ding, ding!", words:["town","ticket","train","half","eight","lightning","fast"], illustration:"🚂" },
                { level:"advanced", title:"Lesson XL", text:"It is noon, and the school is out. Do you see the children at play? Some run and jump, some play ball, and three little girls play school under a tree.\nWhat a big room for such a small school!\nMary is the teacher. They all have books in their hands, and Fanny is reading.\nThey are all good girls, and would not be rude even in playing school.\nKate and Mary listen to Fanny as she reads from her book.\nWhat do you think she is reading about? I will tell you. It is about a poor little boy who was lost in the woods.\nWhen Fanny has finished, the three girls will go home.", words:["noon","school","teacher","books","rude","reading","poor","finished"], illustration:"🏫" },
                { level:"advanced", title:"Lesson XLI", text:"Lucy has a new pet. Do you know what kind of bird it is?\nLucy calls her Polly.\nPolly can say, Poor Poll! Poor Poll! Polly wants a cracker! and she can mew like a cat.\nBut Polly and the cat are good friends. One day Polly flew down, and lit upon the cat's back when she was asleep.\nI think she knew the cat would not like that, and she did it to tease her.\nWhen Lucy pets the cat, Polly flies up into the old apple tree and will not come when Lucy calls her. Then Lucy says, What a silly bird!", words:["Polly","Poll","cracker","mew","friends","asleep","tease","silly","apple"], illustration:"🦜" },
                { level:"advanced", title:"Lesson XLII: Review", text:"Well, children, did you have a nice time in the woods?\nOh yes, mother, such a good time! See what sweet flowers we found, and what soft moss. The best flowers are for grandma. Won't they please her?\nYes; and it will please grandma to know that you thought of her.\nRab was such a good dog, mother. He stayed under the big tree by the brook, to take care of the dolls and the basket.\nWhen we came back, they were all safe. No one could get them while Rab was there.\nWe gave him some of the crackers from the basket.\nO mother, how the birds did sing in the woods!\nFanny said she would like to be a bird, and have a nest in a tree.\nIf she were a bird, her nest would be her home. But what would mother do without her little Fanny?", words:["moss","please","grandma","stayed","crackers","safe","sing"], illustration:"🌳" },
                { level:"advanced", title:"Lesson XLIII", text:"These boys and girls live near the sea. They have been to the beach. It is now evening, and they are going home.\nJohn, who sits on the front seat, found some pretty shells. They are in the basket by his side.\nBen White is driving. He holds the lines in one hand, and his whip in the other.\nRobert has his hat in his hand, and is looking at the horses. He thinks they are very lazy; they do not trot fast.\nThe children are not far from home. In a little while the sun will set, and it will be bed-time.\nHave you ever been at the sea-side? Is it not good sport to watch the big waves, and to play on the wet sand?", words:["sea","beach","evening","shells","driving","lazy","waves","sport","watch"], illustration:"🏖️" },
                { level:"advanced", title:"Lesson XLIV", text:"One evening Frank's father said to him, Frank, would you like to go with me to catch some fish?\nYes; can I go? and with you, father?\nYes, Frank, with me.\nOh, how glad I am!\nHere they are, on the bank of a river. Frank has just pulled a fine fish out of the water. How proud he feels!\nSee what a nice, quiet spot they have found. Frank has the stump of a big tree for his seat, and his father sits on a log near by. They like the sport.", words:["evening","father","fish","river","pulled","proud","quiet","stump","log"], illustration:"🎣" },
                { level:"advanced", title:"Lesson XLV", text:"I like winter, when snow and ice cover the ground. What fun it is to throw snowballs, and to skate on the ice!\nSee the boys and girls! How merry they are! Henry has his sled, and draws his little sister. There they go!\nI think Henry is kind, for his sister is too small to skate.\nLook! Did you see that boy fall down? But I see he is not hurt, for he is laughing.\nSome other boys have just come to join in the sport. See them put on their skates.\nHenry says that he hopes his father will get a pair of skates for his sister next winter.", words:["winter","snow","ice","snowballs","skate","merry","Henry","sled","laughing","pair"], illustration:"⛸️❄️" },
                { level:"advanced", title:"Lesson XLVI", text:"Ellen, do look at Fido! He sits up in a chair, with my hat on. He looks like a little boy; but it is only Fido.\nNow see him shake hands. Give me your paw, Fido. How do you do, sir? Will you take dinner with us, Fido? Speak!\nFido says, Bow-wow, which means, Thank you, I will.\nIsn't Fido a good dog, Ellen? He is always so polite.\nWhen school is out, I will try to teach him some other tricks.", words:["Ellen","Fido","chair","shake","paw","sir","dinner","speak","polite","tricks","teach"], illustration:"🐕" },
                { level:"advanced", title:"Lesson XLVII", text:"O Hattie! I just saw a large rat in the shed; and old Nero tried to catch it.\nDid he catch it, Frank?\nNo, Nero did not; but the old cat did.\nMy cat?\nNo, it was the other one.\nDo tell me how she got it, Frank. Did she run after it?\nNo, that was not the way. Puss was hid on a big box. The rat stole out, and she jumped at it and caught it.\nPoor rat! It must have been very hungry; it came out to get something to eat.\nWhy, Hattie, you are not sorry puss got the rat, are you?\nNo, I can not say I am sorry she got it; but I do not like to see even a rat suffer pain.", words:["Hattie","Nero","shed","caught","stole","hungry","puss","suffer","pain","sorry"], illustration:"🐱🐀" },
                { level:"advanced", title:"Lesson XLVIII", text:"Mary and Lucy have come down to the beach with their grandpa. They live in a town near the sea.\nTheir grandpa likes to sit on the large rock, and watch the big ships as they sail far away on the blue sea. Sometimes he sits there all day long.\nThe little girls like to dig in the sand, and pick up pretty shells. They watch the waves as they roll up on the beach, and break into white foam.\nThey sometimes make little houses of sand, and build walls around them; and they dig wells with their small wooden spades.\nThey have been picking up shells for their little sister. She is too young to come to the beach.\nI think all children like to play by the sea-side when the sun is bright, and the wind does not blow too hard.", words:["grandpa","ships","sail","foam","shells","walls","wells","wooden","spades","young"], illustration:"🏖️⛵" },
                { level:"advanced", title:"Lesson XLIX", text:"One day, Willie's father saw a boy at the market with four little white rabbits in a basket.\nHe thought these would be nice pets for Willie; so he asked the lad how much he wanted for his rabbits.\nThe boy said, Only fifty cents, sir.\nWillie's father bought them, and carried them home.\nHere you see the rabbits and their little master. He has a pen for them, and always shuts them in it at night to keep them safe.\nHe gives them bread and grass to eat. They like grass, and will take it from his hand. He has called in a little friend to see them.\nWillie is telling him about their funny ways.", words:["Willie","rabbits","market","fifty","cents","master","shuts","safe","funny","ways"], illustration:"🐇" },
                { level:"advanced", title:"Lesson L", text:"Come here, Rose. Look down into this bush.\nO Willie! a bird's nest! What cunning little eggs! May we take it, and show it to mother?\nWhat would the old bird do, Rose, if she should come back and not find her nest?\nOh, we would bring it right back, Willie!\nYes; but we could not fasten it in its place again. If the wind should blow it over, the eggs would get broken.", words:["Rose","bush","cunning","show","fasten","place","broken"], illustration:"🐦🌿" },
                { level:"advanced", title:"Lesson LI", text:"How does the bird make the nest so strong, Willie?\nThe mother-bird has her bill and her claws to work with, but she would not know how to make the nest if God did not teach her. Do you see what it is made of?\nYes, Willie, I see some horse-hairs and some dry grass. The old bird must have worked hard to find all the hairs, and make them into such a pretty, round nest.\nShall we take the nest, Rose?\nOh no, Willie! We must not take it; but we will come and look at it again, some time.", words:["bill","claws","God","teach","horse-hairs","dry","round","time"], illustration:"🐦" },
                { level:"advanced", title:"Lesson LII", text:"Willie, when I was feeding the birds just now, a little brown bird flew away with a crumb in its bill.\nWhere did it go, Rose?\nI don't know; away off, somewhere.\nI can guess where, Rose. Don't you know the nest we saw some days ago? What do you think is in it now?\nO Willie, I know! Some little brown birds. Let us go and see them.\nAll right; but we must not go too near. There! I just saw the old bird fly out of the bush. Stand here, Rose. Can you see?\nWhy, Willie, what ugly little things! What big mouths they have, and no feathers!\nKeep still, Rose. Here comes the old bird with a worm in her bill. How hard she must work to feed them all!", words:["feeding","crumb","guess","feathers","mouths","worm","feed"], illustration:"🐦🪺" },
                { level:"advanced", title:"Lesson LIII", text:"One day, when Mary was taking a walk down the lane, trying to sing her doll to sleep, she met Frank, with his basket and cane.\nFrank was a poor, little, lame boy. His father and mother were dead. His dear, old grandma took care of him, and tried to make him happy.\nEvery day, Mary's mother filled Frank's basket with bread and meat, and a little tea for his grandma.\nHow do you do, Frank? said Mary. Don't make a noise; my doll is going to sleep. It is just a little sick to-day.\nWell, then, let us whistle it to sleep. And Frank, taking a willow whistle out of his pocket, blew a long note.\nOh, how sweet! cried Mary. Do let me try.", words:["lane","cane","lame","dead","filled","whistle","willow","pocket","note"], illustration:"👦🎵" },
                { level:"advanced", title:"Lesson LIV", text:"Yes, Mary, I will give it to you, because you are so good to my grandma.\nOh! thank you very much. Mary blew and blew a long time.\nI can't make it whistle, said she, almost ready to cry.\nSometimes they will whistle, and sometimes they won't, said Frank. Try again, Mary.\nShe tried once more, and the whistle made a low, sweet sound.\nIt whistles! she cried.\nIn her joy, she had turned the doll's face down, and its eyes shut tight, as if it had gone to sleep.\nThere! cried Frank, I told you the way to put a doll to sleep, is to whistle to it.\nSo it is, said Mary. Dear, little thing; it must be put in its bed now.\nSo they went into the house. Frank's basket was soon filled, and he went home happy.", words:["because","almost","cry","sometimes","once","low","joy","tight","filled"], illustration:"🎵" },
                { level:"advanced", title:"Lesson LV", text:"There was once a big, white hen that had twelve little chickens. They were very small, and the old hen took good care of them. She found food for them in the day-time, and at night kept them under her wings.\nOne day, this old hen took her chickens down to a small brook. She thought the air from the water would do them good.\nWhen they got to the brook, they walked on the bank a little while. It was very pretty on the other side of the brook, and the old hen thought she would take her children over there.\nThere was a large stone in the brook: she thought it would be easy for them to jump to that stone, and from it to the other side.\nSo she jumped to the stone, and told the children to come after her. For the first time, she found that they would not obey her.\nShe flapped her wings, and cried, Come here, all of you! Jump upon this stone, as I did. We can then jump to the other side. Come, now!\nO mother! we can't, we can't, we can't! said all the little chickens.\nYes you can, if you try, said the old hen. Just flap your wings, as I did, and you can jump over.\nI am flapping my wings, said Chippy, who stood by himself; but I can't jump any better than I could before.", words:["twelve","chickens","wings","night","brook","stone","obey","flapped","Chippy"], illustration:"🐔🐥" },
                { level:"advanced", title:"Lesson LVI", text:"I never saw such children, said the old hen. You don't try at all.\nWe can't jump so far, mother. Indeed we can't, we can't! chirped the little chickens.\nWell, said the old hen, I must give it up. So she jumped back to the bank, and walked slowly home with her brood.\nI think mother asked too much of us, said one little chicken to the others.\nWell, I tried, said Chippy.\nWe didn't, said the others; it was of no use to try.\nWhen they got home, the old hen began to look about for something to eat. She soon found, near the back door, a piece of bread.\nSo she called the chickens, and they all ran up to her, each one trying to get a bite at the piece of bread.\nNo, no! said the old hen. This bread is for Chippy. He is the only one of my children that really tried to jump to the stone.", words:["chirped","indeed","slowly","brood","piece","bite","really"], illustration:"🐔" },
                { level:"advanced", title:"Lesson LVII: The Last Lesson", text:"We have come to the last lesson in this book. We have finished the First Reader.\nYou can now read all the lessons in it, and can write them on your slates.\nHave you taken good care of your book? Children should always keep their books neat and clean.\nAre you not glad to be ready for a new book?\nYour parents are very kind to send you to school. If you are good, and if you try to learn, your teacher will love you, and you will please your parents.\nBe kind to all, and do not waste your time in school.\nWhen you go home, you may ask your parents to get you a Second Reader.", words:["last","finished","slates","neat","clean","parents","teacher","waste","Second Reader"], illustration:"📚🎓" }
            ],
            2: [
                { level:"beginner", title:"The First Day of School", text:"All the children are happy to-day. Do you know why? It is the first day of school.\nHenry has a new ball, and all the boys want to look at it. When play time comes, they will have fine fun with it.\nThe girls are looking at their new books. The books are full of stories and pretty pictures.\nThe children will learn many things at school. They will learn to read and write and sing and spell.\nI can write my name, says little May; and I am going to write a letter to my teacher.\nI can read every lesson in the First Reader, says Lucy.\nBut only think how many things we shall read about in our new books, says Rose. I am glad that it is time for school to begin. I want to learn to be a good reader.\nAnd so the happy children go up the road to the pretty little school house on the hill.\nThe teacher will be at the door to tell them good morning. They will go in and sit at their places and try to do just as they are told.\nThey have been playing all summer, and now they are ready to go to work.", words:["happy","school","read","write","spell","teacher","letter","lesson","ready"], illustration:"🏫" },
                { level:"beginner", title:"Lucy's Garden", text:"Lucy is very busy this bright, warm morning. She is working in her garden.\nIt is not a large garden, but Lucy likes to take care of it.\nI am told that sweet violets grow in it in the spring, and red roses bloom there in the summer time. Now it is fall, and you can see some tall sunflowers near the garden walk.\nLucy calls this garden her farm. Sometimes she works in it all day.\nOne day Frank came to see the flowers. Lucy was very glad, and she wished to make Frank happy.\nWould you like to have a part of my farm, Frank? You may have it if you wish.\nOh, no, Lucy, I thank you. I would not know what to do with so large a farm.", words:["garden","bright","violets","roses","sunflowers","farm","flowers","part"], illustration:"🌻" },
                { level:"beginner", title:"Henry's Train", text:"Mother, will you go to town with us this fine morning?\nHow much do you ask for a ticket on your train?\nOh, we will give you a ticket, mother.\nThank you, Henry. At what time does your train start? Will it go soon?\nYes, mother, we are starting now. Listen to the bell. Come and get on. This is the fast train.\nIt is too fast for me, children. I think I shall stay at home to-day.", words:["town","ticket","train","bell","fast","mother","children","morning"], illustration:"🚂" },
                { level:"beginner", title:"The New Book", text:"One day last week our teacher brought a new book to school.\nIt was a big book with many pretty pictures in it.\nShe put it on a large round table, where all the boys and girls could see it.\nThen she said, Children, if you are good every day, I will read to you from this new book.\nThat evening, when school was out, she read to us about some boys and girls who live far, far away from us.\nWhen it was time to go home, she said, In the morning, children, if you are here a little while before school begins, you may look at the pictures in this book.\nThen I will tell you about them.\nWe were all very happy, and thought that she was very good. We said that we would try to learn very fast. Do you not think we have a good teacher?", words:["teacher","brought","pictures","table","evening","morning","happy","learn"], illustration:"📚" },
                { level:"beginner", title:"The Full Moon", text:"Oh, look at the moon!\nShe is riding so high!\nOh, mother, she looks\nLike a lamp in the sky.\nLast week she was smaller,\nAnd shaped like a bow;\nBut now she is larger,\nAnd round like an O.", words:["moon","riding","high","lamp","sky","smaller","larger","round"], illustration:"🌕" },
                { level:"beginner", title:"Going to Town", text:"Lucy and her father are going to town to-day. They do not go often, and so Lucy is very happy.\nThe train will be here soon, and Lucy's father has gone to buy his ticket. If he stays too long, they will be left.\nLucy sat by the window and looked out. The train ran so fast that she could not see much.\nIt was winter, and the fields and woods were white with snow.\nThe day was so cold that only a few children were out of doors. Some were at school, and some were at home by the warm fire.\nThe river was full of ice, and Lucy thought that it looked very cold and deep.\nLucy thought that the town was very fine. The windows in the stores were full of pretty things.\nShe was glad to get home. As she sat by the bright fire that evening, she told her mother about the things she had seen.\nI think I will write my teacher a letter and tell her about going to town, she said.", words:["father","ticket","window","winter","snow","stores","fire","evening","letter"], illustration:"🚂❄️" },
                { level:"beginner", title:"Our Teacher's Story", text:"Today our teacher told us a pretty story. We all left our seats and stood around her to listen.\nThe story was about three bears that had a house in the green woods. There were vines and pretty flowers all around the door of the house.\nOnce a little girl came to the house when the bears were out. She did not know who lived there. When the bears came home they found her in their little room.\nThey were good bears, and did not try to hurt the little girl.\nThey stood still and looked at her. When she saw them, she jumped out of the window and ran home as fast as she could.\nThe three bears looked after her as she ran. But they did not try to catch her.", words:["story","bears","woods","flowers","window","jumped","catch","seats"], illustration:"🐻" },
                { level:"beginner", title:"The White Rabbits", text:"One day Robert's father saw a boy on the street with four little white rabbits in a basket.\nHe thought the rabbits would be fine pets for Robert, so he asked the boy how much he wanted for them.\nThe boy said, Only one dollar for the four.\nRobert's father gave him a dollar and said that he would carry the rabbits home with him.\nRobert was a happy boy when he saw the pretty little pets.\nHe takes good care of them. He gives them bread and fresh green grass to eat.\nThey like grass and will take it from his hand. They love Robert; he is so kind to them.", words:["rabbits","basket","dollar","pets","bread","grass","kind","carry"], illustration:"🐇" },
                { level:"beginner", title:"Birdie and Baby", text:"What does little birdie say\nIn her nest at peep of day?\nLet me fly, says little birdie.\nMother, let me fly away!\nBirdie, rest a little longer,\nTill the little wings are stronger.\nSo she rests a little longer,\nAnd then she flies away.\nWhat does little baby say\nIn her bed at peep of day?\nBaby says, like little birdie,\nMother, let me fly away!\nBaby, sleep a little longer,\nTill the little limbs are stronger.\nIf she sleeps a little longer,\nBaby, too, may fly away.", words:["birdie","nest","wings","stronger","baby","sleep","limbs","longer"], illustration:"🐦👶" },
                { level:"beginner", title:"The Bird's Nest", text:"One day in summer Frank and his sister Rose took a walk into the woods. All at once Frank stopped and said, Come here, Rose, and look in this bush.\nRose ran and looked. Oh, Frank! she said. A bird's nest! Let me count the eggs. One, two, three, four. Four little blue eggs!\nMay we take the nest and show it to mother?\nWhat would the bird do, sister, if she should come back and find her nest gone?\nOh, we would bring it right back, Frank. We would not keep it long.\nYes, but we could not fasten it in its place again. If the wind should blow it over, the eggs would fall on the ground and be broken.\nShe uses straw and dry grass and many other things. She lines it with soft feathers.\nShe must have worked very hard to find so many things and carry them here. And see what a pretty, round nest she has made.\nShall we take it away from her, Rose?\nOh, no, brother! We must let it stay right where the bird has put it. But we will come and look at it again some time.", words:["nest","eggs","bush","feathers","straw","fasten","broken","summer"], illustration:"🪺" },
                { level:"beginner", title:"The Little Birds", text:"It was two or three weeks before the children saw the bird's nest again.\nOne morning when Rose was feeding her pet rabbit a little brown bird came and sat on the tree above her.\nIt looked at her a minute or two. Then it flew down and picked up a crumb.\nOh, Frank, said Rose, did you see that pretty bird?\nWhat bird, sister?\nA little brown bird. It picked up a crumb from the ground, and then flew away with it.\nWhere did it go, Rose?\nI could not see where it went. It must have gone to the woods.\nOh, I wonder if it is not the bird that made the pretty nest we saw the other day.\nIt may be the same bird, Frank. Let us go out to the woods and see the nest again.\nSo the children ran out to the woods and found the green bush where the nest was.\nStop, Rose, said Frank. I saw the old bird fly out of the bush. It was a brown bird.\nOh, Frank! And I see the little birds in it, too. What funny little things they are! There are no feathers on them.\nThey will soon have feathers. Then they will be brown like their mother, and they will fly far away in the green woods.", words:["crumb","brown","feathers","bush","woods","rabbit","flew","picked"], illustration:"🐦🌿" },
                { level:"beginner", title:"Happy Children", text:"Come, my children, come away,\nFor the sun shines bright to-day;\nLittle children, come with me,\nBirds and brooks and flowers to see.\nBring the kite and bring the ball,\nCome with happy faces, all;\nLet us make a merry ring,\nTalk and play and laugh and sing.", words:["children","bright","brooks","flowers","kite","ball","merry","laugh","sing"], illustration:"☀️🌸" },
                { level:"beginner", title:"The Mice", text:"In an old house in town there were very many mice.\nOne day a cat was brought to the house.\nWhat shall we do now? cried the mice. We cannot run; we cannot play; we cannot go about the old house at all. For if the cat sees us, she will be sure to catch us. We shall have to stay at home day and night.\nThey talked about this for a long time, and no one could think of any plan but to keep out of the cat's way.\nAt last a very old mouse stood up and said, I will tell you what to do.\nWhat is it? What is it? said all the other mice.\nIt is this. Let us get a bell and hang it on the cat. When she runs from place to place the bell will ring. Then we will know when she is near us, and can run out of her way.\nOh, that is a fine plan! cried all the other mice.\nSome of them ran to get the bell. When they came back the old mouse said, Our plan is a very good one as you all know. Now who will take the bell and hang it on the cat?\nNot a mouse would do it.", words:["mice","cat","bell","plan","ring","house","catch","hang"], illustration:"🐱🐭" },
                { level:"beginner", title:"The Little Schoolboy", text:"One day our teacher told us of a little boy who did not like his books or his school. I do not want to go to school, he said. I want to play all day.\nThe sun is shining, and the birds are singing, and I cannot bear to be shut up in school on this fine day. Why is it that boys have to work? I think I will go and have some fun in the fields.\nSo off he ran into the green fields. He saw a bee flying about from flower to flower. Please, little bee, he said, please come and play with me.\nBut the pretty bee said: Oh no, no; I have no time to play. I have so much work to do that I must not be idle. I must get all the honey I can; and away went the bee, buzzing among the flowers.\nThen the boy saw a dog. Come here, my pretty dog, he said, come and have some fun with me.\nBut the dog said: I cannot come. I must take care of all the sheep that you see in this field; and he ran to drive back some lambs that were too near the road.\nThen the boy saw a bird picking up a straw from the ground, and he said: My sweet little bird, will you come and play with me? Will you sing me a pretty song?\nBut the bird said: No, no, I cannot be idle. I must get straw and sticks, and build my nest. So good morning; and away it flew with the straw in its mouth.\nThen the little boy began to think. I see, said he, that even the birds, the bees, and the dogs are busy. There is work for all to do, and I must not be idle.\nSo he ran to school as fast as he could, and never again wished that he might play all the time.", words:["school","idle","honey","bee","sheep","straw","busy","work"], illustration:"🐝🌾" },
                { level:"beginner", title:"The Winds", text:"Which is the wind that brings the cold?\nThe north wind, Robert; and all the snow;\nAnd the sheep will scamper into the fold\nWhen the north wind begins to blow.\nWhich is the wind that brings the heat?\nThe south wind, Lucy; and corn will grow,\nAnd peaches redden for you to eat\nWhen the south wind begins to blow.\nWhich is the wind that brings the rain?\nThe east wind, Henry; and farmers know\nThat cows come shivering up the lane\nWhen the east wind begins to blow.\nWhich is the wind that brings the flowers?\nThe west wind, children; and soft and low\nThe birdies sing in the summer hours\nWhen the west wind begins to blow.", words:["north","south","east","west","snow","corn","peaches","rain","flowers"], illustration:"💨🌬️" },
                { level:"beginner", title:"The Pet Lamb", text:"Lucy has a pet lamb which her father gave to her. She is very kind to it, and when she goes out to play the lamb is sure to follow her.\nShe calls the lamb Robin. Is not that a funny name for a little sheep?\nThe lamb knows its name, and when Lucy calls, Robin, Robin, Robin, it will run to her as fast as it can.\nOne day it went to school with Lucy. When the children went into the schoolhouse, the lamb stayed in the yard to eat grass. When play time came, Lucy took Robin home.\nOnce Lucy went away from home with her mother and was gone a long time. While she was away, Robin was put into a field to feed with some other lambs.\nWhen Lucy came home again, almost the first thing that she did was to look for her pet. There were so many lambs and sheep in the field that Lucy could not tell which one was her pet. But when she called, Robin, Robin, a fine lamb began to jump about, and ran to her.\nIt was Robin. How large you have grown, said Lucy. You are almost as big as any sheep. But I am glad to see you, even if you are bigger.\nThe lamb was glad, too. It ran and played just as when it was smaller, and when Lucy went back to the house it tried to follow her.", words:["lamb","Robin","follow","school","yard","field","grown","bigger"], illustration:"🐑" },
                { level:"beginner", title:"The Bee", text:"One morning, when we were all busy with our lessons, a bee flew into the schoolroom.\nDo you wonder why it came in there? The window was open, and there were some flowers on the teacher's table. The bee wanted to get honey from the flowers.\nThen the teacher told us how the bees live, and what they do.\nOn warm, sunny days every bee is at work. If you go into the garden, you may hear them, buzz, buzz, buzz, among the flowers.\nThey gather honey from the flowers. They know which flowers have honey in them.\nWhen a bee gets a load of honey it carries it home. The home of the bees is called a hive.\nWhy do the bees gather honey? They feed some of it to the young bees in the hive. They put some of it away, to eat when the days are cold and wet and they cannot go out of their house.\nSometimes we take the honey away from the bees. Then they must go out and gather more.", words:["bee","honey","hive","flowers","gather","sunny","window","young"], illustration:"🐝🍯" },
                { level:"intermediate", title:"A Kind Brother", text:"Frank lives on a farm. One day his father sent him to town with a basket of apples to sell.\nThe basket was so full that it was very heavy. So Frank's little brother went with him, to help carry the load.\nThey put a long stick under the handle of the basket, and each then took hold of an end of the stick. In this way they could carry the basket very well.\nNow the older boy thought, My brother Henry does not know about this long stick. If I put the basket near him, his load will be heavy, and mine light; but if the basket is in the middle of the stick, it will be as heavy for me as it is for him.\nHenry does not know this as I do. But I will not do it. It would be wrong, and I will not do what is wrong.\nThen he put the basket much nearer his own end of the stick. His load was now heavy, but that of his little brother was light.\nYet he was happy; for he was sure that he had done right. Had he made his brother carry the heavy load, he would not have been at all happy.", words:["farm","basket","apples","heavy","stick","handle","wrong","happy"], illustration:"🍎👦" },
                { level:"intermediate", title:"The Mother Bird", text:"A little bird built a warm nest in a tree.\nAnd laid some blue eggs in it — one, two, three;\nAnd then very glad and delighted was she —\nVery glad and delighted was she.\nAnd after a time, but how long I can't tell,\nThe little ones came one by one from the shell;\nAnd their mother was pleased, and she loved them well —\nShe was pleased, and she loved them well.\nShe spread her soft wings on them all day long,\nTo warm them and keep them, her love was so strong;\nAnd her mate sat beside her, and sang her a song —\nHer mate sat beside her and sang her a song.", words:["nest","eggs","shell","wings","spread","mate","sang","loved"], illustration:"🐦🪺" },
                { level:"intermediate", title:"The New Boat", text:"There was once a little boy who lived very near a large lake. His name was Robert, and his father was a fisherman. Sometimes when the weather was fine, Robert's father would take him out in his boat. They would often sail far out in the lake to catch fish.\nThose were pleasant times for Robert; and every evening when he came home he had many stories to tell his mother and his little sister.\nOne evening his father said to him: Robert, I am going to try the new boat in the morning. Would you like to go out with me, and see how it sails?\nOh, father, he said, you know I should like to go.\nWell, then, you must wake up early and be ready to start as soon as the sun is up.\nRobert was delighted. He had never been in his father's new boat.\nSo, as soon as it was night, he went to bed and tried to go to sleep. But he could not sleep. He could not help thinking of the new boat and of the fine time he would have in the morning.\nIn the morning he was up as soon as it was light. He climbed into the boat and sat down. He wondered why his father did not come.\nAfter a long while he saw his father coming from the house with a pail and a basket.\nOh, father, said Robert, laughing, I thought we were going to start as soon as the sun was up.\nAnd so we will, said his father, for the sun is not up yet. Run to the house and eat your breakfast, and then we shall be ready to start.\nHe had a fine time on the lake that day; but long before his father was ready to go home he was fast asleep in the new boat.", words:["lake","fisherman","boat","sail","fish","pleasant","breakfast","asleep"], illustration:"⛵🎣" },
                { level:"intermediate", title:"The Ant", text:"One day a busy ant climbed into a tree to look for something to eat. It ran about among the green leaves and was not at all afraid of falling.\nAfter a while it climbed to the top of the tree and looked down to see how high it was.\nJust then the wind blew very hard. It blew the little ant from the tree, and carried it far away over the tops of the bushes.\nI shall soon fall to the ground, said the ant; but I am not afraid. I am so light that I will not be hurt very much.\nBut it did not fall to the ground. It fell into a river where the water was running fast. It tried hard to swim to the shore; but the stream was strong and swift and would soon carry it down to the sea.", words:["ant","climbed","wind","blew","stream","swift","shore","afraid"], illustration:"🐜" },
                { level:"intermediate", title:"The Dove", text:"A pretty dove was sitting in a tree near the river and saw the ant fall into the water. She saw how hard it tried to swim to the shore.\nWhat a brave little ant! she said. It can swim well, but the stream is too swift for it. It will soon be carried far out to sea, and that will be the end of it.\nBut the ant did not give up. It worked very hard, and still it could not get any nearer to the shore.\nThen the dove said, I will save the brave little fellow.\nSo she took a leaf in her mouth and flew far out over the river. When she was just above the ant she let the leaf fall into the water. The ant climbed upon it. The wind blew it to the shore, and the ant was saved.\nThank you, kind dove, said the ant. I will help you some time if I can.", words:["dove","brave","leaf","shore","saved","kind","swift","river"], illustration:"🕊️" },
                { level:"intermediate", title:"The Hunter", text:"Not many days after that, a hunter came into the woods. He saw the dove sitting on the tree. She was thinking of her mate far away, and did not hear him coming.\nThat is a fine dove, said the hunter. I will have a shot at her.\nHe did not see the little ant at his feet. But the ant heard what he said. It saw him point his gun at the dove.\nNow is the time for me to help my friend, it said.\nJust as the hunter was going to shoot, the ant bit his foot very hard. The hunter jumped and looked down.\nThe dove heard the noise and flew far away.\nThe next day she came back to find her little friend. She said, I thank you very much, good ant. You saved my life.\nThe ant said, Kind people are sure to have friends.", words:["hunter","gun","shoot","noise","jumped","saved","friends","kind"], illustration:"🐜🕊️" },
                { level:"intermediate", title:"The Brook", text:"Stop, stop, pretty water!\nSaid Mary one day,\nTo a bright, happy brook\nThat was running away.\nYou run on so fast!\nI wish you would stay;\nMy boat and my flowers\nYou will carry away.\nBut I will run after:\nMother says that I may;\nFor I would know where\nYou are running away.\nSo Mary ran on;\nBut I have heard say,\nThat she never could find\nWhere the brook ran away.", words:["brook","running","stay","carry","flowers","boat","mother","away"], illustration:"🏞️" },
                { level:"intermediate", title:"Henry and His Dog", text:"One day as little Henry was coming home from school he saw a dog lying under a bush by the road.\nThe dog's foot had been hurt, and the poor fellow could not walk on it.\nAt first, Henry was afraid to go near him. But he was a kind little boy, and he did not like to see the poor dog in so much pain.\nSo he ran down to the brook and got his pail full of water. This he carried back to the road and set before the dog.\nThe dog took a long drink, for he had not had any water that day. Then he looked at Henry as if to say, Thank you, little boy.\nHenry then washed the dog's foot in cold water, which he brought from the brook. The dog lay very still, for he knew that the boy was trying to help him.\nAfter a while Henry told the dog to get up. He did so, and Henry was delighted to see that he could walk a little on three feet.\nHe followed Henry home, and when Henry's mother saw what a fine dog he was she said that the little boy might keep him till his owner came after him.\nHenry made a soft bed of straw for him, and took good care of him till his foot was well. He fed him often, and soon boy and dog were very good friends. But no owner ever came to get the dog.\nThe dog learned to go to school with Henry. He was a great pet with the boys, and was always ready to run and play with them.", words:["dog","hurt","pain","water","washed","straw","owner","friends"], illustration:"👦🐕" },
                { level:"intermediate", title:"How the Dog Saved Henry", text:"As the children were going to school one morning they saw some blue flowers growing on the bank of the river very near to the water.\nWhat kind of flowers are they? said May. They do not look like violets.\nI think they are lilies, said Lucy; but I am not sure. I wish I could get them.\nOh, I will get them for you, said little Henry. Then he climbed down the bank and tried to pick the flowers.\nHe had them all in his hand when his foot slipped, and he fell into the river. The water was deep, the stream was swift and strong, and the little boy could not swim.\nAll the boys and girls who saw Henry fall began to cry and scream, but they did not know how to help him in any way.\nHenry's dog heard the noise and saw his little master in the water. He ran as fast as he could and jumped into the river.\nIt did not take him long to swim out in the swift stream and catch hold of Henry's coat, and so keep him from sinking. Then he drew him to the bank and lifted him out.\nBy this time some of the big boys had come down to the river. They took Henry up and carried him home, and it was not long till he was as well and strong as ever.\nYou may be sure that Henry took good care of his dog after that.", words:["lilies","slipped","fell","stream","sinking","coat","lifted","strong"], illustration:"🐕💧" },
