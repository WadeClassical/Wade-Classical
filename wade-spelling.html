<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wade Classical Spelling</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --yellow: #FFD700;
            --cyan: #00FFFF;
            --pink: #FF69B4;
            --orange: #FF8C00;
            --red: #FF0000;
            --white: #FFFFFF;
            --dot-color: #FFD700;
            --wall-blue: #1a1aff;
            --ghost-blue: #2121DE;
            --neon-green: #39FF14;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Press Start 2P', monospace;
            min-height: 100vh;
            overflow-x: hidden;
            cursor: default;
        }

        /* ── SCANLINES OVERLAY ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.15) 2px,
                rgba(0,0,0,0.15) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* ── STARFIELD BG ── */
        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        /* ── MAIN WRAPPER ── */
        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 860px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            padding: 20px 0 10px;
            border-bottom: 3px solid var(--wall-blue);
            margin-bottom: 24px;
            position: relative;
        }

        .header-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 12px;
        }

        .header-dot {
            width: 6px;
            height: 6px;
            background: var(--dot-color);
            border-radius: 50%;
            animation: dotPulse 1.5s infinite;
        }

        .header-dot:nth-child(2) { animation-delay: 0.2s; }
        .header-dot:nth-child(3) { animation-delay: 0.4s; }
        .header-dot:nth-child(4) { animation-delay: 0.6s; }
        .header-dot:nth-child(5) { animation-delay: 0.8s; }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.4); }
        }

        .header-title {
            font-size: clamp(0.9em, 3vw, 1.4em);
            color: var(--yellow);
            text-shadow: 0 0 20px var(--yellow), 0 0 40px rgba(255,215,0,0.5);
            letter-spacing: 0.05em;
            line-height: 1.5;
        }

        .header-sub {
            font-size: 0.5em;
            color: var(--cyan);
            margin-top: 10px;
            text-shadow: 0 0 10px var(--cyan);
            letter-spacing: 0.1em;
        }

        /* ── SCREEN PANELS ── */
        .screen {
            display: none;
            animation: screenIn 0.3s ease;
        }
        .screen.active { display: block; }

        @keyframes screenIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ── USER SELECT ── */
        .user-select-title {
            text-align: center;
            font-size: 0.8em;
            color: var(--cyan);
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--cyan);
        }

        .user-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .user-btn {
            background: var(--black);
            border: 3px solid var(--wall-blue);
            color: var(--white);
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7em;
            padding: 20px 28px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            min-width: 140px;
            position: relative;
            overflow: hidden;
        }

        .user-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--wall-blue);
            opacity: 0;
            transition: opacity 0.15s;
        }

        .user-btn:hover { border-color: var(--yellow); transform: scale(1.05); }
        .user-btn:hover::before { opacity: 0.1; }
        .user-btn:active { transform: scale(0.98); }

        .user-btn .user-icon { font-size: 2em; display: block; margin-bottom: 10px; }
        .user-btn .user-name { color: var(--yellow); position: relative; }
        .user-btn .user-grade { font-size: 0.7em; color: var(--cyan); margin-top: 6px; display: block; position: relative; }

        /* ── STATS BAR ── */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #0a0a0a;
            border: 2px solid var(--wall-blue);
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat-item {
            font-size: 0.55em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-label { color: var(--cyan); }
        .stat-value { color: var(--yellow); }

        .lives-display { display: flex; gap: 4px; }
        .life-pac {
            width: 18px;
            height: 18px;
            background: var(--yellow);
            border-radius: 50%;
            clip-path: polygon(100% 35%, 50% 50%, 100% 65%, 100% 100%, 0% 100%, 0% 0%, 100% 0%);
            transition: all 0.3s;
        }
        .life-pac.lost { background: #333; clip-path: circle(50%); }

        .cherries-display { display: flex; gap: 4px; flex-wrap: wrap; }
        .cherry-icon { font-size: 1.2em; animation: cherryPop 0.4s ease; }

        @keyframes cherryPop {
            0% { transform: scale(0) rotate(-20deg); }
            70% { transform: scale(1.3) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* ── WORD COUNTER ── */
        .word-counter {
            text-align: center;
            font-size: 0.5em;
            color: var(--pink);
            margin-bottom: 16px;
            text-shadow: 0 0 8px var(--pink);
        }

        /* ── WORD DISPLAY AREA ── */
        .word-area {
            background: #050510;
            border: 3px solid var(--wall-blue);
            border-radius: 4px;
            padding: 24px 20px 16px;
            margin-bottom: 16px;
            position: relative;
            min-height: 180px;
        }

        /* Pac-Man track */
        .pacman-track {
            position: relative;
            height: 32px;
            margin-bottom: 20px;
            background: transparent;
            overflow: hidden;
        }

        .track-dots-row {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
        }

        .track-dot {
            width: 6px;
            height: 6px;
            background: var(--dot-color);
            border-radius: 50%;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.2s;
        }

        .track-dot.eaten {
            opacity: 0;
            transform: scale(0);
        }

        .track-dot.spacer { background: transparent; }

        .pacman-sprite {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            transition: left 0.4s ease;
            z-index: 2;
        }

        .pacman-body {
            width: 28px;
            height: 28px;
            background: var(--yellow);
            border-radius: 50%;
            position: relative;
            animation: chomp 0.25s infinite steps(2);
            box-shadow: 0 0 10px var(--yellow), 0 0 20px rgba(255,215,0,0.4);
        }

        @keyframes chomp {
            0% { clip-path: polygon(100% 35%, 50% 50%, 100% 65%, 100% 100%, 0% 100%, 0% 0%, 100% 0%); }
            50% { clip-path: polygon(100% 48%, 50% 50%, 100% 52%, 100% 100%, 0% 100%, 0% 0%, 100% 0%); }
        }

        .pacman-body.stopped { animation: none; clip-path: circle(50%); }

        .cherry-end {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.4em;
            filter: drop-shadow(0 0 6px var(--red));
            transition: opacity 0.3s;
        }

        .cherry-end.eaten {
            animation: cherryEaten 0.5s ease forwards;
        }

        @keyframes cherryEaten {
            0% { transform: translateY(-50%) scale(1); opacity: 1; }
            50% { transform: translateY(-70%) scale(1.5); opacity: 1; }
            100% { transform: translateY(-50%) scale(0); opacity: 0; }
        }

        .ghost-sprite {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5em;
            z-index: 3;
            display: none;
            filter: drop-shadow(0 0 8px var(--pink));
        }

        .ghost-sprite.chasing {
            display: block;
            animation: ghostChase 1.2s ease forwards;
        }

        @keyframes ghostChase {
            0% { left: 90%; opacity: 1; }
            60% { left: 45%; opacity: 1; }
            80% { left: 45%; opacity: 1; transform: translateY(-50%) scale(1.3); }
            100% { left: 45%; opacity: 0; transform: translateY(-70%) scale(0.5); }
        }

        /* ── LETTER BLANKS ── */
        .letter-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .letter-box {
            width: 48px;
            height: 56px;
            border: 3px solid #333;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            font-family: 'Press Start 2P', monospace;
            color: var(--white);
            background: #0d0d0d;
            position: relative;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .letter-box.active {
            border-color: var(--yellow);
            box-shadow: 0 0 12px var(--yellow), inset 0 0 6px rgba(255,215,0,0.1);
            animation: activeGlow 1s infinite;
        }

        @keyframes activeGlow {
            0%, 100% { box-shadow: 0 0 8px var(--yellow), inset 0 0 4px rgba(255,215,0,0.1); }
            50% { box-shadow: 0 0 20px var(--yellow), inset 0 0 10px rgba(255,215,0,0.2); }
        }

        .letter-box.correct {
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
        }

        .letter-box.hint {
            border-color: var(--cyan);
            color: var(--cyan);
            box-shadow: 0 0 10px var(--cyan);
        }

        .letter-box.wrong {
            border-color: var(--red);
            animation: wrongShake 0.4s ease;
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .wrong-x {
            position: absolute;
            color: var(--red);
            font-size: 1.2em;
            text-shadow: 0 0 8px var(--red);
            animation: xPop 0.3s ease;
        }

        @keyframes xPop {
            0% { transform: scale(0) rotate(-30deg); }
            70% { transform: scale(1.3) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* ── BUTTONS ROW ── */
        .btn-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .game-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.55em;
            padding: 12px 20px;
            border: 3px solid;
            background: var(--black);
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.05em;
            border-radius: 3px;
        }

        .game-btn:hover { transform: translateY(-2px); }
        .game-btn:active { transform: translateY(1px); }

        .btn-hear {
            border-color: var(--yellow);
            color: var(--yellow);
            text-shadow: 0 0 8px var(--yellow);
            box-shadow: 0 0 8px rgba(255,215,0,0.3);
        }

        .btn-hear:hover { box-shadow: 0 0 16px rgba(255,215,0,0.5); background: rgba(255,215,0,0.05); }

        .btn-hint {
            border-color: var(--cyan);
            color: var(--cyan);
            text-shadow: 0 0 8px var(--cyan);
            box-shadow: 0 0 8px rgba(0,255,255,0.2);
        }

        .btn-hint:hover { box-shadow: 0 0 16px rgba(0,255,255,0.4); background: rgba(0,255,255,0.05); }
        .btn-hint:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

        /* ── ON-SCREEN KEYBOARD ── */
        .keyboard {
            margin-top: 10px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 5px;
        }

        .key-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.55em;
            width: 42px;
            height: 42px;
            border: 2px solid #2a2a5a;
            background: #0a0a1a;
            color: var(--white);
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
        }

        .key-btn:hover {
            border-color: var(--yellow);
            color: var(--yellow);
            background: rgba(255,215,0,0.08);
            box-shadow: 0 0 8px rgba(255,215,0,0.3);
        }

        .key-btn:active { transform: scale(0.92); }

        .key-btn.hint-correct,
        .key-btn.hint-wrong {
            border-color: var(--cyan) !important;
            color: var(--cyan) !important;
            background: rgba(0,255,255,0.12) !important;
            box-shadow: 0 0 14px var(--cyan), 0 0 28px rgba(0,255,255,0.4) !important;
            animation: hintBluePulse 0.8s ease infinite alternate;
        }

        @keyframes hintBluePulse {
            from { box-shadow: 0 0 8px var(--cyan); }
            to   { box-shadow: 0 0 22px var(--cyan), 0 0 44px rgba(0,255,255,0.5); }
        }

        /* ── GHOST MODE OVERLAY ── */
        .ghost-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            animation: overlayIn 0.3s ease;
        }

        .ghost-overlay.active { display: flex; }

        @keyframes overlayIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .ghost-overlay-icon {
            font-size: 5em;
            animation: ghostFloat 1s ease infinite alternate;
            filter: drop-shadow(0 0 20px var(--pink));
        }

        @keyframes ghostFloat {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }

        .ghost-overlay-title {
            font-size: 1.4em;
            color: var(--pink);
            text-shadow: 0 0 20px var(--pink);
            text-align: center;
        }

        .ghost-overlay-sub {
            font-size: 0.6em;
            color: var(--cyan);
            text-align: center;
            line-height: 2;
        }

        .ghost-overlay-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7em;
            padding: 16px 32px;
            border: 3px solid var(--yellow);
            background: var(--black);
            color: var(--yellow);
            cursor: pointer;
            text-shadow: 0 0 10px var(--yellow);
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
            animation: btnPulse 1s infinite;
        }

        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255,215,0,0.3); }
            50% { box-shadow: 0 0 25px rgba(255,215,0,0.7); }
        }

        /* ── WINNER SCREEN ── */
        .winner-screen {
            text-align: center;
            padding: 30px 20px;
        }

        .winner-title {
            font-size: clamp(1.2em, 4vw, 2em);
            color: var(--yellow);
            text-shadow: 0 0 30px var(--yellow), 0 0 60px rgba(255,215,0,0.5);
            margin-bottom: 20px;
            animation: winnerGlow 0.8s ease infinite alternate;
        }

        @keyframes winnerGlow {
            from { text-shadow: 0 0 20px var(--yellow); }
            to { text-shadow: 0 0 40px var(--yellow), 0 0 80px rgba(255,215,0,0.6), 0 0 120px rgba(255,215,0,0.3); }
        }

        .winner-cherries {
            font-size: 2.5em;
            margin: 20px 0;
            animation: cherryBounce 0.5s ease infinite alternate;
            letter-spacing: 0.1em;
        }

        @keyframes cherryBounce {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .winner-stars {
            font-size: 1.8em;
            color: var(--yellow);
            margin: 10px 0 20px;
            letter-spacing: 0.3em;
            text-shadow: 0 0 15px var(--yellow);
        }

        .winner-score {
            font-size: 0.6em;
            color: var(--cyan);
            line-height: 2.5;
            margin-bottom: 30px;
        }

        .winner-confetti {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
        }

        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 8px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* ── SESSION END (not winner) ── */
        .session-end {
            text-align: center;
            padding: 30px 20px;
        }

        .session-end-title {
            font-size: 1em;
            color: var(--orange);
            text-shadow: 0 0 15px var(--orange);
            margin-bottom: 20px;
        }

        .session-score {
            font-size: 0.6em;
            color: var(--white);
            line-height: 2.5;
            margin-bottom: 24px;
        }

        /* ── MASTERY PANEL ── */
        .mastery-toggle {
            text-align: center;
            margin-bottom: 16px;
        }

        .mastery-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.5em;
            padding: 10px 18px;
            border: 2px solid #333;
            background: var(--black);
            color: #666;
            cursor: pointer;
            margin: 0 4px;
            transition: all 0.15s;
            border-radius: 3px;
        }

        .mastery-btn.active {
            border-color: var(--cyan);
            color: var(--cyan);
            text-shadow: 0 0 8px var(--cyan);
        }

        .mastery-panel {
            background: #050510;
            border: 2px solid var(--wall-blue);
            padding: 16px;
            margin-top: 10px;
            max-height: 250px;
            overflow-y: auto;
        }

        .mastery-list-title {
            font-size: 0.5em;
            margin-bottom: 12px;
            letter-spacing: 0.1em;
        }

        .mastery-word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .mastery-word {
            font-size: 0.5em;
            padding: 5px 10px;
            border-radius: 3px;
            border: 1px solid;
        }

        .mastery-word.correct { border-color: var(--neon-green); color: var(--neon-green); }
        .mastery-word.wrong { border-color: var(--red); color: var(--red); }
        .mastery-word.untried { border-color: #444; color: #888; }

        /* ── ACTION BTNS ── */
        .action-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.6em;
            padding: 14px 28px;
            border: 3px solid var(--yellow);
            background: var(--black);
            color: var(--yellow);
            cursor: pointer;
            text-shadow: 0 0 10px var(--yellow);
            transition: all 0.15s;
            margin: 6px;
            border-radius: 3px;
        }

        .action-btn:hover {
            background: rgba(255,215,0,0.08);
            box-shadow: 0 0 20px rgba(255,215,0,0.4);
            transform: translateY(-2px);
        }

        .action-btn.secondary {
            border-color: var(--cyan);
            color: var(--cyan);
            text-shadow: 0 0 8px var(--cyan);
        }

        .action-btn.secondary:hover {
            background: rgba(0,255,255,0.05);
            box-shadow: 0 0 15px rgba(0,255,255,0.3);
        }

        /* ── WORD CORRECT FLASH ── */
        .word-correct-flash {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(57,255,20,0.12);
            border: 3px solid var(--neon-green);
            border-radius: 4px;
            align-items: center;
            justify-content: center;
            font-size: 1em;
            color: var(--neon-green);
            text-shadow: 0 0 20px var(--neon-green);
            z-index: 10;
            animation: flashIn 0.3s ease;
        }

        .word-correct-flash.show { display: flex; }

        @keyframes flashIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 520px) {
            .letter-box { width: 36px; height: 44px; font-size: 1em; }
            .key-btn { width: 32px; height: 36px; font-size: 0.45em; }
            .game-btn { font-size: 0.45em; padding: 10px 14px; }
        }
    </style>
</head>
<body>

<!-- STARS -->
<div class="stars" id="stars"></div>

<!-- GHOST MODE OVERLAY -->
<div class="ghost-overlay" id="ghostOverlay">
    <div class="ghost-overlay-icon">👻</div>
    <div class="ghost-overlay-title">GHOST GOT YOU!</div>
    <div class="ghost-overlay-sub" id="ghostOverlaySub"></div>
    <button class="ghost-overlay-btn" onclick="dismissGhostOverlay()">▶ CONTINUE</button>
</div>

<!-- WINNER CONFETTI -->
<div class="winner-confetti" id="confettiCanvas"></div>

<div class="wrapper">

    <!-- HEADER -->
    <div class="header">
        <div class="header-dots">
            <div class="header-dot"></div><div class="header-dot"></div>
            <div class="header-dot"></div><div class="header-dot"></div>
            <div class="header-dot"></div><div class="header-dot"></div>
            <div class="header-dot"></div><div class="header-dot"></div>

function showWordHint(word) {
    const hint = WORD_HINTS[word.toLowerCase()];
    const emojiEl = document.getElementById('wordImageEmoji');
    const imgEl = document.getElementById('wordImageImg');
    const labelEl = document.getElementById('wordImageLabel');

    // Reset
    emojiEl.style.display = 'none';
    imgEl.style.display = 'none';
    labelEl.style.display = 'none';
    imgEl.src = '';

    if (!hint) {
        // No entry at all — show generic emoji
        emojiEl.textContent = '📝';
        emojiEl.style.display = 'block';
        return;
    }

    if (hint.url) {
        imgEl.src = hint.url;
        imgEl.alt = word;
        imgEl.style.display = 'block';
        labelEl.style.display = 'block';
        // If image fails to load, handleImgError will fire
    } else if (hint.emoji) {
        emojiEl.textContent = hint.emoji;
        emojiEl.style.display = 'block';
    }
}

function handleImgError() {
    // Image failed — fall back to emoji or placeholder
    const word = currentWord;
    const hint = WORD_HINTS[word?.toLowerCase()];
    const imgEl = document.getElementById('wordImageImg');
    const emojiEl = document.getElementById('wordImageEmoji');
    imgEl.style.display = 'none';
    emojiEl.textContent = hint?.emoji || '📝';
    emojiEl.style.display = 'block';
}
// Wire up onerror after function is defined
document.addEventListener('DOMContentLoaded', function() {
    var imgEl = document.getElementById('wordImageImg');
    if (imgEl) imgEl.onerror = handleImgError;
});

function init() {
    generateStars();
    buildKeyboard();
    document.addEventListener('keydown', handleKeydown);

function generateStars() {
    const container = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2.5 + 0.5;
        star.style.cssText = `
            width:${size}px; height:${size}px;
            left:${Math.random()*100}%;
            top:${Math.random()*100}%;
            animation-delay:${Math.random()*3}s;
            animation-duration:${2+Math.random()*3}s;
        `;
        container.appendChild(star);
    }
}

function buildKeyboard() {
    const rows = ['QWERTYUIOP','ASDFGHJKL','ZXCVBNM'];
    const kb = document.getElementById('keyboard');
    rows.forEach(row => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'keyboard-row';
        row.split('').forEach(ch => {
            const btn = document.createElement('button');
            btn.className = 'key-btn';
            btn.textContent = ch;
            btn.onclick = () => handleLetter(ch.toLowerCase());
            rowDiv.appendChild(btn);
        });
        kb.appendChild(rowDiv);
    });
}

function handleKeydown(e) {
    if (document.getElementById('screenGame').classList.contains('active')) {
        if (e.key.length === 1 && e.key.match(/[a-zA-Z]/)) {
            handleLetter(e.key.toLowerCase());
        }
    }
}

// ══════════════════════════════════════════════
function selectUser(user) {
    currentUser = user;
    loadMastery();
    startSession();
    showScreen('screenGame');
    document.getElementById('statPlayer').textContent = user.toUpperCase();
    const masteryBtn = document.getElementById('masteryViewBtn');
    if (masteryBtn) masteryBtn.style.display = user === 'mom' ? 'inline-block' : 'none';
}

function loadMastery() {
    // Load from localStorage instantly so the app is never blocked
    const saved = localStorage.getItem('wc_spelling_' + currentUser);
    if (saved) {
        try { masteryData = JSON.parse(saved); } catch(e) { masteryData = null; }
    }
    // Reset if missing or all arrays are empty (corrupted state)
    const totalWords = ((masteryData?.correct?.length||0) + (masteryData?.wrong?.length||0) + (masteryData?.untried?.length||0));
    if (!masteryData || !masteryData.untried || totalWords === 0) {
        masteryData = { correct: [], wrong: [], untried: [...(WORD_LISTS[currentUser] || [])] };
    }
    // Add any new words not yet in mastery
    const allWords = WORD_LISTS[currentUser] || [];
    const known = [...(masteryData.correct||[]), ...(masteryData.wrong||[]), ...(masteryData.untried||[])];
    allWords.forEach(w => { if (!known.includes(w)) masteryData.untried.push(w); });
    // Also try to pull from Firebase and merge (non-blocking)
    try {
        db.ref('spelling/' + currentUser).once('value', function(snap) {
            var fbData = snap.val();
            if (fbData) {
                // Firebase stores arrays as objects with numeric keys — convert back
                var toArr = function(v) { return v ? Object.values(v).filter(x => typeof x === 'string') : []; };
                var fbMastery = {
                    correct: toArr(fbData.correct),
                    wrong:   toArr(fbData.wrong),
                    untried: toArr(fbData.untried)
                };
                if (fbMastery.correct.length + fbMastery.wrong.length + fbMastery.untried.length > 0) {
                    masteryData = fbMastery;
                    localStorage.setItem('wc_spelling_' + currentUser, JSON.stringify(masteryData));
                }
            }
        });
    } catch(e) {}
}

function saveMastery() {
    // Ensure all three keys are real arrays before saving
    const clean = {
        correct: Array.isArray(masteryData.correct) ? masteryData.correct : [],
        wrong:   Array.isArray(masteryData.wrong)   ? masteryData.wrong   : [],
        untried: Array.isArray(masteryData.untried) ? masteryData.untried : []
    };
    masteryData = clean;
    localStorage.setItem('wc_spelling_' + currentUser, JSON.stringify(clean));
    try { db.ref('spelling/' + currentUser).set(clean); } catch(e) {}
}

// ══════════════════════════════════════════════
// SESSION
// ══════════════════════════════════════════════
function startSession() {
    lives = 3;
    cherries = 0;
    currentWordIndex = 0;
    sessionWords = buildSessionWords();
    updateStatsBar();
    if (!sessionWords || sessionWords.length === 0) {
        // No words yet — show a friendly message and return to user screen
        console.warn('No words available for', currentUser);
        showScreen('screenUser');
        return;
    }
    loadWord(sessionWords[0]);
}

function buildSessionWords() {
    // Priority: wrong first, then untried, then correct
    const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);
    let pool = [...shuffle(masteryData.wrong||[]), ...shuffle(masteryData.untried||[]), ...shuffle(masteryData.correct||[])];
    // Safety: if somehow empty, use the full word list
    if (pool.length === 0) {
        pool = shuffle([...(WORD_LISTS[currentUser] || [])]);
    }
    return pool.slice(0, 10);
}

function loadWord(word) {
    currentWord = word;
    currentLetterIndex = 0;
    hintUsed = false;
    wordInProgress = true;
    letterStates = Array(word.length).fill('empty');

    document.getElementById('hintBtn').disabled = false;
    document.getElementById('wordCorrectFlash').classList.remove('show');

    renderLetterRow();
    renderPacmanTrack();
    updateWordCounter();
    showWordHint(word);
    clearKeyboardHints();

    // Auto-speak
    setTimeout(() => speakWord(), 400);
}

function renderLetterRow() {
    const row = document.getElementById('letterRow');
    row.innerHTML = '';
    for (let i = 0; i < currentWord.length; i++) {
        const box = document.createElement('div');
        box.className = 'letter-box';
        box.id = `box-${i}`;
        if (i === currentLetterIndex && wordInProgress) box.classList.add('active');
        row.appendChild(box);
    }
}

function renderPacmanTrack() {
    const trackWidth = document.getElementById('pacmanTrack').offsetWidth || 600;
    const dotsRow = document.getElementById('trackDots');
    dotsRow.innerHTML = '';

    // Build dots evenly across track (leave space for pac-man and cherry)
    const dotCount = Math.min(currentWord.length * 4 + 6, 40);
    for (let i = 0; i < dotCount; i++) {
        const dot = document.createElement('div');
        dot.className = 'track-dot';
        dot.style.flex = '1';
        dot.id = `dot-${i}`;
        dotsRow.appendChild(dot);
    }

    // Reset pac-man
    const pac = document.getElementById('pacmanSprite');
    pac.style.left = '4px';
    document.getElementById('pacmanBody').classList.remove('stopped');
    document.getElementById('ghostSprite').classList.remove('chasing');
    document.getElementById('cherryEnd').classList.remove('eaten');
    document.getElementById('cherryEnd').style.opacity = '1';
}

function advancePacman() {
    const track = document.getElementById('pacmanTrack');
    const trackWidth = track.offsetWidth;
    const progress = (currentLetterIndex) / currentWord.length;
    const maxLeft = trackWidth - 80; // leave room for cherry
    const newLeft = Math.round(progress * maxLeft);

    document.getElementById('pacmanSprite').style.left = newLeft + 'px';

    // Eat dots up to progress
    const dots = document.querySelectorAll('.track-dot');
    const eatUpTo = Math.floor(progress * dots.length);
    for (let i = 0; i < eatUpTo; i++) {
        document.getElementById(`dot-${i}`)?.classList.add('eaten');
    }
}

// ══════════════════════════════════════════════
// LETTER HANDLING
// ══════════════════════════════════════════════
function handleLetter(letter) {
    if (!wordInProgress) return;
    if (currentLetterIndex >= currentWord.length) return;
    if (letterStates[currentLetterIndex] === 'correct') return;

    const box = document.getElementById(`box-${currentLetterIndex}`);
    const correct = currentWord[currentLetterIndex];

    if (letter === correct) {
        // Correct!
        letterStates[currentLetterIndex] = 'correct';
        box.textContent = letter.toUpperCase();
        box.classList.remove('active', 'wrong');
        box.classList.add('correct');
        currentLetterIndex++;
        advancePacman();

        if (currentLetterIndex === currentWord.length) {
            // Word complete!
            onWordComplete(true);
        } else {
            const nextBox = document.getElementById(`box-${currentLetterIndex}`);
            if (nextBox) nextBox.classList.add('active');
        }
    } else {
        // Wrong
        box.classList.add('wrong');
        box.classList.remove('active');

        const xEl = document.createElement('span');
        xEl.className = 'wrong-x';
        xEl.textContent = '✗';
        box.appendChild(xEl);

        setTimeout(() => {
            xEl.remove();
            box.classList.remove('wrong');
            box.classList.add('active');
        }, 600);

        // Lose a life
        loseLife();
    }
}

function loseLife() {
    lives--;
    updateLivesDisplay();

    if (lives <= 0) {
        triggerGhostMode();
    }
}

function triggerGhostMode() {
    wordInProgress = false;
    document.getElementById('pacmanBody').classList.add('stopped');

    // Animate ghost chasing
    const ghost = document.getElementById('ghostSprite');
    ghost.classList.add('chasing');

    // Mark word wrong
    markWordResult(currentWord, false);

    setTimeout(() => {
        const sub = document.getElementById('ghostOverlaySub');
        sub.innerHTML = `THE WORD WAS: <span style="color:var(--yellow)">${currentWord.toUpperCase()}</span><br><br>CHERRIES KEPT: ${cherries} 🍒<br>LIVES RESTORED: 3`;
        document.getElementById('ghostOverlay').classList.add('active');
    }, 1400);
}

function dismissGhostOverlay() {
    document.getElementById('ghostOverlay').classList.remove('active');
    document.getElementById('ghostSprite').classList.remove('chasing');
    lives = 3;
    currentWordIndex++;
    updateStatsBar();

    if (currentWordIndex >= sessionWords.length) {
        endSession();
    } else {
        loadWord(sessionWords[currentWordIndex]);
    }
}

function onWordComplete(correct) {
    wordInProgress = false;
    document.getElementById('pacmanBody').classList.add('stopped');

    // Pac-man reaches cherry
    const track = document.getElementById('pacmanTrack');
    const pac = document.getElementById('pacmanSprite');
    pac.style.left = (track.offsetWidth - 44) + 'px';

    // Eat all dots
    document.querySelectorAll('.track-dot').forEach(d => d.classList.add('eaten'));

    setTimeout(() => {
        document.getElementById('cherryEnd').classList.add('eaten');
    }, 300);

    setTimeout(() => {
        const flash = document.getElementById('wordCorrectFlash');
        flash.classList.add('show');
    }, 500);

    markWordResult(currentWord, true);
    cherries++;
    updateCherriesDisplay();

    setTimeout(() => {
        document.getElementById('wordCorrectFlash').classList.remove('show');
        currentWordIndex++;
        updateStatsBar();

        if (currentWordIndex >= sessionWords.length) {
            endSession();
        } else {
            loadWord(sessionWords[currentWordIndex]);
        }
    }, 1800);
}

// ══════════════════════════════════════════════
function clearKeyboardHints() {
    document.querySelectorAll('.key-btn').forEach(k => {
        k.classList.remove('hint-correct', 'hint-wrong');
    });
}

function showHint() {
    if (hintUsed) return;
    if (!wordInProgress) return;
    hintUsed = true;
    document.getElementById('hintBtn').disabled = true;

    // The correct letter for the current active blank
    const correctLetter = currentWord[currentLetterIndex].toUpperCase();

    // Pick one random wrong letter from the alphabet (not the correct one)
    const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    const wrongPool = alphabet.filter(l => l !== correctLetter);
    const wrongLetter = wrongPool[Math.floor(Math.random() * wrongPool.length)];

    // Highlight on keyboard
    clearKeyboardHints();
    document.querySelectorAll('.key-btn').forEach(k => {
        if (k.textContent === correctLetter) k.classList.add('hint-correct');
        if (k.textContent === wrongLetter)   k.classList.add('hint-wrong');
    });

    // Clear highlights after 8 seconds so they don't linger forever
    setTimeout(clearKeyboardHints, 8000);
}

// ══════════════════════════════════════════════
// SPEECH
// ══════════════════════════════════════════════
function populateVoices() {
    const voices = speechSynthesis.getVoices();
    if (!voices.length) return;
    const sel = document.getElementById('voiceSelect');
    if (!sel) return;
    // Only repopulate if empty (beyond the placeholder)
    if (sel.options.length > 1) return;
    const englishVoices = voices.filter(v => v.lang.startsWith('en'));
    const allVoices = englishVoices.length ? englishVoices : voices;
    allVoices.forEach((v, i) => {
        const opt = document.createElement('option');
        opt.value = v.name;
        opt.textContent = v.name + (v.localService ? ' ✓' : ' (network)');
        sel.appendChild(opt);
    });
    // Restore saved voice preference
    const saved = localStorage.getItem('wc_spelling_voice');
    if (saved) sel.value = saved;
    // If nothing saved, try to pick Microsoft Ava Online Natural first, then fallbacks
    if (!sel.value || sel.value === '') {
        const preferred = ['Microsoft Ava Online (Natural)', 'Ava Online', 'Samantha','Karen','Victoria','Zira','Susan','Moira','Fiona','Alex'];
        for (const name of preferred) {
            const match = allVoices.find(v => v.name.includes(name));
            if (match) { sel.value = match.name; break; }
        }
    }
    // Also save it so it persists
    if (sel.value) localStorage.setItem('wc_spelling_voice', sel.value);
}

function saveVoice() {
    const sel = document.getElementById('voiceSelect');
    if (sel && sel.value) {
        localStorage.setItem('wc_spelling_voice', sel.value);
        // Preview the selected voice
        const utter = new SpeechSynthesisUtterance('Hello! This is how I sound.');
        const voices = speechSynthesis.getVoices();
        const chosen = voices.find(v => v.name === sel.value);
        if (chosen) utter.voice = chosen;
        utter.rate = 0.85;
        utter.pitch = 1.0;
        speechSynthesis.cancel();
        speechSynthesis.speak(utter);
    }
}

function speakWord() {
    if (!currentWord) return;
    const utter = new SpeechSynthesisUtterance(currentWord);
    utter.rate = 0.75;
    utter.pitch = 1.0;
    utter.volume = 1;

    const sel = document.getElementById('voiceSelect');
    const voices = speechSynthesis.getVoices();
    const chosenName = sel && sel.value ? sel.value : localStorage.getItem('wc_spelling_voice');
    if (chosenName) {
        const chosen = voices.find(v => v.name === chosenName);
        if (chosen) utter.voice = chosen;
    }

    speechSynthesis.cancel();
    speechSynthesis.speak(utter);
}

// MASTERY
// ══════════════════════════════════════════════
function markWordResult(word, correct) {
    // Remove from all lists
    ['correct','wrong','untried'].forEach(list => {
        masteryData[list] = masteryData[list].filter(w => w !== word);
    });

    if (correct) {
        masteryData.correct.push(word);
    } else {
        masteryData.wrong.push(word);
    }

    saveMastery();
}

                <div style="height:100%; width:${pct}%; background:var(--neon-green); box-shadow:0 0 8px var(--neon-green);"></div>
            </div>
        `;

        // Three word lists
        const sections = [
            { key: 'correct',  label: '✓ CORRECT',  color: 'var(--neon-green)', cls: 'correct' },
            { key: 'wrong',    label: '✗ WRONG',    color: 'var(--red)',        cls: 'wrong'   },
            { key: 'untried',  label: '○ NOT TRIED', color: '#666',             cls: 'untried' },
        ];

        sections.forEach(s => {
            const list = data[s.key] || [];

            const heading = document.createElement('div');

                const empty = document.createElement('div');

// CONFETTI
// ══════════════════════════════════════════════
function launchConfetti() {
    const canvas = document.getElementById('confettiCanvas');
    canvas.innerHTML = '';
    const colors = ['#FFD700','#00FFFF','#FF69B4','#39FF14','#FF8C00','#FFFFFF'];
    for (let i = 0; i < 80; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.cssText = `
            left: ${Math.random()*100}%;
            background: ${colors[Math.floor(Math.random()*colors.length)]};
            width: ${4+Math.random()*8}px;
            height: ${4+Math.random()*8}px;
            border-radius: ${Math.random()>0.5?'50%':'2px'};
            animation-duration: ${2+Math.random()*3}s;
            animation-delay: ${Math.random()*1.5}s;
        `;
        canvas.appendChild(piece);
    }
    setTimeout(() => canvas.innerHTML = '', 6000);
}

function showScreen(id) {

function goHome() {
