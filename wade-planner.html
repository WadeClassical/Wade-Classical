<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wade Classical — Daily Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Cinzel:wght@400;500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-app-compat.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-database-compat.min.js"></script>
    <style>
        :root {
            --linen:       #f5f0e8;
            --linen-dark:  #ede5d8;
            --clay:        #d4c4b0;
            --clay-dark:   #b8a898;
            --ink:         #2e2a24;
            --ink-mid:     #5c5449;
            --ink-light:   #9a9088;

            /* Ryder — forest green */
            --ryder:       #4a7c5f;
            --ryder-light: #6a9c7f;
            --ryder-pale:  #e8f2ec;
            --ryder-mid:   #3a6c4f;

            /* Hadley — muted sky blue */
            --hadley:      #5a7fa0;
            --hadley-light:#7a9fc0;
            --hadley-pale: #e8f0f8;
            --hadley-mid:  #4a6f90;

            /* Mom — dusty rose */
            --mom:         #b87878;
            --mom-light:   #d09898;
            --mom-pale:    #f8eded;
            --mom-mid:     #a06868;

            /* Household — lavender */
            --house:       #8878b8;
            --house-light: #a898d0;
            --house-pale:  #f0edf8;
            --house-mid:   #7868a8;

            --white:       #ffffff;
            --shadow:      rgba(46,42,36,0.08);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Jost', sans-serif;
            background: #faf8f3;
        font-size: 18px;
            color: var(--ink);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            background: var(--white);
            border-bottom: 1px solid var(--linen-dark);
            padding: 18px 24px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px var(--shadow);
        }




        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .header-logo {
            font-family: 'Cinzel', serif;
            font-size: 1.7em;
            color: var(--ink);
            letter-spacing: 0.15em;
            font-weight: 400;
        }

        .header-date {
            font-family: 'Lora', serif;
            font-size: 2.3em;
            color: var(--ink-mid);
            font-style: italic;
            font-weight: 400;
        }

        .edit-toggle {
            font-family: 'Jost', sans-serif;
            font-size: 0.65em;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 500;
            padding: 7px 16px;
            border-radius: 20px;
            border: 1.5px solid var(--clay);
            background: var(--white);
            color: var(--ink-mid);
            cursor: pointer;
            transition: all 0.2s;
        }

        .edit-toggle:hover { border-color: var(--ink-mid); color: var(--ink); }
        .edit-toggle.active { background: var(--ink); color: var(--white); border-color: var(--ink); }

        /* ── PERSON TABS ── */
        .person-tabs {
            display: flex;
            gap: 0;
        }

        .person-tab {
            font-family: 'Jost', sans-serif;
            font-size: 0.82em;
            font-weight: 500;
            letter-spacing: 0.08em;
            padding: 12px 26px;
            border: none;
            background: none;
            cursor: pointer;
            color: var(--ink-light);
            border-bottom: 2.5px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .person-tab:hover { color: var(--ink-mid); }
        .person-tab.ryder.active   { color: var(--ryder);  border-bottom-color: var(--ryder);  }
        .person-tab.hadley.active  { color: var(--hadley); border-bottom-color: var(--hadley); }
        .person-tab.mom.active     { color: var(--mom);    border-bottom-color: var(--mom);    }
        .person-tab.house.active   { color: var(--house);  border-bottom-color: var(--house);  }
        .ryder-panel.active  { background: #c4d9c4; }
        .hadley-panel.active { background: #d4e0ea; }
        .mom-panel.active    { background: #ecdada; }
        .house-panel.active  { background: #e4ddf0; }
        .house-panel .task-item.done .task-check { background: var(--house); border-color: var(--house); }
        .house-panel .task-item:hover .task-check:not(.checked) { border-color: var(--house-light); }
        .house-panel .progress-fill { background: var(--house); }
        .house-panel .add-task-btn { background: var(--house); }
        .house-panel .btn-add { background: var(--house); }
        .week-task-row.done .house-panel .week-check { background: var(--house); border-color: var(--house); }

        /* ── VIEW TOGGLE ── */
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 20px 24px 4px;
        }

        .view-btn {
            font-family: 'Jost', sans-serif;
            font-size: 0.75em;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 9px 22px;
            border-radius: 20px;
            border: 1.5px solid var(--clay);
            background: var(--white);
            color: var(--ink-mid);
            cursor: pointer;
            transition: all 0.2s;
        }

        .view-btn.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
        .view-btn:hover:not(.active) { border-color: var(--ink-mid); }

        /* ── MAIN ── */
        main { max-width: 680px; margin: 0 auto; padding: 16px 20px 80px; }

        /* ── PERSON PANEL ── */
        .person-panel { display: none; }
        .person-panel.active { display: block; animation: fadeIn 0.3s ease; min-height: 100vh; margin: -16px -20px; padding: 16px 20px 80px; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

        /* ── PROGRESS BAR ── */
        .progress-wrap {
            margin-bottom: 20px;
            background: #faf8f3;
            border: 1px solid var(--linen-dark);
            border-radius: 10px;
            padding: 14px 18px;
            box-shadow: 0 1px 6px var(--shadow);
        }

        .progress-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .progress-label {
            font-size: 0.72em;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--ink-light);
            font-weight: 400;
        }

        .progress-count { font-size: 0.85em; color: var(--ink-mid); font-weight: 500; }

        .progress-track {
            height: 5px;
            background: var(--linen-dark);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .ryder-fill  { background: var(--ryder); }
        .hadley-fill { background: var(--hadley); }
        .mom-fill    { background: var(--mom); }

        /* ── DAY VIEW ── */
        .day-header {
            font-family: 'Lora', serif;
            font-size: 1.5em;
            font-style: italic;
            color: var(--ink-mid);
            margin-bottom: 14px;
            font-weight: 400;
            background: #faf8f3;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--linen-dark);
        }

        /* ── TASK ITEM ── */
        .task-list { display: flex; flex-direction: column; gap: 8px; }

        .task-item {
            background: var(--white);
            border: 1px solid var(--linen-dark);
            border-radius: 10px;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 1px 4px var(--shadow);
            transition: all 0.15s;
            cursor: pointer;
            position: relative;
            animation: slideIn 0.3s ease both;
        }

        @keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }

        .task-item:hover { box-shadow: 0 3px 12px var(--shadow); transform: translateY(-1px); }
        .task-item.done { opacity: 0.5; }
        .task-item.done .task-name { text-decoration: line-through; color: var(--ink-light); }

        .task-check {
            width: 26px; height: 26px;
            border-radius: 50%;
            border: 2px solid var(--clay);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 0.7em;
            color: transparent;
        }

        .task-item.done .task-check { color: white; }
        .ryder-panel  .task-item.done .task-check { background: var(--ryder);  border-color: var(--ryder); }
        .hadley-panel .task-item.done .task-check { background: var(--hadley); border-color: var(--hadley); }
        .mom-panel    .task-item.done .task-check { background: var(--mom);    border-color: var(--mom); }

        .ryder-panel  .task-item:hover .task-check:not(.checked) { border-color: var(--ryder-light); }
        .hadley-panel .task-item:hover .task-check:not(.checked) { border-color: var(--hadley-light); }
        .mom-panel    .task-item:hover .task-check:not(.checked) { border-color: var(--mom-light); }

        .task-body { flex: 1; min-width: 0; }
        .task-name { font-size: 1.05em; font-weight: 400; color: var(--ink); line-height: 1.3; }
        .task-note { font-size: 0.8em; color: var(--ink-mid); margin-top: 4px; font-style: italic; display: flex; align-items: flex-start; gap: 4px; }
        .task-note::before { content: '📝'; font-style: normal; font-size: 0.85em; flex-shrink: 0; margin-top: 1px; }

        .task-badges { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }

        .badge-mom {
            font-size: 0.78em;
            background: var(--mom-pale);
            color: var(--mom);
            border: 1px solid var(--mom-light);
            border-radius: 20px;
            padding: 2px 8px;
            font-weight: 500;
            white-space: nowrap;
        }

        .badge-link {
            font-size: 0.65em;
            color: var(--ink-light);
            border: 1px solid var(--clay);
            border-radius: 20px;
            padding: 2px 8px;
            text-decoration: none;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .badge-link:hover { border-color: var(--ink-mid); color: var(--ink); }
        .ryder-panel  .badge-link:hover { border-color: var(--ryder);  color: var(--ryder); }
        .hadley-panel .badge-link:hover { border-color: var(--hadley); color: var(--hadley); }
        .mom-panel    .badge-link:hover { border-color: var(--mom);    color: var(--mom); }

        .task-drag { color: var(--clay); font-size: 0.8em; cursor: grab; padding: 0 2px; display: none; touch-action: none; }
        .edit-mode .task-drag { display: block; }
        .task-item.dragging { opacity: 0.4; border-style: dashed; transform: none !important; box-shadow: none !important; }
        .task-item.drag-over { border-color: var(--clay-dark); background: var(--linen-dark); }
        .week-task-row.dragging { opacity: 0.35; }
        .week-task-row.drag-over { background: var(--linen-dark); outline: 1.5px dashed var(--clay-dark); border-radius: 8px; }
        .week-drag-handle { color: var(--clay); font-size: 0.75em; cursor: grab; padding: 0 4px 0 0; display: none; flex-shrink: 0; }
        .edit-mode .week-drag-handle { display: block; }

        .task-delete {
            font-size: 0.75em;
            color: var(--clay);
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 4px;
            display: none;
            transition: color 0.15s;
        }

        .edit-mode .task-delete { display: block; }
        .edit-mode .task-edit  { display: block; }
        .task-delete:hover { color: var(--mom); }
        .task-edit:hover   { color: var(--sage); }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--ink-light);
        }

        .empty-icon { font-size: 2em; margin-bottom: 12px; }
        .empty-text { font-family: 'Lora', serif; font-style: italic; font-size: 1em; }
        .empty-sub  { font-size: 0.72em; margin-top: 6px; letter-spacing: 0.08em; }

        /* ── WEEK VIEW ── */
        .week-grid { display: flex; flex-direction: column; gap: 12px; }

        .week-day-block {
            background: var(--white);
            border: 1px solid var(--linen-dark);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 1px 4px var(--shadow);
        }

        .week-day-header {
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid var(--linen-dark);
            background: #faf8f3;
        }

        .week-day-header.today-header { background: #f0ece4; }

        .week-day-name {
            font-family: 'Lora', serif;
            font-size: 1.05em;
            font-style: italic;
            color: var(--ink-mid);
        }

        .week-day-name.today-name { font-weight: 600; color: var(--ink); }

        .week-day-count {
            font-size: 0.72em;
            letter-spacing: 0.1em;
            color: var(--ink-light);
            text-transform: uppercase;
        }

        .week-day-tasks { padding: 10px 16px; display: flex; flex-direction: column; gap: 6px; }

        .week-task-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 12px;
            border-radius: 8px;
            background: #dde8dd;
            cursor: pointer;
            transition: background 0.15s;
        }

        .week-task-row:hover { background: var(--linen-dark); }
        .week-task-row.done { opacity: 0.45; }
        .week-task-row.done .week-task-name { text-decoration: line-through; }

        .week-check {
            width: 20px; height: 20px;
            border-radius: 50%;
            border: 1.5px solid var(--clay);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.55em;
            color: transparent;
            transition: all 0.15s;
        }

        .week-task-row.done .week-check { color: white; }
        .ryder-panel  .week-task-row.done .week-check { background: var(--ryder);  border-color: var(--ryder); }
        .hadley-panel .week-task-row.done .week-check { background: var(--hadley); border-color: var(--hadley); }
        .mom-panel    .week-task-row.done .week-check { background: var(--mom);    border-color: var(--mom); }

        .week-task-name { font-size: 0.92em; color: var(--ink); flex: 1; }
        .week-task-mom  { font-size: 0.65em; color: var(--mom); }

        /* ── EDIT MODE ── */
        .edit-panel {
            display: none;
            background: var(--white);
            border: 1px solid var(--linen-dark);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px var(--shadow);
        }

        .edit-panel.show { display: block; animation: fadeIn 0.3s ease; }

        .edit-panel-title {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 1em;
            color: var(--ink-mid);
            margin-bottom: 16px;
            font-weight: 400;
        }

        .edit-field {
            margin-bottom: 12px;
        }

        .edit-label {
            font-size: 0.62em;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--ink-light);
            font-weight: 500;
            display: block;
            margin-bottom: 5px;
        }

        .edit-input, .edit-select, .edit-textarea {
            font-family: 'Jost', sans-serif;
            font-size: 0.95em;
            background: #faf8f3;
            border: 1px solid var(--clay);
            color: var(--ink);
            padding: 9px 12px;
            border-radius: 8px;
            width: 100%;
            transition: border-color 0.2s;
        }

        .edit-input:focus, .edit-select:focus, .edit-textarea:focus {
            outline: none;
            border-color: var(--ink-mid);
        }

        .edit-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .edit-row .edit-field { flex: 1; min-width: 140px; }

        .edit-checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .edit-checkbox-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--mom); cursor: pointer; }
        .edit-checkbox-row label { font-size: 0.82em; color: var(--ink-mid); cursor: pointer; }

        .days-checkboxes {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .day-check-btn {
            font-family: 'Jost', sans-serif;
            font-size: 0.62em;
            font-weight: 500;
            letter-spacing: 0.08em;
            padding: 5px 10px;
            border-radius: 20px;
            border: 1.5px solid var(--clay);
            background: var(--white);
            color: var(--ink-mid);
            cursor: pointer;
            transition: all 0.15s;
        }

        .day-check-btn.selected { background: var(--ink); color: var(--white); border-color: var(--ink); }

        .edit-btn-row { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }

        .btn-add {
            font-family: 'Jost', sans-serif;
            font-size: 0.7em;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
        }

        .ryder-panel  .btn-add { background: var(--ryder);  color: white; }
        .hadley-panel .btn-add { background: var(--hadley); color: white; }
        .mom-panel    .btn-add { background: var(--mom);    color: white; }

        .btn-add:hover { filter: brightness(0.9); transform: translateY(-1px); }

        .btn-cancel {
            font-family: 'Jost', sans-serif;
            font-size: 0.7em;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1.5px solid var(--clay);
            background: var(--white);
            color: var(--ink-mid);
            cursor: pointer;
        }

        /* Add task FAB */
        .add-task-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            font-family: 'Jost', sans-serif;
            font-size: 0.82em;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 15px 26px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 16px var(--shadow);
            transition: all 0.2s;
            z-index: 50;
        }

        .add-task-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }
        .edit-mode .add-task-btn { display: flex; }

        .ryder-panel  .add-task-btn { background: var(--ryder);  color: white; }
        .hadley-panel .add-task-btn { background: var(--hadley); color: white; }
        .mom-panel    .add-task-btn { background: var(--mom);    color: white; }

        /* ── QUICK ADD ── */
        .week-quick-add {
            padding: 8px 10px;
            border-top: 1px solid var(--linen-dark);
            display: none;
        }
        .week-quick-add.show { display: block; }
        .week-quick-add-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .week-quick-input {
            font-family: 'Jost', sans-serif;
            font-size: 0.82em;
            flex: 1;
            background: #faf8f3;
            border: 1px solid var(--clay);
            color: var(--ink);
            padding: 7px 10px;
            border-radius: 8px;
            transition: border-color 0.2s;
        }
        .week-quick-input:focus { outline: none; border-color: var(--ink-mid); }
        .week-quick-save {
            font-family: 'Jost', sans-serif;
            font-size: 0.68em;
            font-weight: 600;
            letter-spacing: 0.08em;
            padding: 7px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            color: white;
            transition: filter 0.15s;
            white-space: nowrap;
        }
        .week-quick-save:hover { filter: brightness(0.9); }
        .week-quick-cancel {
            font-size: 0.8em;
            color: var(--ink-light);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 6px;
        }
        .week-quick-cancel:hover { color: var(--mom); }
        .week-add-btn {
            font-size: 0.75em;
            font-weight: 600;
            color: var(--ink-light);
            background: none;
            border: 1px solid var(--clay);
            border-radius: 20px;
            padding: 3px 10px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .week-add-btn:hover { border-color: var(--ink-mid); color: var(--ink); }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .header-top { flex-wrap: wrap; gap: 8px; }
            .person-tab { padding: 10px 14px; font-size: 0.68em; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <span class="header-logo">Wade Classical</span>
        <button class="edit-toggle" id="editToggle" onclick="toggleEditMode()">⚙ Edit</button>
    </div>
    <div style="text-align:center; margin-bottom:14px;">
        <span class="header-date" id="headerDate"></span>
    </div>
    <div class="person-tabs">
        <button class="person-tab ryder active" onclick="switchPerson('ryder')">⚔️ Ryder</button>
        <button class="person-tab hadley" onclick="switchPerson('hadley')">🌷 Hadley</button>
        <button class="person-tab mom" onclick="switchPerson('mom')">🦋 Mom</button>
        <button class="person-tab house" onclick="switchPerson('house')">🏠 Household</button>
    </div>
</header>

<div class="view-toggle">
    <button class="view-btn active" id="btn-today" onclick="switchView('today')">Today</button>
    <button class="view-btn" id="btn-week" onclick="switchView('week')">This Week</button>
    <button class="view-btn" id="btn-month" onclick="switchView('month')" style="display:none">This Month</button>

const FIREBASE_CONFIG = {

// Firebase refs (set after init)
let db = null;
let firebaseReady = false;
const pendingWrites = [];

function initFirebase() {
    try {
        if (typeof firebase === 'undefined') {
            console.warn('Firebase SDK not loaded, falling back to localStorage');
            showSyncStatus('Offline — local only', '#b87878');
            return;
        }
        if (firebase.apps.length) {
            db = firebase.database();
        } else {
            firebase.initializeApp(FIREBASE_CONFIG);
            db = firebase.database();
        }
        firebaseReady = true;
        pendingWrites.forEach(fn => fn());
        pendingWrites.length = 0;
        console.log('Firebase connected');
    } catch(e) {
        console.warn('Firebase init failed, falling back to localStorage', e);
        showSyncStatus('Offline — local only', '#b87878');
    }
}

function fbRef(path) {
    return db ? db.ref(path) : null;
}

// ── FIREBASE READ/WRITE HELPERS ──
function fbGet(path, callback) {
    const ref = fbRef(path);
    if (!ref) {
        // fallback to localStorage
        const val = localStorage.getItem('wc_' + path.replace(/\//g,'_'));
        callback(val ? JSON.parse(val) : null);
        return;
    }
    ref.once('value', snap => callback(snap.val()));
}

function fbSet(path, value) {
    // Always write to localStorage as cache
    localStorage.setItem('wc_' + path.replace(/\//g,'_'), JSON.stringify(value));
    const ref = fbRef(path);
    if (ref) {
        ref.set(value).catch(e => console.warn('fbSet error', e));
    }
}

function fbListen(path, callback) {
    const ref = fbRef(path);
    if (!ref) {
        // fallback: read from localStorage once
        const val = localStorage.getItem('wc_' + path.replace(/\//g,'_'));
        callback(val ? JSON.parse(val) : null);
        return;
    }
    ref.on('value', snap => callback(snap.val()));
}

// ══════════════════════════════════════════════

// ── STORAGE ──
// Tasks and checks are kept in memory + synced to Firebase
// localCache mirrors Firebase so UI stays fast
const localCache = {};

function loadTasks(person) {
    const key = 'tasks_' + person;
    const raw = localCache[key] || JSON.parse(localStorage.getItem('wc_planner_tasks_' + person) || '[]');
    // Firebase stores arrays as objects with numeric keys — convert back if needed
    const arr = Array.isArray(raw) ? raw : Object.values(raw || {});
    // Ensure note field is always a string or null (Firebase strips null keys)
    return arr.map(t => ({ ...t, note: t.note || null }));
}

function saveTasks(person, tasks) {
    const key = 'tasks_' + person;
    localCache[key] = tasks;
    localStorage.setItem('wc_planner_tasks_' + person, JSON.stringify(tasks));
    fbSet('planner/tasks/' + person, tasks);
}

function loadChecks(person) {
    const key = 'checks_' + person;
    return localCache[key] || JSON.parse(localStorage.getItem('wc_planner_checks_' + person) || '{}');
}

function saveChecks(person, checks) {
    const key = 'checks_' + person;
    localCache[key] = checks;
    localStorage.setItem('wc_planner_checks_' + person, JSON.stringify(checks));
    fbSet('planner/checks/' + person, checks);
}

// ── DATE HELPERS ──
function dateKey(date) {
    return date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0');
}

function getWeekDates() {
    // Mon–Fri of current week
    const dates = [];
    const base = new Date(today);
    const dow = base.getDay(); // 0=Sun
    // Go to Monday
    const diff = dow === 0 ? -6 : 1 - dow;
    for (let i = 0; i < 5; i++) {
        const d = new Date(base);
        d.setDate(base.getDate() + diff + i);
        d.setHours(0,0,0,0);
        dates.push(d);
    }
    return dates;
}

// ── TASK MATCHING ──
// A task appears on a date if:
// - recurring.type === 'daily' (every day)
// - recurring.type === 'weekdays' (Mon-Fri)
// - recurring.type === 'specific' and recurring.days includes dow
// - recurring.type === 'weekly' (once a week - any day this week)
// - recurring.type === 'oneoff' and task.date === dateKey
function taskAppliesToDate(task, date) {
    const key = dateKey(date);
    const dow  = date.getDay();
    const r    = task.recurring;
    if (!r) return task.date === key;
    if (r.type === 'daily')    return true;
    if (r.type === 'weekdays') return dow >= 1 && dow <= 5;
    if (r.type === 'specific') return (r.days || []).includes(dow);
    if (r.type === 'weekly')   return true; // show every day this week, check once
    if (r.type === 'oneoff')   return task.date === key;
    return false;
}

function getTasksForDate(person, date) {
    const tasks = loadTasks(person);
    return tasks
        .filter(t => taskAppliesToDate(t, date))
        .sort((a, b) => (a.order ?? 999) - (b.order ?? 999));
}

// ── CHECK KEY ──
function checkKey(taskId, date) {
    return taskId + '_' + dateKey(date);
}

// ── AUTO RESET ──
function autoReset() {
    const lastReset = localStorage.getItem('wc_planner_lastreset');
    const todayStr  = dateKey(today);
    if (lastReset !== todayStr) {
        // Don't delete checks — they're keyed by date so old ones naturally don't appear
        localStorage.setItem('wc_planner_lastreset', todayStr);
    }
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function render() {
    // Update header date
    document.getElementById('headerDate').textContent =
        DAY_NAMES[today.getDay()] + ', ' +
        today.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});

    PEOPLE.forEach(p => {
        if (currentView === 'today') {
            renderDayView(p, today);
        } else if (currentView === 'week') {
            renderWeekView(p);
        } else if (currentView === 'month' && (p === 'mom' || p === 'house')) {
            renderMonthView(p);
        } else if (currentView === 'year' && (p === 'mom' || p === 'house')) {
            renderYearView(p);
        }
        updateProgress(p);
    });
}

function renderDayView(person, date) {
    const container = document.getElementById('view-' + person);
    const tasks = getTasksForDate(person, date);
    const checks = loadChecks(person);
    const isToday = dateKey(date) === dateKey(today);

    let html = '<div class="day-header">' +
        (isToday ? 'Today' : DAY_NAMES[date.getDay()]) +
        '</div>';

    if (tasks.length === 0) {
        html += '<div class="empty-state">' +
            '<div class="empty-icon">🌿</div>' +
            '<div class="empty-text">No tasks for today</div>' +
            '<div class="empty-sub">' + (editMode ? 'Click + Add Task to get started' : 'Enjoy your free time!') + '</div>' +
            '</div>';
    } else {
        html += '<div class="task-list">';
        tasks.forEach((task, i) => {
            const ckey = checkKey(task.id, date);
            const done = !!checks[ckey];
            html += buildTaskItem(task, done, ckey, i);
        });
        html += '</div>';
    }

    container.innerHTML = html;

    // Bind check events
    container.querySelectorAll('.task-item').forEach(el => {
        el.addEventListener('click', function(e) {
            if (e.target.classList.contains('task-delete') ||
                e.target.classList.contains('badge-link') ||
                e.target.closest('.badge-link')) return;
            const ckey = this.dataset.ckey;
            toggleCheck(person, ckey);
        });
    });

    // Bind edit
    container.querySelectorAll('.task-edit').forEach(el => {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            openEditTask(person, this.dataset.taskid);
        });
    });

    // Bind delete
    container.querySelectorAll('.task-delete').forEach(el => {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            deleteTask(person, this.dataset.taskid);
        });
    });

    // Bind drag-and-drop reordering
    if (editMode) bindDrag(container, person);
}

function bindDrag(container, person) {
    const list = container.querySelector('.task-list');
    if (!list) return;
    let dragSrc = null;

    list.querySelectorAll('.task-item').forEach(item => {
        item.addEventListener('dragstart', function(e) {
            dragSrc = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', this.dataset.taskid);
        });

        item.addEventListener('dragend', function() {
            this.classList.remove('dragging');
            list.querySelectorAll('.task-item').forEach(i => i.classList.remove('drag-over'));
        });

        item.addEventListener('dragover', function(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            list.querySelectorAll('.task-item').forEach(i => i.classList.remove('drag-over'));
            if (this !== dragSrc) this.classList.add('drag-over');
        });

        item.addEventListener('dragleave', function() {
            this.classList.remove('drag-over');
        });

        item.addEventListener('drop', function(e) {
            e.preventDefault();
            e.stopPropagation();
            if (this === dragSrc) return;
            this.classList.remove('drag-over');

            // Get new order from DOM
            const items = [...list.querySelectorAll('.task-item')];
            const srcIdx  = items.indexOf(dragSrc);
            const destIdx = items.indexOf(this);

            // Reorder in DOM
            if (srcIdx < destIdx) {
                list.insertBefore(dragSrc, this.nextSibling);
            } else {
                list.insertBefore(dragSrc, this);
            }

            // Save new order to localStorage
            saveDragOrder(person, list);
        });
    });
}

function bindWeekDrag(dayList, person) {
    let dragSrc = null;

    dayList.querySelectorAll('.week-task-row').forEach(item => {
        item.addEventListener('dragstart', function(e) {
            dragSrc = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', this.dataset.taskid);
        });

        item.addEventListener('dragend', function() {
            this.classList.remove('dragging');
            dayList.querySelectorAll('.week-task-row').forEach(i => i.classList.remove('drag-over'));
        });

        item.addEventListener('dragover', function(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            dayList.querySelectorAll('.week-task-row').forEach(i => i.classList.remove('drag-over'));
            if (this !== dragSrc) this.classList.add('drag-over');
        });

        item.addEventListener('dragleave', function() {
            this.classList.remove('drag-over');
        });

        item.addEventListener('drop', function(e) {
            e.preventDefault();
            e.stopPropagation();
            if (this === dragSrc) return;
            this.classList.remove('drag-over');
            const items = [...dayList.querySelectorAll('.week-task-row')];
            const srcIdx  = items.indexOf(dragSrc);
            const destIdx = items.indexOf(this);
            if (srcIdx < destIdx) dayList.insertBefore(dragSrc, this.nextSibling);
            else dayList.insertBefore(dragSrc, this);
            // Save using the same order-save logic
            const fakeList = { querySelectorAll: (sel) => dayList.querySelectorAll(sel) };
            saveDragOrder(person, dayList);
        });
    });
}

function saveDragOrder(person, list) {
    const sel = list.querySelector('.task-item') ? '.task-item' : '.week-task-row';
    const newOrder = [...list.querySelectorAll(sel)].map(el => el.dataset.taskid);
    const tasks = loadTasks(person);
    // Sort tasks array by new DOM order
    const ordered = [];
    newOrder.forEach(id => {
        const t = tasks.find(t => t.id === id);
        if (t) ordered.push(t);
    });
    // Any tasks not in the visible list (different day) append at end
    tasks.forEach(t => { if (!ordered.find(o => o.id === t.id)) ordered.push(t); });
    // Update order property
    ordered.forEach((t, i) => t.order = i);
    saveTasks(person, ordered);
}

function buildTaskItem(task, done, ckey, idx) {
    const delay = idx * 0.04;
    let badges = '';
    if (task.momFlag) badges += '<span class="badge-mom">🦋 Mom</span>';
    if (task.app && APPS[task.app]) {
        badges += '<a class="badge-link" href="' + APPS[task.app] + '" onclick="event.stopPropagation()">Open ↗</a>';
    }

    return '<div class="task-item' + (done ? ' done' : '') + '" data-ckey="' + ckey + '" data-taskid="' + task.id + '" ' + (editMode ? 'draggable="true"' : '') + ' style="animation-delay:' + delay + 's">' +
        (editMode ? '<span class="task-drag">⠿</span>' : '') +
        '<div class="task-check">' + (done ? '✓' : '') + '</div>' +
        '<div class="task-body">' +
            '<div class="task-name">' + escHtml(task.name) + '</div>' +
            (task.note ? '<div class="task-note">' + escHtml(task.note) + '</div>' : '') +
        '</div>' +
        (badges ? '<div class="task-badges">' + badges + '</div>' : '') +
        (editMode ? '<button class="task-edit" data-taskid="' + task.id + '" title="Edit task">✎</button>' : '') +
        (editMode ? '<button class="task-delete" data-taskid="' + task.id + '">✕</button>' : '') +
    '</div>';
}

function renderWeekView(person) {
    const container = document.getElementById('view-' + person);
    const weekDates = getWeekDates();

    let html = '<div class="week-grid">';

        html += '<div class="week-day-block">' +
            '<div class="week-day-header' + (isT ? ' today-header' : '') + '" onclick="toggleWeekDay(this)">' +

        if (tasks.length === 0) {
            html += '<div style="font-size:0.75em;color:var(--ink-light);padding:6px 0;font-style:italic;">No tasks</div>';
        } else {
            tasks.forEach(task => {

                html += '<div class="week-task-row' + (done ? ' done' : '') + '" data-ckey="' + ckey + '" data-person="' + person + '" data-taskid="' + task.id + '" ' + (editMode ? 'draggable="true"' : '') + '>' +
                    (editMode ? '<span class="week-drag-handle">⠿</span>' : '') +
                    '<div class="week-check">' + (done ? '✓' : '') + '</div>' +
                    '<div style="flex:1;min-width:0;">' +
                        '<span class="week-task-name">' + escHtml(task.name) + '</span>' +
                        (task.note ? '<div class="task-note" style="font-size:0.78em;">' + escHtml(task.note) + '</div>' : '') +
                    '</div>' +
                    (task.momFlag ? '<span class="week-task-mom">🦋</span>' : '') +
                    (editMode ? '<button class="task-edit" data-taskid="' + task.id + '" style="display:block;" title="Edit task">✎</button>' : '') +
                    (editMode ? '<button class="task-delete" data-taskid="' + task.id + '" style="display:block;">✕</button>' : '') +
                '</div>';
            });
        }

        html += '</div>' +
            '<div class="week-quick-add' + (isT ? ' show' : '') + '" id="week-qa-' + person + '-' + key + '">' +
                '<div class="week-quick-add-row">' +
                    '<input class="week-quick-input" id="week-qi-' + person + '-' + key + '" placeholder="Task name..." />' +
                    '<button class="week-quick-save" data-person="' + person + '" data-date="' + key + '" onclick="saveWeekQuickTask(this)">Add</button>' +
                    '<button class="week-quick-cancel" onclick="toggleWeekQuickAdd(&quot;week-qa-' + person + '-' + key + '&quot;)">✕</button>' +
                '</div>' +
            '</div>' +
        '</div>';
    });
    html += '</div>';
    container.innerHTML = html;

    // Bind week check events
    container.querySelectorAll('.week-task-row').forEach(el => {
        el.addEventListener('click', function() {
            toggleCheck(this.dataset.person, this.dataset.ckey);
        });
    });

    // Bind week edit buttons
    container.querySelectorAll('.week-task-row .task-edit').forEach(el => {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            openEditTask(person, this.dataset.taskid);
        });
    });

    // Bind week delete buttons
    container.querySelectorAll('.week-task-row .task-delete').forEach(el => {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            deleteTask(person, this.dataset.taskid);
        });
    });

    // Bind week drag reordering
    if (editMode) {
        container.querySelectorAll('.week-day-tasks').forEach(dayList => {
            bindWeekDrag(dayList, person);
        });
    }

    // Color quick-save buttons per person
    container.querySelectorAll('.week-quick-save').forEach(btn => {
        btn.style.background = 'var(--' + person + ')';
    });

    // Enter key on quick inputs
    container.querySelectorAll('.week-quick-input').forEach(input => {
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const btn = this.nextElementSibling;
                saveWeekQuickTask(btn);
            }
        });
    });
}

function toggleWeekDay(header) {
    const tasks = header.nextElementSibling;
    tasks.style.display = tasks.style.display === 'none' ? 'block' : 'none';
}

function toggleWeekQuickAdd(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.toggle('show');
    // Also expand the day tasks
    const tasksEl = el.previousElementSibling;
    if (tasksEl && el.classList.contains('show')) {
        tasksEl.style.display = 'block';
        el.querySelector('.week-quick-input').focus();
    }
}

function saveWeekQuickTask(btn) {
    const person = btn.dataset.person;
    const date   = btn.dataset.date;
    const inputId = 'week-qi-' + person + '-' + date;
    const input  = document.getElementById(inputId);
    if (!input) return;
    const name = input.value.trim();
    if (!name) { input.focus(); return; }

    const task = {
        id:        'task_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
        name,
        note:      null,
        app:       null,
        momFlag:   false,
        recurring: null,
        date:      date,
        order:     loadTasks(person).length
    };

    const tasks = loadTasks(person);
    tasks.push(task);
    saveTasks(person, tasks);
    input.value = '';
    render();
}

function updateProgress(person) {
    const tasks  = getTasksForDate(person, today);
    const checks = loadChecks(person);
    const total  = tasks.length;
    const done   = tasks.filter(t => !!checks[checkKey(t.id, today)]).length;
    const pct    = total > 0 ? Math.round((done / total) * 100) : 0;

    const wrap = document.getElementById('prog-' + person);
    if (total > 0) {
        wrap.style.display = 'block';
        document.getElementById('prog-count-' + person).textContent = done + ' / ' + total;
        document.getElementById('prog-fill-' + person).style.width  = pct + '%';
    } else {
        wrap.style.display = 'none';
    }
}

function saveNewTask(person) {
    const name  = document.getElementById('new-name-'  + person).value.trim();
    if (!name) { alert('Please enter a task name.'); return; }

    const note  = document.getElementById('new-note-'  + person).value.trim();
    const app   = document.getElementById('new-app-'   + person).value;
    const recur = document.getElementById('new-recur-' + person).value;
    const momF  = document.getElementById('new-mom-'   + person).checked;

    let recurObj = { type: recur };
    if (recur === 'specific') {
        const days = [...document.querySelectorAll('#specific-days-' + person + ' .day-check-btn.selected')]
            .map(b => parseInt(b.dataset.dow));
        if (days.length === 0) { alert('Please select at least one day.'); return; }
        recurObj.days = days;
    }

    let date = null;
    if (recur === 'oneoff') {
        date = document.getElementById('new-date-' + person).value;
        if (!date) { alert('Please select a date.'); return; }
        recurObj = null;
    }

    const task = {
        id:       'task_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
        name,
        note:     note || null,
        app:      app !== 'None' ? app : null,
        momFlag:  momF,
        recurring: recurObj,
        date:     date,
        order:    loadTasks(person).length
    };

    const tasks = loadTasks(person);
    tasks.push(task);
    saveTasks(person, tasks);
    closeAddTask(person);
    render();

function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── MIGRATE EXISTING LOCALSTORAGE TO FIREBASE ──
function migrateLocalStorageToFirebase() {
    if (!firebaseReady) return;
    const migrated = localStorage.getItem('wc_firebase_migrated');
    if (migrated) return; // already done

    console.log('Migrating localStorage to Firebase...');
    PEOPLE.forEach(person => {
        // Migrate tasks
        const tasks = localStorage.getItem('wc_planner_tasks_' + person);
        if (tasks) {
            const parsed = JSON.parse(tasks);
            if (parsed && parsed.length > 0) {
                fbRef('planner/tasks/' + person).set(parsed);
                console.log('Migrated tasks for', person, parsed.length, 'items');
            }
        }
        // Migrate checks
        const checks = localStorage.getItem('wc_planner_checks_' + person);
        if (checks) {
            const parsed = JSON.parse(checks);
            if (parsed && Object.keys(parsed).length > 0) {
                fbRef('planner/checks/' + person).set(parsed);
                console.log('Migrated checks for', person);
            }
        }
    });
    // Migrate monthly/yearly
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && (key.includes('wc_monthly_') || key.includes('wc_yearly_'))) {
            const val = localStorage.getItem(key);
            if (val) {
                const fbKey = key.replace('wc_', '').replace(/_/g, '/');
                fbRef('planner/' + fbKey).set(JSON.parse(val));
            }
        }
    }
    localStorage.setItem('wc_firebase_migrated', 'true');
    console.log('Migration complete!');
    showSyncStatus('✓ Data synced to cloud', '#4a7c5f');
}

// ── FIREBASE REAL-TIME LISTENERS ──
// When data changes on ANY device, update local cache and re-render
function setupFirebaseListeners() {
    if (!firebaseReady) return;
    PEOPLE.forEach(person => {
        // Listen for task changes
        fbRef('planner/tasks/' + person).on('value', snap => {
            const val = snap.val();
            if (val !== null) {
                localCache['tasks_' + person] = val;
                localStorage.setItem('wc_planner_tasks_' + person, JSON.stringify(val));
            }
            render();
        });
        // Listen for check changes
        fbRef('planner/checks/' + person).on('value', snap => {
            const val = snap.val();
            if (val !== null) {
                localCache['checks_' + person] = val;
                localStorage.setItem('wc_planner_checks_' + person, JSON.stringify(val));
            }
            render();
        });
    });

    // Listen for monthly/yearly lists
    fbRef('planner/monthly').on('value', snap => {
        const val = snap.val();
        if (val) {
            Object.entries(val).forEach(([k, v]) => {
                localCache[k] = v;
                localStorage.setItem('wc_' + k, JSON.stringify(v));
            });
            if (currentView === 'month') render();
        }
    });
    fbRef('planner/yearly').on('value', snap => {
        const val = snap.val();
        if (val) {
            Object.entries(val).forEach(([k, v]) => {
                localCache[k] = v;
                localStorage.setItem('wc_' + k, JSON.stringify(v));
            });
            if (currentView === 'year') render();
        }
    });
}

// Show sync status indicator
function showSyncStatus(msg, color) {
    let el = document.getElementById('sync-status');
    if (!el) {
        el = document.createElement('div');
        el.id = 'sync-status';
        el.style.cssText = 'position:fixed;bottom:70px;right:24px;font-family:Jost,sans-serif;font-size:0.6em;letter-spacing:0.1em;padding:6px 14px;border-radius:20px;z-index:200;transition:opacity 0.5s;';
        document.body.appendChild(el);
    }
    el.textContent = msg;
    el.style.background = color || '#4a7c5f';
    el.style.color = 'white';
    el.style.opacity = '1';
    setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

// Init Firebase then set up listeners
initFirebase();
if (firebaseReady) {
    // Migrate any existing localStorage data up to Firebase once
    migrateLocalStorageToFirebase();
    setupFirebaseListeners();
    showSyncStatus('✓ Synced', '#4a7c5f');
} else {
    showSyncStatus('Offline — local only', '#b87878');
}

autoReset();
render();

// Open to specific person if URL param is set e.g. wade-planner.html?person=hadley
(function() {
    const params = new URLSearchParams(window.location.search);
    const person = params.get('person');
    const validPeople = ['ryder','hadley','mom','house'];
    if (person && validPeople.includes(person)) {
        switchPerson(person);
    }
})();
</script>
