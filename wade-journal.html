<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Journal — Wade Classical</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --yellow:     #FFE033;
  --yellow-dark:#C9A800;
  --red:        #E8302A;
  --red-dark:   #A81F1A;
  --blue:       #1B5CA8;
  --blue-light: #3A7FD4;
  --blue-pale:  #D4E8FF;
  --ink:        #0D0D0D;
  --white:      #FFFEF5;
  --panel-bg:   #FFFEF5;
  --outline:    3px solid #0D0D0D;
  --outline-thick: 5px solid #0D0D0D;
  --halftone:   rgba(0,0,0,0.06);
  --green:      #1A8A3A;
  --green-light:#D4F0DC;
  --orange:     #F07020;
  --orange-pale:#FEE8D4;
  --purple:     #7030A0;
  --purple-pale:#ECD4F8;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--yellow);
  min-height: 100vh;
  overflow-x: hidden;
}

/* === HALFTONE BACKGROUND === */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, var(--halftone) 1.5px, transparent 1.5px);
  background-size: 14px 14px;
  pointer-events: none;
  z-index: 0;
}

/* === HEADER === */
.header {
  background: var(--red);
  border-bottom: var(--outline-thick);
  position: relative;
  z-index: 10;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1.5px, transparent 1.5px);
  background-size: 12px 12px;
}

.header-inner {
  max-width: 960px;
  margin: 0 auto;
  padding: 20px 20px 16px;
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.header-left {}

.comic-title {
  font-family: 'Bangers', cursive;
  font-size: clamp(2.4rem, 7vw, 4rem);
  color: var(--yellow);
  letter-spacing: 0.06em;
  line-height: 1;
  text-shadow: 4px 4px 0 var(--red-dark), -1px -1px 0 var(--ink);
  margin-bottom: 2px;
}

.comic-sub {
  font-family: 'Bangers', cursive;
  font-size: 0.95rem;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.7);
  text-transform: uppercase;
}

/* User switcher */
.user-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.writer-btn {
  font-family: 'Bangers', cursive;
  font-size: 1.1rem;
  letter-spacing: 0.08em;
  padding: 8px 18px;
  border: 3px solid var(--ink);
  border-radius: 4px;
  background: var(--white);
  color: var(--ink);
  cursor: pointer;
  transition: all 0.12s;
  box-shadow: 3px 3px 0 var(--ink);
}

.writer-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
.writer-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
.writer-btn.active { background: var(--yellow); color: var(--ink); }
.writer-btn.amanda.active { background: #FF80AA; }
.writer-btn.ryder.active  { background: #80C0FF; }
.writer-btn.hadley.active { background: #80FFAA; }

/* === MAIN === */
.main {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}

/* === PANELS (comic book page sections) === */
.panel {
  background: var(--panel-bg);
  border: var(--outline-thick);
  border-radius: 4px;
  box-shadow: 6px 6px 0 var(--ink);
  margin-bottom: 20px;
  overflow: hidden;
  position: relative;
}

/* Panel label */
.panel-label {
  font-family: 'Bangers', cursive;
  font-size: 0.8rem;
  letter-spacing: 0.2em;
  background: var(--ink);
  color: var(--yellow);
  padding: 4px 12px;
  display: inline-block;
  position: absolute;
  top: 0; left: 0;
  z-index: 2;
}

.panel-body { padding: 20px 20px 16px; }
.panel-body.with-label { padding-top: 36px; }

/* === TODAY'S PROMPT === */
.prompt-type-badge {
  font-family: 'Bangers', cursive;
  font-size: 1rem;
  letter-spacing: 0.1em;
  padding: 4px 14px;
  border: 3px solid var(--ink);
  border-radius: 4px;
  display: inline-block;
  margin-bottom: 12px;
  box-shadow: 3px 3px 0 var(--ink);
}

.badge-hotstake   { background: var(--red);    color: white; }
.badge-wouldyou   { background: var(--blue);   color: white; }
.badge-finish     { background: var(--green);  color: white; }
.badge-whatif     { background: var(--purple); color: white; }
.badge-describe   { background: var(--orange); color: white; }
.badge-rank       { background: var(--yellow-dark); color: white; }
.badge-opinion    { background: var(--red-dark); color: white; }
.badge-twotruth   { background: #555; color: white; }

.prompt-text {
  font-family: 'Comic Neue', cursive;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.4;
  margin-bottom: 8px;
}

.prompt-date {
  font-family: 'Bangers', cursive;
  font-size: 0.8rem;
  letter-spacing: 0.15em;
  color: #888;
  margin-bottom: 16px;
}

/* === SPEECH BUBBLE for prompt === */
.speech-bubble {
  position: relative;
  background: var(--blue-pale);
  border: var(--outline);
  border-radius: 16px;
  padding: 16px 20px;
  margin-bottom: 16px;
}

.speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -20px;
  left: 30px;
  width: 0;
  height: 0;
  border-left: 10px solid transparent;
  border-right: 6px solid transparent;
  border-top: 20px solid var(--ink);
}

.speech-bubble::before {
  content: '';
  position: absolute;
  bottom: -16px;
  left: 31px;
  width: 0;
  height: 0;
  border-left: 9px solid transparent;
  border-right: 5px solid transparent;
  border-top: 18px solid var(--blue-pale);
  z-index: 1;
}

/* === WRITING AREA === */
.write-area {
  width: 100%;
  font-family: 'Comic Neue', cursive;
  font-size: 1rem;
  font-weight: 400;
  padding: 14px 16px;
  border: var(--outline);
  border-radius: 4px;
  background: white;
  color: var(--ink);
  resize: vertical;
  min-height: 140px;
  outline: none;
  line-height: 1.8;
  background-image: repeating-linear-gradient(
    transparent, transparent 29px,
    #d4e0f0 29px, #d4e0f0 31px
  );
  background-attachment: local;
  transition: border-color 0.15s;
}

.write-area:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(27,92,168,0.15); }

/* Grammar issues */
.grammar-flags {
  margin-top: 10px;
  display: none;
}

.grammar-flags.show { display: block; }

.grammar-flag-header {
  font-family: 'Bangers', cursive;
  font-size: 1rem;
  letter-spacing: 0.1em;
  color: var(--orange);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.flag-item {
  background: var(--orange-pale);
  border: 2px solid var(--orange);
  border-radius: 6px;
  padding: 8px 12px;
  margin-bottom: 6px;
  font-family: 'Comic Neue', cursive;
  font-size: 0.85rem;
  color: #5a2800;
  line-height: 1.4;
}

.flag-sentence { font-weight: 700; color: var(--orange); }

/* === SUBMIT BUTTON === */
.submit-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 14px;
  flex-wrap: wrap;
}

.btn-submit {
  font-family: 'Bangers', cursive;
  font-size: 1.3rem;
  letter-spacing: 0.1em;
  padding: 12px 28px;
  background: var(--red);
  color: var(--yellow);
  border: 3px solid var(--ink);
  border-radius: 4px;
  cursor: pointer;
  box-shadow: 4px 4px 0 var(--ink);
  transition: all 0.12s;
  text-transform: uppercase;
}

.btn-submit:hover { transform: translate(-1px,-1px); box-shadow: 5px 5px 0 var(--ink); }
.btn-submit:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--ink); }

.word-count {
  font-family: 'Bangers', cursive;
  font-size: 0.9rem;
  letter-spacing: 0.1em;
  color: #888;
}

/* Already submitted state */
.already-submitted {
  background: var(--green-light);
  border: var(--outline);
  border-radius: 4px;
  padding: 16px;
  text-align: center;
}

.submitted-label {
  font-family: 'Bangers', cursive;
  font-size: 1.4rem;
  letter-spacing: 0.1em;
  color: var(--green);
  margin-bottom: 6px;
}

.submitted-text {
  font-family: 'Comic Neue', cursive;
  font-size: 0.95rem;
  color: #1a5a2a;
  line-height: 1.6;
  text-align: left;
  background: white;
  border: 2px solid var(--green);
  border-radius: 4px;
  padding: 12px;
  margin-top: 8px;
}

.btn-edit-entry {
  font-family: 'Bangers', cursive;
  font-size: 0.95rem;
  letter-spacing: 0.08em;
  padding: 7px 16px;
  background: white;
  color: var(--green);
  border: 2px solid var(--green);
  border-radius: 4px;
  cursor: pointer;
  margin-top: 10px;
  box-shadow: 2px 2px 0 var(--green);
  transition: all 0.12s;
}

.btn-edit-entry:hover { background: var(--green-light); }

/* === STREAK BADGE === */
.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--yellow);
  border: 3px solid var(--ink);
  border-radius: 4px;
  padding: 5px 12px;
  box-shadow: 3px 3px 0 var(--ink);
  margin-bottom: 16px;
}

.streak-num {
  font-family: 'Bangers', cursive;
  font-size: 1.4rem;
  letter-spacing: 0.05em;
  color: var(--red);
  line-height: 1;
}

.streak-label {
  font-family: 'Bangers', cursive;
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  color: var(--ink);
}

/* === FAMILY ENTRIES === */
.entries-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

.entry-card {
  background: var(--panel-bg);
  border: var(--outline);
  border-radius: 4px;
  box-shadow: 4px 4px 0 var(--ink);
  overflow: hidden;
  animation: popIn 0.25s ease both;
}

@keyframes popIn {
  from { opacity:0; transform:scale(0.92) rotate(-1deg); }
  to   { opacity:1; transform:scale(1) rotate(0deg); }
}

.entry-card-top {
  padding: 10px 14px 8px;
  border-bottom: 3px solid var(--ink);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.entry-author {
  font-family: 'Bangers', cursive;
  font-size: 1.1rem;
  letter-spacing: 0.08em;
  color: var(--ink);
}

.author-amanda { color: #C0006A; }
.author-ryder  { color: var(--blue); }
.author-hadley { color: var(--green); }

.entry-date-small {
  font-family: 'Bangers', cursive;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: #aaa;
}

.entry-text {
  padding: 12px 14px;
  font-family: 'Comic Neue', cursive;
  font-size: 0.88rem;
  color: var(--ink);
  line-height: 1.55;
  background: white;
  min-height: 80px;
}

.no-entry-yet {
  padding: 12px 14px;
  font-family: 'Comic Neue', cursive;
  font-style: italic;
  font-size: 0.85rem;
  color: #bbb;
  background: #fafafa;
  min-height: 60px;
}

/* === PAST PROMPTS === */
.past-prompt-row {
  border-bottom: 2px dashed #ddd;
  padding: 14px 0;
}

.past-prompt-row:last-child { border-bottom: none; }

.past-prompt-q {
  font-family: 'Comic Neue', cursive;
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--ink);
  margin-bottom: 8px;
}

.past-entries {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.past-entry {
  background: #f8f8f0;
  border-left: 4px solid var(--blue);
  padding: 8px 12px;
  border-radius: 0 6px 6px 0;
}

.past-entry.amanda { border-left-color: #C0006A; }
.past-entry.ryder  { border-left-color: var(--blue); }
.past-entry.hadley { border-left-color: var(--green); }

.past-entry-author {
  font-family: 'Bangers', cursive;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  margin-bottom: 3px;
}

.past-entry.amanda .past-entry-author { color: #C0006A; }
.past-entry.ryder  .past-entry-author { color: var(--blue); }
.past-entry.hadley .past-entry-author { color: var(--green); }

.past-entry-text {
  font-family: 'Comic Neue', cursive;
  font-size: 0.82rem;
  color: #444;
  line-height: 1.4;
}

/* === POW DECORATIONS === */
.pow-decoration {
  position: absolute;
  font-family: 'Bangers', cursive;
  letter-spacing: 0.05em;
  pointer-events: none;
  z-index: 0;
  opacity: 0.07;
}

/* === TABS === */
.tab-nav {
  display: flex;
  gap: 0;
  margin-bottom: 20px;
  border: var(--outline);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 4px 4px 0 var(--ink);
}

.tab-btn {
  flex: 1;
  font-family: 'Bangers', cursive;
  font-size: 1rem;
  letter-spacing: 0.08em;
  padding: 12px 8px;
  border: none;
  border-right: 3px solid var(--ink);
  background: var(--white);
  color: var(--ink);
  cursor: pointer;
  transition: background 0.12s;
  text-transform: uppercase;
}

.tab-btn:last-child { border-right: none; }
.tab-btn:hover { background: var(--yellow); }
.tab-btn.active { background: var(--ink); color: var(--yellow); }

/* === TOAST === */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--ink);
  color: var(--yellow);
  font-family: 'Bangers', cursive;
  font-size: 1.1rem;
  letter-spacing: 0.1em;
  padding: 12px 28px;
  border: 3px solid var(--yellow);
  border-radius: 4px;
  z-index: 200;
  transition: transform 0.3s ease;
  box-shadow: 4px 4px 0 var(--yellow-dark);
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  .header-inner { flex-direction: column; align-items: flex-start; }
  .entries-grid { grid-template-columns: 1fr; }
  .tab-btn { font-size: 0.82rem; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="comic-title">Daily Journal</div>
      <div class="comic-sub">Wade Classical · Write Every Day</div>
    </div>
    <div class="user-row">
      <button class="writer-btn amanda active" id="btn-amanda">✏️ Amanda</button>
      <button class="writer-btn ryder"  id="btn-ryder">✏️ Ryder</button>
      <button class="writer-btn hadley" id="btn-hadley">✏️ Hadley</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="tab-nav">
    <button class="tab-btn active" id="tab-today">📅 Today</button>
    <button class="tab-btn" id="tab-family">👨‍👩‍👧‍👦 Family</button>
    <button class="tab-btn" id="tab-archive">📚 Archive</button>
  </div>

  <!-- TODAY PANEL -->
  <div id="panel-today">

    <!-- Streak -->
    <div id="streak-display" style="margin-bottom:16px;"></div>

    <!-- Prompt -->
    <div class="panel">
      <div class="panel-label">TODAY'S PROMPT</div>
      <div class="panel-body with-label">
        <div id="prompt-badge"></div>
        <div class="prompt-date" id="prompt-date"></div>
        <div class="speech-bubble">
          <div class="prompt-text" id="prompt-text">Loading...</div>
        </div>
      </div>
    </div>

    <!-- Write -->
    <div class="panel" id="write-panel">
      <div class="panel-label">YOUR ANSWER</div>
      <div class="panel-body with-label">
        <div id="write-area-wrap">
          <textarea class="write-area" id="write-area" placeholder="Write your answer here... Don't worry about being perfect — just write!"></textarea>
          <div class="grammar-flags" id="grammar-flags">
            <div class="grammar-flag-header">✏️ Hey — check these sentences!</div>
            <div id="flag-list"></div>
          </div>
          <div class="submit-row">
            <button class="btn-submit" id="btn-submit">POW! Submit</button>
            <span class="word-count" id="word-count">0 words</span>
          </div>
        </div>
        <div id="submitted-wrap" style="display:none;"></div>
      </div>
    </div>

  </div>

  <!-- FAMILY PANEL -->
  <div id="panel-family" style="display:none;">
    <div class="panel">
      <div class="panel-label">TODAY'S PROMPT</div>
      <div class="panel-body with-label">
        <div id="family-prompt-text" style="font-family:'Comic Neue',cursive;font-weight:700;font-size:1rem;color:var(--ink);margin-bottom:16px;"></div>
        <div class="entries-grid" id="family-entries-grid"></div>
      </div>
    </div>
  </div>

  <!-- ARCHIVE PANEL -->
  <div id="panel-archive" style="display:none;">
    <div class="panel">
      <div class="panel-label">PAST ENTRIES</div>
      <div class="panel-body with-label">
        <div id="archive-list">
          <div style="font-family:'Comic Neue',cursive;color:#aaa;text-align:center;padding:32px;">Loading archive...</div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /main -->

<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-database-compat.min.js"></script>

<script>
// ══════════════════════════════════════════

// ══════════════════════════════════════════
const PROMPTS = [

// ══════════════════════════════════════════
// DATE / PROMPT HELPERS
// ══════════════════════════════════════════
function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getPromptForDate(dateKey) {
  // Deterministic: same date always gets same prompt
  const [y,m,d] = dateKey.split('-').map(Number);
  const seed = y * 10000 + m * 100 + d;
  // Simple hash
  const idx = ((seed * 2654435761) >>> 0) % PROMPTS.length;
  return PROMPTS[idx];
}

function formatDateDisplay(dateKey) {
  const [y,m,d] = dateKey.split('-');
  const date = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
  return date.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
}

// ══════════════════════════════════════════
// STREAK
// ══════════════════════════════════════════
async function getStreak(user) {
  try {
    const snap = await db.ref(`daily-journal/${user}`).get();
    const data = snap.val() || {};
    const keys = Object.keys(data).sort().reverse();
    if (keys.length === 0) return 0;

    let streak = 0;
    let checkDate = new Date();
    // If today is not yet submitted, start from yesterday
    if (!data[getTodayKey()]) checkDate.setDate(checkDate.getDate() - 1);

    for (let i = 0; i < 365; i++) {
      const key = `${checkDate.getFullYear()}-${String(checkDate.getMonth()+1).padStart(2,'0')}-${String(checkDate.getDate()).padStart(2,'0')}`;
      if (data[key]) { streak++; checkDate.setDate(checkDate.getDate() - 1); }
      else break;
    }
    return streak;
  } catch(e) { return 0; }
}

// ══════════════════════════════════════════
// GRAMMAR CHECK
// ══════════════════════════════════════════
function checkGrammar(text) {
  const issues = [];
  if (!text.trim()) return issues;

  // Split into sentences
  const sentences = text.match(/[^.!?]+[.!?]*/g) || [text];

  sentences.forEach((raw, i) => {
    const s = raw.trim();
    if (!s || s.length < 3) return;

    // Check capital first letter
    const firstChar = s.replace(/^["'"'(]/, '')[0];
    if (firstChar && firstChar !== firstChar.toUpperCase()) {
      issues.push({ sentence: s, issue: 'Needs a capital letter at the start' });
    }

    // Check ends with punctuation
    const lastChar = s[s.length - 1];
    if (!['.', '!', '?'].includes(lastChar)) {
      const alreadyFlagged = issues.find(x => x.sentence === s);
      if (!alreadyFlagged) {
        issues.push({ sentence: s, issue: 'Missing punctuation at the end (. ! ?)' });
      } else {
        alreadyFlagged.issue += ' and missing punctuation at the end';
      }
    }
  });

  return issues;
}

function showGrammarFlags(issues) {
  const wrap  = document.getElementById('grammar-flags');
  const list  = document.getElementById('flag-list');
  if (issues.length === 0) { wrap.classList.remove('show'); return; }

  list.innerHTML = issues.map(issue => `
    <div class="flag-item">
      <span class="flag-sentence">"${escHtml(issue.sentence.substring(0,60))}${issue.sentence.length > 60 ? '...' : ''}"</span><br>
      → ${issue.issue}
    </div>
  `).join('');
  wrap.classList.add('show');
}

// ══════════════════════════════════════════
// SUBMIT
// ══════════════════════════════════════════
async function submitEntry() {
  const text = document.getElementById('write-area').value.trim();
  if (!text) { showToast('Write something first!'); return; }

  // Grammar check
  const issues = checkGrammar(text);
  showGrammarFlags(issues);

  // Save regardless
  const entry = {
    text,
    prompt: _todayPrompt.text,
    promptType: _todayPrompt.type,
    submittedAt: Date.now(),
  };

  await db.ref(`daily-journal/${_user}/${_todayKey}`).set(entry);

  if (issues.length > 0) {
    showToast('Saved! But check those sentences ✏️');
  } else {
    showToast('KAPOW! Entry saved! 💥');
  }

  showSubmittedState(text);

  // Update streak display
  const streak = await getStreak(_user);
  const streakEl = document.getElementById('streak-display');
  if (streak > 0) {
    streakEl.innerHTML = `
      <div class="streak-badge">
        <span class="streak-num">${streak}</span>
        <span class="streak-label">DAY STREAK 🔥</span>
      </div>`;
  }
}

            : userEntries.map(e => `
              <div class="past-entry ${e.user}">
                <div class="past-entry-author">${e.user.charAt(0).toUpperCase() + e.user.slice(1)}</div>
                <div class="past-entry-text">${escHtml(e.text)}</div>
              </div>`).join('')}
        </div>
      `;
      archiveEl.appendChild(row);
    });
  } catch(e) {
    archiveEl.innerHTML = '<div style="font-family:\'Comic Neue\',cursive;color:#aaa;padding:20px;text-align:center;">Could not load archive.</div>';
  }
}

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function switchTab(tab) {
  _tab = tab;
  ['today','family','archive'].forEach(t => {
    document.getElementById('panel-' + t).style.display = t === tab ? 'block' : 'none';
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'today')   renderToday();
  if (tab === 'family')  renderFamily();
  if (tab === 'archive') renderArchive();
}

// ══════════════════════════════════════════
// USER SWITCHING
// ══════════════════════════════════════════
function switchUser(user) {
  _user = user;
  ['amanda','ryder','hadley'].forEach(u => {
    document.getElementById('btn-' + u).classList.toggle('active', u === user);
  });
  if (_tab === 'today') renderToday();
}

// ══════════════════════════════════════════
// WORD COUNT
// ══════════════════════════════════════════
document.getElementById('write-area').addEventListener('input', () => {
  const text = document.getElementById('write-area').value.trim();
  const words = text ? text.split(/\s+/).filter(w => w.length > 0).length : 0;
  document.getElementById('word-count').textContent = `${words} word${words !== 1 ? 's' : ''}`;
  // Clear grammar flags while typing
  document.getElementById('grammar-flags').classList.remove('show');
});

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
document.getElementById('btn-amanda').addEventListener('click', () => switchUser('amanda'));
document.getElementById('btn-ryder').addEventListener('click',  () => switchUser('ryder'));
document.getElementById('btn-hadley').addEventListener('click', () => switchUser('hadley'));
document.getElementById('btn-submit').addEventListener('click', submitEntry);
document.getElementById('tab-today').addEventListener('click',   () => switchTab('today'));
document.getElementById('tab-family').addEventListener('click',  () => switchTab('family'));
document.getElementById('tab-archive').addEventListener('click', () => switchTab('archive'));

// URL param
const urlUser = new URLSearchParams(window.location.search).get('user');
if (urlUser && ['amanda','ryder','hadley'].includes(urlUser)) {
  _user = urlUser;
  document.querySelectorAll('.writer-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + urlUser).classList.add('active');
}

renderToday();
</script>
</body>
</html>
