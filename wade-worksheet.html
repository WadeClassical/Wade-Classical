  garden: {
    reading: [
      { title:'The Sleepy Seed', passage:'A tiny seed was planted in the dark soft soil. It slept all through the cold days. Then warm rain came and the sun shone bright. The seed woke up! It pushed a tiny green shoot up toward the light. Day by day it grew taller. One morning a yellow flower opened its petals for the very first time.', questions:[{q:'Where was the tiny seed planted?',lines:1},{q:'What made the seed wake up and start to grow?',lines:1},{q:'How do you think the flower felt when it opened for the first time?',lines:2}] },
      { title:'Bella the Bumblebee', passage:'Bella the bumblebee visited every flower in the garden. She collected sweet nectar in her tiny legs. The roses gave her red pollen. The daisies gave her yellow pollen. By afternoon her legs were so full she could barely fly. She buzzed slowly home to the hive and made the sweetest honey.', questions:[{q:'What did Bella collect from the flowers?',lines:1},{q:'Why could Bella barely fly in the afternoon?',lines:1},{q:'What do you think the honey tasted like?',lines:2}] },
      { title:'The Butterfly Garden', passage:'Grandma had a special garden full of flowers that butterflies loved. Every summer blue and orange butterflies came to visit. A girl named June sat very still on the garden bench. She held out her finger. A blue butterfly landed right on it! She held her breath. It stayed for a whole minute before flying away.', questions:[{q:'Why did butterflies come to Grandma\'s garden?',lines:1},{q:'What did June do to get the butterfly to land on her?',lines:1},{q:'How would you feel if a butterfly landed on your finger?',lines:2}] },
      { title:'The Garden Contest', passage:'Every summer the neighbors had a garden contest. Old Mr. Lee grew the tallest sunflowers on the street. But this year a girl named Rosa had been watering her garden every single day. Her roses were the biggest anyone had ever seen. Mr. Lee smiled and said, "You beat me fair and square, young one."', questions:[{q:'What did Mr. Lee grow every year?',lines:1},{q:'What did Rosa do to win the contest?',lines:1},{q:'What does this story teach about hard work?',lines:2}] },
      { title:'Rain on the Roses', passage:'After three hot dry weeks rain finally fell on the garden. The roses lifted their heads. The daisies drank deeply. Even the little snail came out from under his leaf. The girl who tended the garden ran outside in her boots. She watched every drop fall on every petal. "Thank you, rain," she whispered.', questions:[{q:'What had the weather been like before the rain?',lines:1},{q:'What did the little snail do when the rain came?',lines:1},{q:'Why do you think the girl thanked the rain?',lines:2}] },
      { title:'The Worm\'s Work', passage:'Under the garden a thousand worms were at work. They tunneled through the soil making it soft. They ate dead leaves and turned them into food for the plants. A boy named Eli watched a worm wiggle between his fingers. "You are doing more work than anyone can see," he told it. The worm did not reply but kept working.', questions:[{q:'What were the worms doing under the garden?',lines:1},{q:'What did Eli say to the worm?',lines:1},{q:'Can you think of someone who works hard in ways you don\'t usually notice?',lines:2}] },
      { title:'The Tomato Race', passage:'Every summer Grandpa grew tomatoes on one side of the fence and the boy next door grew tomatoes on his side. Each counted their tomatoes every Sunday. By August they had grown so many that they traded jars of sauce across the fence each week. "We both won," said Grandpa.', questions:[{q:'What did Grandpa and his neighbor grow?',lines:1},{q:'What did they trade across the fence?',lines:1},{q:'What does it mean to say "we both won"?',lines:2}] },
      { title:'The Sunflower Surprise', passage:'A girl planted one sunflower seed by the back fence in spring. By midsummer it had grown taller than the fence — taller than the shed — taller than her papa! It had a face as wide as a dinner plate and hundreds of seeds in the middle. Birds came from all over the neighborhood to eat from it.', questions:[{q:'When did the girl plant the sunflower seed?',lines:1},{q:'How tall did the sunflower grow?',lines:1},{q:'What would you do with a sunflower as tall as a house?',lines:2}] },
      { title:'The Herb Garden', passage:'Mama grew herbs in small pots on the kitchen windowsill. Basil and mint and rosemary. The whole kitchen smelled wonderful. When she cooked she pinched a leaf and added it to the pot. Her daughter helped water the pots each morning. One day she snipped her first herb herself and added it to the soup. It tasted perfect.', questions:[{q:'Where did Mama grow her herbs?',lines:1},{q:'What did the daughter do to help?',lines:1},{q:'What is your favorite smell from the kitchen?',lines:2}] },
      { title:'The Gardener\'s Gloves', passage:'Nana\'s old garden gloves were brown with years of soil. They hung by the back door every evening. Her granddaughter wore them once — they swallowed her small hands completely. She helped Nana plant bulbs all afternoon. When they were done Nana said, "Someday these gloves will fit you." The granddaughter hoped so.', questions:[{q:'What were Nana\'s gloves like?',lines:1},{q:'What did Nana and her granddaughter plant?',lines:1},{q:'What is something of a grown-up\'s you hope to do someday?',lines:2}] },
      { title:'The Strawberry Patch', passage:'Behind the old stone wall was a strawberry patch that the family had tended for thirty years. Every June the children went out early in the morning before the birds to pick the reddest berries. They ate half and brought half inside. Mama made jam that she gave to everyone on the street as a gift.', questions:[{q:'Where was the strawberry patch?',lines:1},{q:'What did Mama make with the strawberries?',lines:1},{q:'Why did the children go out early before the birds?',lines:2}] },
      { title:'The Garden After Rain', passage:'After a big summer rainstorm the garden was a new place. Every leaf had a drop of water on its tip. The air smelled like earth and green. Worms came up from the soil. The tomatoes looked bigger than they had yesterday. The sunflowers turned their faces to the returning sun. Everything looked grateful.', questions:[{q:'What did every leaf have after the rain?',lines:1},{q:'What did the sunflowers do when the sun came back?',lines:1},{q:'What is your favorite thing about a garden after rain?',lines:2}] },
      { title:'The Pea Tunnel', passage:'Papa built a tunnel of poles and netting for the pea vines to climb. By June the tunnel was covered in green leaves and white flowers. The children could walk through it as if it were a secret passageway. When the peas were ready they picked and ate them right off the vine. Nothing tasted better.', questions:[{q:'What did Papa build for the pea vines?',lines:1},{q:'What did the children do when the peas were ready?',lines:1},{q:'Have you ever eaten a vegetable straight from the garden?',lines:2}] },
      { title:'The Garden at Night', passage:'Most people never saw the garden at night. But some things only happened after dark. Moths came to drink from the white flowers. Toads hopped out to hunt. A family of hedgehogs trotted across the grass. The garden was just as busy at night as it was in the day — only different workers were on the job.', questions:[{q:'What came to the white flowers at night?',lines:1},{q:'What came out to hunt at night?',lines:1},{q:'What do you think happens in your backyard at night?',lines:2}] },
      { title:'The Last Tomato', passage:'At the end of summer there was one tomato left on the vine. It was small and a little lopsided. Everyone had forgotten about it. A girl found it one October morning, still red, still warm from the thin autumn sun. She ate it right there in the garden. It tasted like the whole summer.', questions:[{q:'When did the girl find the last tomato?',lines:1},{q:'How did the tomato taste?',lines:1},{q:'Have you ever eaten something that tasted like a memory?',lines:2}] },
      { title:'The Bees Move In', passage:'One spring morning a swarm of bees moved into the hive box that the family had set up in the corner of the garden two years ago. They had almost given up on it. The girl watched from the window as thousands of bees found their new home. That summer the apple tree made more apples than ever before.', questions:[{q:'What moved into the hive box?',lines:1},{q:'What happened to the apple tree that summer?',lines:1},{q:'Why do you think bees help the apple tree make more apples?',lines:2}] },
      { title:'The Forgotten Bulb', passage:'In autumn the family planted tulip bulbs in every flower bed. One got missed and rolled under the garden bench. In spring all the tulips bloomed but there was one extra — pushing up through the gravel under the bench in the most unexpected spot. It was the brightest red of all.', questions:[{q:'What did the family plant in autumn?',lines:1},{q:'Where did the forgotten bulb grow?',lines:1},{q:'What does this story tell you about flowers?',lines:2}] },
      { title:'Garden Helpers', passage:'The best garden had helpers it could not live without. Bees carried pollen from flower to flower. Worms loosened the soil. Ladybugs ate the bugs that hurt the plants. The gardener thanked each of them in her heart every morning when she walked the rows. A garden, she believed, was really a community.', questions:[{q:'What did the bees do to help the garden?',lines:1},{q:'What did the ladybugs do?',lines:1},{q:'Who are the helpers in your family or class community?',lines:2}] },
      { title:'The Mint That Took Over', passage:'Mama planted one small pot of mint. By summer it had spread over three flower beds, through the fence, and into the lawn. "I only planted one plant!" said Mama. Papa laughed. The children loved it. They picked leaves and put them in their water glasses. The whole garden smelled of mint all summer long.', questions:[{q:'What did Mama plant?',lines:1},{q:'What happened to the mint by summer?',lines:1},{q:'Have you ever seen a plant grow faster than expected?',lines:2}] },
      { title:'The Compost Pile', passage:'At the back of the garden was a big compost pile. Every day the family added vegetable scraps and old leaves. By spring it had turned into the richest darkest soil. The gardener spread it over every bed. Every plant that year grew bigger and stronger than the year before. "We fed the garden," she said, "and the garden fed us."', questions:[{q:'What did the family add to the compost pile?',lines:1},{q:'What did the compost pile turn into?',lines:1},{q:'What do you think "the garden fed us" means?',lines:2}] },
      { title:'The Sunflower Seed Trade', passage:'A girl grew sunflowers and dried their seeds every autumn. She sorted them into small paper envelopes. She traded them with neighbors for tomato seeds and bean seeds and flower seeds she had never grown before. By the third year her garden had plants from twelve different neighbors. Every garden in the street was connected.', questions:[{q:'What did the girl do with her sunflower seeds?',lines:1},{q:'How many neighbors\' plants did she have by the third year?',lines:1},{q:'Why is it good to share things with your neighbors?',lines:2}] },
      { title:'The Very Old Rose Bush', passage:'The rose bush at the corner of the garden had been there for sixty years. It had been planted by a great-grandmother no one had ever met. Every June it bloomed deep red. The family looked at it and thought of her. They did not know her face but they knew she had loved roses. That felt like enough.', questions:[{q:'How long had the rose bush been in the garden?',lines:1},{q:'What did the family think about when the rose bloomed?',lines:1},{q:'What is something in your home or garden that has a long history?',lines:2}] },
      { title:'The Garden Journal', passage:'A girl kept a journal of her garden every year. She pressed flowers in it and wrote the date each one bloomed. She drew pictures of bugs she found. By the time she was ten the journal had six volumes. Her teacher said it was the most interesting book she had ever read. The girl already knew that.', questions:[{q:'What did the girl keep in her journal?',lines:1},{q:'How many volumes did the journal have when she was ten?',lines:1},{q:'What would you put in a nature journal?',lines:2}] },
      { title:'The Frog in the Garden', passage:'A frog moved into the garden pond in early spring. All summer he sat on the lily pad and watched the garden grow. He ate every mosquito he could catch. The gardener was delighted. She left a stepping stone just for him beside the pond. He sat on it most mornings like a king surveying his kingdom.', questions:[{q:'Where did the frog live in the garden?',lines:1},{q:'What did the frog eat?',lines:1},{q:'Why was the gardener happy to have the frog?',lines:2}] },
      { title:'The Best Pumpkin', passage:'Every child in the family grew one pumpkin plant each year. They watered them and measured them every Sunday. In October they cut them and lined them up on the porch steps from smallest to biggest. This year the smallest child grew the biggest pumpkin. She had talked to it every single day.', questions:[{q:'What did the children grow every year?',lines:1},{q:'What did the smallest child do to grow the biggest pumpkin?',lines:1},{q:'Do you think talking to plants helps them grow?',lines:2}] },
      { title:'The Lavender Row', passage:'A long row of lavender grew along the sunny path. In summer it buzzed with bees all day long. The girl liked to brush her hand along the tops and smell her palm afterwards. The smell made her think of her grandmother\'s kitchen where lavender had always dried in bunches from the ceiling.', questions:[{q:'What grew along the sunny path?',lines:1},{q:'What did the girl do with the lavender?',lines:1},{q:'Is there a smell that makes you think of someone you love?',lines:2}] },
      { title:'Night Blooming Flowers', passage:'Most flowers open in the daytime. But some of Grandma\'s garden flowers only opened at night. The moon flowers opened just after sunset, big and white and luminous. The evening primrose opened in the afternoon and stayed open all night. Grandma liked to sit on the porch in the dark and smell them. "Night flowers," she said, "are for people who actually pay attention."', questions:[{q:'When did the moon flowers open?',lines:1},{q:'What did Grandma do in the evenings?',lines:1},{q:'What does "people who actually pay attention" mean?',lines:2}] },

// ─── Pick content from banks ──────────────────────────────────────────────────
function getContent(theme) {
  const bank = CONTENT_BANKS[theme] || CONTENT_BANKS.woodland;
  return {
    reading: pick(bank.reading, 1)[0],
    draw:    pick(bank.draw, 1)[0],
    grammar: pick(bank.grammar, 1)[0].map(g => ({ ...g, word_bank: shuffle([...g.word_bank]) }))
  };
}

// ─── Generate Worksheet ───────────────────────────────────────────────────────
function generateWorksheet() {
  const btn  = document.getElementById('gen-btn');
  const bar  = document.getElementById('loading-bar');
  const msg  = document.getElementById('loading-msg');
  const fill = document.getElementById('loading-fill');

  const mathLevel     = document.getElementById('math-level').value;
  const mathCount     = parseInt(document.getElementById('math-count').value);
  const spellingList  = document.getElementById('spelling-list').value;
  const spellingCount = parseInt(document.getElementById('spelling-count').value);
  const theme         = document.getElementById('theme').value;

  const includeMath     = document.getElementById('toggle-math').classList.contains('checked');
  const includeSpelling = document.getElementById('toggle-spelling').classList.contains('checked');
  const includeReading  = document.getElementById('toggle-reading').classList.contains('checked');
  const includeDraw     = document.getElementById('toggle-draw').classList.contains('checked');
  const includeGrammar  = document.getElementById('toggle-grammar').classList.contains('checked');

  btn.disabled = true;
  bar.classList.add('show');
  msg.classList.add('show');
  msg.textContent = '✨ Creating Hadley\'s worksheet...';

  let progress = 0;
  const fillInterval = setInterval(() => {
    progress = Math.min(progress + rand(8, 15), 95);
    fill.style.width = progress + '%';
  }, 120);

  setTimeout(() => {
    clearInterval(fillInterval);
    fill.style.width = '100%';

    const spellingWords = pick(SPELLING_BANKS[spellingList], spellingCount);
    const themeData     = THEMES[theme];
    const aiContent     = getContent(theme);
    const mathProblems  = includeMath ? generateMathProblems(mathLevel, mathCount) : [];

    renderWorksheet({
      date: new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' }),
      theme: themeData,
      sections: { math: includeMath, spelling: includeSpelling, reading: includeReading, draw: includeDraw, grammar: includeGrammar },
      mathProblems,
      spellingWords,
      aiContent
    });

    btn.disabled = false;
    bar.classList.remove('show');
    msg.classList.remove('show');
    fill.style.width = '0%';
  }, 900);
}

// ─── Render Worksheet HTML ─────────────────────────────────────────────────────
function renderWorksheet({ date, theme, sections, mathProblems, spellingWords, aiContent }) {
  let sectionNum = 1;
  let html = '';

  // Header
  html += `
    <div class="ws-border-top">🌿 🍄 🦋 🌿 🍄 🦋 🌿 🍄 🦋 🌿 🍄 🦋 🌿</div>
    <div class="ws-header">
      <div class="ws-title-block">
        <h1>${theme.emoji} Hadley's Daily Worksheet</h1>
        <p>${date} · Grade 1</p>
      </div>
      <div class="ws-name-box">
        <div class="ws-name-line">
          <span>Name:</span><div class="ws-line"></div>
        </div>
        <div class="ws-name-line">
          <span>Score:</span><div class="ws-line" style="width:80px"></div>
        </div>
      </div>
    </div>`;

  // ── MATH ──
  if (sections.math && mathProblems.length > 0) {
    html += `<div class="ws-section">
      <div class="ws-section-header">
        <div class="ws-section-num">${sectionNum++}</div>
        <span class="ws-section-icon">🔢</span>
        <div class="ws-section-title">Math Practice</div>
        <div class="ws-section-points">___ / ${mathProblems.length}</div>
      </div>
      <div class="math-grid">`;
    mathProblems.forEach(p => {
      html += `<div class="math-problem">
        <div class="math-equation">${p.a} ${p.op} ${p.b} =</div>
        <div class="math-answer-line"></div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // ── SPELLING ──
  if (sections.spelling && spellingWords.length > 0) {
    html += `<div class="ws-section">
      <div class="ws-section-header">
        <div class="ws-section-num">${sectionNum++}</div>
        <span class="ws-section-icon">✏️</span>
        <div class="ws-section-title">Spelling Words</div>
        <div class="ws-section-points">Trace · Write · Write again</div>
      </div>`;
    spellingWords.forEach(word => {
      const letters = word.split('');
      html += `<div class="spelling-word-row">
        <div class="spelling-word">${word}</div>
        <div class="trace-boxes">`;
      letters.forEach(l => {
        html += `<div class="trace-box">${l}</div>`;
      });
      html += `</div>
        <div style="flex:1;display:flex;flex-direction:column;gap:10px;margin-left:10px;">
          <div style="border-bottom:1.5px solid #aaa;height:32px;position:relative;">
            <div style="position:absolute;bottom:8px;left:0;right:0;border-bottom:1px dashed #e0e0e0;"></div>
          </div>
          <div style="border-bottom:1.5px solid #aaa;height:32px;position:relative;">
            <div style="position:absolute;bottom:8px;left:0;right:0;border-bottom:1px dashed #e0e0e0;"></div>
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // ── READING COMPREHENSION ──
  if (sections.reading && aiContent.reading) {
    const r = aiContent.reading;
    html += `<div class="ws-section">
      <div class="ws-section-header">
        <div class="ws-section-num">${sectionNum++}</div>
        <span class="ws-section-icon">📖</span>
        <div class="ws-section-title">Reading Comprehension</div>
        <div class="ws-section-points">___ / 3</div>
      </div>
      <div class="reading-passage">
        <div class="passage-title">${r.title}</div>
        ${r.passage}
      </div>`;
    r.questions.forEach((q, i) => {
      html += `<div class="reading-question">
        <p>${i + 1}. ${q.q}</p>
        ${Array(q.lines).fill('<div class="answer-line"></div>').join('')}
      </div>`;
    });
    html += `</div>`;
  }

  // ── DRAW & LABEL ──
  if (sections.draw && aiContent.draw) {
    const d = aiContent.draw;
    html += `<div class="ws-section">
      <div class="ws-section-header">
        <div class="ws-section-num">${sectionNum++}</div>
        <span class="ws-section-icon">🎨</span>
        <div class="ws-section-title">Draw & Label</div>
      </div>
      <p style="font-size:13px;color:#555;margin-bottom:8px;font-style:italic;">${d.prompt}</p>
      <div class="draw-box">Draw here 🖍️</div>
      <div class="draw-labels">`;
    d.labels.forEach(label => {
      html += `<div class="draw-label-item">
        <span style="font-size:12px;font-weight:700;color:#444;">${label}:</span>
        <div class="draw-label-line"></div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // ── GRAMMAR ──
  if (sections.grammar && aiContent.grammar) {
    html += `<div class="ws-section">
      <div class="ws-section-header">
        <div class="ws-section-num">${sectionNum++}</div>
        <span class="ws-section-icon">🌱</span>
        <div class="ws-section-title">Fill in the Blank</div>
        <div class="ws-section-points">___ / ${aiContent.grammar.length}</div>
      </div>`;
    aiContent.grammar.forEach((g, i) => {
      const sentence = g.sentence.replace(/___/g, '<span class="blank"></span>');
      const wb = shuffle(g.word_bank);
      html += `<div class="reading-question">
        <div class="grammar-sentence">${i + 1}. ${sentence}</div>
        <div class="word-bank"><span>Word Bank:</span> &nbsp; ${wb.join(' &nbsp;·&nbsp; ')}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Footer
  html += `
    <div class="ws-footer">
      <div class="star-box">
        <label>How did I do?</label>
        <span class="star">⭐</span>
        <span class="star">⭐</span>
        <span class="star">⭐</span>
      </div>
      <div class="ws-score-box">Score: _____ / ${sectionNum - 1} sections</div>
    </div>
    <div class="ws-deco">🌿 Wade Classical Homeschool · ${new Date().getFullYear()} 🌿</div>`;

  document.getElementById('ws-inner').innerHTML = html;

  // Show worksheet, hide generator
  document.getElementById('generator-screen').style.display = 'none';
  document.getElementById('worksheet').classList.add('visible');
  window.scrollTo(0, 0);
}

</script>
