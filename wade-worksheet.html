<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hadley's Daily Worksheet</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Caveat:wght@400;600;700&family=Patrick+Hand&family=Crimson+Pro:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════
   GENERATOR SCREEN (on-screen)
══════════════════════════ */
:root {
  --forest: #2d4a2d;
  --moss:   #4a7a4a;
  --sage:   #7aaa7a;
  --fern:   #a8c8a8;
  --cream:  #faf6ee;
  --gold:   #c8922a;
  --rose:   #c87878;
  --ink:    #1a2a1a;
  --muted:  #6a7a6a;
  --shadow: rgba(45,74,45,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
}

/* Generator UI */
.generator-screen {
  max-width: 700px; margin: 0 auto;
  padding: 32px 24px;
}

.gen-header {
  text-align: center; margin-bottom: 32px;
}

.gen-title {
  font-size: 32px; font-weight: 800; color: var(--forest);
  margin-bottom: 4px;
}

.gen-title span { color: var(--moss); }

.gen-subtitle {
  font-size: 15px; color: var(--muted);
}

.gen-date {
  font-size: 13px; color: var(--muted);
  background: rgba(74,122,74,0.1);
  border: 1px solid rgba(74,122,74,0.2);
  display: inline-block; padding: 4px 14px; border-radius: 20px;
  margin-top: 8px;
}

/* Settings panel */
.settings-card {
  background: white;
  border: 1px solid rgba(74,122,74,0.2);
  border-radius: 16px; padding: 24px;
  margin-bottom: 20px;
  box-shadow: 0 2px 12px var(--shadow);
}

.settings-title {
  font-size: 13px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--moss);
  margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
}

.settings-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.setting-item {
  display: flex; flex-direction: column; gap: 6px;
}

.setting-item label {
  font-size: 12px; font-weight: 700;
  color: var(--forest); text-transform: uppercase; letter-spacing: 0.5px;
}

.setting-item select,
.setting-item input[type=number] {
  padding: 8px 12px; border-radius: 8px;
  border: 1.5px solid rgba(74,122,74,0.25);
  font-family: 'Nunito', sans-serif; font-size: 14px;
  color: var(--ink); background: white;
  outline: none; transition: border-color 0.2s;
}

.setting-item select:focus,
.setting-item input:focus { border-color: var(--moss); }

/* Section toggles */
.section-toggles {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}

.section-toggle {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 8px;
  border: 1.5px solid rgba(74,122,74,0.2);
  cursor: pointer; transition: all 0.2s; background: white;
  font-size: 13px; font-weight: 600; color: var(--muted);
}

.section-toggle input[type=checkbox] { display: none; }

.section-toggle.checked {
  background: rgba(74,122,74,0.1);
  border-color: var(--moss);
  color: var(--forest);
}

.section-toggle .toggle-icon { font-size: 18px; }

/* Generate button */
.gen-btn {
  width: 100%; padding: 18px;
  background: linear-gradient(135deg, var(--forest), var(--moss));
  color: white; border: none; border-radius: 16px;
  font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 800;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 16px var(--shadow);
  display: flex; align-items: center; justify-content: center; gap: 10px;
}

.gen-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--shadow); }
.gen-btn:disabled { opacity: 0.6; cursor: default; transform: none; }

/* Loading */
.loading-bar {
  width: 100%; height: 6px; background: rgba(74,122,74,0.15);
  border-radius: 3px; overflow: hidden; margin-top: 12px; display: none;
}
.loading-bar.show { display: block; }
.loading-fill {
  height: 100%; width: 0%; background: linear-gradient(90deg, var(--moss), var(--sage));
  border-radius: 3px; transition: width 0.4s ease;
  animation: loadPulse 1.5s ease-in-out infinite;
}
@keyframes loadPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.loading-msg {
  text-align: center; font-size: 14px; color: var(--muted);
  margin-top: 8px; display: none;
}
.loading-msg.show { display: block; }

/* ══════════════════════════
   PRINT STYLESHEET
══════════════════════════ */
@media print {
  .generator-screen, .print-actions, .no-print { display: none !important; }
  body { background: white; }
  .worksheet { display: block !important; }
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}

/* ══════════════════════════
   WORKSHEET (print + screen)
══════════════════════════ */
.worksheet {
  display: none;
  max-width: 750px; margin: 0 auto;
  background: white;
  font-family: 'Nunito', sans-serif;
}

.worksheet.visible { display: block; }

/* Print actions bar */
.print-actions {
  display: flex; gap: 10px; justify-content: center;
  padding: 16px 24px; background: var(--fern);
  border-bottom: 2px solid var(--sage);
}

.print-btn {
  padding: 10px 24px; border-radius: 10px; border: none;
  font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
}

.print-btn.primary {
  background: var(--forest); color: white;
}
.print-btn.primary:hover { background: var(--moss); }

.print-btn.secondary {
  background: white; color: var(--forest);
  border: 2px solid var(--forest);
}
.print-btn.secondary:hover { background: var(--fern); }

/* Worksheet inner */
.ws-inner {
  padding: 32px 40px;
  border: 3px solid #1a2a1a;
}

/* Worksheet header */
.ws-header {
  display: flex; justify-content: space-between; align-items: flex-end;
  border-bottom: 2px solid #1a2a1a; padding-bottom: 10px; margin-bottom: 20px;
}

.ws-title-block h1 {
  font-size: 22px; font-weight: 800; color: #1a2a1a;
  font-family: 'Nunito', sans-serif;
}

.ws-title-block p {
  font-size: 12px; color: #555; margin-top: 2px;
}

.ws-name-box {
  text-align: right; font-size: 13px; color: #333;
}

.ws-name-line {
  display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
  justify-content: flex-end;
}

.ws-line {
  width: 160px; height: 1px; background: #1a2a1a;
}

/* Woodland border decoration */
.ws-border-top {
  font-size: 11px; text-align: center; letter-spacing: 6px;
  color: #888; margin-bottom: 8px; opacity: 0.6;
}

/* Section */
.ws-section {
  margin-bottom: 22px; page-break-inside: avoid;
}

.ws-section-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}

.ws-section-num {
  width: 24px; height: 24px; border-radius: 50%;
  background: #1a2a1a; color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; flex-shrink: 0;
}

.ws-section-title {
  font-size: 14px; font-weight: 800; color: #1a2a1a;
  text-transform: uppercase; letter-spacing: 1px;
}

.ws-section-icon { font-size: 16px; }

.ws-section-points {
  margin-left: auto; font-size: 11px; color: #888;
  border: 1px solid #ccc; padding: 1px 7px; border-radius: 20px;
}

/* Math section */
.math-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px 20px;
}

.math-problem {
  display: flex; flex-direction: column; align-items: center;
}

.math-equation {
  font-size: 20px; font-weight: 700; color: #1a2a1a;
  font-family: 'Nunito', sans-serif; margin-bottom: 4px;
  text-align: center;
}

.math-answer-line {
  width: 60px; height: 1.5px; background: #1a2a1a;
  margin-top: 4px;
}

/* Spelling section */
.spelling-word-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 14px;
}

.spelling-word {
  min-width: 90px; font-family: 'Patrick Hand', cursive;
  font-size: 22px; color: #1a2a1a; font-weight: 400;
}

.trace-boxes {
  display: flex; gap: 2px;
}

.trace-box {
  width: 36px; height: 40px;
  border: 1.5px solid #ccc;
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  font-family: 'Patrick Hand', cursive;
  font-weight: 400;
  /* Hollow/dotted trace effect */
  color: transparent;
  -webkit-text-stroke: 1.5px #c8c8c8;
  text-stroke: 1.5px #c8c8c8;
  letter-spacing: 0;
  line-height: 1;
  position: relative;
}

/* Dotted baseline in trace box */
.trace-box::after {
  content: '';
  position: absolute; bottom: 6px; left: 4px; right: 4px;
  height: 1px; background: #e0e0e0; border-bottom: 1px dashed #ddd;
}

.write-line {
  flex: 1; height: 1.5px; background: #ccc; margin-top: 14px;
  border-bottom: 1.5px solid #aaa;
}

.write-line-label {
  font-size: 10px; color: #aaa; align-self: flex-end; margin-bottom: -14px;
}

/* Reading comprehension */
.reading-passage {
  background: #f8f8f8; border-left: 3px solid #1a2a1a;
  padding: 12px 14px; margin-bottom: 12px;
  font-size: 14px; line-height: 1.8; color: #222;
  border-radius: 0 6px 6px 0;
  font-family: 'Crimson Pro', serif;
}

.reading-passage .passage-title {
  font-weight: 700; font-size: 13px; color: #1a2a1a;
  font-family: 'Nunito', sans-serif; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 6px;
}

.reading-question {
  margin-bottom: 14px;
}

.reading-question p {
  font-size: 13px; font-weight: 600; color: #1a2a1a; margin-bottom: 4px;
}

.answer-line {
  width: 100%; height: 1.5px; background: #ccc; margin: 6px 0;
  border-bottom: 1.5px solid #aaa;
}

.answer-line + .answer-line { margin-top: 12px; }

/* Draw & label */
.draw-box {
  border: 1.5px solid #aaa; border-radius: 8px;
  width: 100%; height: 130px;
  display: flex; align-items: center; justify-content: center;
  color: #ccc; font-size: 12px;
}

.draw-labels {
  display: flex; gap: 16px; margin-top: 8px; flex-wrap: wrap;
}

.draw-label-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: #555;
}

.draw-label-line {
  width: 80px; height: 1px; background: #aaa; border-bottom: 1px solid #aaa;
}

/* Grammar fill-in-blank */
.grammar-sentence {
  font-size: 15px; line-height: 2.2; color: #1a2a1a;
  margin-bottom: 8px; font-family: 'Crimson Pro', serif;
}

.blank {
  display: inline-block;
  border-bottom: 1.5px solid #1a2a1a;
  min-width: 90px;
  margin: 0 4px;
  vertical-align: bottom;
}

/* Word bank */
.word-bank {
  background: #f0f0f0; border: 1.5px dashed #aaa;
  border-radius: 6px; padding: 8px 12px;
  font-size: 13px; color: #555; margin-top: 8px;
}

.word-bank span { font-weight: 700; }

/* Star rating box */
.ws-footer {
  border-top: 1.5px solid #ccc; padding-top: 10px; margin-top: 16px;
  display: flex; justify-content: space-between; align-items: center;
}

.star-box {
  display: flex; gap: 6px; align-items: center;
}

.star-box label { font-size: 12px; color: #888; }

.star { font-size: 20px; color: #ddd; }

.ws-score-box {
  font-size: 12px; color: #888;
  border: 1.5px solid #ccc; padding: 4px 16px; border-radius: 20px;
}

/* Worksheet woodland deco */
.ws-deco {
  font-size: 10px; letter-spacing: 8px; text-align: center;
  color: #bbb; margin-top: 8px;
}
</style>
</head>
<body>

<!-- ══ GENERATOR SCREEN ══ -->
<div class="generator-screen" id="generator-screen">
  <div class="gen-header">
    <h1 class="gen-title">🌿 Hadley's <span>Daily Worksheet</span></h1>
    <p class="gen-subtitle">Grade 1 · Enchanted Woodland Edition</p>
    <div class="gen-date" id="gen-date"></div>
  </div>

  <!-- Settings -->
  <div class="settings-card">
    <div class="settings-title">⚙️ Worksheet Settings</div>
    <div class="settings-grid">
      <div class="setting-item">
        <label>Math Level</label>
        <select id="math-level">
          <option value="easy">Easy (sums to 10)</option>
          <option value="medium" selected>Medium (sums to 20)</option>
          <option value="hard">Challenge (borrowing/carrying)</option>
        </select>
      </div>
      <div class="setting-item">
        <label>Number of Math Problems</label>
        <input type="number" id="math-count" value="6" min="3" max="12">
      </div>
      <div class="setting-item">
        <label>Spelling Words</label>
        <select id="spelling-list">
          <option value="dolch-pre">Dolch Pre-K words</option>
          <option value="dolch-k">Dolch Kindergarten words</option>
          <option value="dolch-1" selected>Dolch Grade 1 words</option>
          <option value="cvc">CVC word families</option>
          <option value="sight">Common sight words</option>
        </select>
      </div>
      <div class="setting-item">
        <label>Number of Spelling Words</label>
        <input type="number" id="spelling-count" value="5" min="3" max="8">
      </div>
      <div class="setting-item">
        <label>Theme</label>
        <select id="theme">
          <option value="woodland" selected>🌿 Enchanted Woodland</option>
          <option value="animals">🦊 Animals & Nature</option>
          <option value="seasons">🍂 Seasons</option>
          <option value="ocean">🌊 Ocean & Water</option>
          <option value="garden">🌸 Garden & Flowers</option>
        </select>
      </div>
      <div class="setting-item">
        <label>Reading Level</label>
        <select id="reading-level">
          <option value="early">Early (very simple)</option>
          <option value="grade1" selected>Grade 1</option>
          <option value="advanced">Advanced Grade 1</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Section toggles -->
  <div class="settings-card">
    <div class="settings-title">📋 Sections to Include</div>
    <div class="section-toggles">
      <label class="section-toggle checked" id="toggle-math">
        <input type="checkbox" checked onchange="toggleSection(this,'toggle-math')">
        <span class="toggle-icon">🔢</span> Math
      </label>
      <label class="section-toggle checked" id="toggle-spelling">
        <input type="checkbox" checked onchange="toggleSection(this,'toggle-spelling')">
        <span class="toggle-icon">✏️</span> Spelling
      </label>
      <label class="section-toggle checked" id="toggle-reading">
        <input type="checkbox" checked onchange="toggleSection(this,'toggle-reading')">
        <span class="toggle-icon">📖</span> Reading
      </label>
      <label class="section-toggle checked" id="toggle-draw">
        <input type="checkbox" checked onchange="toggleSection(this,'toggle-draw')">
        <span class="toggle-icon">🎨</span> Draw & Label
      </label>
      <label class="section-toggle checked" id="toggle-grammar">
        <input type="checkbox" checked onchange="toggleSection(this,'toggle-grammar')">
        <span class="toggle-icon">🌱</span> Grammar
      </label>
    </div>
  </div>

  <button class="gen-btn" id="gen-btn" onclick="generateWorksheet()">
    🌿 Generate Today's Worksheet
  </button>
  <div class="loading-bar" id="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>
  <div class="loading-msg" id="loading-msg">✨ Creating Hadley's worksheet...</div>
</div>

<!-- ══ WORKSHEET OUTPUT ══ -->
<div class="worksheet" id="worksheet">
  <div class="print-actions no-print">
    <button class="print-btn primary" onclick="window.print()">🖨️ Print Worksheet</button>
    <button class="print-btn secondary" onclick="showGenerator()">← Make Another</button>
  </div>
  <div class="ws-inner" id="ws-inner"></div>
</div>

<script>
// ─── Spelling word banks ──────────────────────────────────────────────────────
const SPELLING_BANKS = {
  'dolch-pre': ['a','and','away','big','blue','can','come','down','find','for','funny','go','help','here','i','in','is','it','jump','little','look','make','me','my','not','one','play','red','run','said','see','the','three','to','two','up','we','where','yellow','you'],
  'dolch-k': ['all','am','are','at','ate','be','black','brown','but','came','did','do','eat','four','get','good','have','he','into','like','must','new','no','now','on','our','out','please','pretty','ran','ride','saw','say','she','so','soon','that','there','they','this','too','under','want','was','well','went','what','white','who','will','with','yes'],
  'dolch-1': ['after','again','an','any','ask','as','by','could','every','fly','from','give','going','had','has','her','him','his','how','just','know','let','live','may','of','old','once','open','over','put','round','some','stop','take','thank','them','then','think','walk','were','when'],
  'cvc': ['cat','hat','bat','sat','mat','rat','can','pan','fan','man','tan','van','bed','fed','led','red','big','dig','fig','jig','pig','wig','dot','got','hot','lot','not','pot','rot','top','bug','cup','cut','fun','gun','hug','jug','mud','mug','run','sun','tub','tug'],
  'sight': ['the','and','is','in','it','of','to','was','that','he','she','they','we','you','for','on','are','but','not','with','have','this','from','at','be','his','her','all','one','do','what','get','like','your','said','go','no','my','can','will','see','come','some','how','its']
};

const THEMES = {
  woodland: { name: 'Enchanted Woodland', emoji: '🌿', words: ['forest','rabbit','mushroom','acorn','owl','fox','deer','tree','leaf','stream','fern','berry','nest','bark','moss'] },
  animals: { name: 'Animals & Nature', emoji: '🦊', words: ['bunny','puppy','kitten','bird','duck','frog','fish','bear','lamb','chick','nest','pond','field','farm','meadow'] },
  seasons: { name: 'Seasons', emoji: '🍂', words: ['spring','summer','autumn','winter','snow','rain','sun','bloom','leaf','seed','warm','cold','wind','cloud','flower'] },
  ocean: { name: 'Ocean & Water', emoji: '🌊', words: ['ocean','wave','shell','fish','crab','sand','beach','tide','coral','reef','whale','seal','boat','sail','blue'] },
  garden: { name: 'Garden & Flowers', emoji: '🌸', words: ['flower','rose','daisy','seed','stem','petal','bee','butterfly','garden','rain','sun','grow','soil','root','bloom'] }
};

// ─── Helpers ──────────────────────────────────────────────────────────────────
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
function pick(arr, n) { return shuffle(arr).slice(0, n); }
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function toggleSection(checkbox, id) {
  document.getElementById(id).classList.toggle('checked', checkbox.checked);
}

function showGenerator() {
  document.getElementById('generator-screen').style.display = 'block';
  document.getElementById('worksheet').classList.remove('visible');
  window.scrollTo(0, 0);
}

// ─── Date display ─────────────────────────────────────────────────────────────
document.getElementById('gen-date').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

// ─── Math generation ──────────────────────────────────────────────────────────
function generateMathProblems(level, count) {
  const problems = [];
  for (let i = 0; i < count; i++) {
    let a, b, op, result;
    if (level === 'easy') {
      op = Math.random() > 0.4 ? '+' : '-';
      if (op === '+') { a = rand(1, 9); b = rand(1, 10 - a); }
      else { a = rand(2, 10); b = rand(1, a - 1); }
    } else if (level === 'medium') {
      op = Math.random() > 0.4 ? '+' : '-';
      if (op === '+') { a = rand(2, 15); b = rand(2, 20 - a); }
      else { a = rand(5, 20); b = rand(2, a - 1); }
    } else {
      op = Math.random() > 0.5 ? '+' : '-';
      if (op === '+') { a = rand(8, 18); b = rand(3, 20 - a + 5); }
      else { a = rand(12, 25); b = rand(5, a - 2); }
    }
    result = op === '+' ? a + b : a - b;
    problems.push({ a, b, op, result });
  }
  return problems;
}

// ─── Content Banks ───────────────────────────────────────────────────────────
const CONTENT_BANKS = {
  woodland: {
    reading: [
      { title:'The Lost Acorn', passage:'A little squirrel lost her acorn in the big forest. She looked under every leaf and log. A kind owl watched from a tall oak tree. "I saw it by the stream!" said the owl. The squirrel ran to the stream and found her acorn safe and dry.', questions:[{q:'Who helped the squirrel find her acorn?',lines:1},{q:'Where was the acorn found?',lines:1},{q:'What do you think the squirrel will do with her acorn now?',lines:2}] },
      { title:'The Rainy Day Den', passage:'It began to rain in the enchanted forest. A little fox ran to find shelter. She found a cozy den under a mossy rock. Inside, two rabbits were already staying dry. "Come in!" said the rabbits. The fox smiled and sat down. They listened to the rain drip on the leaves together.', questions:[{q:'Where did the fox find shelter?',lines:1},{q:'Who was already in the den?',lines:1},{q:'How do you think the fox felt when she was let inside?',lines:2}] },
      { title:'Mushroom Magic', passage:'Deep in the forest, Pip the mouse found a glowing mushroom. It was bright red with tiny white dots. A wise old fern whispered, "That mushroom only glows when it is happy." Pip sat beside it and sang a soft song. The mushroom glowed even brighter.', questions:[{q:'What did Pip find in the forest?',lines:1},{q:'What made the mushroom glow brighter?',lines:1},{q:'Would you sing to a glowing mushroom? Why?',lines:2}] },
      { title:'The Owl and the Moon', passage:'Every night a small owl flew up to say hello to the moon. The moon always smiled back. One cloudy night the owl could not see the moon at all. She felt very sad. Then the clouds parted and the moon shone bright. "I was here all along," said the moon softly.', questions:[{q:'What did the owl do every night?',lines:1},{q:'Why could the owl not see the moon one night?',lines:1},{q:'What does this story teach us?',lines:2}] },
      { title:'Berry Picking Day', passage:'Finn the fox cub went berry picking with his mama. They walked deep into the woods where the best berries grew. Finn ate more berries than he put in his basket. His nose turned bright purple! Mama laughed and kissed his nose. "You are the silliest little fox," she said.', questions:[{q:'What did Finn and his mama go to do?',lines:1},{q:'What happened to Finn\'s nose?',lines:1},{q:'Why do you think Finn ate so many berries?',lines:2}] },
      { title:'The Sleepy Deer', passage:'A fawn named Clover was very tired. She tried a pile of dry leaves — too crinkly! She tried a mossy log — too lumpy! Then she found a soft patch of green fern. She curled up and fell fast asleep. The forest hummed its quiet song around her.', questions:[{q:'What was the deer\'s name?',lines:1},{q:'Where did Clover finally fall asleep?',lines:1},{q:'What is your favorite place to rest?',lines:2}] },
      { title:'Nest Builders', passage:'A robin and a wren decided to build nests next to each other. The robin used twigs and mud. The wren used soft grass and feathers. "Your nest is so cozy," said the robin. "Your nest is so strong," said the wren. They helped each other finish and both nests were perfect.', questions:[{q:'What did the robin use to build her nest?',lines:1},{q:'How did the two birds help each other?',lines:1},{q:'What would YOU put in a nest to make it cozy?',lines:2}] },
      { title:'The Hidden Stream', passage:'Hazel the hedgehog heard a soft trickling sound in the woods. She followed it through the ferns and tall grass. Around a mossy rock she found a tiny stream sparkling in the light. She drank the cool water and splashed her little paws. It was the best day ever.', questions:[{q:'What sound did Hazel hear?',lines:1},{q:'What did Hazel find around the mossy rock?',lines:1},{q:'How do you think Hazel felt when she found the stream?',lines:2}] },
      { title:'The Fox and the Firefly', passage:'One summer evening a young fox chased a firefly through the dark forest. It led her to a beautiful meadow full of glowing lights. Hundreds of fireflies filled the air. The fox sat down and forgot all about chasing. She just watched until the sky turned pink.', questions:[{q:'What was the fox chasing?',lines:1},{q:'Where did the firefly lead the fox?',lines:1},{q:'Why do you think the fox stopped chasing and just watched?',lines:2}] },
      { title:'The Leaf Boat', passage:'Rosie the mouse found a large oak leaf by the stream. She pushed it into the water and climbed on. It floated perfectly! She used a twig as a paddle and sailed down the gentle stream. Two frogs cheered from a mossy rock. "A fine vessel!" croaked one frog.', questions:[{q:'What did Rosie use as a boat?',lines:1},{q:'Who cheered for Rosie as she sailed by?',lines:1},{q:'What would you sail in if you were as small as a mouse?',lines:2}] },
      { title:'Badger Bakes', passage:'On cold mornings Badger liked to bake acorn bread. The whole forest could smell it. One by one the neighbors knocked on his door — first the hedgehog, then the rabbit, then the deer. Badger set out plates for everyone. "There is always enough," he said happily.', questions:[{q:'What did Badger like to bake?',lines:1},{q:'Who came to Badger\'s door?',lines:1},{q:'What does it mean to share what you have?',lines:2}] },
      { title:'Storm Night', passage:'A big storm blew through the forest one night. The wind bent the tall pines and rain drummed on every leaf. Deep in their dens all the animals stayed warm and dry. In the morning the forest sparkled with raindrops. Every spider web was hung with tiny pearls of water.', questions:[{q:'What happened in the forest during the storm?',lines:1},{q:'What did the forest look like in the morning?',lines:1},{q:'Have you ever seen something beautiful after a storm?',lines:2}] },
      { title:'Two Rabbits One Burrow', passage:'Two rabbits named Clove and Thistle shared a burrow. Clove was tidy and Thistle was messy. Every day Clove picked up and Thistle made a mess. One rainy week they were stuck inside together. They made a rule: each one tidied their own side. It worked perfectly.', questions:[{q:'Where did Clove and Thistle live?',lines:1},{q:'What rule did they make to get along?',lines:1},{q:'What do you do when you disagree with someone you live with?',lines:2}] },
      { title:'Little Owl Learns to Fly', passage:'Little Owl sat on her branch and watched her brothers fly. She was scared to jump. Every evening her mother said, "When you are ready." One still warm night Little Owl closed her eyes, spread her wings, and leaped. The air caught her. She flew! She circled the whole forest twice.', questions:[{q:'What was Little Owl afraid to do?',lines:1},{q:'What did her mother say to her each evening?',lines:1},{q:'Can you think of something you were afraid to try but then loved?',lines:2}] },
      { title:'Firefly Festival', passage:'Every midsummer the forest held a firefly festival. All the animals gathered in the big clearing after dark. The fireflies put on a light show. A little mouse thought she saw them spell HELLO in the sky. She waved back just in case.', questions:[{q:'When was the firefly festival held?',lines:1},{q:'What did the mouse think the fireflies spelled?',lines:1},{q:'What would you want the fireflies to spell for you?',lines:2}] },
      { title:'The Mapmaker Mouse', passage:'Thistle the mouse made maps of every path in the forest. She drew them on big oak leaves with berry juice. Other animals came to buy them. "How do you know every path?" asked a young rabbit. "I walk them all myself," said Thistle. "You cannot draw a place you have never been."', questions:[{q:'What did Thistle make her maps out of?',lines:1},{q:'How did Thistle learn every path in the forest?',lines:1},{q:'What place would you most like to make a map of?',lines:2}] },
      { title:'The Smallest Tree', passage:'In a forest of towering giants grew one very small pine tree. It never grew taller than a bush. But animals loved to sit under it because it was just the right size. A wren built her nest in its soft top. It was small but it was perfect.', questions:[{q:'What was different about the small pine tree?',lines:1},{q:'Why did animals love to sit under it?',lines:1},{q:'Can something be small and still be perfect?',lines:2}] },
      { title:'Fox Cub\'s First Snow', passage:'The snow fell for the first time and Fox Cub did not know what it was. He touched it — cold! He sniffed it — nothing! He licked it — wonderful! He ran back inside. "Mama!" he cried. "The sky is leaving little cold sweet pieces all over the ground!" Mama laughed and laughed.', questions:[{q:'What did Fox Cub do when he first saw the snow?',lines:1},{q:'How did he describe snow to his mama?',lines:1},{q:'What is your favorite thing about snow?',lines:2}] },
      { title:'The Wise Tortoise', passage:'Old Tortoise lived at the edge of the forest pond. Animals came from all over to ask for advice. "How do you know so much?" asked a young fox. Tortoise smiled slowly. "I move slowly and watch carefully," he said. "Most answers come to those who are patient enough to wait."', questions:[{q:'Where did the Tortoise live?',lines:1},{q:'What was Tortoise\'s secret to being wise?',lines:1},{q:'Can you think of a time when being patient helped you?',lines:2}] },
      { title:'The Night the Stars Fell', passage:'One August night the animals watched shooting stars fall across the sky. Each one made a wish. The little hedgehog wished for a warmer winter coat. The rabbit wished for sweeter clover. The owl wished for nothing. "I already have everything," she said, looking out at the beautiful forest.', questions:[{q:'What did the animals watch in the sky?',lines:1},{q:'What did the hedgehog wish for?',lines:1},{q:'What would you wish for on a shooting star?',lines:2}] },
      { title:'The Berry Race', passage:'Every autumn the forest animals held a berry-picking race. The winner got a honey cake. This year a slow old tortoise entered. Everyone laughed. But Tortoise picked steadily all morning without stopping to chat. At noon she tipped a full basket into the judge\'s scales and won.', questions:[{q:'What did the winner of the berry race receive?',lines:1},{q:'How did Tortoise win even though she was slow?',lines:1},{q:'What does this story remind you of?',lines:2}] },
      { title:'Acorn Soup', passage:'Grandma Squirrel made the best acorn soup in the whole forest. She added dried berries and a sprig of fern and one secret ingredient no one knew. Every animal asked what it was. Grandma smiled and said, "Love." The little ones rolled their eyes. But secretly they believed her.', questions:[{q:'What did Grandma Squirrel make?',lines:1},{q:'What did she say her secret ingredient was?',lines:1},{q:'Do you think love can make food taste better? Why?',lines:2}] },
      { title:'The Thunderstorm Friends', passage:'When the thunder came three young animals hid under the same big fern — a rabbit, a hedgehog, and a wood mouse. They sat pressed together shivering. When the storm passed they looked at each other. They had never met before. They walked home together and became the best of friends.', questions:[{q:'What were the three animals hiding from?',lines:1},{q:'What happened after the storm?',lines:1},{q:'Have you ever made a new friend in an unexpected way?',lines:2}] },
      { title:'The Broken Wing', passage:'A small bird fell from its nest during a storm. A girl named Ivy found it in the wet grass. She made it a warm box with a soft cloth and brought it seeds every day. Weeks later the wing healed. She took the bird outside and opened the box. It flew away into the blue sky.', questions:[{q:'How did Ivy find the bird?',lines:1},{q:'What did Ivy do to help the bird heal?',lines:1},{q:'How do you think Ivy felt when the bird flew away?',lines:2}] },
      { title:'The Winter Sleep', passage:'When the first snow came Bear found his favorite cave and began to sleep. He dreamed of warm honey and running streams. Months passed. Then one morning a warm drip of water hit his nose. He opened one eye. Spring had come at last.', questions:[{q:'Where did Bear sleep during winter?',lines:1},{q:'What woke Bear up in the spring?',lines:1},{q:'If you slept all winter what would you want to dream about?',lines:2}] },
      { title:'The Morning Fox', passage:'Every morning a red fox sat at the top of the hill and watched the sun rise over the forest. She had done this since she was a cub. The other foxes slept in. But she loved the way the first light turned the treetops gold. It was the best part of her day.', questions:[{q:'What did the fox do every morning?',lines:1},{q:'What did the first light do to the treetops?',lines:1},{q:'Do you have a favorite time of day? What is it?',lines:2}] },
      { title:'The Ice Pond', passage:'When the pond froze in winter the animals gathered to slide on the ice. Deer skidded on four legs. Rabbit bounced and spun. Even old Badger shuffled out and did a slow circle. Only Otter was truly graceful. She glided in long sweeping curves and everyone stopped to watch.', questions:[{q:'What did the animals do on the frozen pond?',lines:1},{q:'Who was the most graceful skater?',lines:1},{q:'What is your favorite winter activity?',lines:2}] },
      { title:'Grandpa Badger\'s Garden', passage:'Grandpa Badger grew the best vegetables in the forest. He woke before sunrise every day to water them. His granddaughter Pip asked if she could help. Every morning they worked side by side. By summer Pip knew every plant by name and they cooked a big feast for the whole forest.', questions:[{q:'When did Grandpa Badger wake up each day?',lines:1},{q:'What did Pip learn by the end of summer?',lines:1},{q:'What is something you would like to grow?',lines:2}] },
      { title:'The Forgotten Path', passage:'An old path through the forest had been forgotten for years. Brambles covered it and tall ferns hid it. A young rabbit named Pip found it by accident. She cleared a little each day. By the end of the week the old path was open again and no one knew where it led.', questions:[{q:'What had happened to the old path?',lines:1},{q:'How did Pip find the path?',lines:1},{q:'Would you want to follow the mystery path? Why?',lines:2}] },
      { title:'The Stone Soup of the Forest', passage:'A hungry wolf came to the clearing and said he was making stone soup. He put a stone in a pot of water. "It just needs a little carrot," he said. A rabbit brought carrots. "And a few berries." A fox brought berries. Soon everyone had a full bowl of delicious soup.', questions:[{q:'What did the wolf say he was making?',lines:1},{q:'What did the rabbit and fox add to the soup?',lines:1},{q:'What does this story teach about working together?',lines:2}] },

  animals: {
    reading: [
      { title:'The Muddy Puppy', passage:'Biscuit the puppy loved to play outside. One day he found a big muddy puddle. He jumped right in with all four paws! Mud splashed everywhere. When he came inside his owner laughed and gave him a warm bath. Biscuit shook his wet fur and wagged his tail.', questions:[{q:'What did Biscuit find outside?',lines:1},{q:'What happened after Biscuit came inside?',lines:1},{q:'Do you think Biscuit would jump in the puddle again? Why?',lines:2}] },
      { title:'Duck Family Morning', passage:'Mama Duck led her five ducklings to the pond each morning. The babies had to walk in a line. Little Pip always stopped to look at bugs. One morning Pip fell behind and got lost. He quacked very loudly. Mama Duck heard him and swam right back.', questions:[{q:'How many ducklings did Mama Duck have?',lines:1},{q:'Why did Pip get lost?',lines:1},{q:'What do you think Mama Duck did to keep her ducklings safe after that?',lines:2}] },
      { title:'The Brave Little Lamb', passage:'A lamb named Button was afraid of the big field. One sunny day a butterfly landed on Button\'s nose. She laughed and ran after it. Before she knew it she was in the middle of the field. She looked around and smiled. It was not so scary after all!', questions:[{q:'What was Button afraid of?',lines:1},{q:'What made Button run into the field?',lines:1},{q:'Have you ever been scared of something that turned out to be okay?',lines:2}] },
      { title:'Kittens in a Basket', passage:'Three kittens lived in a soft basket by the fire. Their names were Muffin, Biscuit, and Pip. Muffin liked to sleep. Biscuit liked to play. Pip liked to watch the flames. Every night their mama came to tuck them in and purred a soft song.', questions:[{q:'Where did the three kittens live?',lines:1},{q:'What did Pip like to do?',lines:1},{q:'Which kitten is most like you? Why?',lines:2}] },
      { title:'Frog School', passage:'Every morning the frogs went to school on lily pads. The teacher was a big green frog named Mr. Hop. One day a tiny frog jumped all the way across the pond. Everyone cheered. Mr. Hop gave her a gold star made of sunshine.', questions:[{q:'Where did the frogs go to school?',lines:1},{q:'What did the tiny frog do that was special?',lines:1},{q:'What would you want to learn at frog school?',lines:2}] },
      { title:'Bear and the Honey Tree', passage:'A young bear found a tree full of honey. He waited until the bees flew off to find flowers. Then he very gently took just a little honey and left plenty for the bees. The bees came back and did not mind at all. They buzzed a friendly hello.', questions:[{q:'What did the bear find in the tree?',lines:1},{q:'What did the bear do before taking the honey?',lines:1},{q:'Was the bear being kind? How do you know?',lines:2}] },
      { title:'The Lost Kitten', passage:'A small orange kitten followed a butterfly all the way to the end of the road. Then the butterfly flew away and the kitten did not know where she was. She sat down and meowed. A girl heard her from a garden and came running. She carried the kitten home and gave her warm milk.', questions:[{q:'How did the kitten get lost?',lines:1},{q:'Who helped the kitten?',lines:1},{q:'What do you do if you find a lost animal?',lines:2}] },
      { title:'The Pig Who Loved Mud', passage:'Rosie the pig loved mud more than anything. She rolled in it every morning and splashed in it every afternoon. Her farmer friend always laughed. "You are going to need a bath!" he said. But Rosie did not care. Mud was cool and soft and wonderful.', questions:[{q:'What did Rosie love more than anything?',lines:1},{q:'What did the farmer always say to Rosie?',lines:1},{q:'What is your favorite messy activity?',lines:2}] },
      { title:'The Tall Giraffe', passage:'Gerald the giraffe was the tallest animal in the savanna. He could reach leaves no one else could. The other animals were jealous at first. But when the low bushes dried up everyone was glad. Gerald pulled down leafy branches for everyone to share.', questions:[{q:'Why was Gerald special?',lines:1},{q:'How did Gerald help the other animals?',lines:1},{q:'What is something special about you that helps others?',lines:2}] },
      { title:'The Two Horses', passage:'Two horses lived in the same field. One was fast and loved to run. One was slow and loved to graze. They seemed very different. But every evening they stood side by side at the fence and watched the sun set. "We may be different," said the fast horse, "but I like watching sunsets with you."', questions:[{q:'How were the two horses different?',lines:1},{q:'What did they do together every evening?',lines:1},{q:'Can two very different people still be good friends?',lines:2}] },
      { title:'The Baby Elephant\'s Bath', passage:'Every morning Mama Elephant led her baby to the watering hole. Baby loved to splash with her trunk. She sprayed water everywhere! Mama used her big trunk to shower her baby clean. The baby giggled and ran around her mama\'s huge legs.', questions:[{q:'Where did Mama Elephant take her baby each morning?',lines:1},{q:'What did the baby do with her trunk?',lines:1},{q:'What is your favorite way to cool down on a hot day?',lines:2}] },
      { title:'The Chicken Who Couldn\'t Cluck', passage:'All the chickens on the farm could cluck loudly — all except little Dot. Dot could only peep softly. The others teased her. But one night a fox crept near. Dot heard it first and peeped so loudly the farmer came running. Dot\'s quiet voice had saved them all.', questions:[{q:'What could Dot only make instead of a cluck?',lines:1},{q:'How did Dot save the other chickens?',lines:1},{q:'What does this story teach about being different?',lines:2}] },
      { title:'The Very Fluffy Sheep', passage:'Flora the sheep had the fluffiest wool on the whole farm. By springtime she was so fluffy she could barely see over her own wool. When the farmer finally sheared her she felt as light as a cloud. She ran and jumped and kicked her heels. "I had no idea I could move like this!" she bleated.', questions:[{q:'What was special about Flora\'s wool?',lines:1},{q:'How did Flora feel after she was sheared?',lines:1},{q:'Have you ever felt much better after a haircut? Why?',lines:2}] },
      { title:'The Sleeping Turtle', passage:'When autumn came Turtle found a muddy spot at the bottom of the pond. She tucked in her legs and went to sleep. Ice formed above her. Snow fell. Children skated on the pond. Turtle heard none of it. She slept until the first warm day of spring then swam up yawning widely.', questions:[{q:'Where did Turtle sleep in winter?',lines:1},{q:'What happened while Turtle slept?',lines:1},{q:'If you could sleep all winter what would you do in spring?',lines:2}] },
      { title:'The Parrot Who Listened', passage:'Most parrots learned to talk by repeating what people said. But Marco the parrot learned to listen. Really listen. When the children were sad he sat quietly nearby. When they were happy he bobbed his green head. The children said Marco was the best listener they knew.', questions:[{q:'How was Marco different from most parrots?',lines:1},{q:'What did Marco do when the children were sad?',lines:1},{q:'Why is being a good listener important?',lines:2}] },
      { title:'The Clever Crow', passage:'Crow found a tall jar with a little water at the bottom. She could not reach it with her beak. She dropped a pebble in. Then another. Then another. The water rose with each pebble. When it was high enough she drank her fill. The other birds watched with their beaks open.', questions:[{q:'What problem did the crow have?',lines:1},{q:'How did she solve the problem?',lines:1},{q:'What does this story teach about thinking carefully?',lines:2}] },
      { title:'The Smallest Duckling', passage:'There were eight ducklings in the nest but Pearl was the smallest. She was always last. But Pearl was the first to notice the fox slipping through the reeds. She quacked so loudly the whole family flew to safety. After that no one ever called her small again.', questions:[{q:'How many ducklings were in the nest?',lines:1},{q:'What did Pearl do to save her family?',lines:1},{q:'How did Pearl prove that being small does not matter?',lines:2}] },
      { title:'Caterpillar\'s Long Wait', passage:'Caterpillar wound herself into a cozy cocoon and waited. Outside the world changed. Flowers bloomed. Rain fell. Children played. Then one warm morning she pushed and stretched and broke free. Where once was a small green caterpillar now was a golden butterfly. She flew away into the sky.', questions:[{q:'What did caterpillar wrap herself in?',lines:1},{q:'What did she become after she broke free?',lines:1},{q:'Why do you think waiting can lead to something wonderful?',lines:2}] },
      { title:'The Dog Who Dug', passage:'Max the dog dug holes everywhere. The yard was full of them. His owners were not pleased. But one afternoon Max dug in the corner and uncovered an old tin box. Inside were photographs of the family from long ago. Max sat proudly next to the box as if he knew all along.', questions:[{q:'What did Max love to do?',lines:1},{q:'What did Max find in the corner of the garden?',lines:1},{q:'How do you think the family felt when they saw the old photographs?',lines:2}] },
      { title:'The Piglet\'s First Rain', passage:'Clover the piglet had never seen rain before. She stood in the barnyard with her snout turned up to the sky. Rain drops hit her nose. She snorted in surprise. Then she opened her mouth wide and drank from the sky. Her mama watched from the dry barn and laughed a deep piggy laugh.', questions:[{q:'What had Clover never seen before?',lines:1},{q:'What did Clover do in the rain?',lines:1},{q:'What do you love to do on a rainy day?',lines:2}] },
      { title:'The Old Horse\'s Last Race', passage:'Copper the old horse had not raced for many years. His legs were stiff and his mane was grey. But on the morning of the farm race he lined up beside the young horses. He did not win. But he finished, breathing hard, eyes bright. The crowd cheered louder for him than anyone.', questions:[{q:'Why had Copper not raced for many years?',lines:1},{q:'How did the crowd react when Copper finished?',lines:1},{q:'Why do you think the crowd cheered loudest for Copper?',lines:2}] },
      { title:'Goats on the Hill', passage:'Three goats lived on a steep rocky hill. They could climb places no other animal could reach. The smallest goat could climb the highest. One day she reached the very top and found the sweetest clover she had ever tasted. She bleated until the others came up to share it.', questions:[{q:'Where did the three goats live?',lines:1},{q:'What did the smallest goat find at the top?',lines:1},{q:'Why did the smallest goat call the others to share?',lines:2}] },
      { title:'The Frog and the Rain', passage:'The frogs of the pond celebrated every time it rained. They croaked their loudest songs and leaped the highest leaps. A visiting bird thought they were upset. "You have it backwards," croaked the biggest frog. "Rain fills our pond and grows our food. Rain is our best friend."', questions:[{q:'How did the frogs feel about rain?',lines:1},{q:'Why did the frog say rain was their best friend?',lines:1},{q:'What is something you love that others might not understand?',lines:2}] },
      { title:'The Napping Cat', passage:'Luna the cat could sleep anywhere. On windowsills. In laundry baskets. On top of the refrigerator. She had seventeen napping spots her family had counted. "Does she ever stay awake?" asked a visiting cousin. Just then Luna opened one yellow eye. Then closed it again.', questions:[{q:'How many napping spots did Luna have?',lines:1},{q:'What did Luna do when the cousin asked if she was awake?',lines:1},{q:'What is the coziest place you like to rest?',lines:2}] },
      { title:'The Migratory Birds', passage:'Every autumn thousands of birds flew over the valley on their way south. A girl named Wren ran outside every year to watch. The sky turned black with wings. The noise was like rushing water. Her grandmother said the birds had been making this journey for thousands of years.', questions:[{q:'When did the birds fly over the valley?',lines:1},{q:'What did the grandmother tell Wren about the birds?',lines:1},{q:'Have you ever seen something in nature that amazed you?',lines:2}] },
      { title:'The Calf and the Crow', passage:'A young calf and a crow became unlikely friends. The crow sat on the calf\'s back and ate the flies that bothered her. In return the calf let the crow ride to the far meadow where the best seeds grew. They never spoke the same language but understood each other perfectly.', questions:[{q:'How did the crow help the calf?',lines:1},{q:'How did the calf help the crow?',lines:1},{q:'Can two very different animals help each other? Give an example.',lines:2}] },
      { title:'Pig\'s Vegetable Garden', passage:'Pepper the pig decided to grow her own vegetables. She dug up a patch of mud and planted carrot seeds and bean seeds and one pumpkin seed. She watered them every day. In autumn she dug up seventeen carrots, twenty-two beans, and one enormous pumpkin.', questions:[{q:'What did Pepper plant in her garden?',lines:1},{q:'How did she take care of her garden?',lines:1},{q:'What vegetable would you most like to grow?',lines:2}] },
      { title:'The Rabbit Marathon', passage:'Every spring the rabbits ran a race three times around the big pond. A rabbit named Clover trained every single morning. On race day her paws barely seemed to touch the ground. She won by a whole field length. Then she helped the slowest rabbit cross the finish line.', questions:[{q:'What did the rabbits do every spring?',lines:1},{q:'What did Clover do to prepare for the race?',lines:1},{q:'Why did Clover help the slowest rabbit at the end?',lines:2}] },
      { title:'The Butterfly Who Couldn\'t Fly', passage:'A butterfly hatched with one wing smaller than the other. She walked everywhere on her six delicate legs and saw the world from the ground — dewdrops on grass blades, ant highways, the undersides of flowers. By the time her wing grew strong she was not sure she wanted to fly.', questions:[{q:'What was different about the butterfly\'s wings?',lines:1},{q:'What did the butterfly see from the ground?',lines:1},{q:'Is there a good side to going slowly? What might you notice?',lines:2}] },

  seasons: {
    reading: [
      { title:'The First Snow', passage:'Lily woke up and looked out her window. Everything was white! Snow had fallen all night long. She put on her boots and her big red coat. Outside snowflakes landed on her nose. She caught one on her tongue. It tasted like cold water and winter magic.', questions:[{q:'What did Lily see when she looked out her window?',lines:1},{q:'What did the snowflake taste like?',lines:1},{q:'What is your favorite thing to do in the snow?',lines:2}] },
      { title:'Apple Picking Fall', passage:'Every autumn the Rivera family went to pick apples. The trees were full of red and yellow fruit. Little Marco could not reach the highest ones. His papa lifted him up on his shoulders. Marco picked the biggest apple he could find. They made a warm pie when they got home.', questions:[{q:'What did the Rivera family do every autumn?',lines:1},{q:'How did Marco reach the high apples?',lines:1},{q:'What would you make with apples you picked?',lines:2}] },
      { title:'Spring Puddles', passage:'After the long winter spring arrived at last. The snow melted into shining puddles. A girl named Bea put on her yellow boots and ran outside. She jumped in every puddle she could find. Her dog Max jumped in too. By the time they got home they were both very wet and very happy.', questions:[{q:'What happened to the snow when spring came?',lines:1},{q:'What did Bea and Max do outside?',lines:1},{q:'Why were they happy even though they were wet?',lines:2}] },
      { title:'Summer Fireflies', passage:'On warm summer nights fireflies lit up the backyard. They blinked on and off like tiny stars. Rosa and her brother caught some in a jar. They watched them glow for a little while. Then Rosa said, "Let\'s let them go." They opened the jar and the fireflies danced back into the dark sky.', questions:[{q:'When did the fireflies come out?',lines:1},{q:'What did Rosa and her brother do with the fireflies?',lines:1},{q:'Why do you think Rosa wanted to let the fireflies go?',lines:2}] },
      { title:'The Leaf Pile', passage:'Dad raked the leaves into a very tall pile. It took a whole hour. The leaves were red and orange and gold. Before Dad could bag them the kids ran and jumped right in. Leaves flew everywhere. Dad laughed and started raking all over again.', questions:[{q:'What color were the leaves?',lines:1},{q:'What did the kids do to the leaf pile?',lines:1},{q:'How do you think Dad felt? Was he upset?',lines:2}] },
      { title:'The Snowman\'s Secret', passage:'The children built a snowman in the front yard. They gave him a carrot nose and a scarf. That night it got very cold and the snowman\'s smile seemed to grow bigger. In the morning the children were sure he had moved closer to the house. Their papa just winked and said nothing.', questions:[{q:'What did the children give the snowman?',lines:1},{q:'What did the children think happened to the snowman overnight?',lines:1},{q:'Why do you think papa winked and said nothing?',lines:2}] },
      { title:'The Last Day of Summer', passage:'On the last day of summer Mia and her best friend sat on the dock and dangled their feet in the cool lake. They had spent the whole summer swimming and fishing and chasing fireflies. "I don\'t want it to end," said Mia. Her friend smiled. "That\'s how you know it was a good summer."', questions:[{q:'What did Mia and her friend do all summer?',lines:1},{q:'What did Mia say she didn\'t want?',lines:1},{q:'What was your favorite thing about last summer?',lines:2}] },
      { title:'First Day of Spring', passage:'On the first warm day of spring a girl ran outside in bare feet for the first time since autumn. The grass was cold and wet and wonderful. She found the first crocus pushing up through the dark soil. She sat beside it for a long time. It was proof that warm days were really coming back.', questions:[{q:'What did the girl do on the first warm spring day?',lines:1},{q:'What did she find pushing through the soil?',lines:1},{q:'What is your favorite sign that spring has arrived?',lines:2}] },
      { title:'The Ice Storm', passage:'One winter night an ice storm coated every branch and blade of grass with a thin layer of crystal ice. In the morning the whole world sparkled. Every tree was a chandelier. The children walked outside slowly so they would not slip. "It looks like a fairy world," said the smallest child.', questions:[{q:'What did the ice storm do to the branches and grass?',lines:1},{q:'How did the world look the next morning?',lines:1},{q:'Have you ever seen the world look magical after a storm?',lines:2}] },
      { title:'Planting Day', passage:'Every spring Grandma and her grandchildren planted seeds in the garden. Each child got their own row. They pressed the seeds deep into the dark soil and covered them gently. "Now we wait," said Grandma. Three weeks later every row had tiny green shoots reaching toward the sun.', questions:[{q:'What did Grandma and her grandchildren do every spring?',lines:1},{q:'What happened three weeks after they planted?',lines:1},{q:'What would you like to plant in your own row?',lines:2}] },
      { title:'The Autumn Moon', passage:'Every autumn the moon seemed bigger and more orange than at any other time of year. A boy named Cal watched it rise over the hills from his porch every night in October. His grandpa said it was called the harvest moon and that farmers used its light to work late into the night.', questions:[{q:'What did Cal do every night in October?',lines:1},{q:'What did grandpa say the moon was called?',lines:1},{q:'What is your favorite thing to look at in the night sky?',lines:2}] },
      { title:'The Great Snowball Fight', passage:'After the big snowstorm the whole neighborhood had a snowball fight. Teams were made and forts were built in twenty minutes. Snowballs flew through the air. The smallest kid on the block threw the best snowballs and hit more targets than anyone. By noon everyone was laughing and soaking wet.', questions:[{q:'What did the neighborhood do after the snowstorm?',lines:1},{q:'Who threw the best snowballs?',lines:1},{q:'Have you ever been in a snowball fight? What was it like?',lines:2}] },
      { title:'The Summer Storm', passage:'A big summer thunderstorm rolled in just as the family was finishing their picnic. They grabbed the basket and ran for the porch. Rain poured down in sheets. Lightning flashed over the hills. They all sat on the porch swing and watched. It was one of the best parts of the whole summer.', questions:[{q:'What were the family doing when the storm came?',lines:1},{q:'Where did they go to stay dry?',lines:1},{q:'Why do you think watching the storm together was special?',lines:2}] },
      { title:'Mud Season', passage:'Between winter and spring there was a season the children called Mud Season. Every path turned to thick brown mud. Every boot got stuck at least once a day. Mama put towels by the back door. The children loved it. Even Mama secretly loved the smell of spring mud after a long cold winter.', questions:[{q:'When was Mud Season?',lines:1},{q:'What did Mama put by the back door?',lines:1},{q:'Why do you think even Mama secretly loved Mud Season?',lines:2}] },
      { title:'The Longest Day', passage:'On the first day of summer the sun stayed up later than any other day of the year. The children played outside until nine o\'clock at night and it was still light. They ate dinner on the back porch. Fireflies came out. Bats swooped overhead. It felt like the day would never end and they hoped it wouldn\'t.', questions:[{q:'What was special about the first day of summer?',lines:1},{q:'What did the family do outside?',lines:1},{q:'What would you do with a day that never ended?',lines:2}] },
      { title:'The Pumpkin Patch', passage:'Every October the family drove to the pumpkin patch on the edge of town. There were hundreds of pumpkins of every size and shape. Little Rosa always chose the lopsided ones that no one else wanted. She said they had more character. Her pumpkin won first prize at the Halloween contest three years in a row.', questions:[{q:'When did the family go to the pumpkin patch?',lines:1},{q:'What kind of pumpkins did Rosa always choose?',lines:1},{q:'Why do you think the lopsided pumpkins kept winning?',lines:2}] },
      { title:'Sledding Hill', passage:'There was one hill in town that everyone called The Best Hill. On the first snow of winter children appeared from every direction pulling sleds. They flew down fast and trudged back up slowly all morning long. The fastest sled belonged to an old grandfather who said he had been sledding that hill for sixty years.', questions:[{q:'What was special about The Best Hill?',lines:1},{q:'Whose sled was the fastest?',lines:1},{q:'What is your favorite snow day activity?',lines:2}] },
      { title:'The Robin\'s Return', passage:'Every year the first robin of spring arrived on the same weekend in March. The family kept a journal of the date going back fifteen years. When the children heard the robin\'s song they ran outside to find it. There it was — a fat red-breasted robin singing from the top of the maple tree.', questions:[{q:'When did the first robin of spring usually arrive?',lines:1},{q:'What did the family keep in their journal?',lines:1},{q:'What bird or animal do you notice that tells you spring is here?',lines:2}] },
      { title:'Summer Lemonade', passage:'On the hottest days of summer Junie set up a lemonade stand at the end of the driveway. She squeezed every lemon herself. Her little brother stirred in the sugar and added ice. By afternoon the jar was always empty. She gave the last glass to the mail carrier for free. He said it was the best lemonade he had ever had.', questions:[{q:'What did Junie do on hot summer days?',lines:1},{q:'Who got the last glass of lemonade?',lines:1},{q:'What is your favorite cold drink on a hot day?',lines:2}] },
      { title:'The Frozen Windowpane', passage:'On the coldest winter morning the girl found her bedroom window completely covered in frost. The frost had made beautiful patterns — tiny trees and feathers and lace. She pressed her warm hand against the glass and watched the frost melt in the shape of her palm. She did it again on every window in the house.', questions:[{q:'What did the girl find on her window on a cold morning?',lines:1},{q:'What did she do with her warm hand?',lines:1},{q:'Have you ever seen frost on a window? What did it look like?',lines:2}] },
      { title:'The Spring Concert', passage:'Every spring the birds began their dawn chorus. At first it was just one or two. Then by April the mornings were filled with dozens of different songs. A girl named Wren set her alarm for five in the morning to hear the whole thing. She lay in bed with the window open and thought it was the finest concert in the world.', questions:[{q:'What happened every spring at dawn?',lines:1},{q:'What did Wren do to hear the whole chorus?',lines:1},{q:'What sound do you love waking up to?',lines:2}] },
      { title:'Autumn Apples', passage:'The old apple tree in the backyard gave fruit every October. The apples were small and tart and the best for pies. The children shook the lowest branches until apples rained down. They filled three baskets. Grandma made four pies and stored applesauce in jars for the whole winter.', questions:[{q:'When did the old apple tree give fruit?',lines:1},{q:'What did Grandma make with the apples?',lines:1},{q:'What is your favorite thing to make from fruit?',lines:2}] },
      { title:'The Last Warm Day', passage:'In late October came the last warm day before winter. Everyone knew it was the last one even though the forecast said nothing special. The children played outside until dark. Papa grilled on the back porch. Mama sat in the last of the sunshine. No one wanted to go inside. Winter could wait one more hour.', questions:[{q:'When did the last warm day come?',lines:1},{q:'What did the family do to enjoy the day?',lines:1},{q:'Why do you think no one wanted to go inside?',lines:2}] },
      { title:'Snowflake Study', passage:'A boy named Eli caught snowflakes on a piece of dark paper and studied them with a magnifying glass. No two were the same. Some had six perfect arms. Some looked like tiny stars. Some were so small he could barely see them at all. He spent an entire snowy afternoon making a drawing of every one he found.', questions:[{q:'What did Eli use to study the snowflakes?',lines:1},{q:'What did Eli notice about the snowflakes?',lines:1},{q:'Why do you think no two snowflakes are exactly the same?',lines:2}] },
      { title:'The Summer Reading Tree', passage:'Every summer a girl named June read books under the big oak tree in her backyard. She kept a list of every book she finished. By the end of August the list had twenty-three books on it. Her teacher saw the list in September and said it was the most impressive thing she had ever seen. June just shrugged and said it had been a good tree.', questions:[{q:'Where did June read her books every summer?',lines:1},{q:'How many books did June finish?',lines:1},{q:'What is your favorite book you have read?',lines:2}] },
      { title:'The Kite Day', passage:'On the windiest day of spring Papa took the children to the big open field to fly kites. The kites shot straight up into the blue sky. One kite tangled in a tree but they got it back with a long stick. By afternoon they were experts. The kite strings hummed and the whole family lay on their backs watching the colors dance overhead.', questions:[{q:'When did Papa take the children to fly kites?',lines:1},{q:'What happened to one of the kites?',lines:1},{q:'Have you ever flown a kite? What was it like?',lines:2}] },
      { title:'First Frost', passage:'On the first frosty morning of autumn every blade of grass was tipped with white. The garden had to be covered with cloth to protect it. The pumpkins on the porch were fine. The cat sat in the window and watched the white world and decided not to go out. The family drank hot cocoa and watched the yard sparkle.', questions:[{q:'What happened to the grass on the first frosty morning?',lines:1},{q:'What did the family do to enjoy the cold morning?',lines:1},{q:'What is your favorite hot drink on a cold day?',lines:2}] },
      { title:'The Autumn Walk', passage:'Every Sunday in October the family took a long walk through the woods to see the autumn colors. Mama named every tree by its leaves. Papa carried a basket for any interesting things they found. The children raced ahead and came back with acorns and mushrooms and striped rocks. It was the best day of every week.', questions:[{q:'What did the family do every Sunday in October?',lines:1},{q:'What did the children bring back in the basket?',lines:1},{q:'What is something interesting you have found on a walk?',lines:2}] },

  ocean: {
    reading: [
      { title:'The Little Crab', passage:'A small crab named Sandy lived under a rock by the sea. Every day she came out to look for food. One day the tide came in fast and Sandy could not get back to her rock. A big wave set her down in a tide pool. She found a new home with five new friends.', questions:[{q:'Where did Sandy live?',lines:1},{q:'What happened when the tide came in fast?',lines:1},{q:'Was Sandy\'s new home better or worse? What do you think?',lines:2}] },
      { title:'Whale Song', passage:'Deep in the blue ocean a baby whale learned to sing. Her song was low and long and beautiful. The other whales swam from far away to listen. Even the fish stopped to hear. When she finished the whole ocean was quiet for a moment. Then everyone splashed and cheered.', questions:[{q:'What did the baby whale learn to do?',lines:1},{q:'Who came to listen to the whale\'s song?',lines:1},{q:'How does music make you feel?',lines:2}] },
      { title:'Seashell Morning', passage:'Every morning Mia walked along the beach looking for shells. She had found pink ones and speckled ones and striped ones. One morning she found a shell so big she could hear the ocean inside it. She held it to her ear and smiled. "The sea is talking to me," she told her grandma.', questions:[{q:'What did Mia do every morning?',lines:1},{q:'What was special about the big shell she found?',lines:1},{q:'What do you think the ocean was saying to Mia?',lines:2}] },
      { title:'The Helpful Seal', passage:'A fishing boat got lost in the fog near the rocks. The sailors were scared. Suddenly a seal popped up beside the boat. She barked and swam in circles. The sailors followed her. She led them safely around the rocks and back to the harbor. The sailors tossed her a fish.', questions:[{q:'Why were the sailors scared?',lines:1},{q:'How did the seal help the boat?',lines:1},{q:'Why do you think the seal helped the sailors?',lines:2}] },
      { title:'Coral Reef Colors', passage:'Under the warm blue water lived the most colorful fish in the world. They darted between pink and purple coral. A small yellow fish named Sunny liked to count all the colors she could see. She counted sixteen before she lost track. "This is the most beautiful place," she thought.', questions:[{q:'Where did Sunny live?',lines:1},{q:'What did Sunny like to do?',lines:1},{q:'What is the most colorful place you have ever seen?',lines:2}] },
      { title:'The Turtle\'s Long Journey', passage:'Every year the mother sea turtle swam hundreds of miles to lay her eggs on the same beach where she was born. She dragged herself up the sand in the dark and dug a deep hole. She laid her eggs and covered them with sand. Then she turned and swam back to the open sea.', questions:[{q:'What did the sea turtle do every year?',lines:1},{q:'What did she do after laying her eggs?',lines:1},{q:'Why do you think she came back to the same beach every year?',lines:2}] },
      { title:'The Lighthouse Keeper', passage:'Every evening the old lighthouse keeper climbed two hundred steps to light the great lamp. Ships far out at sea could see the light blinking. It kept them safe from the rocks. One stormy night a captain wrote in his log: "The lighthouse light saved our ship tonight. God bless whoever keeps it burning."', questions:[{q:'What did the lighthouse keeper do every evening?',lines:1},{q:'What did the lighthouse light do for ships?',lines:1},{q:'Would you like to be a lighthouse keeper? Why?',lines:2}] },
      { title:'The Hermit Crab\'s New Shell', passage:'A hermit crab had grown too big for his shell. He had been looking for a new one for three days. Every shell he tried was either too small or too big or too pointy. Then he found a perfect pearly spiral shell beside a tide pool. He slipped in and it fit exactly right. He did a happy sideways dance.', questions:[{q:'Why did the hermit crab need a new shell?',lines:1},{q:'What was special about the shell he finally found?',lines:1},{q:'Have you ever found something that fit just right?',lines:2}] },
      { title:'The Dolphin Race', passage:'A pod of dolphins decided to race the fishing boat back to the harbor. They leaped and spun alongside the bow, showing off. The fisherman laughed and steered a little faster. The dolphins sped up too. They stayed ahead all the way. When the boat reached the dock the dolphins leaped once more as if taking a bow.', questions:[{q:'What did the dolphins decide to do?',lines:1},{q:'What did the dolphins do when the boat reached the dock?',lines:1},{q:'Why do you think dolphins like to play alongside boats?',lines:2}] },
      { title:'The Message in a Bottle', passage:'A girl named Iris wrote a letter, rolled it up, and put it in a glass bottle. She sealed it tight and threw it into the ocean from the pier. She wondered where it would go. Seven months later a boy on an island far away found the bottle in the sand. He wrote back and they became pen pals for ten years.', questions:[{q:'What did Iris put in the bottle?',lines:1},{q:'Who found the bottle?',lines:1},{q:'If you put a message in a bottle what would you write?',lines:2}] },
      { title:'The Tide Pool World', passage:'At low tide a whole world appeared in the rocks by the sea. Star fish clung to the walls. Tiny crabs scurried under rocks. Sea anemones waved their orange arms. A girl crouched down and watched for an hour without moving. It was like a whole city, she thought, that only appeared twice a day.', questions:[{q:'What appeared in the rocks at low tide?',lines:1},{q:'What did the girl think the tide pool was like?',lines:1},{q:'What creature in the tide pool would you most want to see?',lines:2}] },
      { title:'Sand Castle Day', passage:'Every summer the beach held a sand castle contest. Teams of children built their castles from morning to afternoon. Rosie\'s team built a castle with five towers and a real moat that filled with sea water. When the tide came in it washed all the castles away. "That\'s the best part," said Rosie.', questions:[{q:'What did the beach hold every summer?',lines:1},{q:'What happened to all the castles when the tide came in?',lines:1},{q:'Why do you think Rosie said that was the best part?',lines:2}] },
      { title:'The Shark Who Was Afraid of Fish', passage:'Gerald the shark had a secret. He was afraid of small fish. Not big fish. Just the tiny silver ones that swam in enormous shoals. He did not know why. One day a shoal swam right toward him. He closed his eyes and held very still. The shoal parted around him like a curtain and was gone. He opened his eyes. He was fine.', questions:[{q:'What was Gerald\'s secret fear?',lines:1},{q:'What did Gerald do when the shoal swam at him?',lines:1},{q:'Have you ever been afraid of something small?',lines:2}] },
      { title:'The Pelican\'s Catch', passage:'Old Pete the pelican had caught fish in the same bay for thirty years. Young pelicans came to watch how he did it. He soared high, spotted a flash of silver below, and plunge-dived straight down. Splash! He came up with three fish in his pouch. The young pelicans tried all day. Pete had caught thirty.', questions:[{q:'How long had Pete been catching fish in the bay?',lines:1},{q:'How did Pete catch fish?',lines:1},{q:'What does this story teach about practice?',lines:2}] },
      { title:'The Octopus Artist', passage:'An octopus named Ocho lived in a cave on the ocean floor. She collected colorful pebbles and shells and arranged them into beautiful patterns outside her cave. Other sea creatures came to look. A passing diver took photographs. Later a museum put them on display. The caption read: Unknown Artist. Ocho would have smiled if she could.', questions:[{q:'Where did Ocho live?',lines:1},{q:'What did Ocho make outside her cave?',lines:1},{q:'What would you make if you had eight arms?',lines:2}] },
      { title:'Starfish Morning', passage:'Every morning at low tide hundreds of starfish appeared on the rocks. A boy named Sam made it his job to carry any starfish left in the sun back to the water. It took him an hour each morning. His sister said, "There are too many to save." Sam picked up one more and said, "It matters to this one."', questions:[{q:'What did Sam do every morning?',lines:1},{q:'What did his sister say?',lines:1},{q:'What do you think Sam\'s actions show about kindness?',lines:2}] },
      { title:'The Storm at Sea', passage:'A fierce storm rose up while the fishing boats were out. The sky turned dark green. Waves crashed over the bows. Every boat turned for home. The smallest boat had the hardest time. But its captain was the most experienced sailor in the fleet. She brought her crew home safely while the storm roared around them.', questions:[{q:'What happened while the fishing boats were out?',lines:1},{q:'Which boat had the hardest time?',lines:1},{q:'Why do you think experience helped the captain?',lines:2}] },
      { title:'The Mermaid\'s Garden', passage:'Deep below the waves grew a garden that no one on land had ever seen. It had kelp trees and flower-shaped coral and fish of every color drifting through the leaves. A mermaid tended it every day, pulling weeds and feeding the fish. She thought sometimes of people on the shore. Did they know how beautiful the world was below?', questions:[{q:'Where was the mermaid\'s garden?',lines:1},{q:'What did the mermaid do in her garden each day?',lines:1},{q:'What do you imagine it looks like on the ocean floor?',lines:2}] },
      { title:'The Crab Who Walked Straight', passage:'All crabs walk sideways. Everyone knows that. Except Calvin. Calvin always walked straight forward. The other crabs laughed at him. But Calvin could walk faster than any of them and got to the best food first. After a while the other crabs tried walking straight too. It was harder than it looked.', questions:[{q:'How did Calvin walk differently from other crabs?',lines:1},{q:'What advantage did Calvin\'s way of walking give him?',lines:1},{q:'What does this story teach about doing things differently?',lines:2}] },
      { title:'The Sea Glass Collection', passage:'After every storm Willa walked the beach to collect sea glass. The ocean had tumbled the broken glass until it was smooth and frosted and beautiful. She had every color — green white brown and rare blue. She kept them in a jar by her window where the morning light turned them into jewels. The most beautiful things, she thought, are the ones the sea has shaped.', questions:[{q:'When did Willa walk the beach?',lines:1},{q:'How had the ocean changed the broken glass?',lines:1},{q:'What does Willa\'s collection tell you about her?',lines:2}] },
      { title:'The Whale and the Little Boat', passage:'A whale surfaced right beside a small rowboat. The little girl inside froze. The whale\'s eye was as big as a dinner plate. It looked at her calmly. She looked back. For thirty seconds they just looked at each other. Then the whale slipped below the surface and was gone. The girl could not speak for a whole minute.', questions:[{q:'What surfaced beside the little boat?',lines:1},{q:'What did the girl and the whale do?',lines:1},{q:'How do you think you would feel in that moment?',lines:2}] },
      { title:'The Sailor\'s Map', passage:'An old sailor kept a map of every reef and rock and shoal in the harbor. He had made it himself over forty years. When he was too old to sail he gave the map to a young fisherman. "This map," he said, "has saved my life a dozen times. May it save yours too." The young fisherman framed it on his wall.', questions:[{q:'What did the old sailor keep?',lines:1},{q:'What did the sailor do with the map when he was old?',lines:1},{q:'What is something you know well that you could teach someone else?',lines:2}] },
      { title:'First Swim', passage:'It was the first day warm enough to swim in the ocean. A boy named Marcus stood at the edge of the waves. The water was still cold from winter. He ran in before he could think about it. The cold took his breath away. But then he was used to it. He swam out past the break and floated on his back looking up at the blue sky.', questions:[{q:'Why was Marcus hesitant to go in the water?',lines:1},{q:'What did he do when he ran in?',lines:1},{q:'Have you ever done something brave by not thinking about it?',lines:2}] },
      { title:'The Surfing Pelican', passage:'A pelican named Gus discovered he could ride the waves. He spread his wings and let the wave carry him toward shore. Other pelicans stopped flying to watch. Some tried it too. By afternoon the whole flock was surfing. A family on the beach took video. "Has anyone ever seen pelicans surf before?" asked the dad. Nobody had.', questions:[{q:'What did Gus discover he could do?',lines:1},{q:'What did the other pelicans do when they saw Gus?',lines:1},{q:'What is something fun you discovered by accident?',lines:2}] },
      { title:'The Lost Fishing Net', passage:'A fisherman\'s net broke free in a storm and tangled on the reef. A group of divers spent three days carefully cutting it free so the fish and coral would not be hurt. When they were done the reef was clear. Fish that had been hiding came back out. The divers felt very tired and very proud.', questions:[{q:'What happened to the fishing net in the storm?',lines:1},{q:'How did the divers help the reef?',lines:1},{q:'Why do you think the divers felt proud?',lines:2}] },
      { title:'The Glowing Sea', passage:'Some nights the ocean near the shore glowed bright blue. Tiny living things in the water made the light. When the waves broke they left trails of glowing foam. Children ran into the surf and came out with glowing drops on their arms. "Are we magic?" asked a small boy. "A little bit," said his mama.', questions:[{q:'Why did the ocean glow blue?',lines:1},{q:'What happened when the children ran into the surf?',lines:1},{q:'What would you think if you saw a glowing sea?',lines:2}] },
      { title:'The Brave Lighthouse Girl', passage:'The lighthouse keeper was sick and someone had to light the lamp. His daughter Rosa was only ten years old. She climbed all two hundred steps alone in the dark carrying the oil lamp. She lit the great light at the top just as a storm rolled in. Ships saw the light and steered to safety. No one was lost that night.', questions:[{q:'Why did Rosa have to light the lamp?',lines:1},{q:'How did Rosa help the ships?',lines:1},{q:'What would you do if you had to do something very scary but very important?',lines:2}] },
      { title:'The Crab Race', passage:'Every summer the children on the island held crab races on the beach. They drew a big circle in the sand and put their crabs in the middle. First crab to cross the edge of the circle won. The crabs never cooperated. They went every direction except out of the circle. It took a very long time and everyone laughed the entire time.', questions:[{q:'How did the children race crabs?',lines:1},{q:'Why did the race take a very long time?',lines:1},{q:'What was the funniest part of the crab race?',lines:2}] },
