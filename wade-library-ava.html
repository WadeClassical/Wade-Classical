<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ava's Library — Wade Classical</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-app-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --cabin-dark:   #0e0a04;
  --cabin-mid:    #1c1208;
  --cabin-panel:  #2a1c0a;
  --cabin-warm:   #3a2810;
  --cabin-light:  #4e3818;
  --amber:        #c8680a;
  --amber-light:  #e0882a;
  --amber-glow:   #f5a840;
  --amber-pale:   #f5d098;
  --rust:         #a83820;
  --rust-light:   #c84828;
  --gold:         #c89020;
  --gold-light:   #e0b030;
  --maple:        #8a3a08;
  --forest:       #2a4018;
  --forest-light: #3a5820;
  --cream:        #f0dfc0;
  --cream-dim:    #c8a870;
  --text:         #e8d0a0;
  --subtext:      #a07840;
  --muted:        #6a5028;
  --dim:          #4a3818;
  --fire1:        #ff6a00;
  --fire2:        #ff9500;
  --fire3:        #ffcc00;
  --red:          #c84828;
  --shadow:       rgba(10,5,0,0.7);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cabin-dark);color:var(--text);font-family:'Crimson Text',serif;font-size:16px;min-height:100vh;overflow-x:hidden;}

/* ── CABIN BACKGROUND ── */
#cabin-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}

/* Wood panel texture */
.wood-panel{
  position:absolute;inset:0;
  background:
    repeating-linear-gradient(90deg,
      transparent 0px, transparent 60px,
      rgba(10,5,0,.18) 60px, rgba(10,5,0,.18) 62px,
      transparent 62px, transparent 90px,
      rgba(255,160,60,.04) 90px, rgba(255,160,60,.04) 91px
    ),
    repeating-linear-gradient(180deg,
      transparent 0px, transparent 200px,
      rgba(10,5,0,.06) 200px, rgba(10,5,0,.06) 201px
    ),
    linear-gradient(180deg, #0e0a04 0%, #1a1006 40%, #160e05 100%);
}

/* Fireplace glow — ambient light from below-left */
.fire-ambient{
  position:absolute;bottom:0;left:0;right:0;height:60%;
  background:radial-gradient(ellipse 80% 60% at 18% 100%,
    rgba(200,104,10,.22) 0%, rgba(160,60,8,.10) 35%, transparent 70%);
  animation:fireAmb 3s ease-in-out infinite alternate;
}
@keyframes fireAmb{
  0%  {opacity:.7;}
  50% {opacity:1;}
  100%{opacity:.8;}
}
/* Candle glow spots */
.candle-glow{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle, rgba(240,168,60,.18) 0%, transparent 70%);
  animation:candleFlicker var(--cd,4s) ease-in-out var(--co,0s) infinite alternate;
}
@keyframes candleFlicker{
  0%  {opacity:.5;transform:scale(1);}
  25% {opacity:.9;transform:scale(1.08);}
  60% {opacity:.6;transform:scale(.96);}
  100%{opacity:.85;transform:scale(1.04);}
}

/* ── FIREPLACE SCENE (fixed bottom-left) ── */
#fireplace{
  position:fixed;bottom:0;left:0;width:320px;height:340px;
  z-index:2;pointer-events:none;overflow:hidden;
}

/* ── AUTUMN LEAVES ── */
.leaf-canvas{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
.leaf{position:absolute;pointer-events:none;}

/* ── HEADER ── */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(14,10,4,.88);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(200,136,32,.18);
  padding:0 32px;height:54px;
  display:flex;align-items:center;justify-content:space-between;
}
.header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,104,10,.4),rgba(200,136,32,.3),transparent);
}
.header-left{display:flex;align-items:center;gap:20px;}
.back-btn{color:var(--subtext);text-decoration:none;font-family:'Jost',sans-serif;font-size:13px;font-weight:400;transition:color .15s;letter-spacing:.05em;}
.back-btn:hover{color:var(--cream);}
.header-title{font-family:'Cinzel',serif;font-size:16px;font-weight:600;color:var(--amber-glow);letter-spacing:.12em;}
.header-tag{font-family:'Jost',sans-serif;font-size:11px;color:var(--amber);background:rgba(200,104,10,.12);padding:2px 10px;border-radius:4px;border:1px solid rgba(200,104,10,.25);letter-spacing:.08em;}

/* ── MAIN ── */
.main{position:relative;z-index:10;max-width:1000px;margin:0 auto;padding:32px 24px 80px;}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid rgba(200,104,10,.18);margin-bottom:32px;}
.tab{padding:10px 20px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Jost',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:-1px;white-space:nowrap;letter-spacing:.04em;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--amber-light);border-bottom-color:var(--amber);}

/* ── CURRENTLY READING ── */
.cr-section{margin-bottom:52px;}
.cr-spotlight{display:flex;gap:36px;align-items:center;flex-wrap:wrap;padding:8px 0;}
.cr-book-card{display:flex;gap:24px;align-items:center;flex:1;min-width:260px;max-width:420px;}
.cr-cover-wrap{position:relative;flex-shrink:0;transition:transform .3s ease;}
.cr-cover-wrap:hover{transform:scale(1.03);}
.cr-cover-img{width:110px;height:155px;object-fit:cover;border-radius:4px;
  box-shadow:-4px 4px 0 rgba(0,0,0,.6),-8px 8px 20px rgba(0,0,0,.7),0 0 30px rgba(200,104,10,.2);display:block;}
.cr-cover-no-img{width:110px;height:155px;border-radius:4px;
  background:linear-gradient(135deg,var(--cabin-panel),var(--cabin-warm));
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;
  box-shadow:-4px 4px 0 rgba(0,0,0,.5);}
.cr-cover-no-img span{font-size:12px;color:var(--muted);text-align:center;padding:0 8px;line-height:1.3;}
.cr-info{flex:1;}
.cr-eyebrow{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);margin-bottom:8px;}
.cr-title{font-family:'Cinzel',serif;font-size:19px;font-weight:600;color:var(--cream);line-height:1.2;margin-bottom:4px;}
.cr-author{font-family:'Crimson Text',serif;font-size:14px;color:var(--subtext);margin-bottom:12px;}
.cr-meta{font-family:'Jost',sans-serif;font-size:11px;color:var(--dim);margin-bottom:14px;letter-spacing:.04em;}
.cr-progress-labels{display:flex;justify-content:space-between;margin-bottom:6px;}
.cr-progress-text{font-family:'Jost',sans-serif;font-size:11px;color:var(--muted);}
.cr-progress-pct{font-family:'Jost',sans-serif;font-size:11px;color:var(--amber);}
.cr-progress-track{height:3px;background:var(--cabin-warm);border-radius:2px;overflow:hidden;margin-bottom:14px;}
.cr-progress-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--gold));border-radius:2px;transition:width .6s ease;box-shadow:0 0 8px rgba(200,104,10,.5);}
.cr-actions{display:flex;gap:8px;}
.cr-divider{color:rgba(200,104,10,.25);font-size:20px;align-self:center;padding:0 4px;flex-shrink:0;}
.cr-empty{padding:32px 0;color:var(--dim);font-size:14px;display:none;flex-direction:column;gap:12px;align-items:flex-start;}
.cr-books-row{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;}

/* ── SHELF SECTION ── */
.cf-section{margin-bottom:48px;}
.shelf-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.shelf-title{font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
.add-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;background:rgba(200,104,10,.1);color:var(--amber);border:1px solid rgba(200,104,10,.22);border-radius:5px;font-family:'Jost',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
.add-btn:hover{background:rgba(200,104,10,.22);border-color:var(--amber);color:var(--amber-glow);}

/* ── COVERFLOW ── */
.cf-stage{position:relative;height:260px;display:flex;align-items:center;justify-content:center;perspective:900px;overflow:visible;margin-bottom:0;}
.cf-track{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;transform-style:preserve-3d;}
.cf-book{position:absolute;width:150px;height:210px;cursor:pointer;transition:all .4s cubic-bezier(.25,.8,.25,1);transform-style:preserve-3d;transform-origin:center center;flex-shrink:0;}
.cf-book:hover{z-index:30!important;}
.cf-book-inner{width:100%;height:100%;border-radius:3px 6px 6px 3px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.04);}
.cf-book-cover{width:100%;height:100%;object-fit:cover;display:block;}
.cf-book-no-cover{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;text-align:center;}
.cf-book-no-cover-title{font-family:'Cinzel',serif;font-size:11px;color:rgba(240,200,140,.85);line-height:1.4;margin-top:8px;}
.cf-book-reflection{position:absolute;bottom:-70px;left:0;right:0;height:70px;overflow:hidden;opacity:.2;transform:scaleY(-1);filter:blur(1px);pointer-events:none;}
.cf-book-reflection img{width:100%;height:100%;object-fit:cover;object-position:top;}
.cf-book[data-pos="0"] {transform:translateX(0) translateZ(0) rotateY(0deg) scale(1);z-index:10;filter:brightness(1);}
.cf-book[data-pos="1"] {transform:translateX(175px) translateZ(-110px) rotateY(-36deg) scale(.88);z-index:8;filter:brightness(.55);}
.cf-book[data-pos="2"] {transform:translateX(305px) translateZ(-200px) rotateY(-40deg) scale(.75);z-index:6;filter:brightness(.38);}
.cf-book[data-pos="3"] {transform:translateX(395px) translateZ(-280px) rotateY(-43deg) scale(.65);z-index:4;filter:brightness(.25);}
.cf-book[data-pos="-1"]{transform:translateX(-175px) translateZ(-110px) rotateY(36deg) scale(.88);z-index:8;filter:brightness(.55);}
.cf-book[data-pos="-2"]{transform:translateX(-305px) translateZ(-200px) rotateY(40deg) scale(.75);z-index:6;filter:brightness(.38);}
.cf-book[data-pos="-3"]{transform:translateX(-395px) translateZ(-280px) rotateY(43deg) scale(.65);z-index:4;filter:brightness(.25);}
.cf-book[data-pos="hidden-right"]{transform:translateX(560px) translateZ(-380px) rotateY(-45deg) scale(.5);z-index:1;opacity:0;pointer-events:none;}
.cf-book[data-pos="hidden-left"] {transform:translateX(-560px) translateZ(-380px) rotateY(45deg) scale(.5);z-index:1;opacity:0;pointer-events:none;}
.cf-book[data-pos="0"]:hover{transform:translateX(0) translateZ(20px) scale(1.03);}
.cf-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(200,104,10,.08);border:1px solid rgba(200,104,10,.2);border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:var(--amber);font-size:24px;cursor:pointer;transition:all .15s;z-index:20;padding-bottom:2px;}
.cf-arrow:hover{background:rgba(200,104,10,.2);border-color:var(--amber);color:var(--amber-glow);}
.cf-arrow:disabled{opacity:.2;cursor:default;}
.cf-arrow-left{left:0;}
.cf-arrow-right{right:0;}
.cf-info{text-align:center;padding:14px 0 0;min-height:52px;}
.cf-info-title{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:var(--cream);margin-bottom:3px;transition:all .3s;}
.cf-info-author{font-family:'Crimson Text',serif;font-size:13px;color:var(--subtext);transition:all .3s;}
.cf-dots{display:flex;justify-content:center;gap:5px;margin-top:8px;}
.cf-dot{width:5px;height:5px;border-radius:50%;background:rgba(200,104,10,.2);cursor:pointer;transition:all .3s;border:none;}
.cf-dot.active{background:var(--amber);transform:scale(1.4);}
.cf-empty{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:120px;gap:10px;color:var(--dim);font-size:14px;font-family:'Crimson Text',serif;}
.finished-count{text-align:center;padding:24px 0 18px;border-bottom:1px solid rgba(200,104,10,.12);margin-bottom:20px;}
.finished-number{font-family:'Cinzel',serif;font-size:48px;font-weight:600;color:var(--amber);line-height:1;display:block;}
.finished-label{font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:5px;display:block;}

/* No-cover color palette — fall tones */
.bc-rust    {background:linear-gradient(135deg,#3a1008,#8a3820);}
.bc-amber   {background:linear-gradient(135deg,#3a2008,#8a5010);}
.bc-gold    {background:linear-gradient(135deg,#2a1a04,#7a5010);}
.bc-forest  {background:linear-gradient(135deg,#0a1a08,#2a4818);}
.bc-maple   {background:linear-gradient(135deg,#3a0808,#782018);}
.bc-bark    {background:linear-gradient(135deg,#1a1008,#3a2810);}
.bc-ember   {background:linear-gradient(135deg,#2a1004,#7a3808);}
.bc-dusk    {background:linear-gradient(135deg,#1a0e10,#4a2028);}
.bc-pine    {background:linear-gradient(135deg,#081410,#183828);}
.bc-ochre   {background:linear-gradient(135deg,#2a1a04,#6a4010);}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(5,3,0,.9);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--cabin-mid);border:1px solid rgba(200,104,10,.2);border-radius:12px;padding:28px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;position:relative;transform:translateY(12px);transition:transform .2s;scrollbar-width:thin;scrollbar-color:var(--cabin-warm) transparent;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-title{font-family:'Cinzel',serif;font-size:16px;font-weight:600;color:var(--cream);margin-bottom:20px;letter-spacing:.08em;}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;transition:color .15s;line-height:1;}
.modal-close:hover{color:var(--text);}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--cabin-panel);border:1px solid var(--cabin-warm);border-radius:6px;padding:9px 12px;color:var(--text);font-family:'Crimson Text',serif;font-size:15px;outline:none;transition:border-color .15s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--amber);}
.form-select option{background:var(--cabin-mid);}
.form-textarea{resize:vertical;min-height:72px;}
.two-col{display:flex;gap:10px;}.two-col>div{flex:1;}
.btn{padding:9px 18px;border:none;border-radius:6px;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:.04em;}
.btn-primary{background:var(--amber);color:var(--cabin-dark);}
.btn-primary:hover{background:var(--amber-light);}
.btn-secondary{background:var(--cabin-panel);color:var(--subtext);border:1px solid var(--cabin-warm);}
.btn-secondary:hover{color:var(--text);border-color:var(--amber);}
.btn-danger{background:rgba(168,56,32,.1);color:var(--rust-light);border:1px solid rgba(168,56,32,.25);}
.btn-danger:hover{background:rgba(168,56,32,.2);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap;}
.search-results{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;margin-top:10px;scrollbar-width:thin;scrollbar-color:var(--cabin-warm) transparent;}
.result-item{display:flex;gap:12px;padding:10px;align-items:flex-start;background:var(--cabin-panel);border:1px solid var(--cabin-warm);border-radius:8px;cursor:pointer;transition:border-color .15s;}
.result-item:hover{border-color:var(--amber);}
.result-cover{width:38px;height:52px;object-fit:cover;border-radius:3px;flex-shrink:0;background:var(--cabin-warm);}
.result-cover-ph{width:38px;height:52px;background:var(--cabin-warm);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;}
.result-info{flex:1;min-width:0;}
.result-title{font-family:'Cinzel',serif;font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px;}
.result-author{font-size:12px;color:var(--subtext);}
.result-year{font-family:'Jost',sans-serif;font-size:11px;color:var(--dim);margin-top:2px;}
.confirm-area{background:var(--cabin-panel);border:1px solid var(--cabin-warm);border-radius:8px;padding:12px;margin-top:12px;display:none;}
.confirm-title{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;}
.confirm-author{font-size:12px;color:var(--subtext);margin-bottom:12px;}
.mode-toggle{display:flex;margin-bottom:16px;border:1px solid var(--cabin-warm);border-radius:6px;overflow:hidden;}
.mode-btn{flex:1;padding:8px;background:none;border:none;color:var(--muted);font-family:'Jost',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
.mode-btn.active{background:var(--cabin-panel);color:var(--text);}
.report-section{background:var(--cabin-panel);border:1px solid var(--cabin-warm);border-radius:8px;padding:16px;margin-top:16px;}
.report-title{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--amber);margin-bottom:14px;letter-spacing:.08em;}
.detail-header{display:flex;gap:16px;margin-bottom:20px;align-items:flex-start;}
.detail-cover{width:80px;height:112px;object-fit:cover;border-radius:4px;flex-shrink:0;box-shadow:0 8px 20px rgba(0,0,0,.5);}
.detail-cover-ph{width:80px;height:112px;background:var(--cabin-panel);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;}
.detail-title{font-family:'Cinzel',serif;font-size:17px;font-weight:600;color:var(--cream);margin-bottom:4px;line-height:1.2;}
.detail-author{font-size:13px;color:var(--subtext);margin-bottom:4px;}
.detail-meta{font-family:'Jost',sans-serif;font-size:11px;color:var(--dim);}
.progress-wrap{margin-bottom:16px;}
.progress-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.progress-lbl{font-family:'Jost',sans-serif;font-size:11px;color:var(--muted);}
.progress-pct{font-family:'Jost',sans-serif;font-size:11px;color:var(--amber);}
.progress-track{height:3px;background:var(--cabin-warm);border-radius:2px;overflow:hidden;margin-bottom:12px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--gold));border-radius:2px;transition:width .6s;}
.page-row{display:flex;gap:10px;align-items:center;margin-top:8px;}
.star-row{display:flex;gap:4px;margin-top:4px;}
.star{font-size:20px;color:var(--cabin-light);cursor:pointer;transition:color .15s;}
.star.active,.star:hover{color:var(--amber-glow);}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--cabin-warm);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--cabin-warm);color:var(--amber-glow);border:1px solid rgba(200,104,10,.35);padding:10px 22px;border-radius:30px;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;letter-spacing:.04em;z-index:9000;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.toast.show{opacity:1;}

/* Fireplace fire flames */
@keyframes flicker1{0%,100%{transform:scaleX(1) scaleY(1) translateY(0);}25%{transform:scaleX(.96) scaleY(1.04) translateY(-2px);}50%{transform:scaleX(1.04) scaleY(.97) translateY(1px);}75%{transform:scaleX(.98) scaleY(1.03) translateY(-1px);}}
@keyframes flicker2{0%,100%{transform:scaleX(1) scaleY(1) translateY(0);}33%{transform:scaleX(1.05) scaleY(.96) translateY(2px);}66%{transform:scaleX(.95) scaleY(1.05) translateY(-2px);}}
@keyframes flicker3{0%,100%{opacity:.9;}30%{opacity:.6;}70%{opacity:1;}}
@keyframes smokeRise{0%{transform:translateY(0) translateX(0) scale(1);opacity:.3;}100%{transform:translateY(-80px) translateX(10px) scale(2.5);opacity:0;}}
@keyframes leafFall{0%{opacity:0;transform:translateY(0) rotate(0deg);}8%{opacity:.9;}85%{opacity:.7;}100%{opacity:0;transform:translateY(90vh) rotate(540deg);}}

var COLORS = ['bc-rust','bc-amber','bc-gold','bc-forest','bc-maple','bc-bark','bc-ember','bc-dusk','bc-pine','bc-ochre'];
var COLOR_BGSIDES = {
  'bc-rust':  'linear-gradient(135deg,#3a1008,#8a3820)',
  'bc-amber': 'linear-gradient(135deg,#3a2008,#8a5010)',

function uid(){return Date.now()+'-'+Math.random().toString(36).slice(2,7);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function randColor(s){var h=0;for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))%COLORS.length;return COLORS[h];}

// ── FIREBASE ──
function loadBooks(){
  db.ref('library/'+PERSON).on('value',function(snap){
    var d=snap.val()||{};
    books.reading  = d.reading  ? Object.values(d.reading)  : [];
    books.read     = d.read     ? Object.values(d.read)     : [];
    books.want     = d.want     ? Object.values(d.want)     : [];
    books.assigned = d.assigned ? Object.values(d.assigned) : [];
    renderAll();
  });
}
function saveBook(shelf,book){db.ref('library/'+PERSON+'/'+shelf+'/'+book.id).set(book);}
function deleteBook(shelf,id){db.ref('library/'+PERSON+'/'+shelf+'/'+id).remove();}

function renderAll(){
  renderSpotlight();
  renderShelf('read');
  renderShelf('want');
  renderShelf('assigned');
  renderReportsList();
  var n=document.getElementById('finished-num');
  var w=document.getElementById('finished-wrap');
  if(n)n.textContent=books.read.length;
  if(w)w.style.display=books.read.length?'block':'none';
}

// ── TABS ──
function switchTab(name,btn){
  ['reading','read','want','assigned','browse','reports'].forEach(function(t){
    var el=document.getElementById('tab-'+t);
    if(el)el.style.display='none';
  });
  document.getElementById('tab-'+name).style.display='block';
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}

// ── CURRENTLY READING SPOTLIGHT ──
function renderSpotlight(){
  var arr=books.reading||[];
  var empty=document.getElementById('empty-reading');
  var row=document.getElementById('cr-books-row');
  if(!arr.length){if(empty)empty.style.display='flex';if(row)row.style.display='none';return;}
  if(empty)empty.style.display='none';
  if(row)row.style.display='flex';
  row.innerHTML='';
  var showCount=Math.min(arr.length,2);
  for(var i=0;i<showCount;i++){
    var book=arr[i];
    var pct=(book.pages&&book.currentPage)?Math.round(book.currentPage/book.pages*100):0;
    var pageText=book.currentPage?'Page '+book.currentPage:'Not started';
    if(book.pages)pageText+=' of '+book.pages;
    var meta=(book.year||'')+(book.year&&book.pages?' · ':'')+(book.pages?book.pages+' pages':'');
    var eyebrow=i===0?'Now Reading':'Also Reading';
    var tilt=i===0?'rotate(-2deg)':'rotate(1.5deg)';
    if(i===1){var dv=document.createElement('div');dv.className='cr-divider';dv.textContent='|';row.appendChild(dv);}
    var card=document.createElement('div');card.className='cr-book-card';
    var cw=document.createElement('div');cw.className='cr-cover-wrap';cw.style.transform=tilt;
    if(book.cover){
      var ci=document.createElement('img');ci.className='cr-cover-img';ci.src=book.cover;ci.alt=book.title;
      var fb=document.createElement('div');fb.className='cr-cover-no-img';fb.innerHTML='<span>'+esc(book.title)+'</span>';fb.style.display='none';
      ci.addEventListener('error',(function(f){return function(){this.style.display='none';f.style.display='flex';};})(fb));
      cw.appendChild(ci);cw.appendChild(fb);
    } else {
      var noCover=document.createElement('div');noCover.className='cr-cover-no-img';noCover.innerHTML='<span>📖</span><span>'+esc(book.title)+'</span>';
      cw.appendChild(noCover);
    }
    var info=document.createElement('div');info.className='cr-info';
    info.innerHTML='<div class="cr-eyebrow">'+esc(eyebrow)+'</div>'+
      '<div class="cr-title">'+esc(book.title)+'</div>'+
      '<div class="cr-author">'+esc(book.author||'')+'</div>'+
      '<div class="cr-meta">'+esc(meta)+'</div>'+
      '<div class="cr-progress-labels"><span class="cr-progress-text">'+esc(pageText)+'</span><span class="cr-progress-pct">'+pct+'%</span></div>'+
      '<div class="cr-progress-track"><div class="cr-progress-fill" style="width:'+pct+'%"></div></div>';
    var actions=document.createElement('div');actions.className='cr-actions';
    var ob=document.createElement('button');ob.className='btn btn-primary btn-sm';ob.textContent='Open';
    ob.addEventListener('click',(function(b){return function(){openDetailModal(b,'reading');};})(book));
    actions.appendChild(ob);
    info.appendChild(actions);
    card.appendChild(cw);card.appendChild(info);row.appendChild(card);
  }
}

// ── COVERFLOW ──
function renderShelf(shelf){
  var arr=books[shelf]||[];
  var track=document.getElementById('track-'+shelf);
  var emp=document.getElementById('empty-'+shelf);
  var info=document.getElementById('info-'+shelf);
  var arrL=document.getElementById('arr-left-'+shelf);
  var arrR=document.getElementById('arr-right-'+shelf);
  if(!track)return;
  track.innerHTML='';
  if(!arr.length){
    if(emp)emp.style.display='flex';
    if(info)info.style.visibility='hidden';
    if(arrL)arrL.style.display='none';
    if(arrR)arrR.style.display='none';
    return;
  }
  if(emp)emp.style.display='none';
  if(info)info.style.visibility='visible';
  if(arrL)arrL.style.display='flex';
  if(arrR)arrR.style.display='flex';
  if(cfIndex[shelf]>=arr.length)cfIndex[shelf]=arr.length-1;
  if(cfIndex[shelf]<0)cfIndex[shelf]=0;
  for(var i=0;i<arr.length;i++){
    var book=arr[i];
    var card=document.createElement('div');card.className='cf-book';
    var pos=i-cfIndex[shelf];
    if(pos>3)pos='hidden-right';
    else if(pos<-3)pos='hidden-left';
    card.dataset.pos=pos;
    var inner=document.createElement('div');inner.className='cf-book-inner';
    if(book.cover){
      var img=document.createElement('img');img.className='cf-book-cover';img.src=book.cover;img.alt=book.title;inner.appendChild(img);
      var ref=document.createElement('div');ref.className='cf-book-reflection';
      var ri=document.createElement('img');ri.src=book.cover;ref.appendChild(ri);card.appendChild(ref);
    } else {
      inner.style.background=COLOR_BGSIDES[randColor(book.id||book.title||'x')];
      var nc=document.createElement('div');nc.className='cf-book-no-cover';
      nc.innerHTML='<span style="font-size:28px">📖</span><div class="cf-book-no-cover-title">'+esc(book.title)+'</div>';
      inner.appendChild(nc);
    }
    card.appendChild(inner);
    card.addEventListener('click',(function(b,s){return function(){openDetailModal(b,s);};})(book,shelf));
    track.appendChild(card);
  }
  updateCfInfo(shelf);
  updateCfDots(shelf);
}
function cfShift(shelf,dir){
  var arr=books[shelf]||[];
  cfIndex[shelf]=Math.max(0,Math.min(arr.length-1,cfIndex[shelf]+dir));
  renderShelf(shelf);
}
function updateCfInfo(shelf){
  var arr=books[shelf]||[];
  var idx=cfIndex[shelf];
  var book=arr[idx];
  var it=document.getElementById('info-title-'+shelf);
  var ia=document.getElementById('info-author-'+shelf);
  if(it)it.textContent=book?book.title:'';
  if(ia)ia.textContent=book?(book.author||''):'';
}
function updateCfDots(shelf){
  var arr=books[shelf]||[];
  var el=document.getElementById('dots-'+shelf);
  if(!el)return;
  el.innerHTML='';
  for(var i=0;i<arr.length;i++){
    var d=document.createElement('button');d.className='cf-dot'+(i===cfIndex[shelf]?' active':'');
    d.addEventListener('click',(function(idx){return function(){cfIndex[shelf]=idx;renderShelf(shelf);};})(i));
    el.appendChild(d);
  }
}

// ── ADD MODAL ──
function openAddModal(shelf){currentShelf=shelf;clearSel();setAddMode('search');document.getElementById('add-q').value='';openModal('modal-add');setTimeout(function(){document.getElementById('add-q').focus();},100);}
function setAddMode(mode){
  document.getElementById('add-search-mode').style.display=mode==='search'?'block':'none';
  document.getElementById('add-manual-mode').style.display=mode==='manual'?'block':'none';
  document.getElementById('mode-search').classList.toggle('active',mode==='search');
  document.getElementById('mode-manual').classList.toggle('active',mode==='manual');
}
async function gbSearch(q){
  var url='https://www.googleapis.com/books/v1/volumes?q='+encodeURIComponent(q)+'&maxResults=10&key='+BOOKS_API;
  var r=await fetch(url);
  var d=await r.json();
  return (d.items||[]).map(function(item){
    var v=item.volumeInfo;
    return {title:v.title||'Unknown',author:(v.authors||[]).join(', '),year:(v.publishedDate||'').slice(0,4),pages:v.pageCount||'',cover:(v.imageLinks&&(v.imageLinks.thumbnail||v.imageLinks.smallThumbnail))||''};
  });
}
function renderResults(results,container,clickFn){
  container.innerHTML='';
  if(!results.length){container.innerHTML='<div style="color:var(--muted);font-size:13px;padding:10px">No results.</div>';return;}
  results.forEach(function(bk){
    var item=document.createElement('div');item.className='result-item';
    if(bk.cover){var img=document.createElement('img');img.className='result-cover';img.src=bk.cover;img.addEventListener('error',function(){this.style.display='none';});item.appendChild(img);}
    else{var ph=document.createElement('div');ph.className='result-cover-ph';ph.textContent='📖';item.appendChild(ph);}
    var info=document.createElement('div');info.className='result-info';
    info.innerHTML='<div class="result-title">'+esc(bk.title)+'</div><div class="result-author">'+esc(bk.author)+'</div><div class="result-year">'+esc(bk.year)+(bk.pages?' · '+bk.pages+' pages':'')+'</div>';
    item.appendChild(info);
    item.addEventListener('click',(function(b){return function(){clickFn(b);};})(bk));
    container.appendChild(item);
  });
}
async function doAddSearch(){
  var q=document.getElementById('add-q').value.trim();
  var el=document.getElementById('add-results');
  if(!q)return;
  el.innerHTML='<div style="padding:16px;text-align:center"><span class="spinner"></span></div>';
  try{var r=await gbSearch(q);renderResults(r,el,selectBook);}
  catch(e){el.innerHTML='<div style="color:var(--muted);font-size:13px;padding:10px">Search failed. Try Manual.</div>';}
}
function selectBook(bk){
  selectedBook={id:uid(),title:bk.title,author:bk.author,year:bk.year,pages:bk.pages,cover:bk.cover,addedAt:Date.now(),currentPage:0,notes:'',rating:0,report:null};
  document.getElementById('add-results').innerHTML='';
  document.getElementById('confirm-title').textContent=bk.title;
  document.getElementById('confirm-author').textContent=bk.author;
  document.getElementById('s-pages').value=bk.pages||'';
  document.getElementById('add-confirm').style.display='block';
}
function clearSel(){selectedBook=null;document.getElementById('add-confirm').style.display='none';document.getElementById('add-results').innerHTML='';document.getElementById('add-q').value='';}
function confirmAdd(){
  if(!selectedBook)return;
  selectedBook.currentPage=parseInt(document.getElementById('s-page').value)||0;
  selectedBook.pages=parseInt(document.getElementById('s-pages').value)||selectedBook.pages||'';
  selectedBook.notes=document.getElementById('s-notes').value;
  saveBook(currentShelf,selectedBook);closeModal('modal-add');showToast('"'+selectedBook.title+'" added');
}
function confirmManual(){
  var title=document.getElementById('m-title').value.trim();
  if(!title){showToast('Enter a title');return;}
  var book={id:uid(),title:title,author:document.getElementById('m-author').value.trim(),year:document.getElementById('m-year').value.trim(),pages:parseInt(document.getElementById('m-pages').value)||'',cover:document.getElementById('m-cover').value.trim(),addedAt:Date.now(),currentPage:parseInt(document.getElementById('m-page').value)||0,notes:'',rating:0,report:null};
  saveBook(currentShelf,book);closeModal('modal-add');showToast('"'+title+'" added');
}

// ── BROWSE ──
async function doBrowse(){
  var q=document.getElementById('browse-q').value.trim();
  var el=document.getElementById('browse-results');
  if(!q)return;
  el.innerHTML='<div style="padding:20px;text-align:center"><span class="spinner"></span></div>';

    el.innerHTML='';
    results.forEach(function(bk){
      var item=document.createElement('div');item.className='result-item';item.style.cursor='default';
      if(bk.cover){var img=document.createElement('img');img.className='result-cover';img.src=bk.cover;img.addEventListener('error',function(){this.style.display='none';});item.appendChild(img);}
      else{var ph=document.createElement('div');ph.className='result-cover-ph';ph.textContent='📖';item.appendChild(ph);}
      var info=document.createElement('div');info.className='result-info';
      info.innerHTML='<div class="result-title">'+esc(bk.title)+'</div><div class="result-author">'+esc(bk.author)+'</div><div class="result-year">'+esc(bk.year)+'</div>';
      var btn=document.createElement('button');btn.className='btn btn-secondary btn-sm';btn.style.marginTop='6px';btn.textContent='+ Want to Read';

      };})(bk,btn));

    });
  }catch(e){el.innerHTML='<div style="color:var(--muted);font-size:13px">Search failed.</div>';}
}

// ── DETAIL MODAL ──
function openDetailModal(book,shelf){
  var rep=book.report||{};
  var pct=(book.pages&&book.currentPage)?Math.round(book.currentPage/book.pages*100):0;
  var container=document.getElementById('detail-content');container.innerHTML='';
  var hdr=document.createElement('div');hdr.className='detail-header';
  if(book.cover){var ci=document.createElement('img');ci.className='detail-cover';ci.src=book.cover;hdr.appendChild(ci);}
  else{var cp=document.createElement('div');cp.className='detail-cover-ph';cp.textContent='📖';hdr.appendChild(cp);}
  var hi=document.createElement('div');
  hi.innerHTML='<div class="detail-title">'+esc(book.title)+'</div><div class="detail-author">'+esc(book.author||'')+'</div><div class="detail-meta">'+esc((book.year?book.year+' · ':'')+(book.pages?book.pages+' pages':''))+'</div>';
  hdr.appendChild(hi);container.appendChild(hdr);
  if(shelf==='reading'){
    var pw=document.createElement('div');pw.className='progress-wrap';
    pw.innerHTML='<div class="progress-row"><span class="progress-lbl">Progress</span><span class="progress-pct">'+pct+'%</span></div><div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
    var pr=document.createElement('div');pr.className='page-row';
    var pi=document.createElement('input');pi.type='number';pi.id='detail-page';pi.value=book.currentPage||0;pi.min='0';pi.className='form-input';pi.style.width='90px';
    var po=document.createElement('span');po.style.cssText='color:var(--muted);font-size:13px;font-family:Jost,sans-serif';po.textContent='of '+(book.pages||'?');
    var ps=document.createElement('button');ps.className='btn btn-secondary btn-sm';ps.textContent='Save';
    ps.addEventListener('click',function(){updateProgress(book.id,shelf);});
    pr.appendChild(pi);pr.appendChild(po);pr.appendChild(ps);pw.appendChild(pr);container.appendChild(pw);
  }
  var rw=document.createElement('div');rw.style.marginBottom='14px';
  var rl=document.createElement('div');rl.style.cssText='font-family:Jost,sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px';rl.textContent='Rating';
  var sr=document.createElement('div');sr.className='star-row';sr.id='stars-'+book.id;
  for(var n=1;n<=5;n++){var st=document.createElement('span');st.className='star'+((book.rating||0)>=n?' active':'');st.dataset.n=n;st.innerHTML='&#9733;';st.addEventListener('click',(function(nn){return function(){setRating(nn,book.id,shelf);};})(n));sr.appendChild(st);}
  rw.appendChild(rl);rw.appendChild(sr);container.appendChild(rw);
  if(shelf==='reading'||shelf==='read'){
    var rs=document.createElement('div');rs.className='report-section';
    var rt=document.createElement('div');rt.className='report-title';rt.textContent='Book Report';rs.appendChild(rt);
    var so='<option value="">— stars —</option>';
    for(var si=1;si<=5;si++)so+='<option value="'+si+'"'+(rep.stars==si?' selected':'')+'>'+si+' star'+(si>1?'s':'')+'</option>';
    rs.innerHTML+='<div class="form-group"><label class="form-label">Star Rating</label><select class="form-select" id="report-stars">'+so+'</select></div>'+
      '<div class="form-group"><label class="form-label">Characters</label><input type="text" class="form-input" id="report-chars" placeholder="Main characters..." value="'+esc(rep.characters||'')+'"></div>'+
      '<div class="form-group"><label class="form-label">Setting</label><input type="text" class="form-input" id="report-setting" placeholder="Where/when?" value="'+esc(rep.setting||'')+'"></div>'+
      '<div class="form-group"><label class="form-label">1. What was this book about?</label><textarea class="form-textarea" id="report-about" placeholder="Summarize...">'+esc(rep.about||'')+'</textarea></div>'+
      '<div class="form-group"><label class="form-label">2. What was your favorite part?</label><textarea class="form-textarea" id="report-fav" placeholder="Favorite scene or moment...">'+esc(rep.favorite||'')+'</textarea></div>'+
      '<div class="form-group"><label class="form-label">3. What is something you learned?</label><textarea class="form-textarea" id="report-learned" placeholder="What did you take away?">'+esc(rep.learned||'')+'</textarea></div>';
    var sv=document.createElement('button');sv.className='btn btn-primary btn-sm';sv.textContent='Save Report';
    sv.addEventListener('click',function(){saveReport(book.id,shelf);});rs.appendChild(sv);container.appendChild(rs);
  }
  var br=document.createElement('div');br.className='btn-row';br.style.cssText='margin-top:16px;padding-top:14px;border-top:1px solid var(--cabin-warm)';
  if(shelf==='reading'){var fb=document.createElement('button');fb.className='btn btn-primary btn-sm';fb.textContent='Mark Finished';fb.addEventListener('click',function(){moveBook(book.id,'reading','read');});br.appendChild(fb);}
  if(shelf==='want'){var sb=document.createElement('button');sb.className='btn btn-secondary btn-sm';sb.textContent='Start Reading';sb.addEventListener('click',function(){moveBook(book.id,'want','reading');});br.appendChild(sb);}
  if(shelf==='read'){var rb=document.createElement('button');rb.className='btn btn-secondary btn-sm';rb.textContent='Re-read';rb.addEventListener('click',function(){moveBook(book.id,'read','reading');});br.appendChild(rb);}
  if(shelf==='assigned'){var ab=document.createElement('button');ab.className='btn btn-primary btn-sm';ab.textContent='Start Reading';ab.addEventListener('click',function(){var nb=Object.assign({},book);deleteBook('assigned',book.id);saveBook('reading',nb);closeModal('modal-detail');showToast('Started reading');});br.appendChild(ab);}
  var rm=document.createElement('button');rm.className='btn btn-danger btn-sm';rm.textContent='Remove';
  rm.addEventListener('click',function(){closeModal('modal-detail');setTimeout(function(){if(!confirm('Remove this book?'))return;deleteBook(shelf,book.id);showToast('Removed');},150);});
  br.appendChild(rm);container.appendChild(br);
  openModal('modal-detail');
}

function updateProgress(id,shelf){
  var page=parseInt(document.getElementById('detail-page').value)||0;
  (books[shelf]||[]).forEach(function(b){if(b.id===id){b.currentPage=page;saveBook(shelf,b);}});
  showToast('Saved');closeModal('modal-detail');
}
function setRating(n,id,shelf){
  (books[shelf]||[]).forEach(function(b){if(b.id===id){b.rating=n;saveBook(shelf,b);}});
  var c=document.getElementById('stars-'+id);
  if(c)c.querySelectorAll('.star').forEach(function(s){s.classList.toggle('active',parseInt(s.dataset.n)<=n);});
  showToast('Rating saved');
}
function saveReport(id,shelf){
  (books[shelf]||[]).forEach(function(b){
    if(b.id===id){
      b.report={stars:document.getElementById('report-stars').value,characters:document.getElementById('report-chars').value,setting:document.getElementById('report-setting').value,about:document.getElementById('report-about').value,favorite:document.getElementById('report-fav').value,learned:document.getElementById('report-learned').value,savedAt:Date.now()};
      saveBook(shelf,b);
    }
  });
  showToast('Report saved');
}
function moveBook(id,from,to){
  (books[from]||[]).forEach(function(b){if(b.id===id){var nb=Object.assign({},b,{movedAt:Date.now()});deleteBook(from,id);saveBook(to,nb);}});
  closeModal('modal-detail');showToast('Moved');
}

    if(rep.favorite)html+='<div style="margin-bottom:8px"><div style="font-family:Jost,sans-serif;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:2px">Favorite part</div><div style="font-size:14px;color:var(--text);line-height:1.5">'+esc(rep.favorite)+'</div></div>';
    if(rep.learned)html+='<div><div style="font-family:Jost,sans-serif;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:2px">Something I learned</div><div style="font-size:14px;color:var(--text);line-height:1.5">'+esc(rep.learned)+'</div></div>';
    html+='</div>';
  });
  el.innerHTML=html;
}

    function(c,s){return '<svg width="'+(s*.8)+'" height="'+s+'" viewBox="-7 -10 14 20" xmlns="http://www.w3.org/2000/svg"><path d="M0,-9 C4,-4 5,3 0,9 C-5,3 -4,-4 0,-9Z" fill="'+c+'" opacity=".87"/><line x1="0" y1="-8" x2="0" y2="8" stroke="rgba(0,0,0,.2)" stroke-width=".6"/><line x1="0" y1="-1" x2="4" y2="3" stroke="rgba(0,0,0,.12)" stroke-width=".4"/><line x1="0" y1="-1" x2="-4" y2="3" stroke="rgba(0,0,0,.12)" stroke-width=".4"/><line x1="0" y1="3" x2="3.5" y2="6" stroke="rgba(0,0,0,.1)" stroke-width=".4"/><line x1="0" y1="3" x2="-3.5" y2="6" stroke="rgba(0,0,0,.1)" stroke-width=".4"/></svg>';}
  ];
  var colors=['#c84808','#e06010','#d48010','#a83010','#c89020','#8a2808','#d4601a','#b84008','#e8a028','#6a1808','#c05018','#a87020'];
  var leaves=[];
  var MAX=20;
  function makeLeaf(){
    var c=colors[Math.floor(Math.random()*colors.length)];
    var design=leafDesigns[Math.floor(Math.random()*leafDesigns.length)];
    var size=16+Math.random()*20;
    var el=document.createElement('div');
    el.className='leaf';
    el.innerHTML=design(c,size);
    el.style.filter='drop-shadow(0 1px 2px rgba(0,0,0,.3))';
    canvas.appendChild(el);
    return {
      el:el,
      x:Math.random()*W(),
      y:-30-Math.random()*120,
      vy:0.5+Math.random()*0.8,
      vx:(Math.random()-0.5)*0.7,
      rot:Math.random()*360,
      vr:(Math.random()-0.5)*2.5,
      sway:Math.random()*Math.PI*2,
      scale:0.7+Math.random()*0.8,
      opacity:0,
      fadeIn:true
    };
  }
  for(var i=0;i<MAX;i++) setTimeout(function(){leaves.push(makeLeaf());},i*400);
  function tick(){
    var vh=H();
    var fadeZone=vh*0.82;
    for(var i=leaves.length-1;i>=0;i--){
      var p=leaves[i];
      p.sway+=0.014;
      p.x+=p.vx+Math.sin(p.sway)*0.5;
      p.y+=p.vy;
      p.rot+=p.vr;
      if(p.fadeIn){p.opacity=Math.min(p.opacity+0.02,0.85);if(p.opacity>=0.85)p.fadeIn=false;}
      if(p.y>fadeZone){var t=(p.y-fadeZone)/(vh*0.14);p.opacity=0.85*Math.max(0,1-t);}
      p.el.style.transform='translate('+p.x+'px,'+p.y+'px) rotate('+p.rot+'deg) scale('+p.scale+')';
      p.el.style.opacity=p.opacity;
      if(p.y>vh*0.96&&p.opacity<=0.01){
        p.el.remove();leaves.splice(i,1);
        setTimeout(function(){leaves.push(makeLeaf());},Math.random()*3000+500);
      }
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

loadBooks();
</script>
