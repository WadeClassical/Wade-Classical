<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Planner 🌿 Wade Classical</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Nunito:wght@400;600;700;800;900&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#fdf6f0;--cream2:#f5e8e0;--ink:#1e1428;--muted:#7a6070;
  /* Bridgerton palette */
  --mon:#e8559a;  --mon-bg:#fde8f4;  --mon-dark:#b8206a;
  --tue:#9b59d4;  --tue-bg:#f2e8fc;  --tue-dark:#6a28a8;
  --wed:#3a8fbf;  --wed-bg:#e4f2fa;  --wed-dark:#1a5a80;
  --thu:#2a8a5a;  --thu-bg:#e2f5ec;  --thu-dark:#1a5a38;
  --fri:#c44090;  --fri-bg:#fae4f4;  --fri-dark:#8a1860;
  --sat:#5870d4;  --sat-bg:#eaeeff;  --sat-dark:#2840a0;
  --sun:#a040c8;  --sun-bg:#f4e4fc;  --sun-dark:#6818a0;
  --sh-sm:0 2px 8px rgba(30,20,40,.09);
  --sh-md:0 6px 24px rgba(30,20,40,.13);
  --sh-lg:0 16px 48px rgba(30,20,40,.17);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',sans-serif;
  background-color:#fdf0f5;
  background-image:
    radial-gradient(ellipse at 0% 0%,   rgba(232,85,154,.13) 0%,transparent 45%),
    radial-gradient(ellipse at 100% 0%,  rgba(155,89,212,.10) 0%,transparent 45%),
    radial-gradient(ellipse at 100% 100%,rgba(90,112,212,.09) 0%,transparent 40%),
    radial-gradient(ellipse at 0% 100%,  rgba(42,138,90,.07)  0%,transparent 40%),
    radial-gradient(ellipse at 50% 50%,  rgba(232,85,154,.04) 0%,transparent 60%);
  min-height:100vh;color:var(--ink);overflow-x:hidden;
}

/* ── FIXED BOTANICAL CORNERS ── */
.bot{position:fixed;pointer-events:none;z-index:0;}
.bot.tl{top:0;left:0;opacity:.28;}
.bot.br{bottom:0;right:0;transform:rotate(180deg);opacity:.22;}
.bot.tr{top:0;right:0;transform:scaleX(-1);opacity:.20;}
.bot.bl{bottom:0;left:0;transform:scaleY(-1);opacity:.16;}

/* ── PETAL CANVAS ── */
.petals-canvas{
  position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;
}
.petal{
  position:absolute;
  pointer-events:none;
}
header{position:relative;z-index:10;background:rgba(253,246,240,.96);backdrop-filter:blur(8px);border-bottom:2px solid var(--cream2);padding:14px 28px;display:flex;align-items:center;gap:16px;box-shadow:var(--sh-sm);}
.back-btn{background:var(--cream2);border:1.5px solid #e0d0d8;color:var(--muted);padding:6px 14px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .18s;}
.back-btn:hover{background:#ead8e4;color:var(--ink);}
.htitle{flex:1;text-align:center;}
.htitle h1{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--ink);letter-spacing:.06em;}
.htitle p{font-family:'Caveat',cursive;font-size:15px;color:var(--muted);margin-top:1px;}
.sync-ind{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);}
.sdot{width:8px;height:8px;border-radius:50%;background:#2a8a5a;}
.sdot.syncing{background:#9b59d4;animation:pulse .8s infinite;}
.sdot.err{background:#e8559a;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.page{position:relative;z-index:1;padding:24px 20px 340px;max-width:1100px;margin:0 auto;}

/* ── VIEW TABS ── */
.view-tabs{display:flex;gap:0;justify-content:center;margin-bottom:28px;background:#fff;border-radius:16px;padding:5px;box-shadow:var(--sh-sm);width:fit-content;margin-left:auto;margin-right:auto;}
.vtab{background:transparent;border:none;color:var(--muted);padding:9px 20px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .18s;letter-spacing:.03em;white-space:nowrap;}
.vtab.active{background:linear-gradient(135deg,var(--mon),var(--tue));color:#fff;box-shadow:0 3px 12px rgba(155,89,212,.3);}
.vtab:hover:not(.active){background:var(--cream2);color:var(--ink);}

/* ── VIEWS ── */
#carView{display:block;}#edView,#dbView{display:none;}

/* ── CAROUSEL ── */
.car-wrap{display:flex;align-items:center;justify-content:center;gap:14px;perspective:1600px;padding:8px 0 24px;}
.wcard{background:#fff;border-radius:24px;box-shadow:var(--sh-md);transition:all .4s cubic-bezier(.34,1.4,.64,1);cursor:pointer;position:relative;overflow:hidden;flex-shrink:0;}
.wcard.side{width:190px;opacity:.55;box-shadow:var(--sh-sm);filter:saturate(.55) brightness(.97);}
.wcard.side.left{transform:scale(.84) rotateY(12deg) translateX(10px);}
.wcard.side.right{transform:scale(.84) rotateY(-12deg) translateX(-10px);}
.wcard.center{width:520px;opacity:1;transform:scale(1) rotateY(0);box-shadow:0 20px 60px rgba(30,20,40,.18);cursor:default;}
.wcard.side:hover{opacity:.75;filter:saturate(.8);}

/* center card header — lush botanical banner */
.card-hdr{padding:0;position:relative;overflow:hidden;}
.card-hdr-inner{
  padding:18px 22px 16px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,#1a0a28 0%,#28102a 40%,#1a0e22 70%,#0c1220 100%);
  position:relative;z-index:1;
  min-height:72px;
}
/* shimmer sweep */
.card-hdr-inner::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 35%,rgba(232,85,154,.08) 50%,rgba(155,89,212,.06) 60%,transparent 70%);
  pointer-events:none;
}
/* bottom glow line */
.card-hdr-inner::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(232,85,154,.5) 25%,rgba(200,140,255,.6) 50%,rgba(155,89,212,.5) 75%,transparent 100%);
}
/* scattered dot sparkles */
.card-hdr-sparkles{
  position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(circle,rgba(232,85,154,.5) 1px,transparent 1px),
    radial-gradient(circle,rgba(200,160,255,.4) 1px,transparent 1px),
    radial-gradient(circle,rgba(100,180,255,.3) 1px,transparent 1px);
  background-size:120px 60px, 90px 50px, 140px 70px;
  background-position:18px 14px, 55px 30px, 90px 10px;
}
/* botanical SVG overlay */
.card-hdr-botanical{
  position:absolute;right:0;top:0;bottom:0;
  width:160px;pointer-events:none;z-index:0;opacity:.22;
}
.card-hdr-botanical-left{
  position:absolute;left:0;top:0;bottom:0;
  width:80px;pointer-events:none;z-index:0;opacity:.15;
}
/* week label — script feel */
.card-wlbl{
  font-family:'Caveat',cursive;
  font-size:20px;font-weight:700;
  color:#f4d0e8;
  letter-spacing:.04em;
  text-shadow:0 0 20px rgba(232,85,154,.4);
  position:relative;z-index:2;
  line-height:1;
}
.card-wlbl-sub{
  font-family:'Cinzel',serif;
  font-size:9px;font-weight:600;
  color:rgba(232,200,240,.45);
  letter-spacing:.18em;text-transform:uppercase;
  display:block;margin-top:3px;
}
.card-comp{
  font-size:11px;font-weight:800;
  padding:4px 12px;border-radius:20px;
  background:rgba(232,85,154,.18);
  color:#f4d0e8;
  border:1px solid rgba(232,85,154,.35);
  position:relative;z-index:2;
  letter-spacing:.04em;
  backdrop-filter:blur(4px);
}
.card-comp.done{
  background:linear-gradient(135deg,rgba(42,138,90,.8),rgba(26,90,56,.9));
  color:#a8f0c8;border-color:rgba(42,138,90,.5);
}

/* side card headers — simpler */
.wcard.side .card-hdr-inner{padding:10px 14px;background:var(--cream2);min-height:auto;}
.wcard.side .card-hdr-inner::before,.wcard.side .card-hdr-inner::after{display:none;}
.wcard.side .card-hdr-sparkles,.wcard.side .card-hdr-botanical,.wcard.side .card-hdr-botanical-left{display:none;}
.wcard.side .card-wlbl{color:var(--muted);font-size:14px;text-shadow:none;}
.wcard.side .card-wlbl-sub{display:none;}
.wcard.side .card-comp{background:rgba(30,20,40,.08);color:var(--muted);border:none;font-size:10px;padding:2px 8px;backdrop-filter:none;}

/* day rows — center card */
.card-days{padding:6px 0 0;}
.card-drow{display:flex;align-items:center;gap:0;transition:background .35s ease;position:relative;overflow:hidden;}
.card-drow:last-child{border-bottom:none;}

/* left color bar */
.card-dbar{width:5px;flex-shrink:0;align-self:stretch;}

/* day label block */
.card-dlabel{width:110px;flex-shrink:0;padding:10px 12px;display:flex;flex-direction:column;gap:2px;border-right:1px solid rgba(30,20,40,.05);}
.card-dname{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--ink);letter-spacing:.05em;}
.card-dtheme{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.6;}
.card-demoji-big{font-size:18px;padding:10px 10px;flex-shrink:0;}

/* meal name */
.card-dmeal-wrap{flex:1;padding:8px 14px 8px 0;display:flex;align-items:center;gap:8px;}
.card-dmeal{font-family:'Caveat',cursive;font-size:20px;font-weight:700;color:var(--ink);flex:1;line-height:1.1;}
.card-dempty{font-family:'Nunito',sans-serif;font-size:12px;color:#c0a8b8;font-style:italic;flex:1;}

/* separating lines between days */
.card-drow::after{content:'';position:absolute;bottom:0;left:5px;right:0;height:1px;background:rgba(30,20,40,.05);}
.card-drow:last-child::after{display:none;}

/* center card hover row effect */
.wcard.center .card-drow:hover{background:rgba(30,20,40,.025);}

/* side card day rows — compact */
.wcard.side .card-days{padding:4px 0 0;}
.wcard.side .card-dbar{width:3px;}
.wcard.side .card-dlabel{width:60px;padding:6px 8px;}
.wcard.side .card-dname{font-size:9px;}
.wcard.side .card-dtheme{display:none;}
.wcard.side .card-demoji-big{font-size:13px;padding:6px 7px;}
.wcard.side .card-dmeal-wrap{padding:5px 10px 5px 0;}
.wcard.side .card-dmeal{font-size:13px;}
.wcard.side .card-dempty{font-size:10px;}

/* completion bar */
.bar-wrap{padding:12px 18px 16px;border-top:1px solid rgba(30,20,40,.05);}
.bar-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.bar-label{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
.bar-pct{font-family:'Caveat',cursive;font-size:16px;font-weight:700;color:var(--ink);}
.bar-track{background:var(--cream2);border-radius:10px;height:7px;overflow:hidden;}
.bar-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--mon),var(--tue),var(--sun));transition:width .6s cubic-bezier(.34,1.56,.64,1);}
.wcard.side .bar-wrap{padding:8px 12px 10px;}
.wcard.side .bar-meta{display:none;}
.wcard.side .bar-track{height:4px;}

/* plan button inside center card */
.card-plan-btn{display:block;margin:0 18px 18px;padding:10px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--mon),var(--tue));color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;cursor:pointer;letter-spacing:.04em;transition:all .2s;text-align:center;box-shadow:0 4px 14px rgba(155,89,212,.3);}
.card-plan-btn:hover{transform:scale(1.02);box-shadow:0 6px 20px rgba(155,89,212,.45);}

.car-arrow{background:#fff;border:2px solid var(--cream2);width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;box-shadow:var(--sh-sm);transition:all .18s;flex-shrink:0;}
.car-arrow:hover{background:var(--ink);color:var(--cream);border-color:var(--ink);transform:scale(1.1);}
.car-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:4px;}
.act-btn{background:#fff;border:2px solid var(--cream2);color:var(--ink);padding:9px 18px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .18s;box-shadow:var(--sh-sm);display:flex;align-items:center;gap:6px;}
.act-btn:hover{transform:translateY(-2px);box-shadow:var(--sh-md);}
.act-btn.a{border-color:var(--mon);}.act-btn.a:hover{background:var(--mon-bg);}
.act-btn.b{border-color:var(--sat);}.act-btn.b:hover{background:var(--sat-bg);}
.act-btn.c{border-color:var(--sun);}.act-btn.c:hover{background:var(--sun-bg);}

/* ── EDITOR ── */
.ed-hdr{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.ed-back{background:#fff;border:2px solid var(--cream2);color:var(--muted);padding:7px 14px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .18s;box-shadow:var(--sh-sm);}
.ed-back:hover{background:var(--cream2);}
.ed-wtitle{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--ink);letter-spacing:.05em;}
.ed-comp{margin-left:auto;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;padding:5px 14px;border-radius:20px;background:var(--cream2);color:var(--muted);}
.ed-comp.done{background:linear-gradient(135deg,#2a8a5a,#1a5a38);color:#fff;}
.day-secs{display:flex;flex-direction:column;gap:14px;}
.daycard{background:#fff;border-radius:16px;box-shadow:var(--sh-sm);border-left:6px solid #ddd;overflow:hidden;transition:box-shadow .2s, background .35s ease;animation:slideIn .3s ease both;}
@keyframes slideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.daycard:nth-child(1){animation-delay:.00s}.daycard:nth-child(2){animation-delay:.05s}.daycard:nth-child(3){animation-delay:.09s}
.daycard:nth-child(4){animation-delay:.13s}.daycard:nth-child(5){animation-delay:.17s}.daycard:nth-child(6){animation-delay:.21s}.daycard:nth-child(7){animation-delay:.25s}
.daycard:hover{box-shadow:var(--sh-md);}
.dc-hdr{padding:13px 16px 11px;display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none;}
.theme-badge{display:flex;align-items:center;gap:7px;padding:4px 11px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:#fff;}
.dc-dayname{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--ink);flex:1;}
.dc-date{font-size:12px;color:var(--muted);font-weight:600;}
.dc-icon{font-size:11px;color:var(--muted);transition:transform .2s;}
.daycard.open .dc-icon{transform:rotate(180deg);}
.meal-display{margin:0 14px 10px;padding:9px 13px;border-radius:11px;display:flex;align-items:center;gap:9px;border:2px solid var(--cream2);}
.meal-display.filled{border-style:solid;}
.md-emoji{font-size:20px;}
.md-name{font-family:'Caveat',cursive;font-size:19px;font-weight:700;flex:1;color:var(--ink);}
.md-empty{font-size:13px;color:#c0a8b8;font-style:italic;flex:1;}
.md-link{color:var(--sat);font-size:13px;text-decoration:none;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--sat-bg);transition:all .15s;white-space:nowrap;flex-shrink:0;}
.md-link:hover{background:var(--sat);color:#fff;}
.md-clr{background:none;border:none;color:#ccc;font-size:17px;cursor:pointer;padding:0;transition:color .15s;line-height:1;flex-shrink:0;}
.md-clr:hover{color:var(--mon);}
.sat-wrap{margin:0 14px 12px;display:flex;gap:8px;align-items:center;}
.sat-inp{flex:1;padding:9px 13px;border:2px solid var(--cream2);border-radius:10px;font-family:'Caveat',cursive;font-size:17px;font-weight:600;color:var(--ink);background:#fff;outline:none;transition:border-color .18s;}
.sat-inp::placeholder{color:#c0a8b8;font-style:italic;}
.sat-inp:focus{border-color:var(--sat);}
.sat-btn{background:var(--sat);color:#fff;border:none;padding:9px 14px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .18s;}
.sat-btn:hover{background:var(--sat-dark);transform:scale(1.04);}
.opts-panel{display:none;padding:0 14px 14px;}
.daycard.open .opts-panel{display:block;}
.opts-lbl{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;}
.opts-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
.mchip{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:10px;background:var(--cream2);border:2px solid transparent;font-family:'Caveat',cursive;font-size:15px;font-weight:600;cursor:pointer;transition:all .18s;color:var(--ink);user-select:none;}
.mchip:hover{transform:translateY(-2px) scale(1.03);box-shadow:var(--sh-sm);}
.mchip.sel{color:#fff;border-color:transparent;transform:scale(1.04);box-shadow:0 4px 12px rgba(0,0,0,.14);}
.mchip-link{font-size:11px;opacity:.8;margin-left:2px;}
.rand-btn{background:none;border:2px dashed #ddd;color:var(--muted);padding:7px 13px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;transition:all .18s;width:100%;margin-top:7px;letter-spacing:.03em;}
.rand-btn:hover{border-color:var(--tue);color:var(--tue);background:var(--tue-bg);}
.add-theme-row{display:flex;gap:7px;align-items:center;margin-top:9px;}
.add-tinp{flex:1;padding:7px 11px;border:2px solid var(--cream2);border-radius:10px;font-family:'Caveat',cursive;font-size:15px;color:var(--ink);background:#fff;outline:none;transition:border-color .18s;}
.add-tinp::placeholder{color:#c0a8b8;font-style:italic;}
.add-tbtn{background:var(--cream2);border:2px solid #ddd;color:var(--muted);padding:7px 13px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;transition:all .18s;white-space:nowrap;}
.add-tbtn:hover{color:var(--ink);background:#ead8e4;}
/* one-off entry */
.oneoff-wrap{display:flex;gap:7px;align-items:center;margin-bottom:12px;}
.oneoff-inp{flex:1;padding:9px 13px;border:2px solid var(--cream2);border-radius:10px;font-family:'Caveat',cursive;font-size:17px;color:var(--ink);background:#fff;outline:none;transition:border-color .18s;}
.oneoff-inp::placeholder{color:#c0a8b8;font-style:italic;}
.oneoff-inp:focus{border-color:#c44090;}
.oneoff-btn{background:#e8559a;color:#fff;border:none;padding:9px 16px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:900;cursor:pointer;transition:all .18s;white-space:nowrap;letter-spacing:.02em;}
.oneoff-btn:hover{filter:brightness(1.1);transform:scale(1.03);}
/* divider between one-off and recipe box */
.opts-divider{display:flex;align-items:center;gap:10px;margin:4px 0 10px;}
.opts-divider-line{flex:1;height:1px;background:var(--cream2);}
.opts-divider-lbl{font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#c0a8b8;white-space:nowrap;}

/* ── DATABASE VIEW ── */
.db-topbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.db-title{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--ink);letter-spacing:.05em;flex:1;}
.db-add-btn{background:linear-gradient(135deg,var(--mon),var(--tue));color:#fff;border:none;padding:9px 20px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;cursor:pointer;transition:all .2s;box-shadow:0 3px 12px rgba(155,89,212,.3);white-space:nowrap;}
.db-add-btn:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(155,89,212,.4);}
.db-groups{display:flex;flex-direction:column;gap:20px;}
.db-group{background:#fff;border-radius:16px;box-shadow:var(--sh-sm);overflow:hidden;animation:slideIn .3s ease both;}
.db-group:nth-child(1){animation-delay:.00s}.db-group:nth-child(2){animation-delay:.05s}.db-group:nth-child(3){animation-delay:.09s}
.db-group:nth-child(4){animation-delay:.13s}.db-group:nth-child(5){animation-delay:.17s}.db-group:nth-child(6){animation-delay:.21s}.db-group:nth-child(7){animation-delay:.25s}
.db-group-hdr{padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:2px solid var(--cream2);}
.db-theme-badge{display:flex;align-items:center;gap:8px;padding:5px 14px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:#fff;}
.db-group-title{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--ink);flex:1;}
.db-count{font-size:12px;font-weight:800;color:var(--muted);background:var(--cream2);padding:3px 10px;border-radius:20px;}
.db-add-here{background:none;border:none;font-size:12px;font-weight:800;cursor:pointer;padding:4px 10px;border-radius:8px;transition:all .15s;}
.db-add-here:hover{background:var(--cream2);}
.db-meals-list{padding:10px 14px 14px;display:flex;flex-direction:column;gap:6px;}
.db-meal-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;border:1.5px solid var(--cream2);background:#fdfaf8;transition:all .15s;}
.db-meal-row:hover{border-color:#d8c0d0;background:#fff;box-shadow:var(--sh-sm);}
.db-meal-name{font-family:'Caveat',cursive;font-size:17px;font-weight:600;color:var(--ink);flex:1;}
.db-meal-link{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--sat);text-decoration:none;padding:3px 8px;border-radius:6px;background:var(--sat-bg);transition:all .15s;white-space:nowrap;flex-shrink:0;}
.db-meal-link:hover{background:var(--sat);color:#fff;}
.db-meal-link svg{width:12px;height:12px;fill:currentColor;}
.db-meal-edit{background:none;border:1.5px solid #ddd;color:var(--muted);font-size:12px;font-weight:700;padding:4px 10px;border-radius:7px;cursor:pointer;transition:all .15s;flex-shrink:0;}
.db-meal-edit:hover{border-color:var(--tue);color:var(--tue);background:var(--tue-bg);}
.db-meal-del{background:none;border:none;color:#ddd;font-size:16px;cursor:pointer;padding:0;transition:color .15s;line-height:1;flex-shrink:0;}
.db-meal-del:hover{color:var(--mon);}
.db-empty{font-size:13px;color:#c0a8b8;font-style:italic;padding:8px 4px;}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(30,20,40,.5);z-index:800;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.overlay.open{display:flex;}
.modal{background:var(--cream);border-radius:20px;padding:26px;width:90%;max-width:420px;box-shadow:var(--sh-lg);position:relative;max-height:90vh;overflow-y:auto;animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{font-family:'Cinzel',serif;font-size:19px;font-weight:700;color:var(--ink);margin-bottom:18px;padding-bottom:11px;border-bottom:2px dashed var(--cream2);}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:21px;color:var(--muted);cursor:pointer;transition:color .15s;}
.modal-close:hover{color:var(--mon);}
.flbl{font-size:11px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;margin-top:14px;display:block;}
.finput,.fselect{width:100%;padding:9px 12px;border:2px solid var(--cream2);border-radius:10px;font-family:'Caveat',cursive;font-size:17px;color:var(--ink);background:#fff;outline:none;transition:border-color .18s;}
.finput::placeholder{color:#c0a8b8;font-style:italic;}
.finput:focus,.fselect:focus{border-color:var(--tue);}
.fselect{font-family:'Nunito',sans-serif;font-size:14px;}
.flink{font-family:'Nunito',sans-serif;font-size:13px;}
.modal-hint{font-size:11px;color:var(--muted);margin-top:4px;font-style:italic;}
.modal-actions{display:flex;gap:9px;margin-top:20px;}
.btn-save{flex:1;background:linear-gradient(135deg,var(--mon),var(--tue));color:#fff;border:none;padding:10px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;cursor:pointer;transition:all .2s;}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(155,89,212,.35);}
.btn-cancel{flex:1;background:var(--cream2);color:var(--muted);border:1.5px solid #ddd;padding:10px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;}
.btn-cancel:hover{background:#ead8e4;}

/* ── MISC ── */
.banner{display:none;text-align:center;padding:13px;border-radius:14px;background:linear-gradient(135deg,#2a8a5a,#1a5a38);color:#fff;margin-bottom:18px;font-family:'Cinzel',serif;font-size:15px;font-weight:700;letter-spacing:.05em;box-shadow:var(--sh-md);animation:pop .4s cubic-bezier(.34,1.56,.64,1);}
.banner.show{display:block;}
.confetti-c{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;}
.cpiec{position:absolute;width:10px;height:10px;border-radius:2px;animation:cfall linear forwards;}
@keyframes cfall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:30px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;z-index:9000;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;box-shadow:var(--sh-lg);}
.toast.show{opacity:1;}
.toast.pink{background:var(--mon);color:#fff;}.toast.purple{background:var(--tue);color:#fff;}.toast.blue{background:var(--sat);color:#fff;}.toast.green{background:var(--thu);color:#fff;}.toast.orange{background:#d4780a;color:#fff;}
/* ── POND SCENE ── */
.pond-scene{
  position:fixed;bottom:0;left:0;right:0;
  height:320px;pointer-events:none;z-index:0;
  overflow:visible;
}
@media(max-width:700px){.pond-scene{height:240px;}}
@keyframes ripple{
  0%  {transform:scale(1);   opacity:.5;}
  50% {transform:scale(1.35);opacity:.2;}
  100%{transform:scale(1);   opacity:.5;}
}
@keyframes sway{
  0%,100%{transform:rotate(-2deg);}
  50%    {transform:rotate(2deg);}
}
@keyframes lilyBob{
  0%,100%{transform:translateY(0)  rotate(-3deg);}
  50%    {transform:translateY(3px) rotate(2deg);}
}
@keyframes waterShimmer{
  0%,100%{opacity:.35;}
  50%    {opacity:.55;}
}
@media(max-width:700px){.pond-scene{height:160px;}}

<script>
firebase.initializeApp({apiKey:"AIzaSyAw9V30gR9hc3WKS3zhO61IU6NeeKghyQM",authDomain:"wade-classical.firebaseapp.com",databaseURL:"https://wade-classical-default-rtdb.firebaseio.com",projectId:"wade-classical",storageBucket:"wade-classical.firebasestorage.app",messagingSenderId:"72309085457",appId:"1:72309085457:web:3d8b5a07302248ded6a8b0"});
const db=firebase.database();
const sdot=document.getElementById('sdot'),slbl=document.getElementById('slbl');
function setSyncing(){sdot.className='sdot syncing';slbl.textContent='Saving...';}
function setSynced(){sdot.className='sdot';slbl.textContent='Synced';}
function setSyncErr(){sdot.className='sdot err';slbl.textContent='Offline';}

const THEMES=[
  {day:'Monday',   short:'Mon',label:'Quick & Easy', emoji:'⚡',color:'#e8559a',bg:'#fde8f4',dark:'#b8206a'},
  {day:'Tuesday',  short:'Tue',label:'Taco Tuesday', emoji:'🌮',color:'#9b59d4',bg:'#f2e8fc',dark:'#6a28a8'},
  {day:'Wednesday',short:'Wed',label:'Home Cooked',  emoji:'🏠',color:'#3a8fbf',bg:'#e4f2fa',dark:'#1a5a80'},

  {day:'Saturday', short:'Sat',label:'Takeout',      emoji:'🥡',color:'#5870d4',bg:'#eaeeff',dark:'#2840a0',ft:true},
  {day:'Sunday',   short:'Sun',label:'Breakfast',    emoji:'🥞',color:'#a040c8',bg:'#f4e4fc',dark:'#6818a0'},
];

// meals[i] = [{name,link},...] — link optional
const DM=[
  [{name:'Grilled Cheese & Soup'},{name:'Quesadillas'},{name:'Fried Rice'},{name:'Scrambled Eggs & Toast'},{name:'Sandwiches'},{name:'Ramen Upgrade'}],
  [{name:'Beef Tacos'},{name:'Chicken Tacos'},{name:'Fish Tacos'},{name:'Taco Salad'},{name:'Burrito Bowls'}],
  [{name:'Roast Chicken'},{name:'Meatloaf'},{name:'Pot Pie'},{name:'Fried Chicken'},{name:'Stuffed Peppers'},{name:'Baked Salmon'}],
  [{name:'Pot Roast'},{name:'Chicken & Dumplings'},{name:'Beef Stew'},{name:'Pulled Pork'},{name:'Chili'}],
  [{name:'Spaghetti & Meatballs'},{name:'Fettuccine Alfredo'},{name:'Lasagna'},{name:'Baked Ziti'},{name:'Carbonara'}],
  [],
  [{name:'Pancakes'},{name:'Waffles'},{name:'Biscuits & Gravy'},{name:'French Toast'},{name:'Breakfast Burritos'}],
];

let S={meals:DM.map(a=>a.map(m=>({...m}))),plan:{}};
let carOff=0,curView='car',edOff=0;
// modal state
let mmEditThemeIdx=-1,mmEditMealIdx=-1;

// ── UTILS ────────────────────────────────────────────────────────
function mealName(m){return typeof m==='string'?m:(m&&m.name?m.name:'');}
function mealLink(m){return(m&&m.link)?m.link:'';}
function normMeal(m){if(typeof m==='string')return{name:m,link:''};return{name:m.name||'',link:m.link||''};}
function getMonday(off=0){const d=new Date(),dow=d.getDay()||7;d.setDate(d.getDate()-dow+1+off*7);d.setHours(0,0,0,0);return d;}
function weekKey(off=0){const m=getMonday(off),y=m.getFullYear(),s=new Date(y,0,1),wk=Math.ceil(((m-s)/86400000+s.getDay()+1)/7);return y+'-W'+String(wk).padStart(2,'0');}
function weekLabel(off=0){const m=getMonday(off),s=new Date(m);s.setDate(m.getDate()+6);const f=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});return 'Week of '+f(m);}
function dayDate(wOff,dIdx){const m=getMonday(wOff),d=new Date(m);d.setDate(m.getDate()+dIdx);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function getPlan(off){const raw=S.plan[weekKey(off)];if(!raw)return new Array(7).fill(null);if(Array.isArray(raw))return raw;const arr=new Array(7).fill(null);Object.keys(raw).forEach(k=>{const idx=parseInt(k);if(idx>=0&&idx<7)arr[idx]=raw[k];});return arr;}
function setPlanDay(off,di,meal){const k=weekKey(off);const cur=getPlan(off);cur[di]=meal;S.plan[k]=[...cur];}
function countPlanned(off){return getPlan(off).filter(m=>m!==null&&m!=='').length;}
function normArr(val,fb){if(!val)return fb.map(m=>({...m}));if(Array.isArray(val))return val.map(normMeal);const arr=[];Object.keys(val).forEach(k=>{arr[parseInt(k)]=val[k];});return arr.length?arr.map(normMeal):fb.map(m=>({...m}));}

// ── FIREBASE ─────────────────────────────────────────────────────
function loadFB(){setSyncing();db.ref('meal-planner-v3').once('value',snap=>{const v=snap.val()||{};if(v.meals){const raw=Array.isArray(v.meals)?v.meals:Object.values(v.meals);S.meals=raw.map((a,i)=>normArr(a,DM[i]));}if(v.plan&&typeof v.plan==='object')S.plan=v.plan;setSynced();renderAll();},()=>{setSyncErr();renderAll();});}
function saveFB(){setSyncing();db.ref('meal-planner-v3').set({meals:S.meals,plan:S.plan}).then(setSynced).catch(setSyncErr);}

// ── VIEWS ────────────────────────────────────────────────────────
function showView(v){
  curView=v;
  ['car','ed','db'].forEach(n=>{document.getElementById(n+'View').style.display=v===n?'block':'none';document.getElementById('btn'+n.charAt(0).toUpperCase()+n.slice(1)).classList.toggle('active',v===n);});
  if(v==='ed'){edOff=carOff;renderEditor();}
  if(v==='car')renderCarousel();
  if(v==='db')renderDB();
}
function renderAll(){renderCarousel();if(curView==='ed')renderEditor();if(curView==='db')renderDB();}

// ── CAROUSEL ─────────────────────────────────────────────────────
function renderCarousel(){buildCard('cLeft',carOff-1,'side left');buildCard('cCenter',carOff,'center');buildCard('cRight',carOff+1,'side right');}
function buildCard(elId,off,cls){
  const el=document.getElementById(elId);el.className='wcard '+cls;el.innerHTML='';
  const plan=getPlan(off),count=countPlanned(off);
  const isCenter=cls.includes('center');

  // ── header ──
  const hdr=document.createElement('div');hdr.className='card-hdr';
  const hdrInner=document.createElement('div');hdrInner.className='card-hdr-inner';

  if(isCenter){
    // sparkle dots
    const sparkles=document.createElement('div');sparkles.className='card-hdr-sparkles';hdrInner.appendChild(sparkles);
    // botanical SVG right
    const botR=document.createElement('div');botR.className='card-hdr-botanical';
    botR.innerHTML='<svg viewBox="0 0 160 72" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%"><path d="M155 60 Q130 35 100 45 Q80 52 70 38 Q58 22 75 10" stroke="#e8559a" stroke-width="1.5" fill="none"/><ellipse cx="100" cy="45" rx="14" ry="7" fill="#e8559a" transform="rotate(-20 100 45)"/><ellipse cx="82" cy="32" rx="11" ry="5.5" fill="#9b59d4" transform="rotate(-35 82 32)"/><ellipse cx="115" cy="52" rx="10" ry="5" fill="#c44090" transform="rotate(-10 115 52)"/><circle cx="76" cy="10" r="5" fill="#a040c8"/><circle cx="68" cy="4" r="3" fill="#e8559a" opacity=".7"/><path d="M130 65 Q118 50 125 38" stroke="#9b59d4" stroke-width="1" fill="none"/><ellipse cx="126" cy="36" rx="9" ry="4.5" fill="#9b59d4" transform="rotate(-50 126 36)" opacity=".8"/></svg>';
    hdrInner.appendChild(botR);
    // botanical SVG left
    const botL=document.createElement('div');botL.className='card-hdr-botanical-left';
    botL.innerHTML='<svg viewBox="0 0 80 72" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%"><path d="M5 65 Q20 40 15 15" stroke="#3a8fbf" stroke-width="1.5" fill="none"/><ellipse cx="14" cy="30" rx="12" ry="6" fill="#3a8fbf" transform="rotate(20 14 30)"/><ellipse cx="20" cy="50" rx="10" ry="5" fill="#2a8a5a" transform="rotate(10 20 50)"/></svg>';
    hdrInner.appendChild(botL);
  }

  // week label
  const lblWrap=document.createElement('div');lblWrap.style.cssText='position:relative;z-index:2;';
  const lbl=document.createElement('div');lbl.className='card-wlbl';lbl.textContent=weekLabel(off);
  if(isCenter){
    const sub=document.createElement('span');sub.className='card-wlbl-sub';sub.textContent='Wade Classical Kitchen';
    lbl.appendChild(sub);
  }
  lblWrap.appendChild(lbl);

  const comp=document.createElement('div');comp.className='card-comp'+(count===7?' done':'');
  comp.textContent=count===7?'✓ All Set!':count+'/7';
  comp.style.position='relative';comp.style.zIndex='2';

  hdrInner.appendChild(lblWrap);hdrInner.appendChild(comp);
  hdr.appendChild(hdrInner);
  el.appendChild(hdr);

  // ── days ──
  const days=document.createElement('div');days.className='card-days';
  THEMES.forEach((t,i)=>{
    const row=document.createElement('div');row.className='card-drow';

    // colored left bar
    const bar=document.createElement('div');bar.className='card-dbar';bar.style.background=t.color;

    // day label
    const dlabel=document.createElement('div');dlabel.className='card-dlabel';
    const dname=document.createElement('div');dname.className='card-dname';dname.textContent=t.day;
    const dtheme=document.createElement('div');dtheme.className='card-dtheme';dtheme.style.color=t.color;dtheme.textContent=t.label;
    dlabel.appendChild(dname);dlabel.appendChild(dtheme);

    // emoji
    const demoji=document.createElement('div');demoji.className='card-demoji-big';demoji.textContent=t.emoji;

    // meal
    const mval=plan[i];const mstr=mealName(mval);
    const mwrap=document.createElement('div');mwrap.className='card-dmeal-wrap';
    if(mstr){
      const nm=document.createElement('div');nm.className='card-dmeal';nm.textContent=mstr;
      mwrap.appendChild(nm);
      // tint the whole row with a soft wash of the theme color
      row.style.background=t.bg;
      dlabel.style.borderRightColor=t.color+'22';
    } else {
      const em=document.createElement('div');em.className='card-dempty';
      em.textContent=isCenter?'tap ✏️ to plan':'—';
      mwrap.appendChild(em);
    }

    row.appendChild(bar);row.appendChild(dlabel);row.appendChild(demoji);row.appendChild(mwrap);
    days.appendChild(row);
  });
  el.appendChild(days);

  // ── completion bar ──
  const bw=document.createElement('div');bw.className='bar-wrap';

  }
  const bt=document.createElement('div');bt.className='bar-track';
  const bf=document.createElement('div');bf.className='bar-fill';bf.style.width=(count/7*100)+'%';
  bt.appendChild(bf);bw.appendChild(bt);el.appendChild(bw);

function navCar(dir){carOff+=dir;renderCarousel();}
document.getElementById('carPrev').onclick=()=>navCar(-1);
document.getElementById('carNext').onclick=()=>navCar(1);

// ── EDITOR ───────────────────────────────────────────────────────
function renderEditor(){
  const off=edOff;
  document.getElementById('edTitle').textContent=weekLabel(off);
  const cnt=countPlanned(off);
  const ce=document.getElementById('edComp');ce.textContent=cnt===7?'🎉 All planned!':cnt+'/7 planned';ce.className='ed-comp'+(cnt===7?' done':'');
  document.getElementById('banner').classList.toggle('show',cnt===7);
  const con=document.getElementById('daySecs');
  const opens={};con.querySelectorAll('.daycard').forEach(c=>{if(c.classList.contains('open'))opens[c.dataset.day]=true;});
  con.innerHTML='';
  THEMES.forEach((t,i)=>{const plan=getPlan(off),meal=plan[i]||null;con.appendChild(buildDayCard(t,i,off,meal,opens[t.day]));});
}
function buildDayCard(t,di,off,curMeal,open){
  const curName=mealName(curMeal),curLink=mealLink(curMeal);
  const card=document.createElement('div');card.className='daycard'+(open?' open':'');card.dataset.day=t.day;card.style.borderLeftColor=t.color;
  // tint the whole card background when planned
  if(curName){ card.style.background=t.bg; }
  const hdr=document.createElement('div');hdr.className='dc-hdr';
  // tint the header strip when planned
  if(curName){ hdr.style.background=t.bg+'cc'; hdr.style.borderBottom='1px solid '+t.color+'30'; }
  const badge=document.createElement('div');badge.className='theme-badge';badge.style.background=t.color;badge.innerHTML='<span>'+t.emoji+'</span><span>'+t.label+'</span>';
  const dn=document.createElement('div');dn.className='dc-dayname';dn.textContent=t.day;
  const dt=document.createElement('div');dt.className='dc-date';dt.textContent=dayDate(off,di);
  const ic=document.createElement('div');ic.className='dc-icon';ic.textContent='▼';
  hdr.appendChild(badge);hdr.appendChild(dn);hdr.appendChild(dt);hdr.appendChild(ic);
  hdr.addEventListener('click',()=>card.classList.toggle('open'));
  card.appendChild(hdr);
  const disp=document.createElement('div');disp.className='meal-display'+(curName?' filled':'');
  if(curName){disp.style.background=t.bg;disp.style.borderColor=t.color;}
  const dEmoji=document.createElement('div');dEmoji.className='md-emoji';dEmoji.textContent=curName?t.emoji:'🍽';
  if(curName){
    const nm=document.createElement('div');nm.className='md-name';nm.textContent=curName;
    disp.appendChild(dEmoji);disp.appendChild(nm);
    if(curLink){const a=document.createElement('a');a.className='md-link';a.href=curLink;a.target='_blank';a.rel='noopener';a.textContent=curLink.includes('tiktok')?'▶ TikTok':curLink.includes('youtu')?'▶ YouTube':'▶ Recipe';disp.appendChild(a);}
    const clr=document.createElement('button');clr.className='md-clr';clr.textContent='×';
    clr.addEventListener('click',e=>{e.stopPropagation();setPlanDay(off,di,null);saveFB();renderEditor();renderCarousel();showToast('Cleared!','pink');});
    disp.appendChild(clr);
  }else{
    const em=document.createElement('div');em.className='md-empty';em.textContent='Tap to plan '+t.day+'...';
    disp.appendChild(dEmoji);disp.appendChild(em);
    disp.addEventListener('click',()=>card.classList.add('open'));
  }
  card.appendChild(disp);
  const panel=document.createElement('div');panel.className='opts-panel';
  if(t.ft){
    const wrap=document.createElement('div');wrap.className='sat-wrap';
    const inp=document.createElement('input');inp.className='sat-inp';inp.type='text';inp.placeholder='Pizza? Chinese? Sushi?...';inp.value=curName||'';
    const btn=document.createElement('button');btn.className='sat-btn';btn.textContent='Set!';
    btn.addEventListener('click',()=>{const v=inp.value.trim();if(!v)return;selectMeal(off,di,{name:v,link:''},t);});
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')btn.click();});
    wrap.appendChild(inp);wrap.appendChild(btn);panel.appendChild(wrap);
  }else{
    // ── one-off entry (just for today, no recipe box) ──
    const oneoffWrap=document.createElement('div');oneoffWrap.className='oneoff-wrap';
    const oneoffInp=document.createElement('input');oneoffInp.className='oneoff-inp';oneoffInp.type='text';oneoffInp.placeholder='Type anything just for today...';
    const oneoffBtn=document.createElement('button');oneoffBtn.className='oneoff-btn';oneoffBtn.style.background=t.color;oneoffBtn.textContent='Set for today';
    oneoffBtn.addEventListener('click',()=>{const v=oneoffInp.value.trim();if(!v)return;selectMeal(off,di,{name:v,link:''},t);oneoffInp.value='';});
    oneoffInp.addEventListener('keydown',e=>{if(e.key==='Enter')oneoffBtn.click();});
    oneoffWrap.appendChild(oneoffInp);oneoffWrap.appendChild(oneoffBtn);
    panel.appendChild(oneoffWrap);

    // ── divider ──
    const div=document.createElement('div');div.className='opts-divider';
    const divLine=document.createElement('div');divLine.className='opts-divider-line';
    const divLbl=document.createElement('span');divLbl.className='opts-divider-lbl';divLbl.textContent='or pick from your recipe box';
    div.appendChild(divLine);div.appendChild(divLbl);div.appendChild(divLine.cloneNode());
    panel.appendChild(div);

    const lbl=document.createElement('div');lbl.className='opts-lbl';lbl.textContent=t.label+' meals — click to pick:';panel.appendChild(lbl);
    const grid=document.createElement('div');grid.className='opts-grid';
    S.meals[di].forEach(meal=>{
      const mn=mealName(meal),ml=mealLink(meal);
      const chip=document.createElement('div');chip.className='mchip'+(curName===mn?' sel':'');
      if(curName===mn)chip.style.background=t.color;
      chip.innerHTML='<span>'+mn+'</span>'+(ml?'<span class="mchip-link">🔗</span>':'');
      chip.addEventListener('click',()=>selectMeal(off,di,curName===mn?null:meal,t));
      grid.appendChild(chip);
    });
    panel.appendChild(grid);
    const rand=document.createElement('button');rand.className='rand-btn';rand.textContent='🎲 Random pick for me!';
    rand.addEventListener('click',()=>{const opts=S.meals[di];if(!opts.length){showToast('Add some meals first!','orange');return;}selectMeal(off,di,opts[Math.floor(Math.random()*opts.length)],t);});
    panel.appendChild(rand);
    const ar=document.createElement('div');ar.className='add-theme-row';
    const ai=document.createElement('input');ai.className='add-tinp';ai.type='text';ai.placeholder='Quick-add a '+t.label+' meal...';
    const ab=document.createElement('button');ab.className='add-tbtn';ab.textContent='+ Add to box';
    ab.addEventListener('click',()=>{const v=ai.value.trim();if(!v)return;if(S.meals[di].find(m=>mealName(m)===v)){showToast('Already in the list!','orange');return;}S.meals[di].push({name:v,link:''});saveFB();renderEditor();showToast('"'+v+'" added to recipe box! 🌿','green');ai.value='';});
    ai.addEventListener('keydown',e=>{if(e.key==='Enter')ab.click();});
    ar.appendChild(ai);ar.appendChild(ab);panel.appendChild(ar);
  }
  card.appendChild(panel);
  return card;
}
function selectMeal(off,di,meal,t){
  const prevCount=countPlanned(off);
  setPlanDay(off,di,meal);saveFB();renderEditor();renderCarousel();
  if(meal&&mealName(meal))showToast(t.emoji+' '+mealName(meal)+' it is!','green');
  if(meal&&prevCount<7&&countPlanned(off)===7)setTimeout(launchConfetti,200);
}

// ── DATABASE ─────────────────────────────────────────────────────
function renderDB(){
  const con=document.getElementById('dbGroups');con.innerHTML='';
  THEMES.forEach((t,i)=>{
    const grp=document.createElement('div');grp.className='db-group';
    const ghdr=document.createElement('div');ghdr.className='db-group-hdr';
    const badge=document.createElement('div');badge.className='db-theme-badge';badge.style.background=t.color;badge.innerHTML='<span>'+t.emoji+'</span><span>'+t.label+'</span>';
    const title=document.createElement('div');title.className='db-group-title';title.textContent=t.day;
    const cnt=document.createElement('div');cnt.className='db-count';cnt.textContent=S.meals[i].length+' recipes';
    const addBtn=document.createElement('button');addBtn.className='db-add-here';addBtn.style.color=t.color;addBtn.textContent='+ Add';
    addBtn.addEventListener('click',()=>openAddModal(i));
    ghdr.appendChild(badge);ghdr.appendChild(title);ghdr.appendChild(cnt);ghdr.appendChild(addBtn);
    grp.appendChild(ghdr);
    const list=document.createElement('div');list.className='db-meals-list';
    if(t.ft){
      const note=document.createElement('div');note.className='db-empty';note.textContent='Saturday is a free-text field — whatever takeout you ordered!';
      list.appendChild(note);
    } else if(!S.meals[i].length){
      const em=document.createElement('div');em.className='db-empty';em.textContent='No recipes yet — add some!';
      list.appendChild(em);
    } else {
      S.meals[i].forEach((meal,mi)=>{
        const mn=mealName(meal),ml=mealLink(meal);
        const row=document.createElement('div');row.className='db-meal-row';
        const nm=document.createElement('div');nm.className='db-meal-name';nm.textContent=mn;
        row.appendChild(nm);
        if(ml){
          const a=document.createElement('a');a.className='db-meal-link';a.href=ml;a.target='_blank';a.rel='noopener';
          const icon='<svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>';
          a.innerHTML=icon+(ml.includes('tiktok')?'TikTok':ml.includes('youtu')?'YouTube':'Recipe');
          row.appendChild(a);
        }
        const editBtn=document.createElement('button');editBtn.className='db-meal-edit';editBtn.textContent='Edit';
        editBtn.addEventListener('click',()=>openEditModal(i,mi));
        const delBtn=document.createElement('button');delBtn.className='db-meal-del';delBtn.textContent='×';
        delBtn.addEventListener('click',()=>{if(confirm('Remove "'+mn+'"?')){S.meals[i].splice(mi,1);saveFB();renderAll();showToast('Removed!','pink');}});
        row.appendChild(editBtn);row.appendChild(delBtn);
        list.appendChild(row);
      });
    }
    grp.appendChild(list);
    con.appendChild(grp);
  });
}

// ── MEAL MODAL ───────────────────────────────────────────────────
function openAddModal(themeIdx){
  mmEditThemeIdx=themeIdx;mmEditMealIdx=-1;
  document.getElementById('mealModalTitle').textContent='Add a Recipe';
  document.getElementById('mmName').value='';
  document.getElementById('mmLink').value='';
  document.getElementById('mmSave').textContent='Save Recipe';
  populateCatSelect(themeIdx<0?0:themeIdx);
  document.getElementById('mealModal').classList.add('open');
  setTimeout(()=>document.getElementById('mmName').focus(),80);
}
function openEditModal(themeIdx,mealIdx){
  mmEditThemeIdx=themeIdx;mmEditMealIdx=mealIdx;
  const meal=S.meals[themeIdx][mealIdx];
  document.getElementById('mealModalTitle').textContent='Edit Recipe';
  document.getElementById('mmName').value=mealName(meal);
  document.getElementById('mmLink').value=mealLink(meal);
  document.getElementById('mmSave').textContent='Save Changes';
  populateCatSelect(themeIdx);
  document.getElementById('mealModal').classList.add('open');
  setTimeout(()=>document.getElementById('mmName').focus(),80);
}
function populateCatSelect(selectedIdx){
  const sel=document.getElementById('mmCat');sel.innerHTML='';
  THEMES.forEach((t,i)=>{if(t.ft)return;const o=document.createElement('option');o.value=i;o.textContent=t.emoji+' '+t.day+' — '+t.label;if(i===selectedIdx)o.selected=true;sel.appendChild(o);});
}
function closeMealModal(){document.getElementById('mealModal').classList.remove('open');}
function saveMealModal(){
  const name=document.getElementById('mmName').value.trim();
  const link=document.getElementById('mmLink').value.trim();
  const catIdx=parseInt(document.getElementById('mmCat').value);
  if(!name){showToast('Enter a recipe name','orange');return;}
  const mealObj={name,link};
  if(mmEditMealIdx>=0){
    // editing existing
    if(catIdx===mmEditThemeIdx){
      S.meals[mmEditThemeIdx][mmEditMealIdx]=mealObj;
    } else {
      // moved to different category
      S.meals[mmEditThemeIdx].splice(mmEditMealIdx,1);
      S.meals[catIdx].push(mealObj);
      showToast('Moved to '+THEMES[catIdx].label+'!','blue');
    }
  } else {
    // new meal
    if(S.meals[catIdx].find(m=>mealName(m)===name)){showToast('Already in that category!','orange');return;}
    S.meals[catIdx].push(mealObj);
  }
  saveFB();renderAll();closeMealModal();
  showToast('"'+name+'" saved! 🌸','pink');
}
document.getElementById('mmName').addEventListener('keydown',e=>{if(e.key==='Enter')saveMealModal();});
document.getElementById('mealModal').addEventListener('click',e=>{if(e.target===document.getElementById('mealModal'))closeMealModal();});

// ── ACTIONS ──────────────────────────────────────────────────────
function copyLastWeek(){const lp=getPlan(carOff-1);if(!lp.some(m=>mealName(m))){showToast('Last week has no meals!','orange');return;}S.plan[weekKey(carOff)]=[...lp];saveFB();renderAll();showToast('💥 Last week copied!','purple');if(countPlanned(carOff)===7)setTimeout(launchConfetti,300);}
function randomFill(){const k=weekKey(carOff);if(!S.plan[k])S.plan[k]=new Array(7).fill(null);THEMES.forEach((t,i)=>{if(!mealName(S.plan[k][i])){if(t.ft)S.plan[k][i]={name:'Takeout',link:''};else{const opts=S.meals[i];if(opts.length)S.plan[k][i]=opts[Math.floor(Math.random()*opts.length)];}}});saveFB();renderAll();showToast('🎲 Random meals picked!','purple');if(countPlanned(carOff)===7)setTimeout(launchConfetti,300);}
function launchConfetti(){const c=document.getElementById('confC'),cols=['#e8559a','#9b59d4','#3a8fbf','#2a8a5a','#c44090','#5870d4','#a040c8','#fff'];for(let i=0;i<90;i++){const p=document.createElement('div');p.className='cpiec';p.style.left=Math.random()*100+'vw';p.style.top='-20px';p.style.background=cols[Math.floor(Math.random()*cols.length)];p.style.width=(7+Math.random()*9)+'px';p.style.height=(7+Math.random()*9)+'px';p.style.borderRadius=Math.random()>.5?'50%':'2px';p.style.animationDuration=(1.4+Math.random()*2.2)+'s';p.style.animationDelay=Math.random()*.6+'s';c.appendChild(p);setTimeout(()=>p.remove(),4500);}}
let toastT;
function showToast(msg,color='pink'){clearTimeout(toastT);const el=document.getElementById('toast');el.textContent=msg;el.className='toast show '+color;toastT=setTimeout(()=>el.classList.remove('show'),2800);}

// ── PETALS ────────────────────────────────────────────────────────
(function(){
  const canvas = document.getElementById('petalsCanvas');
  const W = () => window.innerWidth;
  const H = () => window.innerHeight;

  // SVG templates — 8 designs, mix of full flowers, single petals, buds
  // Each is a function(petalColor, centerColor, size) returning SVG string
  const designs = [

    // 1 — full 5-petal cherry blossom
    (p,c,s) => `<svg width="${s}" height="${s}" viewBox="-10 -10 20 20" xmlns="http://www.w3.org/2000/svg">
      <ellipse rx="3.5" ry="7" fill="${p}" opacity=".92" transform="rotate(0)  translate(0,-5)"/>
      <ellipse rx="3.5" ry="7" fill="${p}" opacity=".88" transform="rotate(72) translate(0,-5)"/>
      <ellipse rx="3.5" ry="7" fill="${p}" opacity=".90" transform="rotate(144) translate(0,-5)"/>
      <ellipse rx="3.5" ry="7" fill="${p}" opacity=".88" transform="rotate(216) translate(0,-5)"/>
      <ellipse rx="3.5" ry="7" fill="${p}" opacity=".92" transform="rotate(288) translate(0,-5)"/>
      <circle r="2.8" fill="${c}" opacity=".95"/>
      <circle r="1.2" fill="rgba(255,255,255,.7)"/>
      <circle cx=".6" cy="-1.8" r=".4" fill="#f5c842" opacity=".9"/>
      <circle cx="1.8" cy=".6"  r=".4" fill="#f5c842" opacity=".85"/>
      <circle cx="-.6" cy="-1.8" r=".35" fill="#f5c842" opacity=".8"/>
    </svg>`,

    // 2 — 5-petal blossom, slightly open, notched petals
    (p,c,s) => `<svg width="${s}" height="${s}" viewBox="-10 -10 20 20" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,-8 C2,-5 3.5,-3 0,-1 C-3.5,-3 -2,-5 0,-8Z" fill="${p}" opacity=".9"  transform="rotate(0)"/>
      <path d="M0,-8 C2,-5 3.5,-3 0,-1 C-3.5,-3 -2,-5 0,-8Z" fill="${p}" opacity=".85" transform="rotate(72)"/>
      <path d="M0,-8 C2,-5 3.5,-3 0,-1 C-3.5,-3 -2,-5 0,-8Z" fill="${p}" opacity=".9"  transform="rotate(144)"/>
      <path d="M0,-8 C2,-5 3.5,-3 0,-1 C-3.5,-3 -2,-5 0,-8Z" fill="${p}" opacity=".85" transform="rotate(216)"/>
      <path d="M0,-8 C2,-5 3.5,-3 0,-1 C-3.5,-3 -2,-5 0,-8Z" fill="${p}" opacity=".9"  transform="rotate(288)"/>
      <circle r="2.5" fill="${c}"/>
      <circle r="1"   fill="rgba(255,255,255,.65)"/>
    </svg>`,

    // 3 — single teardrop petal (fallen from tree)
    (p,c,s) => `<svg width="${s*0.6}" height="${s}" viewBox="-5 -10 10 20" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,-9 C4,-4 4,4 0,9 C-4,4 -4,-4 0,-9Z" fill="${p}" opacity=".88"/>
      <path d="M0,-9 C1,-4 1,2 0,7" stroke="rgba(255,255,255,.35)" stroke-width=".8" fill="none"/>
    </svg>`,

    // 4 — two overlapping petals
    (p,c,s) => `<svg width="${s}" height="${s*0.7}" viewBox="-10 -7 20 14" xmlns="http://www.w3.org/2000/svg">
      <ellipse rx="6" ry="4.5" fill="${p}" opacity=".82" transform="rotate(-25) translate(-2,0)"/>
      <ellipse rx="6" ry="4.5" fill="${c}" opacity=".78" transform="rotate(20)  translate(2,0)"/>
    </svg>`,

    // 5 — small plum blossom (4 petals)
    (p,c,s) => `<svg width="${s}" height="${s}" viewBox="-10 -10 20 20" xmlns="http://www.w3.org/2000/svg">
      <ellipse rx="3" ry="6.5" fill="${p}" opacity=".9"  transform="rotate(0)   translate(0,-4)"/>
      <ellipse rx="3" ry="6.5" fill="${p}" opacity=".85" transform="rotate(90)  translate(0,-4)"/>
      <ellipse rx="3" ry="6.5" fill="${p}" opacity=".9"  transform="rotate(180) translate(0,-4)"/>
      <ellipse rx="3" ry="6.5" fill="${p}" opacity=".85" transform="rotate(270) translate(0,-4)"/>
      <circle r="2.2" fill="${c}"/>
      <circle r=".8"  fill="rgba(255,255,255,.6)"/>
    </svg>`,

    // 6 — small 6-petal flower
    (p,c,s) => `<svg width="${s}" height="${s}" viewBox="-10 -10 20 20" xmlns="http://www.w3.org/2000/svg">
      <ellipse rx="2.8" ry="6" fill="${p}" opacity=".88" transform="rotate(0)   translate(0,-4.5)"/>
      <ellipse rx="2.8" ry="6" fill="${p}" opacity=".84" transform="rotate(60)  translate(0,-4.5)"/>
      <ellipse rx="2.8" ry="6" fill="${p}" opacity=".88" transform="rotate(120) translate(0,-4.5)"/>
      <ellipse rx="2.8" ry="6" fill="${p}" opacity=".84" transform="rotate(180) translate(0,-4.5)"/>
      <ellipse rx="2.8" ry="6" fill="${p}" opacity=".88" transform="rotate(240) translate(0,-4.5)"/>
      <ellipse rx="2.8" ry="6" fill="${p}" opacity=".84" transform="rotate(300) translate(0,-4.5)"/>
      <circle r="2.4" fill="${c}"/>
      <circle r=".9"  fill="rgba(255,255,255,.55)"/>
    </svg>`,

    // 7 — drifting petal with vein detail
    (p,c,s) => `<svg width="${s*0.55}" height="${s}" viewBox="-5 -10 10 20" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,-9 C5,-3 5,5 0,9 C-5,5 -5,-3 0,-9Z" fill="${p}" opacity=".86"/>
      <path d="M0,-8 C.8,-2 .6,4 0,8"  stroke="rgba(255,255,255,.4)" stroke-width=".7" fill="none"/>
      <path d="M0,-4 C2.5,0 2.5,4 0,6"  stroke="rgba(255,255,255,.25)" stroke-width=".5" fill="none"/>
      <path d="M0,-4 C-2.5,0 -2.5,4 0,6" stroke="rgba(255,255,255,.25)" stroke-width=".5" fill="none"/>
    </svg>`,

    // 8 — tiny bud (closed flower)
    (p,c,s) => `<svg width="${s*0.55}" height="${s}" viewBox="-5 -10 10 20" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,-9 C3,-6 4,-2 3,3 C1,7 -1,7 -3,3 C-4,-2 -3,-6 0,-9Z" fill="${p}" opacity=".9"/>
      <path d="M0,-9 C1,-5 1.5,0 1,4" stroke="${c}" stroke-width=".8" fill="none" opacity=".6"/>
      <path d="M-2,-5 C-1,-2 1,-2 2,-5" stroke="${c}" stroke-width=".7" fill="none" opacity=".5"/>
    </svg>`,
  ];

  // color palettes: [petalColor, centerColor]
  const palettes = [
    ['#f8d0e8','#f5c842'],  // pale pink, gold
    ['#f4b8d8','#fff0a0'],  // blush, cream yellow
    ['#e8559a','#fff'],     // hot pink, white
    ['#c44090','#fce8a0'],  // deep rose, yellow
    ['#fce4f4','#f5c842'],  // very pale, gold
    ['#c9a0e8','#fff'],     // lavender, white
    ['#9b59d4','#fce8a0'],  // purple, cream
    ['#a040c8','#fff0d0'],  // violet, light gold
    ['#f0a0cc','#f5c842'],  // soft pink, gold
    ['#d4a0e8','#fff'],     // wisteria, white
    ['#f8e8f4','#e8559a'],  // near white, pink center
    ['#fce4f4','#c44090'],  // pale, deep rose center
  ];

  const petals = [];
  const MAX = 30;

  function makePetal(){
    const pal    = palettes[Math.floor(Math.random()*palettes.length)];
    const design = designs[Math.floor(Math.random()*designs.length)];
    const size   = 14 + Math.random()*18; // 14–32px
    const svg    = design(pal[0], pal[1], size);

    const el = document.createElement('div');
    el.className = 'petal';
    el.innerHTML = svg;
    // drop-shadow for depth
    el.style.filter = `drop-shadow(0 1px 2px rgba(180,80,140,.18))`;
    canvas.appendChild(el);

    return {
      el,
      x:     Math.random() * W(),
      y:     -40 - Math.random()*140,
      vy:    0.35 + Math.random()*0.55,
      vx:    (Math.random()-0.5)*0.5,
      rot:   Math.random()*360,
      vr:    (Math.random()-0.5)*1.8,
      sway:  Math.random()*Math.PI*2,
      scale: 0.7 + Math.random()*0.8,
      opacity: 0,
      fadeIn: true,
    };
  }

  for(let i = 0; i < MAX; i++){
    setTimeout(()=> petals.push(makePetal()), i * 230);
  }

  function tick(){
    const vh = H();
    const fadeZone = vh * 0.76;

    for(let i = petals.length-1; i >= 0; i--){
      const p = petals[i];

      p.sway += 0.016;
      p.x  += p.vx + Math.sin(p.sway) * 0.45;
      p.y  += p.vy;
      p.rot += p.vr;

      if(p.fadeIn){
        p.opacity = Math.min(p.opacity + 0.022, 0.88);
        if(p.opacity >= 0.88) p.fadeIn = false;
      }

      if(p.y > fadeZone){
        const t = (p.y - fadeZone) / (vh * 0.16);
        p.opacity = 0.88 * Math.max(0, 1 - t);
      }

      p.el.style.transform = `translate(${p.x}px, ${p.y}px) rotate(${p.rot}deg) scale(${p.scale})`;
      p.el.style.opacity   = p.opacity;

      if(p.y > vh * 0.93 && p.opacity <= 0.01){
        p.el.remove();
        petals.splice(i, 1);
        setTimeout(()=> petals.push(makePetal()), Math.random()*1800);
      }
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();

loadFB();
</script>
