<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryder's Library</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:    #060b17;
  --navy2:   #0d1526;
  --navy3:   #162035;
  --navy4:   #1e2d47;
  --blue:    #3b82f6;
  --blue2:   #2563eb;
  --steel:   #60a5fa;
  --sky:     #93c5fd;
  --dim:     #3d5270;
  --muted:   #5a7090;
  --text:    #cdd6e8;
  --subtext: #7a8fa8;
  --white:   #ffffff;
  --red:     #ef4444;
  --candle:  #60a5fa;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--navy); color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px; min-height:100vh; overflow-x:hidden; }

/* ── SPACE BACKGROUND ── */
#space-bg {
  position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none;
  background: radial-gradient(ellipse at 30% 20%, #0a1a3a 0%, transparent 55%),
              radial-gradient(ellipse at 70% 80%, #071228 0%, transparent 50%),
              radial-gradient(ellipse at 50% 50%, #0a0f1e 0%, #060b17 100%);
}
#space-stars { position:absolute; inset:0; }
.s-star { position:absolute; border-radius:50%; background:#fff; animation:sTwinkle var(--d,3s) var(--delay,0s) ease-in-out infinite; }
@keyframes sTwinkle {
  0%   { opacity:var(--op,.5); transform:scale(1); }
  20%  { opacity:calc(var(--op,.5) * 1.2); transform:scale(1.1); }
  50%  { opacity:.03; transform:scale(.4); }
  80%  { opacity:calc(var(--op,.5) * 0.8); transform:scale(0.9); }
  100% { opacity:var(--op,.5); transform:scale(1); }
}
.s-sparkle {
  animation: sSparkle var(--d,1s) var(--delay,0s) ease-in-out infinite !important;
}
@keyframes sSparkle {
  0%,100% { opacity:1; transform:scale(1); box-shadow:inherit; }
  25%  { opacity:.1; transform:scale(.3); }
  50%  { opacity:1; transform:scale(1.3); }
  75%  { opacity:.2; transform:scale(.5); }
}

/* Nebula clouds */
.nebula {
  position:absolute; border-radius:50%; pointer-events:none;
  animation: nebulaDrift var(--nd,20s) ease-in-out infinite alternate;
}
@keyframes nebulaDrift { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(var(--nx,20px),var(--ny,-15px)) scale(1.05)} }

/* Slow scan line effect — very subtle */
#space-scan {
  position:absolute; inset:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(59,130,246,0.012) 2px, rgba(59,130,246,0.012) 4px);
  pointer-events:none;
}

/* Milky Way band */
.milky-way {
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  background:
    radial-gradient(ellipse 120% 25% at 50% 35%,
      rgba(59,130,246,0.055) 0%,
      rgba(99,102,241,0.035) 30%,
      transparent 70%
    ),
    radial-gradient(ellipse 80% 15% at 60% 40%,
      rgba(14,165,233,0.04) 0%,
      transparent 60%
    );
  transform: rotate(-15deg) scaleX(1.4);
  pointer-events:none;
  animation: mwDrift 35s ease-in-out infinite alternate;
}
@keyframes mwDrift { 0%{opacity:.7;transform:rotate(-15deg) scaleX(1.4)} 100%{opacity:1;transform:rotate(-13deg) scaleX(1.45)} }

/* ── HEADER ── */
.header {
  position:sticky; top:0; z-index:100;
  background:rgba(6,11,23,0.85); backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(59,130,246,0.12);
  padding:0 32px; height:52px;
  display:flex; align-items:center; justify-content:space-between;
}
.header-left { display:flex; align-items:center; gap:20px; }
.back-btn { color:var(--muted); text-decoration:none; font-size:13px; font-weight:500; transition:color .15s; }
.back-btn:hover { color:var(--text); }
.header-title { font-size:15px; font-weight:600; color:var(--white); letter-spacing:-.2px; }
.header-tag { font-family:'DM Mono',monospace; font-size:11px; color:var(--steel); background:rgba(59,130,246,0.1); padding:2px 8px; border-radius:4px; border:1px solid rgba(59,130,246,0.2); }

/* ── MAIN ── */
.main { position:relative; z-index:10; max-width:1000px; margin:0 auto; padding:32px 24px 80px; }

/* ── TABS ── */
.tabs { display:flex; border-bottom:1px solid rgba(59,130,246,0.12); margin-bottom:32px; }
.tab { padding:10px 20px; background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all .15s; margin-bottom:-1px; white-space:nowrap; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--steel); border-bottom-color:var(--blue); }

/* ── SHELF SECTION ── */
.cf-section { margin-bottom:48px; }
.shelf-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.shelf-title { font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
.add-btn { display:inline-flex; align-items:center; gap:4px; padding:5px 12px; background:rgba(59,130,246,0.12); color:var(--steel); border:1px solid rgba(59,130,246,0.2); border-radius:5px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; transition:all .15s; }
.add-btn:hover { background:rgba(59,130,246,0.22); border-color:var(--blue); color:#fff; }

/* ── CURRENTLY READING SPOTLIGHT ── */
.cr-section { margin-bottom:52px; }
.cr-spotlight { display:flex; gap:36px; align-items:center; flex-wrap:wrap; padding:8px 0; }
.cr-book-card { display:flex; gap:24px; align-items:center; flex:1; min-width:260px; max-width:420px; }
.cr-cover-wrap { position:relative; flex-shrink:0; transition:transform .3s ease; }
.cr-cover-wrap:hover { transform:scale(1.03); }
.cr-cover-img { width:110px; height:155px; object-fit:cover; border-radius:4px; box-shadow:-4px 4px 0 rgba(0,0,0,0.5), -8px 8px 20px rgba(0,0,0,0.6), 0 0 30px rgba(59,130,246,0.15); display:block; }
.cr-cover-no-img { width:110px; height:155px; border-radius:4px; background:linear-gradient(135deg,var(--navy3),var(--navy4)); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; box-shadow:-4px 4px 0 rgba(0,0,0,0.5); }
.cr-cover-no-img span { font-size:12px; color:var(--muted); text-align:center; padding:0 8px; line-height:1.3; }
.cr-info { flex:1; }
.cr-eyebrow { font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--steel); margin-bottom:8px; }
.cr-title { font-size:20px; font-weight:600; color:var(--white); line-height:1.2; margin-bottom:4px; }
.cr-author { font-size:13px; color:var(--subtext); margin-bottom:12px; }
.cr-meta { font-family:'DM Mono',monospace; font-size:11px; color:var(--dim); margin-bottom:14px; }
.cr-progress-labels { display:flex; justify-content:space-between; margin-bottom:6px; }
.cr-progress-text { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }
.cr-progress-pct { font-family:'DM Mono',monospace; font-size:11px; color:var(--steel); }
.cr-progress-track { height:3px; background:var(--navy4); border-radius:2px; overflow:hidden; margin-bottom:14px; }
.cr-progress-fill { height:100%; background:var(--blue); border-radius:2px; transition:width .6s ease; box-shadow:0 0 8px rgba(59,130,246,0.5); }
.cr-actions { display:flex; gap:8px; }
.cr-divider { color:rgba(59,130,246,0.2); font-size:20px; align-self:center; padding:0 4px; flex-shrink:0; }
.cr-empty { padding:32px 0; color:var(--dim); font-size:14px; display:none; flex-direction:column; gap:12px; align-items:flex-start; }
.cr-books-row { display:flex; gap:24px; align-items:flex-start; flex-wrap:wrap; }

/* ── COVERFLOW ── */
.cf-stage { position:relative; height:260px; display:flex; align-items:center; justify-content:center; perspective:900px; overflow:visible; margin-bottom:0; }
.cf-track { position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; transform-style:preserve-3d; }
.cf-book { position:absolute; width:150px; height:210px; cursor:pointer; transition:all .4s cubic-bezier(.25,.8,.25,1); transform-style:preserve-3d; transform-origin:center center; flex-shrink:0; }
.cf-book:hover { z-index:30 !important; }
.cf-book-inner { width:100%; height:100%; border-radius:3px 6px 6px 3px; overflow:hidden; box-shadow:0 20px 50px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.04); }
.cf-book-cover { width:100%; height:100%; object-fit:cover; display:block; }
.cf-book-no-cover { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:16px; text-align:center; }
.cf-book-no-cover-title { font-family:'DM Sans',sans-serif; font-size:12px; color:rgba(255,255,255,.85); line-height:1.4; margin-top:8px; }
.cf-book-reflection { position:absolute; bottom:-70px; left:0; right:0; height:70px; overflow:hidden; opacity:.25; transform:scaleY(-1); filter:blur(1px); pointer-events:none; }
.cf-book-reflection img { width:100%; height:100%; object-fit:cover; object-position:top; }
.cf-book[data-pos="0"]  { transform:translateX(0) translateZ(0) rotateY(0deg) scale(1); z-index:10; filter:brightness(1); }
.cf-book[data-pos="1"]  { transform:translateX(175px) translateZ(-110px) rotateY(-36deg) scale(.88); z-index:8; filter:brightness(.55); }
.cf-book[data-pos="2"]  { transform:translateX(305px) translateZ(-200px) rotateY(-40deg) scale(.75); z-index:6; filter:brightness(.38); }
.cf-book[data-pos="3"]  { transform:translateX(395px) translateZ(-280px) rotateY(-43deg) scale(.65); z-index:4; filter:brightness(.25); }
.cf-book[data-pos="-1"] { transform:translateX(-175px) translateZ(-110px) rotateY(36deg) scale(.88); z-index:8; filter:brightness(.55); }
.cf-book[data-pos="-2"] { transform:translateX(-305px) translateZ(-200px) rotateY(40deg) scale(.75); z-index:6; filter:brightness(.38); }
.cf-book[data-pos="-3"] { transform:translateX(-395px) translateZ(-280px) rotateY(43deg) scale(.65); z-index:4; filter:brightness(.25); }
.cf-book[data-pos="hidden-right"] { transform:translateX(560px) translateZ(-380px) rotateY(-45deg) scale(.5); z-index:1; opacity:0; pointer-events:none; }
.cf-book[data-pos="hidden-left"]  { transform:translateX(-560px) translateZ(-380px) rotateY(45deg) scale(.5); z-index:1; opacity:0; pointer-events:none; }
.cf-book[data-pos="0"]:hover { transform:translateX(0) translateZ(20px) scale(1.03); }

/* CF arrows */
.cf-arrow { position:absolute; top:50%; transform:translateY(-50%); background:rgba(59,130,246,0.08); border:1px solid rgba(59,130,246,0.18); border-radius:50%; width:38px; height:38px; display:flex; align-items:center; justify-content:center; color:var(--steel); font-size:24px; cursor:pointer; transition:all .15s; z-index:20; padding-bottom:2px; }
.cf-arrow:hover { background:rgba(59,130,246,0.18); border-color:var(--blue); color:#fff; }
.cf-arrow:disabled { opacity:.2; cursor:default; }
.cf-arrow-left { left:0; }
.cf-arrow-right { right:0; }

/* CF info */
.cf-info { text-align:center; padding:14px 0 0; min-height:52px; }
.cf-info-title { font-size:15px; font-weight:600; color:var(--white); margin-bottom:3px; transition:all .3s; }
.cf-info-author { font-size:12px; color:var(--subtext); transition:all .3s; }
.cf-dots { display:flex; justify-content:center; gap:5px; margin-top:8px; }
.cf-dot { width:5px; height:5px; border-radius:50%; background:rgba(59,130,246,0.2); cursor:pointer; transition:all .3s; border:none; }
.cf-dot.active { background:var(--blue); transform:scale(1.4); }
.cf-empty { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:120px; gap:10px; color:var(--dim); font-size:14px; }

/* Finished count */
.finished-count { text-align:center; padding:24px 0 18px; border-bottom:1px solid rgba(59,130,246,0.1); margin-bottom:20px; }
.finished-number { font-family:'DM Mono',monospace; font-size:48px; font-weight:500; color:var(--blue); line-height:1; display:block; }
.finished-label { font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-top:5px; display:block; }

/* Coverflow colors for no-cover books */
.bc-blue      { background:linear-gradient(135deg,#1a3a6a,#2563eb); }
.bc-navy      { background:linear-gradient(135deg,#0d1f3c,#1e3a6e); }
.bc-steel     { background:linear-gradient(135deg,#1e3a5f,#3b82f6); }
.bc-midnight  { background:linear-gradient(135deg,#0a1628,#162850); }
.bc-electric  { background:linear-gradient(135deg,#1a2a4a,#2d5a9e); }
.bc-deep      { background:linear-gradient(135deg,#0f1c35,#1a3060); }
.bc-slate     { background:linear-gradient(135deg,#1a2840,#2a4070); }
.bc-cobalt    { background:linear-gradient(135deg,#142a50,#1d4ed8); }
.bc-indigo    { background:linear-gradient(135deg,#1e1b4b,#3730a3); }
.bc-cyan      { background:linear-gradient(135deg,#0a2a35,#0891b2); }

/* ── MODAL ── */
.modal-overlay { position:fixed; inset:0; background:rgba(4,8,18,0.9); backdrop-filter:blur(6px); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .2s; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal { background:var(--navy2); border:1px solid rgba(59,130,246,0.15); border-radius:12px; padding:28px; max-width:480px; width:100%; max-height:90vh; overflow-y:auto; position:relative; transform:translateY(12px); transition:transform .2s; scrollbar-width:thin; scrollbar-color:var(--navy4) transparent; }
.modal-overlay.open .modal { transform:translateY(0); }
.modal-title { font-size:16px; font-weight:600; color:var(--white); margin-bottom:20px; }
.modal-close { position:absolute; top:16px; right:16px; background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; transition:color .15s; line-height:1; }
.modal-close:hover { color:var(--text); }

/* FORMS */
.form-group { margin-bottom:14px; }
.form-label { display:block; font-size:11px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
.form-input,.form-select,.form-textarea { width:100%; background:var(--navy3); border:1px solid var(--navy4); border-radius:6px; padding:9px 12px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color .15s; }
.form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--blue); }
.form-select option { background:var(--navy2); }
.form-textarea { resize:vertical; min-height:72px; }
.two-col { display:flex; gap:10px; }
.two-col>div { flex:1; }

/* BUTTONS */
.btn { padding:9px 18px; border:none; border-radius:6px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all .15s; }
.btn-primary { background:var(--blue2); color:#fff; }
.btn-primary:hover { background:var(--blue); }
.btn-secondary { background:var(--navy3); color:var(--subtext); border:1px solid var(--navy4); }
.btn-secondary:hover { color:var(--text); border-color:var(--dim); }
.btn-danger { background:rgba(239,68,68,.1); color:var(--red); border:1px solid rgba(239,68,68,.2); }
.btn-danger:hover { background:rgba(239,68,68,.18); }
.btn-sm { padding:6px 12px; font-size:12px; }
.btn-row { display:flex; gap:8px; justify-content:flex-end; margin-top:18px; flex-wrap:wrap; }

/* SEARCH */
.search-results { display:flex; flex-direction:column; gap:8px; max-height:260px; overflow-y:auto; margin-top:10px; scrollbar-width:thin; scrollbar-color:var(--navy4) transparent; }
.result-item { display:flex; gap:12px; padding:10px; align-items:flex-start; background:var(--navy3); border:1px solid var(--navy4); border-radius:8px; cursor:pointer; transition:border-color .15s; }
.result-item:hover { border-color:var(--blue); }
.result-cover { width:38px; height:52px; object-fit:cover; border-radius:3px; flex-shrink:0; background:var(--navy4); }
.result-cover-ph { width:38px; height:52px; background:var(--navy4); border-radius:3px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; }
.result-info { flex:1; min-width:0; }
.result-title { font-size:13px; font-weight:500; color:var(--text); margin-bottom:2px; }
.result-author { font-size:12px; color:var(--subtext); }
.result-year { font-size:11px; color:var(--dim); font-family:'DM Mono',monospace; margin-top:2px; }

/* CONFIRM */
.confirm-area { background:var(--navy3); border:1px solid var(--navy4); border-radius:8px; padding:12px; margin-top:12px; display:none; }
.confirm-title { font-size:13px; font-weight:500; color:var(--text); margin-bottom:2px; }
.confirm-author { font-size:12px; color:var(--subtext); margin-bottom:12px; }

/* MODE TOGGLE */
.mode-toggle { display:flex; margin-bottom:16px; border:1px solid var(--navy4); border-radius:6px; overflow:hidden; }
.mode-btn { flex:1; padding:8px; background:none; border:none; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; transition:all .15s; }
.mode-btn.active { background:var(--navy3); color:var(--text); }

/* REPORT */
.report-section { margin-top:18px; padding-top:16px; border-top:1px solid var(--navy4); }
.report-title { font-size:11px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); margin-bottom:14px; }

/* STARS */
.star-row { display:flex; gap:4px; margin:6px 0; }
.star { font-size:20px; cursor:pointer; color:var(--navy4); transition:color .1s; }
.star.active { color:var(--steel); }
.star:hover { color:var(--blue); }

/* DETAIL */
.detail-header { display:flex; gap:16px; margin-bottom:20px; }
.detail-cover { width:70px; height:100px; object-fit:cover; border-radius:4px; flex-shrink:0; background:var(--navy3); }
.detail-cover-ph { width:70px; height:100px; background:var(--navy3); border-radius:4px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:28px; }
.detail-title { font-size:18px; font-weight:600; color:var(--white); margin-bottom:3px; }
.detail-author { font-size:13px; color:var(--subtext); margin-bottom:6px; }
.detail-meta { font-family:'DM Mono',monospace; font-size:11px; color:var(--dim); }

/* PROGRESS */
.progress-wrap { margin:14px 0; }
.progress-row { display:flex; justify-content:space-between; margin-bottom:6px; }
.progress-lbl { font-size:11px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); }
.progress-pct { font-family:'DM Mono',monospace; font-size:11px; color:var(--steel); }
.progress-track { height:3px; background:var(--navy4); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:var(--blue); border-radius:2px; transition:width .5s; }
.page-row { display:flex; gap:8px; align-items:center; margin-top:10px; }

/* TOAST */
.toast { position:fixed; bottom:24px; right:24px; background:var(--navy2); border:1px solid rgba(59,130,246,0.2); border-radius:8px; padding:12px 18px; color:var(--text); font-size:13px; font-weight:500; z-index:2000; opacity:0; transform:translateY(8px); transition:all .2s; pointer-events:none; box-shadow:0 8px 24px rgba(0,0,0,.5); }
.toast.show { opacity:1; transform:translateY(0); }

/* SPINNER */
.spinner { display:inline-block; width:16px; height:16px; border:2px solid var(--navy4); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg); } }

@media(max-width:600px) { .main{padding:24px 16px 60px} .modal{padding:20px 16px} .header{padding:0 16px} .cf-stage{height:220px} }
</style>
</head>
<body>

<!-- SPACE BACKGROUND -->
<div id="space-bg">
  <div id="space-stars"></div>
  <div id="space-deep-stars"></div>
  <!-- Milky Way band -->
  <div class="milky-way"></div>
  <!-- Nebula glows — richer colors -->
  <div class="nebula" style="width:700px;height:500px;top:-80px;left:-150px;background:radial-gradient(ellipse,rgba(29,78,216,0.13) 0%,rgba(99,102,241,0.06) 40%,transparent 70%);--nd:20s;--nx:35px;--ny:-18px"></div>
  <div class="nebula" style="width:600px;height:420px;top:35%;right:-120px;background:radial-gradient(ellipse,rgba(59,130,246,0.1) 0%,rgba(14,165,233,0.05) 40%,transparent 70%);--nd:25s;--nx:-30px;--ny:20px"></div>
  <div class="nebula" style="width:500px;height:380px;bottom:5%;left:15%;background:radial-gradient(ellipse,rgba(99,102,241,0.08) 0%,rgba(59,130,246,0.04) 40%,transparent 70%);--nd:18s;--nx:25px;--ny:-12px"></div>
  <div class="nebula" style="width:350px;height:250px;top:20%;left:40%;background:radial-gradient(ellipse,rgba(14,165,233,0.06) 0%,transparent 65%);--nd:30s;--nx:-15px;--ny:25px"></div>
  <div id="space-scan"></div>
</div>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <a href="index.html" class="back-btn">← Home</a>
    <span class="header-title">Ryder's Library</span>
  </div>
  <span class="header-tag">⚔️ ryder</span>
</header>

<div class="main">

<script>
var FB = {
  apiKey:"AIzaSyBsjx3JKjCQOMuus07MSoj3o-Vu9eRW6zc",
  authDomain:"wade-classical.firebaseapp.com",
  databaseURL:"https://wade-classical-default-rtdb.firebaseio.com",
  projectId:"wade-classical",
  storageBucket:"wade-classical.firebasestorage.app",
  messagingSenderId:"72309085457",
  appId:"1:72309085457:web:3d8b5a07302248ded6a8b0"
};
firebase.initializeApp(FB);
var db = firebase.database();
var PERSON = 'ryder';
var books = {reading:[],read:[],want:[],assigned:[]};
var currentShelf = 'reading';
var selectedBook = null;
var cfIndex = {read:0, want:0, assigned:0};
var crCurrentIdx = 0;

var COLORS = ['bc-blue','bc-navy','bc-steel','bc-midnight','bc-electric','bc-deep','bc-slate','bc-cobalt','bc-indigo','bc-cyan'];
var COLOR_BGSIDES = {
  'bc-blue':     'linear-gradient(135deg,#1a3a6a,#2563eb)',
  'bc-navy':     'linear-gradient(135deg,#0d1f3c,#1e3a6e)',
  'bc-steel':    'linear-gradient(135deg,#1e3a5f,#3b82f6)',
  'bc-midnight': 'linear-gradient(135deg,#0a1628,#162850)',
  'bc-electric': 'linear-gradient(135deg,#1a2a4a,#2d5a9e)',
  'bc-deep':     'linear-gradient(135deg,#0f1c35,#1a3060)',
  'bc-slate':    'linear-gradient(135deg,#1a2840,#2a4070)',
  'bc-cobalt':   'linear-gradient(135deg,#142a50,#1d4ed8)',
  'bc-indigo':   'linear-gradient(135deg,#1e1b4b,#3730a3)',
  'bc-cyan':     'linear-gradient(135deg,#0a2a35,#0891b2)'
};

function uid(){ return Date.now()+'-'+Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function randColor(s){ var h=0; for(var i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))%COLORS.length; return COLORS[h]; }

// ── FIREBASE ──
function loadBooks(){
  db.ref('library/'+PERSON).on('value',function(snap){
    var d=snap.val()||{};
    books.reading  = d.reading  ? Object.values(d.reading)  : [];
    books.read     = d.read     ? Object.values(d.read)     : [];
    books.want     = d.want     ? Object.values(d.want)     : [];
    books.assigned = d.assigned ? Object.values(d.assigned) : [];
    renderAll();
  });
}
function saveBook(shelf,book){ db.ref('library/'+PERSON+'/'+shelf+'/'+book.id).set(book); }
function deleteBook(shelf,id){ db.ref('library/'+PERSON+'/'+shelf+'/'+id).remove(); }

function renderAll(){
  renderSpotlight();
  renderShelf('read');
  renderShelf('want');
  renderShelf('assigned');
  renderReportsList();
  var n=document.getElementById('finished-num');
  var w=document.getElementById('finished-wrap');
  if(n) n.textContent=books.read.length;
  if(w) w.style.display=books.read.length?'block':'none';
}

// ── CURRENTLY READING SPOTLIGHT ──
function renderSpotlight(){
  var arr=books.reading||[];
  var empty=document.getElementById('empty-reading');
  var row=document.getElementById('cr-books-row');
  if(!arr.length){ if(empty)empty.style.display='flex'; if(row)row.style.display='none'; return; }
  if(empty)empty.style.display='none';
  if(row)row.style.display='flex';
  row.innerHTML='';
  var showCount=Math.min(arr.length,2);
  for(var i=0;i<showCount;i++){
    var book=arr[i];
    var pct=(book.pages&&book.currentPage)?Math.round(book.currentPage/book.pages*100):0;
    var pageText=book.currentPage?'Page '+book.currentPage:'Not started';
    if(book.pages) pageText+=' of '+book.pages;
    var meta=(book.year||'')+(book.year&&book.pages?' · ':'')+(book.pages?book.pages+' pages':'');
    var eyebrow=i===0?'Now Reading':'Also Reading';
    var tilt=i===0?'rotate(-2deg)':'rotate(1.5deg)';
    if(i===1){ var dv=document.createElement('div'); dv.className='cr-divider'; dv.textContent='|'; row.appendChild(dv); }
    var card=document.createElement('div'); card.className='cr-book-card';
    var cw=document.createElement('div'); cw.className='cr-cover-wrap'; cw.style.transform=tilt;
    if(book.cover){
      var ci=document.createElement('img'); ci.className='cr-cover-img'; ci.src=book.cover; ci.alt=book.title;
      var fb=document.createElement('div'); fb.className='cr-cover-no-img'; fb.innerHTML='<span>'+esc(book.title)+'</span>';
      fb.style.display='none';
      ci.addEventListener('error',(function(f){return function(){this.style.display='none';f.style.display='flex';};})(fb));
      cw.appendChild(ci); cw.appendChild(fb);
    } else {
      var noCover=document.createElement('div'); noCover.className='cr-cover-no-img'; noCover.innerHTML='<span>📖</span><span>'+esc(book.title)+'</span>';
      cw.appendChild(noCover);
    }
    var info=document.createElement('div'); info.className='cr-info';
    info.innerHTML='<div class="cr-eyebrow">'+esc(eyebrow)+'</div>'+
      '<div class="cr-title">'+esc(book.title)+'</div>'+
      '<div class="cr-author">'+esc(book.author||'')+'</div>'+
      '<div class="cr-meta">'+esc(meta)+'</div>'+
      '<div class="cr-progress-labels"><span class="cr-progress-text">'+esc(pageText)+'</span><span class="cr-progress-pct">'+pct+'%</span></div>'+
      '<div class="cr-progress-track"><div class="cr-progress-fill" style="width:'+pct+'%"></div></div>';
    var actions=document.createElement('div'); actions.className='cr-actions';
    var ob=document.createElement('button'); ob.className='btn btn-primary btn-sm'; ob.textContent='Open';
    ob.addEventListener('click',(function(b){return function(){openDetailModal(b,'reading');};})(book));
    actions.appendChild(ob);
    info.appendChild(actions);
    card.appendChild(cw); card.appendChild(info); row.appendChild(card);
  }
}

// ── COVERFLOW ──
function renderShelf(shelf){
  var arr=books[shelf]||[];
  var track=document.getElementById('track-'+shelf);
  var emp=document.getElementById('empty-'+shelf);
  var info=document.getElementById('info-'+shelf);
  var arrL=document.getElementById('arr-left-'+shelf);
  var arrR=document.getElementById('arr-right-'+shelf);
  if(!track) return;
  track.innerHTML='';
  if(!arr.length){
    if(emp)emp.style.display='flex';
    if(info)info.style.visibility='hidden';
    if(arrL)arrL.style.display='none';
    if(arrR)arrR.style.display='none';
    return;
  }
  if(emp)emp.style.display='none';
  if(info)info.style.visibility='visible';
  if(arrL)arrL.style.display='flex';
  if(arrR)arrR.style.display='flex';
  if(cfIndex[shelf]>=arr.length) cfIndex[shelf]=arr.length-1;
  if(cfIndex[shelf]<0) cfIndex[shelf]=0;
  for(var i=0;i<arr.length;i++){
    var book=arr[i];
    var card=document.createElement('div'); card.className='cf-book';
    var pos=i-cfIndex[shelf];
    if(pos>3) pos='hidden-right';
    else if(pos<-3) pos='hidden-left';
    card.dataset.pos=pos;
    var inner=document.createElement('div'); inner.className='cf-book-inner';
    if(book.cover){
      var img=document.createElement('img'); img.className='cf-book-cover'; img.src=book.cover; img.alt=book.title; inner.appendChild(img);
      var ref=document.createElement('div'); ref.className='cf-book-reflection';
      var ri=document.createElement('img'); ri.src=book.cover; ref.appendChild(ri); card.appendChild(ref);
    } else {
      inner.style.background=COLOR_BGSIDES[randColor(book.id||book.title||'x')];
      var nc=document.createElement('div'); nc.className='cf-book-no-cover';
      nc.innerHTML='<div style="font-size:28px;opacity:.3">📖</div><div class="cf-book-no-cover-title">'+esc(book.title)+'</div>';
      inner.appendChild(nc);
    }
    card.appendChild(inner);
    card.addEventListener('click',(function(b,s,di){return function(){if(cfIndex[s]===di){openDetailModal(b,s);}else{cfIndex[s]=di;renderShelf(s);}};}) (book,shelf,i));
    track.appendChild(card);
  }
  var active=arr[cfIndex[shelf]];
  var te=document.getElementById('info-title-'+shelf);
  var ae=document.getElementById('info-author-'+shelf);
  if(te)te.textContent=active.title;
  if(ae)ae.textContent=active.author||'';
  var de=document.getElementById('dots-'+shelf);
  if(de){
    de.innerHTML='';
    var md=Math.min(arr.length,12);
    for(var d=0;d<md;d++){
      var dot=document.createElement('div'); dot.className='cf-dot'+(d===cfIndex[shelf]?' active':'');
      dot.addEventListener('click',(function(s,di){return function(){cfIndex[s]=di;renderShelf(s);};})(shelf,d));
      de.appendChild(dot);
    }
  }
  if(arrL)arrL.disabled=cfIndex[shelf]===0;
  if(arrR)arrR.disabled=cfIndex[shelf]===arr.length-1;
}

function cfShift(shelf,dir){
  var arr=books[shelf]||[];
  var ni=cfIndex[shelf]+dir;
  if(ni<0||ni>=arr.length) return;
  cfIndex[shelf]=ni; renderShelf(shelf);
}

// ── TABS ──
function switchTab(tab){
  ['shelves','browse','assigned','reports'].forEach(function(t,i){
    document.getElementById('tab-'+t).style.display=t===tab?'block':'none';
    document.querySelectorAll('.tab')[i].classList.toggle('active',t===tab);
  });
  if(tab==='reports') renderReportsList();
}

// ── ADD MODAL ──
function setAddMode(mode){
  document.getElementById('add-search-mode').style.display=mode==='search'?'block':'none';
  document.getElementById('add-manual-mode').style.display=mode==='manual'?'block':'none';
  document.getElementById('mode-search').className='mode-btn'+(mode==='search'?' active':'');
  document.getElementById('mode-manual').className='mode-btn'+(mode==='manual'?' active':'');
}
function openAddModal(shelf){
  currentShelf=shelf; selectedBook=null;
  document.getElementById('add-q').value='';
  document.getElementById('add-results').innerHTML='';
  document.getElementById('add-confirm').style.display='none';
  ['s-page','s-pages','s-notes','m-title','m-author','m-year','m-cover','m-page','m-pages'].forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});
  setAddMode('search');
  openModal('modal-add');
}

// ── GOOGLE BOOKS ──
async function gbSearch(q){
  var url='https://www.googleapis.com/books/v1/volumes?q='+encodeURIComponent(q)+'&maxResults=10&printType=books&key=AIzaSyBsjx3JKjCQOMuus07MSoj3o-Vu9eRW6zc';
  var res=await fetch(url); if(!res.ok) throw new Error('HTTP '+res.status);
  var data=await res.json();
  return (data.items||[]).map(function(item){
    var v=item.volumeInfo||{};
    var cover=''; if(v.imageLinks)cover=(v.imageLinks.thumbnail||v.imageLinks.smallThumbnail||'').replace('http://','https://');
    return {title:v.title||'Unknown',author:(v.authors||[]).join(', '),year:v.publishedDate?v.publishedDate.slice(0,4):'',pages:v.pageCount||'',cover:cover};
  });
}

function renderResults(results,container,clickFn){
  container.innerHTML='';
  if(!results.length){container.innerHTML='<div style="color:var(--muted);font-size:13px;padding:10px">No results.</div>';return;}
  results.forEach(function(bk){
    var item=document.createElement('div'); item.className='result-item';
    if(bk.cover){var img=document.createElement('img');img.className='result-cover';img.src=bk.cover;img.addEventListener('error',function(){this.style.display='none';});item.appendChild(img);}
    else{var ph=document.createElement('div');ph.className='result-cover-ph';ph.textContent='📖';item.appendChild(ph);}
    var info=document.createElement('div'); info.className='result-info';
    info.innerHTML='<div class="result-title">'+esc(bk.title)+'</div><div class="result-author">'+esc(bk.author)+'</div><div class="result-year">'+esc(bk.year)+(bk.pages?' · '+bk.pages+' pages':'')+'</div>';
    item.appendChild(info);
    item.addEventListener('click',(function(b){return function(){clickFn(b);};})(bk));
    container.appendChild(item);
  });
}

async function doAddSearch(){
  var q=document.getElementById('add-q').value.trim();
  var el=document.getElementById('add-results');
  if(!q) return;
  el.innerHTML='<div style="padding:16px;text-align:center"><span class="spinner"></span></div>';
  try{ var r=await gbSearch(q); renderResults(r,el,selectBook); }
  catch(e){ el.innerHTML='<div style="color:var(--muted);font-size:13px;padding:10px">Search failed. Try Manual.</div>'; }
}

function selectBook(bk){
  selectedBook={id:uid(),title:bk.title,author:bk.author,year:bk.year,pages:bk.pages,cover:bk.cover,addedAt:Date.now(),currentPage:0,notes:'',rating:0,report:null};
  document.getElementById('add-results').innerHTML='';
  document.getElementById('confirm-title').textContent=bk.title;
  document.getElementById('confirm-author').textContent=bk.author;
  document.getElementById('s-pages').value=bk.pages||'';
  document.getElementById('add-confirm').style.display='block';
}
function clearSel(){
  selectedBook=null;
  document.getElementById('add-confirm').style.display='none';
  document.getElementById('add-results').innerHTML='';
  document.getElementById('add-q').value='';
}
function confirmAdd(){
  if(!selectedBook) return;
  selectedBook.currentPage=parseInt(document.getElementById('s-page').value)||0;
  selectedBook.pages=parseInt(document.getElementById('s-pages').value)||selectedBook.pages||'';
  selectedBook.notes=document.getElementById('s-notes').value;
  saveBook(currentShelf,selectedBook); closeModal('modal-add'); showToast('"'+selectedBook.title+'" added');
}
function confirmManual(){
  var title=document.getElementById('m-title').value.trim();
  if(!title){showToast('Enter a title');return;}
  var book={id:uid(),title:title,author:document.getElementById('m-author').value.trim(),year:document.getElementById('m-year').value.trim(),pages:parseInt(document.getElementById('m-pages').value)||'',cover:document.getElementById('m-cover').value.trim(),addedAt:Date.now(),currentPage:parseInt(document.getElementById('m-page').value)||0,notes:'',rating:0,report:null};
  saveBook(currentShelf,book); closeModal('modal-add'); showToast('"'+title+'" added');
}

// ── BROWSE ──
async function doBrowse(){
  var q=document.getElementById('browse-q').value.trim();
  var el=document.getElementById('browse-results');
  if(!q) return;
  el.innerHTML='<div style="padding:20px;text-align:center"><span class="spinner"></span></div>';
  try{
    var results=await gbSearch(q);
    if(!results.length){el.innerHTML='<div style="color:var(--muted);font-size:13px">No results.</div>';return;}
    el.innerHTML='';
    results.forEach(function(bk){
      var item=document.createElement('div'); item.className='result-item'; item.style.cursor='default';
      if(bk.cover){var img=document.createElement('img');img.className='result-cover';img.src=bk.cover;img.addEventListener('error',function(){this.style.display='none';});item.appendChild(img);}
      else{var ph=document.createElement('div');ph.className='result-cover-ph';ph.textContent='📖';item.appendChild(ph);}
      var info=document.createElement('div'); info.className='result-info';
      info.innerHTML='<div class="result-title">'+esc(bk.title)+'</div><div class="result-author">'+esc(bk.author)+'</div><div class="result-year">'+esc(bk.year)+'</div>';
      var btn=document.createElement('button'); btn.className='btn btn-secondary btn-sm'; btn.style.marginTop='6px'; btn.textContent='+ Want to Read';
      btn.addEventListener('click',(function(b,bt){return function(){
        var nb={id:uid(),title:b.title,author:b.author,year:b.year,pages:b.pages,cover:b.cover,addedAt:Date.now(),currentPage:0,notes:'',rating:0,report:null};
        saveBook('want',nb); bt.textContent='Added'; bt.disabled=true; showToast('"'+b.title+'" added');
      };})(bk,btn));
      info.appendChild(btn); item.appendChild(info); el.appendChild(item);
    });
  }catch(e){el.innerHTML='<div style="color:var(--muted);font-size:13px">Search failed.</div>';}
}

// ── DETAIL MODAL ──
function openDetailModal(book,shelf){
  var rep=book.report||{};
  var pct=(book.pages&&book.currentPage)?Math.round(book.currentPage/book.pages*100):0;
  var container=document.getElementById('detail-content'); container.innerHTML='';
  var hdr=document.createElement('div'); hdr.className='detail-header';
  if(book.cover){var ci=document.createElement('img');ci.className='detail-cover';ci.src=book.cover;hdr.appendChild(ci);}
  else{var cp=document.createElement('div');cp.className='detail-cover-ph';cp.textContent='📖';hdr.appendChild(cp);}
  var hi=document.createElement('div');
  hi.innerHTML='<div class="detail-title">'+esc(book.title)+'</div><div class="detail-author">'+esc(book.author||'')+'</div><div class="detail-meta">'+esc((book.year?book.year+' · ':'')+(book.pages?book.pages+' pages':''))+'</div>';
  hdr.appendChild(hi); container.appendChild(hdr);
  if(shelf==='reading'){
    var pw=document.createElement('div'); pw.className='progress-wrap';
    pw.innerHTML='<div class="progress-row"><span class="progress-lbl">Progress</span><span class="progress-pct">'+pct+'%</span></div><div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
    var pr=document.createElement('div'); pr.className='page-row';
    var pi=document.createElement('input'); pi.type='number'; pi.id='detail-page'; pi.value=book.currentPage||0; pi.min='0'; pi.className='form-input'; pi.style.width='90px';
    var po=document.createElement('span'); po.style.cssText='color:var(--muted);font-size:13px'; po.textContent='of '+(book.pages||'?');
    var ps=document.createElement('button'); ps.className='btn btn-secondary btn-sm'; ps.textContent='Save';
    ps.addEventListener('click',function(){updateProgress(book.id,shelf);});
    pr.appendChild(pi); pr.appendChild(po); pr.appendChild(ps); pw.appendChild(pr); container.appendChild(pw);
  }
  var rw=document.createElement('div'); rw.style.marginBottom='14px';
  var rl=document.createElement('div'); rl.style.cssText='font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:6px'; rl.textContent='Rating';
  var sr=document.createElement('div'); sr.className='star-row'; sr.id='stars-'+book.id;
  for(var n=1;n<=5;n++){var st=document.createElement('span');st.className='star'+((book.rating||0)>=n?' active':'');st.dataset.n=n;st.innerHTML='&#9733;';st.addEventListener('click',(function(nn){return function(){setRating(nn,book.id,shelf);};})(n));sr.appendChild(st);}
  rw.appendChild(rl); rw.appendChild(sr); container.appendChild(rw);
  if(shelf==='reading'||shelf==='read'){
    var rs=document.createElement('div'); rs.className='report-section';
    var rt=document.createElement('div'); rt.className='report-title'; rt.textContent='Book Report'; rs.appendChild(rt);
    var so='<option value="">— stars —</option>';
    for(var si=1;si<=5;si++) so+='<option value="'+si+'"'+(rep.stars==si?' selected':'')+'>'+si+' star'+(si>1?'s':'')+'</option>';
    rs.innerHTML+='<div class="form-group"><label class="form-label">Star Rating</label><select class="form-select" id="report-stars">'+so+'</select></div>'+
      '<div class="form-group"><label class="form-label">Characters</label><input type="text" class="form-input" id="report-chars" placeholder="Main characters..." value="'+esc(rep.characters||'')+'"></div>'+
      '<div class="form-group"><label class="form-label">Setting</label><input type="text" class="form-input" id="report-setting" placeholder="Where/when?" value="'+esc(rep.setting||'')+'"></div>'+
      '<div class="form-group"><label class="form-label">1. What was this book about?</label><textarea class="form-textarea" id="report-about" placeholder="Summarize...">'+esc(rep.about||'')+'</textarea></div>'+
      '<div class="form-group"><label class="form-label">2. What was your favorite part?</label><textarea class="form-textarea" id="report-fav" placeholder="Favorite scene or moment...">'+esc(rep.favorite||'')+'</textarea></div>'+
      '<div class="form-group"><label class="form-label">3. What is something you learned?</label><textarea class="form-textarea" id="report-learned" placeholder="What did you take away?">'+esc(rep.learned||'')+'</textarea></div>';
    var sv=document.createElement('button'); sv.className='btn btn-primary btn-sm'; sv.textContent='Save Report';
    sv.addEventListener('click',function(){saveReport(book.id,shelf);}); rs.appendChild(sv); container.appendChild(rs);
  }
  var br=document.createElement('div'); br.className='btn-row'; br.style.cssText='margin-top:16px;padding-top:14px;border-top:1px solid var(--navy4)';
  if(shelf==='reading'){var fb=document.createElement('button');fb.className='btn btn-primary btn-sm';fb.textContent='Mark Finished';fb.addEventListener('click',function(){moveBook(book.id,'reading','read');});br.appendChild(fb);}
  if(shelf==='want'){var sb=document.createElement('button');sb.className='btn btn-secondary btn-sm';sb.textContent='Start Reading';sb.addEventListener('click',function(){moveBook(book.id,'want','reading');});br.appendChild(sb);}
  if(shelf==='read'){var rb=document.createElement('button');rb.className='btn btn-secondary btn-sm';rb.textContent='Re-read';rb.addEventListener('click',function(){moveBook(book.id,'read','reading');});br.appendChild(rb);}
  if(shelf==='assigned'){var ab=document.createElement('button');ab.className='btn btn-primary btn-sm';ab.textContent='Start Reading';ab.addEventListener('click',function(){var nb=Object.assign({},book);deleteBook('assigned',book.id);saveBook('reading',nb);closeModal('modal-detail');showToast('Started reading');});br.appendChild(ab);}
  var rm=document.createElement('button'); rm.className='btn btn-danger btn-sm'; rm.textContent='Remove';
  rm.addEventListener('click',function(){closeModal('modal-detail');setTimeout(function(){if(!confirm('Remove this book?'))return;deleteBook(shelf,book.id);showToast('Removed');},150);});
  br.appendChild(rm); container.appendChild(br);
  openModal('modal-detail');
}

function updateProgress(id,shelf){
  var page=parseInt(document.getElementById('detail-page').value)||0;
  (books[shelf]||[]).forEach(function(b){if(b.id===id){b.currentPage=page;saveBook(shelf,b);}});
  showToast('Saved'); closeModal('modal-detail');
}
function setRating(n,id,shelf){
  (books[shelf]||[]).forEach(function(b){if(b.id===id){b.rating=n;saveBook(shelf,b);}});
  var c=document.getElementById('stars-'+id);
  if(c)c.querySelectorAll('.star').forEach(function(s){s.classList.toggle('active',parseInt(s.dataset.n)<=n);});
  showToast('Rating saved');
}
function saveReport(id,shelf){
  (books[shelf]||[]).forEach(function(b){
    if(b.id===id){
      b.report={stars:document.getElementById('report-stars').value,characters:document.getElementById('report-chars').value,setting:document.getElementById('report-setting').value,about:document.getElementById('report-about').value,favorite:document.getElementById('report-fav').value,learned:document.getElementById('report-learned').value,savedAt:Date.now()};
      saveBook(shelf,b);
    }
  });
  showToast('Report saved');
}
function moveBook(id,from,to){
  (books[from]||[]).forEach(function(b){if(b.id===id){var nb=Object.assign({},b,{movedAt:Date.now()});deleteBook(from,id);saveBook(to,nb);}});
  closeModal('modal-detail'); showToast('Moved');
}

function renderReportsList(){
  var el=document.getElementById('reports-list'); if(!el) return;
  var all=(books.read||[]).concat(books.reading||[]);
  var wr=all.filter(function(b){return b.report&&(b.report.about||b.report.favorite||b.report.learned);});
  if(!wr.length){el.innerHTML='<p style="color:var(--muted);font-size:13px">No reports yet. Open a book and fill in its report.</p>';return;}
  var html='';
  wr.forEach(function(b){
    var rep=b.report;
    var stars=''; if(rep.stars){for(var i=0;i<5;i++)stars+=i<parseInt(rep.stars)?'★':'☆';}
    html+='<div style="padding:16px;margin-bottom:10px;background:var(--navy2);border:1px solid var(--navy4);border-radius:10px">';
    html+='<div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:12px">';
    if(b.cover)html+='<img src="'+esc(b.cover)+'" style="width:44px;height:62px;object-fit:cover;border-radius:3px;flex-shrink:0">';
    html+='<div><div style="font-size:14px;font-weight:600;color:var(--white);margin-bottom:2px">'+esc(b.title)+'</div><div style="font-size:12px;color:var(--subtext);margin-bottom:4px">'+esc(b.author||'')+'</div>';
    if(stars)html+='<div style="font-size:13px;color:var(--steel)">'+stars+'</div>';
    html+='</div></div>';
    if(rep.characters)html+='<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:2px">Characters</div><div style="font-size:13px;color:var(--text)">'+esc(rep.characters)+'</div></div>';
    if(rep.setting)html+='<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:2px">Setting</div><div style="font-size:13px;color:var(--text)">'+esc(rep.setting)+'</div></div>';
    if(rep.about)html+='<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:2px">What was this book about?</div><div style="font-size:13px;color:var(--text);line-height:1.5">'+esc(rep.about)+'</div></div>';
    if(rep.favorite)html+='<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:2px">Favorite part</div><div style="font-size:13px;color:var(--text);line-height:1.5">'+esc(rep.favorite)+'</div></div>';
    if(rep.learned)html+='<div><div style="font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:2px">Something I learned</div><div style="font-size:13px;color:var(--text);line-height:1.5">'+esc(rep.learned)+'</div></div>';
    html+='</div>';
  });
  el.innerHTML=html;
}

function openModal(id){var ov=document.getElementById(id);ov.classList.add('open');ov.addEventListener('click',function h(e){if(e.target===ov){closeModal(id);ov.removeEventListener('click',h);}});}
function closeModal(id){document.getElementById(id).classList.remove('open');}

document.getElementById('add-q').addEventListener('keydown',function(e){if(e.key==='Enter')doAddSearch();});
document.getElementById('browse-q').addEventListener('keydown',function(e){if(e.key==='Enter')doBrowse();});

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

// ── SPACE STARS ──
(function(){
  // Bright foreground stars
  var el=document.getElementById('space-stars');
  if(el){
    for(var i=0;i<220;i++){
      var s=document.createElement('div'); s.className='s-star';
      var sz=Math.random()*2.4+0.4;
      s.style.width=sz+'px'; s.style.height=sz+'px';
      s.style.top=Math.random()*100+'%';
      s.style.left=Math.random()*100+'%';
      s.style.setProperty('--op', String(Math.random()*0.75+0.2));
      s.style.setProperty('--d',  (Math.random()*5+3)+'s');
      s.style.setProperty('--delay', (Math.random()*8)+'s');
      if(Math.random()<0.3) s.style.background='rgba(147,197,253,0.95)';
      else if(Math.random()<0.15) s.style.background='rgba(186,230,253,0.9)';
      else if(Math.random()<0.05) s.style.background='rgba(255,220,180,0.9)';
      el.appendChild(s);
    }
  }
  // Dense deep-field micro stars
  var el2=document.getElementById('space-deep-stars');
  if(el2){
    for(var j=0;j<350;j++){
      var ds=document.createElement('div'); ds.className='s-star';
      var dsz=Math.random()*0.9+0.2;
      ds.style.width=dsz+'px'; ds.style.height=dsz+'px';
      ds.style.top=Math.random()*100+'%';
      ds.style.left=Math.random()*100+'%';
      ds.style.setProperty('--op', String(Math.random()*0.45+0.08));
      ds.style.setProperty('--d',  (Math.random()*7+5)+'s');
      ds.style.setProperty('--delay', (Math.random()*14)+'s');
      if(Math.random()<0.2) ds.style.background='rgba(147,197,253,0.7)';
      el2.appendChild(ds);
    }
  }
  // Bright sparkle stars — larger, faster twinkle
  var el3=document.getElementById('space-stars');
  if(el3){
    for(var k=0;k<25;k++){
      var sp=document.createElement('div'); sp.className='s-star s-sparkle';
      var spz=Math.random()*1.5+2;
      sp.style.width=spz+'px'; sp.style.height=spz+'px';
      sp.style.top=Math.random()*100+'%';
      sp.style.left=Math.random()*100+'%';
      sp.style.boxShadow='0 0 '+(spz*3)+'px '+(spz)+'px rgba(147,197,253,0.6)';
      sp.style.setProperty('--op', '1');
      sp.style.setProperty('--d',  (Math.random()*2+2)+'s');
      sp.style.setProperty('--delay', (Math.random()*5)+'s');
      el3.appendChild(sp);
    }
  }

})();

loadBooks();
</script>
